<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Quantum Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --purple: #7000ff; --glass: rgba(255,255,255,0.03); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #000; color: white; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow-y: auto; padding-bottom: 40px; }
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 80% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 50%); z-index: -1; }
        
        header { padding: 35px 20px; display: flex; align-items: center; gap: 15px; }
        .back-btn { font-size: 1.5rem; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .back-btn:active { transform: translateX(-5px); opacity: 1; }

        /* --- VAULT CARD --- */
        .vault-hero { margin: 0 20px 25px; background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,242,255,0.02)); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; text-align: center; position: relative; overflow: hidden; }
        .vault-hero::before { content: "VAULT SECURED"; position: absolute; top: 10px; right: -30px; background: var(--cyan); color: #000; font-size: 0.5rem; font-weight: 900; padding: 5px 40px; transform: rotate(45deg); font-family: 'Orbitron'; }
        
        .staked-amt { font-family: 'Orbitron'; font-size: 2.8rem; font-weight: 900; margin: 15px 0; color: #fff; text-shadow: 0 0 20px rgba(0,242,255,0.3); }
        .info-row { display: flex; justify-content: space-between; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .info-item { text-align: left; }
        .info-label { font-size: 0.5rem; color: #555; letter-spacing: 1px; font-weight: 800; }
        .info-val { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--cyan); }

        /* --- STAKING PANEL --- */
        .stake-panel { padding: 0 20px; }
        .input-group { background: var(--glass); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .stake-input { width: 100%; background: transparent; border: none; color: white; font-family: 'Orbitron'; font-size: 1.5rem; outline: none; text-align: center; margin-top: 10px; }
        .stake-input::placeholder { color: #333; }

        .btn-stake { width: 100%; padding: 22px; border-radius: 100px; border: none; font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; background: #fff; color: #000; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(255,255,255,0.1); }
        .btn-stake:active { transform: scale(0.96); }
        
        .timer-msg { margin-top: 20px; font-size: 0.65rem; color: #666; text-align: center; line-height: 1.5; }
        .highlight { color: var(--cyan); font-weight: 800; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <header>
        <div class="back-btn" onclick="location.href='dashboard.html'">←</div>
        <div style="font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px;">QUANTUM VAULT</div>
    </header>

    <div class="vault-hero">
        <div class="info-label">TOTAL STAKED ABP</div>
        <div class="staked-amt" id="totalStaked">0</div>
        
        <div class="info-row">
            <div class="info-item">
                <div class="info-label">LOCK PERIOD</div>
                <div class="info-val">24 DAYS</div>
            </div>
            <div class="info-item" style="text-align: right;">
                <div class="info-label">EARNING APY</div>
                <div class="info-val">12.5%</div>
            </div>
        </div>
    </div>

    <div class="stake-panel">
        <div class="input-group">
            <div class="info-label" style="text-align: center;">STAKE AMOUNT</div>
            <input type="number" class="stake-input" id="stakeAmount" placeholder="0.00">
            <div id="balanceRef" style="font-size: 0.55rem; color: #444; text-align: center; margin-top: 10px;">AVAILABLE: 0 ABP</div>
        </div>

        <button class="btn-stake" id="stakeBtn">CONFIRM STAKE</button>
        
        <div class="timer-msg">
            By staking, your ABP will be locked for <span class="highlight">24 days</span>.<br>
            Early withdrawal is <span style="color:#ff4444">not permitted</span> in the beta phase.
        </div>
    </div>

    <script type="module">
        import { DBModule } from './js/database.js';
        const wallet = localStorage.getItem('userWallet');
        let userBalance = 0;

        // Fetch User Data
        DBModule.listenToProfile(wallet, (data) => {
            if(data) {
                userBalance = data.balance || 0;
                document.getElementById('totalStaked').innerText = (data.staked || 0).toLocaleString();
                document.getElementById('balanceRef').innerText = `AVAILABLE: ${userBalance.toLocaleString()} ABP`;
            }
        });

        document.getElementById('stakeBtn').onclick = async () => {
            const amount = parseInt(document.getElementById('stakeAmount').value);
            
            if(isNaN(amount) || amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }
            if(amount > userBalance) {
                alert("Insufficient ABP balance!");
                return;
            }

            // Logic: Reduce Balance, Increase Staked
            try {
                document.getElementById('stakeBtn').innerText = "PROCESSING...";
                await DBModule.updateBalance(wallet, -amount);
                await DBModule.updateStaked(wallet, amount);
                
                alert(`Successfully staked ${amount} ABP for 24 days!`);
                document.getElementById('stakeAmount').value = '';
                document.getElementById('stakeBtn').innerText = "CONFIRM STAKE";
            } catch (e) {
                alert("Vault connection failed. Try again.");
                document.getElementById('stakeBtn').innerText = "CONFIRM STAKE";
            }
        };
    </script>
</body>
</html>
