<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Identity Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Bottom overlap protection */
        .profile-wrapper { padding-bottom: 120px; }

        .rank-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px;
            text-align: center; position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        .rank-badge {
            width: 95px; height: 95px; margin: 0 auto 15px;
            background: rgba(255,255,255,0.03); border: 2px solid var(--cyan);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; box-shadow: 0 0 25px var(--cyan-glow);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* NEW: CIBIL STYLE GAUGE METER */
        .gauge-container {
            position: relative; width: 200px; height: 120px; margin: 20px auto 0;
            overflow: hidden;
        }
        .gauge-svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 12; stroke-linecap: round; }
        .gauge-track { fill: none; stroke-width: 12; stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 251; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Needle/Arrow Styling */
        .needle {
            position: absolute; bottom: 10px; left: 50%; width: 4px; height: 70px;
            background: #fff; transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg);
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .needle::before {
            content: ''; position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%); border-left: 6px solid transparent;
            border-right: 6px solid transparent; border-bottom: 12px solid #fff;
        }
        .needle-pivot {
            position: absolute; bottom: 0; left: 50%; width: 12px; height: 12px;
            background: #fff; border-radius: 50%; transform: translate(-50%, 50%);
        }

        .score-display { margin-top: -10px; position: relative; z-index: 5; }
        .score-value { font-family: 'Orbitron'; font-size: 2rem; font-weight: 900; display: block; color: #fff; }
        .score-label { font-size: 9px; color: #666; font-family: 'Orbitron'; letter-spacing: 2px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .stat-box { 
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 18px; 
            border: 1px solid var(--glass-border); text-align: center;
        }

        .leaderboard-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: rgba(255,255,255,0.02);
            border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--glass-border);
        }
        
        .rank-num { font-family: 'Orbitron'; font-weight: 900; width: 30px; color: var(--cyan); font-size: 14px; }
        .rank-addr { font-size: 11px; color: #aaa; flex: 1; margin-left: 10px; font-family: 'Orbitron'; }
        .rank-pts { font-family: 'Orbitron'; font-size: 12px; color: #fff; font-weight: bold; }

        .logout-btn {
            width: 100%; margin-top: 25px; background: transparent; 
            border: 1px solid #333; color: #555; padding: 15px; 
            border-radius: 15px; font-family: 'Orbitron'; font-size: 10px;
            letter-spacing: 2px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <header style="text-align: center; margin-bottom: 25px;">
            <div style="font-size: 9px; color: var(--cyan); font-family: 'Orbitron'; letter-spacing: 3px; margin-bottom: 5px;">PROTOCOL_IDENTITY</div>
            <p id="user-wallet-full" style="font-size: 10px; color: #444; word-break: break-all; font-family: monospace;">0x...</p>
        </header>

        <section class="rank-card">
            <div id="rank-glow" class="rank-badge">🎖️</div>
            <h2 id="rank-title" style="font-family: 'Orbitron'; color: #fff; margin-bottom: 8px; font-size: 1.2rem; letter-spacing: 1px;">INITIALIZING...</h2>
            
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 60">
                    <path class="gauge-bg" d="M10 50 A40 40 0 0 1 90 50" />
                    <path id="gauge-fill" class="gauge-track" d="M10 50 A40 40 0 0 1 90 50" stroke="#ff3e3e" />
                </svg>
                <div id="gauge-needle" class="needle"></div>
                <div class="needle-pivot"></div>
            </div>

            <div class="score-display">
                <span id="credit-score-val" class="score-value">300</span>
                <span class="score-label">ADVANCE ELIGIBLE SCORE</span>
                <div id="score-trend" style="font-family: 'Orbitron'; font-size: 8px; margin-top: 5px;">
                    <span style="color: #ff3e3e;">▼ INACTIVE DECAY</span>
                </div>
            </div>

            <p id="eligibility-note" style="font-size: 8px; color: #444; margin-top: 15px; font-weight: bold; font-family: 'Orbitron'; text-transform: uppercase;">
                Min 550 Score & 5 Refs for $ADS Claim
            </p>
        </section>

        <div class="stat-grid">
            <div class="stat-box">
                <span style="font-size: 9px; color: #555; display: block; font-family: 'Orbitron'; margin-bottom: 5px;">ABP POINTS</span>
                <span id="stat-balance" style="font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: #fff;">0.00</span>
            </div>
            <div class="stat-box">
                <span style="font-size: 9px; color: #555; display: block; font-family: 'Orbitron'; margin-bottom: 5px;">NETWORK NODES</span>
                <span id="stat-refs" style="font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: #fff;">0</span>
            </div>
            <div class="stat-box">
                <span style="font-size: 9px; color: #555; display: block; font-family: 'Orbitron'; margin-bottom: 5px;">ACTIVITY</span>
                <span id="stat-activity" style="font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: var(--p-green);">ONLINE</span>
            </div>
            <div class="stat-box">
                <span style="font-size: 9px; color: #555; display: block; font-family: 'Orbitron'; margin-bottom: 5px;">ENGAGEMENT</span>
                <span id="stat-social" style="font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: #fff;">0%</span>
            </div>
        </div>

        <section class="leaderboard-section" style="margin-top: 35px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
                <h3 style="font-family: 'Orbitron'; font-size: 11px; color: #fff; letter-spacing: 2px;">GLOBAL_RANKING</h3>
                <span style="font-size: 9px; color: var(--p-green); font-family: 'Orbitron';">LIVE FEED</span>
            </div>
            <div id="leaderboard-container"></div>
        </section>

        <button class="logout-btn" onclick="logout()">TERMINATE SESSION</button>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠 HOME</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item active">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
        const userWallet = localStorage.getItem('adamas_user');

        function formatABP(num) {
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return parseFloat(num).toFixed(2);
        }

        window.onload = () => {
            if(!userWallet) window.location.href = "index.html";
            document.getElementById('user-wallet-full').innerText = userWallet;

            db.ref('users/' + userWallet.toLowerCase()).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('stat-balance').innerText = formatABP(data.balance || 0);
                    
                    let tasksDone = 0;
                    for(let i=1; i<=4; i++) {
                        if(localStorage.getItem('adamas_task_t'+i) === 'verified') tasksDone++;
                    }
                    const engagement = Math.round((tasksDone / 4) * 100);
                    document.getElementById('stat-social').innerText = engagement + "%";
                    document.getElementById('stat-refs').innerText = data.referralCount || 0;

                    calculateAdvanceScore(data, engagement);
                    updateRankUI(data);
                }
            });
            loadLeaderboard();
        };

        function calculateAdvanceScore(data, engagement) {
            const minScore = 300;
            const maxScore = 900;
            const refs = data.referralCount || 0;
            
            let socialPoints = Math.min(refs * 60, 300); 
            let miningPoints = (engagement / 100) * 200;
            let stabilityPoints = 100;

            const lastActive = new Date(data.joinedAt).getTime(); 
            const hoursSince = (Date.now() - lastActive) / (1000 * 60 * 60);
            
            if(hoursSince > 24) {
                stabilityPoints -= Math.min(hoursSince * 0.5, 100);
                document.getElementById('score-trend').innerHTML = `<span style="color: #ff3e3e;">▼ DECAYING (-${Math.round(hoursSince*0.1)})</span>`;
            } else {
                document.getElementById('score-trend').innerHTML = `<span style="color: var(--p-green);">▲ STABLE (+12)</span>`;
            }

            let totalScore = minScore + socialPoints + miningPoints + stabilityPoints;

            // 55% BARRIER CHECK
            if (refs < 5 && totalScore > 550) {
                totalScore = 550;
            }

            totalScore = Math.floor(Math.min(totalScore, maxScore));

            // UI Updates - Gauge & Needle
            const scoreVal = document.getElementById('credit-score-val');
            const gaugeFill = document.getElementById('gauge-fill');
            const needle = document.getElementById('gauge-needle');
            
            scoreVal.innerText = totalScore;

            // Calculate rotation (-90deg to 90deg)
            const percent = (totalScore - 300) / (900 - 300);
            const rotation = (percent * 180) - 90;
            needle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;

            // Update Gauge Color and Stroke
            const offset = 251 - (percent * 125); // Fill half the circle
            gaugeFill.style.strokeDashoffset = offset;

            if(totalScore >= 750) {
                gaugeFill.style.stroke = "var(--p-green)";
                scoreVal.style.color = "var(--p-green)";
            } else if (totalScore >= 550) {
                gaugeFill.style.stroke = "var(--cyan)";
                scoreVal.style.color = "var(--cyan)";
            } else {
                gaugeFill.style.stroke = "#ff3e3e";
                scoreVal.style.color = "#ff3e3e";
            }
        }

        function updateRankUI(data) {
            const title = document.getElementById('rank-title');
            const badge = document.getElementById('rank-glow');
            const score = parseInt(document.getElementById('credit-score-val').innerText);

            if(data.role === "FOUNDER") {
                title.innerText = "DIAMOND FOUNDER";
                badge.innerText = "💎";
            } else if(score >= 750) {
                title.innerText = "GOLD VALIDATOR";
                badge.innerText = "🥇";
            } else if(score >= 550) {
                title.innerText = "SILVER NODE";
                badge.innerText = "🥈";
            } else {
                title.innerText = "BRONZE NODE";
                badge.innerText = "🥉";
            }
        }

        function loadLeaderboard() {
            db.ref('users').orderByChild('balance').limitToLast(10).on('value', (snapshot) => {
                const container = document.getElementById('leaderboard-container');
                let users = [];
                snapshot.forEach(child => { users.push({ wallet: child.key, ...child.val() }); });
                users.reverse();
                let html = "";
                users.forEach((u, index) => {
                    let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1);
                    html += `<div class="leaderboard-item"><div class="rank-num">${medal}</div><div class="rank-addr">${u.wallet.substring(0,8)}...</div><div class="rank-pts">${formatABP(u.balance || 0)}</div></div>`;
                });
                container.innerHTML = html;
            });
        }

        function logout() { localStorage.removeItem('adamas_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
