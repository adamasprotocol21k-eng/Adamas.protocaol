<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Identity Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { 
            --cyan: #00f2ff; 
            --cyan-glow: rgba(0, 242, 255, 0.4); 
            --p-green: #adff2f; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { background: #050505; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .profile-wrapper { padding: 20px; padding-bottom: 140px; max-width: 440px; margin: 0 auto; animation: fadeIn 0.8s ease-out; }

        /* --- RANK CARD --- */
        .rank-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid var(--glass-border); border-radius: 35px; padding: 40px 25px;
            text-align: center; position: relative; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .rank-badge {
            width: 90px; height: 90px; margin: 0 auto 20px;
            background: rgba(0,0,0,0.6); border: 2px solid var(--cyan);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; box-shadow: 0 0 30px var(--cyan-glow);
            position: relative; z-index: 2;
        }

        /* --- GAUGE SYSTEM --- */
        .gauge-container { position: relative; width: 220px; height: 120px; margin: 20px auto 0; overflow: hidden; }
        .gauge-svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 8; stroke-linecap: round; }
        .gauge-track { 
            fill: none; stroke-width: 8; stroke-linecap: round; 
            stroke-dasharray: 251; stroke-dashoffset: 251; 
            transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .needle {
            position: absolute; bottom: 10px; left: 50%; width: 3px; height: 70px;
            background: linear-gradient(to top, #fff, var(--cyan)); transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg); transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px; z-index: 4;
        }

        .score-display { margin-top: -5px; position: relative; z-index: 10; }
        .score-value { font-family: 'Orbitron'; font-size: 2.4rem; font-weight: 900; color: #fff; }
        .score-label { font-size: 8px; color: #555; font-family: 'Orbitron'; letter-spacing: 2px; display: block; margin-top: 5px; }

        /* --- STAT GRID --- */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .stat-box { 
            background: var(--glass); padding: 20px 10px; border-radius: 22px; 
            border: 1px solid var(--glass-border); text-align: center;
        }
        .stat-box .val { font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: #eee; display: block; margin-top: 6px; }
        .stat-box .lbl { font-size: 7px; color: #444; font-family: 'Orbitron'; letter-spacing: 1.5px; }

        /* --- LEADERBOARD --- */
        .leaderboard-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 22px; background: rgba(255,255,255,0.02);
            border-radius: 24px; margin-bottom: 12px; border: 1px solid var(--glass-border);
        }
        .rank-num { font-family: 'Orbitron'; font-weight: 900; width: 30px; color: var(--cyan); font-size: 13px; }
        .rank-addr { font-size: 10px; color: #666; flex: 1; margin-left: 10px; font-family: 'Orbitron'; }
        .rank-pts { font-family: 'Orbitron'; font-size: 11px; color: #fff; font-weight: bold; }

        /* --- NAVIGATION --- */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; align-items: center;
            padding: 18px 0; border-top: 1px solid var(--glass-border); 
            z-index: 10000;
        }
        .nav-item { 
            text-decoration: none; color: #444; font-size: 9px; 
            font-family: 'Orbitron'; font-weight: 700; text-align: center;
            display: flex; flex-direction: column; gap: 6px; transition: 0.3s;
        }
        .nav-item.active { color: var(--cyan); }
        .nav-item span { font-size: 16px; margin-bottom: 2px; }

        .logout-btn {
            width: 100%; margin-top: 40px; background: rgba(255, 62, 62, 0.05); 
            border: 1px solid rgba(255, 62, 62, 0.1); color: #ff3e3e; padding: 18px; 
            border-radius: 22px; font-family: 'Orbitron'; font-size: 9px;
            letter-spacing: 3px; cursor: pointer; transition: 0.3s; font-weight: 900;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <header style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 8px; color: var(--cyan); font-family: 'Orbitron'; letter-spacing: 5px; margin-bottom: 10px; opacity: 0.8;">TERMINAL_IDENTITY_v2.0</div>
            <p id="user-wallet-full" style="font-size: 9px; color: #333; word-break: break-all; font-family: monospace; opacity: 0.6;">0x...</p>
        </header>

        <section class="rank-card">
            <div id="rank-glow" class="rank-badge">🥉</div>
            <h2 id="rank-title" style="font-family: 'Orbitron'; color: #fff; margin-bottom: 5px; font-size: 1.1rem; letter-spacing: 2px;">SCANNING...</h2>
            
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 60">
                    <path class="gauge-bg" d="M10 50 A40 40 0 0 1 90 50" />
                    <path id="gauge-fill" class="gauge-track" d="M10 50 A40 40 0 0 1 90 50" stroke="var(--cyan)" />
                </svg>
                <div id="gauge-needle" class="needle"></div>
            </div>

            <div class="score-display">
                <span id="credit-score-val" class="score-value">300</span>
                <span class="score-label">LOYALTY_SYNC_SCORE</span>
                <div id="score-trend" style="font-family: 'Orbitron'; font-size: 8px; margin-top: 10px;">
                    <span style="color: #444; letter-spacing: 1px;">ANALYZING_STABILITY...</span>
                </div>
            </div>
        </section>

        <div class="stat-grid">
            <div class="stat-box">
                <span class="lbl">TOTAL_ABP</span>
                <span id="stat-balance" class="val">0.00</span>
            </div>
            <div class="stat-box">
                <span class="lbl">ACTIVE_NODES</span>
                <span id="stat-refs" class="val">0</span>
            </div>
            <div class="stat-box">
                <span class="lbl">STREAK</span>
                <span id="stat-streak" class="val">1 DAY</span>
            </div>
            <div class="stat-box">
                <span class="lbl">SYNC_RATE</span>
                <span id="stat-social" class="val">0%</span>
            </div>
        </div>

        <section class="leaderboard-section" style="margin-top: 45px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding: 0 5px;">
                <h3 style="font-family: 'Orbitron'; font-size: 10px; color: #444; letter-spacing: 2px;">GLOBAL_LEADERBOARD</h3>
                <span style="font-size: 8px; color: var(--p-green); font-family: 'Orbitron'; font-weight: 900;">LIVE</span>
            </div>
            <div id="leaderboard-container"></div>
        </section>

        <button class="logout-btn" onclick="logout()">TERMINATE_SESSION</button>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item"><span>🏠</span>HOME</a>
            <a href="vault.html" class="nav-item"><span>🔒</span>VAULT</a>
            <a href="missions.html" class="nav-item"><span>⚡</span>TASKS</a>
            <a href="referral.html" class="nav-item"><span>👥</span>NETWORK</a>
            <a href="profile.html" class="nav-item active"><span>🏆</span>RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
        const userWallet = localStorage.getItem('adamas_user');

        window.onload = () => {
            if(!userWallet) window.location.href = "index.html";
            document.getElementById('user-wallet-full').innerText = userWallet;

            db.ref('users/' + userWallet.toLowerCase()).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    const balance = parseFloat(data.balance) || 0;
                    document.getElementById('stat-balance').innerText = balance.toLocaleString();
                    document.getElementById('stat-streak').innerText = (data.streak || 1) + " DAYS";
                    
                    let tasksDone = 0;
                    if(data.completedMissions) tasksDone = Object.keys(data.completedMissions).length;
                    if(data.quizDone) tasksDone += 1;

                    const engagement = Math.min(100, Math.round((tasksDone / 6) * 100));
                    document.getElementById('stat-social').innerText = engagement + "%";
                    
                    db.ref('users').orderByChild('referredBy').equalTo(userWallet.toLowerCase()).once('value', refSnap => {
                        const refCount = refSnap.numChildren() || 0;
                        document.getElementById('stat-refs').innerText = refCount;
                        calculateScore(data, engagement, refCount);
                    });
                }
            });
            loadLeaderboard();
        };

        function calculateScore(data, engagement, refCount) {
            const minScore = 300;
            const maxScore = 900;
            
            let socialPoints = Math.min(refCount * 60, 350); 
            let activityPoints = (engagement / 100) * 150;
            let streakPoints = Math.min((data.streak || 1) * 20, 100);

            let totalScore = minScore + socialPoints + activityPoints + streakPoints;
            if (refCount < 5 && totalScore > 550) { totalScore = 550; }
            totalScore = Math.floor(Math.min(totalScore, maxScore));

            const scoreVal = document.getElementById('credit-score-val');
            const gaugeFill = document.getElementById('gauge-fill');
            const needle = document.getElementById('gauge-needle');
            
            scoreVal.innerText = totalScore;

            const percent = (totalScore - 300) / (maxScore - 300);
            const rotation = (percent * 180) - 90;
            needle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
            gaugeFill.style.strokeDashoffset = 251 - (percent * 251);

            const trend = document.getElementById('score-trend');
            const badge = document.getElementById('rank-glow');
            const title = document.getElementById('rank-title');

            if(totalScore >= 750) {
                gaugeFill.style.stroke = "var(--p-green)";
                scoreVal.style.color = "var(--p-green)";
                trend.innerHTML = `<span style="color: var(--p-green);">▲ ELITE_NODE</span>`;
                badge.innerText = "🥇"; title.innerText = "EXECUTIVE_VALIDATOR";
            } else if (totalScore >= 550) {
                gaugeFill.style.stroke = "var(--cyan)";
                scoreVal.style.color = "var(--cyan)";
                trend.innerHTML = `<span style="color: var(--cyan);">▲ PRIME_STATUS</span>`;
                badge.innerText = "🥈"; title.innerText = "PRIME_NODE";
            } else {
                gaugeFill.style.stroke = "#ff3e3e";
                scoreVal.style.color = "#ff3e3e";
                trend.innerHTML = `<span style="color: #ff3e3e;">▼ BASE_SYNC</span>`;
                badge.innerText = "🥉"; title.innerText = "BASE_PARTICLE";
            }
        }

        function loadLeaderboard() {
            db.ref('users').orderByChild('balance').limitToLast(10).on('value', (snapshot) => {
                const container = document.getElementById('leaderboard-container');
                let users = [];
                snapshot.forEach(child => { users.push({ wallet: child.key, ...child.val() }); });
                users.reverse();
                let html = "";
                users.forEach((u, index) => {
                    let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1);
                    html += `<div class="leaderboard-item">
                                <div class="rank-num">${medal}</div>
                                <div class="rank-addr">${u.wallet.substring(0,6)}...${u.wallet.slice(-4)}</div>
                                <div class="rank-pts">${(u.balance || 0).toLocaleString()} ABP</div>
                             </div>`;
                });
                container.innerHTML = html;
            });
        }

        function logout() { localStorage.removeItem('adamas_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
