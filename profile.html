<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | ADAMAS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .header {
            padding: 15px 20px; display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 1.2rem; }

        .container { padding: 30px 20px 100px; max-width: 500px; margin: auto; text-align: center; }

        /* Profile Image Section */
        .profile-pic-container {
            position: relative; width: 120px; height: 120px; margin: 0 auto 20px;
        }
        .profile-pic {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--primary); box-shadow: 0 0 20px var(--primary);
            background: var(--dark);
        }
        .upload-icon {
            position: absolute; bottom: 5px; right: 5px; background: var(--secondary);
            width: 35px; height: 35px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            border: 2px solid white; font-size: 1rem;
        }

        /* Form Styling */
        .profile-card {
            background: var(--glass); border-radius: 25px; padding: 30px 20px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            text-align: left; transform-style: preserve-3d;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; font-family: 'Orbitron'; font-size: 0.7rem;
            color: var(--primary); margin-bottom: 8px; letter-spacing: 1px;
        }
        .input-group input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 12px; color: white; font-family: 'Rajdhani';
            font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .note-box {
            background: rgba(255, 204, 0, 0.1); border-left: 4px solid #ffcc00;
            padding: 15px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 25px;
            color: #ffcc00;
        }

        .save-btn {
            width: 100%; background: transparent; border: 2px solid var(--primary);
            color: var(--primary); padding: 15px; border-radius: 100px;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            transition: 0.4s; text-transform: uppercase; letter-spacing: 2px;
        }
        .save-btn:hover { background: var(--primary); color: black; box-shadow: 0 0 30px var(--primary); }

        /* Dock */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 11, 16, 0.8); backdrop-filter: blur(20px);
            padding: 10px 25px; border-radius: 100px; display: flex; gap: 25px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .dock-item { text-decoration: none; font-size: 1.2rem; opacity: 0.5; transition: 0.3s; color: white; }
        .dock-item.active { opacity: 1; color: var(--primary); transform: scale(1.2); }

    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <a href="dashboard.html" class="back-btn">←</a>
        <div style="font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 1px;">MY IDENTITY</div>
    </div>

    <div class="container">
        <div class="profile-pic-container">
            <img src="assets/logo.png" id="profileDisplay" class="profile-pic" alt="User">
            <label for="fileInput" class="upload-icon">📷</label>
            <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="previewImage(event)">
        </div>

        <div style="font-family: 'Orbitron'; margin-bottom: 25px; font-size: 0.8rem; opacity: 0.6;" id="displayWallet">0x...Loading</div>

        <div class="profile-card">
            <div class="input-group">
                <label>FULL NAME</label>
                <input type="text" id="userName" placeholder="Enter your real name">
            </div>

            <div class="input-group">
                <label>EMAIL ADDRESS</label>
                <input type="email" id="userEmail" placeholder="name@example.com">
            </div>

            <div class="note-box">
                <strong>Note:</strong> Make sure your name matches your ID for future ADS Token Airdrop verification.
            </div>

            <button class="save-btn" onclick="saveProfile()">Save Profile</button>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item">🏠</a>
        <a href="wallet.html" class="dock-item">💰</a>
        <a href="invite.html" class="dock-item">👥</a>
        <a href="profile.html" class="dock-item active">👤</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 1. 3D Background Logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(500 * 3);
        for(let i=0; i < 1500; i++) posArray[i] = (Math.random() - 0.5) * 10;
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0x00f2ff });
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);
        camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); particlesMesh.rotation.y += 0.001; renderer.render(scene, camera); }
        animate();

        // 2. Image Upload Preview Logic
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('profileDisplay');
                output.src = reader.result;
                localStorage.setItem('userProfilePic', reader.result); // Save locally
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // 3. Save Logic
        function saveProfile() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            localStorage.setItem('userName', name);
            localStorage.setItem('userEmail', email);
            alert("Profile Updated Successfully! 🚀");
        }

        window.onload = function() {
            const addr = localStorage.getItem('userWallet');
            if(addr) document.getElementById('displayWallet').innerText = addr;
            
            const savedPic = localStorage.getItem('userProfilePic');
            if(savedPic) document.getElementById('profileDisplay').src = savedPic;
            
            document.getElementById('userName').value = localStorage.getItem('userName') || "";
            document.getElementById('userEmail').value = localStorage.getItem('userEmail') || "";
        }
    </script>
</body>
</html>
