<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>User Profile | Adamas Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateAllUI()">

    <div style="padding: 40px 20px; text-align: center;">
        <div style="width: 100px; height: 100px; background: #1e2329; border: 2px solid #F3BA2F; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;">👤</div>
        
        <h3 id="userWalletAddr" style="color: #F3BA2F; margin: 0; font-size: 0.9rem;">0x...</h3>
        <p style="color: #848e9c; font-size: 0.7rem; margin-top: 5px;">Elite Member</p>

        <div class="glass-card" style="margin-top: 30px; padding: 25px; text-align: left;">
            <label style="color: #848e9c; font-size: 0.7rem;">DISPLAY NAME</label>
            <input type="text" id="userName" placeholder="Enter Name" style="width:100%; background:#000; border:1px solid #333; padding:12px; border-radius:10px; color:#fff; margin:10px 0 20px;">

            <label style="color: #848e9c; font-size: 0.7rem;">EMAIL ADDRESS</label>
            <input type="email" id="userEmail" placeholder="name@example.com" style="width:100%; background:#000; border:1px solid #333; padding:12px; border-radius:10px; color:#fff; margin:10px 0;">
            
            <button class="btn-neon-large" style="margin-top: 20px; width: 100%;" onclick="saveProfile()">SAVE PROFILE</button>
            <button class="btn-neon-large" style="margin-top: 10px; width: 100%; background: transparent; border: 1px solid #333; color: #848e9c;" onclick="location.href='dashboard.html'">SKIP FOR NOW</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="games.html" class="nav-item">🎮 Games</a>
        <a href="earn.html" class="nav-item">⛏️ Earn</a>
        <a href="invite.html" class="nav-item">🔗 Invite</a>
        <a href="wallet.html" class="nav-item">💰 Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function saveProfile() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const wallet = window.userStats.wallet;

            if(!name || !email) return showNotification("Please fill all fields");

            firebase.database().ref('users/' + wallet).update({
                name: name,
                email: email
            }).then(() => {
                showNotification("Profile Updated!");
                setTimeout(() => location.href = 'dashboard.html', 1500);
            });
        }
    </script>
</body>
</html>
