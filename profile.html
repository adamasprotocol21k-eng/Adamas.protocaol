<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Identity Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* FIX: Content overlap */
        .profile-wrapper { padding-bottom: 120px; }

        .rank-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px;
            text-align: center; position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        .rank-badge {
            width: 95px; height: 95px; margin: 0 auto 15px;
            background: rgba(255,255,255,0.03); border: 2px solid var(--cyan);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; box-shadow: 0 0 25px var(--cyan-glow);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 4 Main Eligibility Metrics */
        .eligibility-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;
        }
        .metric-box {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 15px; text-align: left;
        }
        .metric-label { font-size: 8px; color: #666; font-family: 'Orbitron'; text-transform: uppercase; }
        .metric-value { display: block; font-size: 11px; color: #fff; font-weight: bold; margin-top: 4px; }
        .metric-status { color: var(--p-green); font-size: 9px; float: right; }

        .leaderboard-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: rgba(255,255,255,0.02);
            border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--glass-border);
        }
        
        .rank-1 { border-color: var(--neon-gold); background: rgba(255, 204, 0, 0.05); }
        .rank-num { font-family: 'Orbitron'; font-weight: 900; width: 30px; color: var(--cyan); font-size: 14px; }
        .rank-addr { font-size: 11px; color: #aaa; flex: 1; margin-left: 10px; font-family: 'Orbitron'; }
        .rank-pts { font-family: 'Orbitron'; font-size: 12px; color: #fff; font-weight: bold; }

        .logout-btn {
            width: 100%; margin-top: 25px; background: transparent; 
            border: 1px solid #333; color: #555; padding: 15px; 
            border-radius: 15px; font-family: 'Orbitron'; font-size: 10px;
            letter-spacing: 2px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <header style="text-align: center; margin-bottom: 25px;">
            <div style="font-size: 9px; color: var(--cyan); font-family: 'Orbitron'; letter-spacing: 3px; margin-bottom: 5px;">PROTOCOL_IDENTITY</div>
            <p id="user-wallet-full" style="font-size: 10px; color: #444; word-break: break-all; font-family: monospace;">0x...</p>
        </header>

        <section class="rank-card">
            <div id="rank-glow" class="rank-badge">🎖️</div>
            <h2 id="rank-title" style="font-family: 'Orbitron'; color: #fff; margin-bottom: 8px; font-size: 1.3rem; letter-spacing: 1px;">INITIALIZING...</h2>
            
            <div style="margin-top: 20px; background: rgba(0,0,0,0.4); padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03);">
                <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; font-family: 'Orbitron';">
                    <span style="color: #666;">AIRDROP ELIGIBILITY</span>
                    <span id="score-percent" style="color: var(--p-green);">0%</span>
                </div>
                <div style="height: 8px; background: #111; border-radius: 10px; overflow: hidden;">
                    <div id="score-fill" style="width: 0%; height: 100%; background: var(--p-green); transition: 1s;"></div>
                </div>
                <p id="eligibility-note" style="font-size: 9px; color: #444; margin-top: 10px; font-weight: bold; font-family: 'Orbitron';">MIN 80% SCORE FOR $ADS CLAIM</p>
            </div>

            <div class="eligibility-grid">
                <div class="metric-box">
                    <span class="metric-label">Points</span>
                    <span id="metric-abp" class="metric-value">0.00</span>
                </div>
                <div class="metric-box">
                    <span class="metric-label">Activity</span>
                    <span id="metric-streak" class="metric-value">0 Days</span>
                </div>
                <div class="metric-box">
                    <span class="metric-label">Network</span>
                    <span id="metric-refs" class="metric-value">0 Nodes</span>
                </div>
                <div class="metric-box">
                    <span class="metric-label">Social</span>
                    <span id="metric-tasks" class="metric-value">0% Done</span>
                </div>
            </div>
        </section>

        <section class="leaderboard-section" style="margin-top: 35px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
                <h3 style="font-family: 'Orbitron'; font-size: 11px; color: #fff; letter-spacing: 2px;">GLOBAL_RANKING</h3>
                <span style="font-size: 9px; color: var(--p-green); font-family: 'Orbitron';">LIVE FEED</span>
            </div>
            
            <div id="leaderboard-container">
                <p style="text-align: center; font-size: 10px; color: #333; margin-top: 30px; font-family: 'Orbitron';">SYNCING WITH MAINNET...</p>
            </div>
        </section>

        <button class="logout-btn" onclick="logout()">TERMINATE SESSION</button>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠 HOME</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item active">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
        const userWallet = localStorage.getItem('adamas_user');

        function formatABP(num) {
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return parseFloat(num).toFixed(2);
        }

        window.onload = () => {
            if(!userWallet) window.location.href = "index.html";
            document.getElementById('user-wallet-full').innerText = userWallet;

            // Live Sync for Profile Metrics
            db.ref('users/' + userWallet).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    // Update the 4 Metrics
                    document.getElementById('metric-abp').innerText = formatABP(data.balance || 0);
                    document.getElementById('metric-streak').innerText = (data.streak || 0) + " Days";
                    
                    // Task Percentage
                    const tasksDone = data.completedMissions ? Object.keys(data.completedMissions).length : 0;
                    const taskPercent = Math.round((tasksDone / 4) * 100);
                    document.getElementById('metric-tasks').innerText = taskPercent + "% Done";

                    updateRankUI(data, tasksDone);
                }
            });

            // Referral Count for Metric
            db.ref('users').orderByChild('referredBy').equalTo(userWallet).on('value', snap => {
                const count = snap.exists() ? Object.keys(snap.val()).length : 0;
                document.getElementById('metric-refs').innerText = count + " Nodes";
            });

            loadLeaderboard();
        };

        function loadLeaderboard() {
            db.ref('users').orderByChild('balance').limitToLast(10).on('value', (snapshot) => {
                const container = document.getElementById('leaderboard-container');
                let users = [];
                snapshot.forEach(child => {
                    users.push({ wallet: child.key, ...child.val() });
                });
                users.reverse();

                let html = "";
                users.forEach((u, index) => {
                    let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1);
                    let shortAddr = u.wallet.substring(0,6) + "..." + u.wallet.slice(-4);
                    
                    html += `
                        <div class="leaderboard-item">
                            <div class="rank-num">${medal}</div>
                            <div class="rank-addr">${shortAddr}</div>
                            <div class="rank-pts">${formatABP(u.balance || 0)}</div>
                        </div>`;
                });
                container.innerHTML = html;
            });
        }

        function updateRankUI(data, tasks) {
            let score = 0;
            const bal = data.balance || 0;
            const refs = data.referralCount || 0;

            // Multi-point Scoring Logic
            if(bal >= 5000) score += 40; else if(bal >= 1000) score += 20;
            if(refs >= 5) score += 30; else if(refs >= 1) score += 10;
            if(tasks >= 4) score += 30; else if(tasks >= 2) score += 15;

            const finalScore = Math.min(score, 100);
            document.getElementById('score-fill').style.width = finalScore + "%";
            document.getElementById('score-percent').innerText = finalScore + "%";

            const title = document.getElementById('rank-title');
            const badge = document.getElementById('rank-glow');

            if(data.role === "FOUNDER") {
                title.innerText = "GENESIS FOUNDER";
                badge.innerText = "💎";
                document.getElementById('score-fill').style.width = "100%";
                document.getElementById('score-percent').innerText = "ELITE";
            } else if(finalScore >= 80) {
                title.innerText = "MASTER VALIDATOR";
                badge.innerText = "👑";
                badge.style.borderColor = "var(--neon-gold)";
            } else if(finalScore >= 40) {
                title.innerText = "ACTIVE NODE";
                badge.innerText = "⚡";
            } else {
                title.innerText = "PROBATIONARY";
                badge.innerText = "🛰️";
            }
        }

        function logout() {
            localStorage.removeItem('adamas_user');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
