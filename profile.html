<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Identity Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- PRO PROFILE STYLING --- */
        .profile-wrapper { padding: 15px; padding-bottom: 140px; animation: fadeIn 0.8s ease-out; }

        .rank-card {
            background: linear-gradient(145deg, rgba(15,15,20,0.9) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid var(--glass-border); border-radius: 35px; padding: 40px 25px;
            text-align: center; position: relative; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .rank-badge {
            width: 100px; height: 100px; margin: 0 auto 20px;
            background: rgba(0,0,0,0.4); border: 2.5px solid var(--cyan);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; box-shadow: 0 0 30px var(--cyan-glow);
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; z-index: 2;
        }

        /* --- GAUGE SYSTEM --- */
        .gauge-container { position: relative; width: 220px; height: 130px; margin: 20px auto 0; overflow: hidden; }
        .gauge-svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 8; stroke-linecap: round; }
        .gauge-track { 
            fill: none; stroke-width: 8; stroke-linecap: round; 
            stroke-dasharray: 251; stroke-dashoffset: 251; 
            transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .needle {
            position: absolute; bottom: 15px; left: 50%; width: 3px; height: 75px;
            background: linear-gradient(to top, #fff, var(--cyan)); transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg); transition: 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px; z-index: 4;
        }
        .needle::after {
            content: ''; position: absolute; top: -5px; left: 50%;
            transform: translateX(-50%); width: 8px; height: 8px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff;
        }

        .score-display { margin-top: -10px; position: relative; z-index: 10; }
        .score-value { font-family: 'Orbitron'; font-size: 2.4rem; font-weight: 900; color: #fff; letter-spacing: -1px; }
        .score-label { font-size: 7.5px; color: #444; font-family: 'Orbitron'; letter-spacing: 2px; text-transform: uppercase; display: block; margin-top: 5px; }

        /* --- STAT GRID UPGRADE --- */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .stat-box { 
            background: rgba(255,255,255,0.02); padding: 18px 10px; border-radius: 20px; 
            border: 1px solid var(--glass-border); text-align: center;
        }
        .stat-box .val { font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: #eee; display: block; margin-top: 5px; }
        .stat-box .lbl { font-size: 7px; color: #555; font-family: 'Orbitron'; letter-spacing: 1px; }

        /* --- LEADERBOARD --- */
        .leaderboard-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; background: rgba(255,255,255,0.01);
            border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--glass-border);
        }
        .rank-num { font-family: 'Orbitron'; font-weight: 900; width: 30px; color: var(--cyan); font-size: 13px; }
        .rank-addr { font-size: 10px; color: #666; flex: 1; margin-left: 10px; font-family: 'Orbitron'; }
        .rank-pts { font-family: 'Orbitron'; font-size: 11px; color: #fff; font-weight: bold; }

        .logout-btn {
            width: 100%; margin-top: 40px; background: rgba(255, 62, 62, 0.05); 
            border: 1px solid rgba(255, 62, 62, 0.1); color: #ff3e3e; padding: 18px; 
            border-radius: 20px; font-family: 'Orbitron'; font-size: 9px;
            letter-spacing: 3px; cursor: pointer; transition: 0.3s; font-weight: 900;
        }
        .logout-btn:active { transform: scale(0.95); background: rgba(255, 62, 62, 0.1); }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <header style="text-align: center; margin-bottom: 30px; padding: 0 20px;">
            <div style="font-size: 8px; color: var(--cyan); font-family: 'Orbitron'; letter-spacing: 5px; margin-bottom: 10px; opacity: 0.7;">TERMINAL_IDENTITY_v.2</div>
            <p id="user-wallet-full" style="font-size: 9px; color: #333; word-break: break-all; font-family: monospace; letter-spacing: 0.5px; opacity: 0.5;">0x...</p>
        </header>

        <section class="rank-card">
            <div id="rank-glow" class="rank-badge">🎖️</div>
            <h2 id="rank-title" style="font-family: 'Orbitron'; color: #fff; margin-bottom: 5px; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase;">SCANNING...</h2>
            
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 60">
                    <path class="gauge-bg" d="M10 50 A40 40 0 0 1 90 50" />
                    <path id="gauge-fill" class="gauge-track" d="M10 50 A40 40 0 0 1 90 50" stroke="var(--cyan)" />
                </svg>
                <div id="gauge-needle" class="needle"></div>
            </div>

            <div class="score-display">
                <span id="credit-score-val" class="score-value">300</span>
                <span class="score-label">LOYALTY_SYNC_SCORE</span>
                <div id="score-trend" style="font-family: 'Orbitron'; font-size: 8px; margin-top: 10px;">
                    <span style="color: #444; letter-spacing: 1px;">ANALYZING_NODE_STABILITY...</span>
                </div>
            </div>

            <div style="margin-top: 25px; padding: 12px; background: rgba(0,242,255,0.02); border: 1px solid rgba(0,242,255,0.05); border-radius: 16px;">
                <p id="eligibility-note" style="font-size: 7.5px; color: var(--cyan); font-weight: 900; font-family: 'Orbitron'; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">
                    MIN_TARGET: 550_SCORE | 5_ACTIVE_NODES
                </p>
            </div>
        </section>

        <div class="stat-grid">
            <div class="stat-box">
                <span class="lbl">TOTAL_ABP</span>
                <span id="stat-balance" class="val">0.00</span>
            </div>
            <div class="stat-box">
                <span class="lbl">NETWORK_L1</span>
                <span id="stat-refs" class="val">0</span>
            </div>
            <div class="stat-box">
                <span class="lbl">PROTOCOL_STK</span>
                <span id="stat-streak" class="val">1 DAY</span>
            </div>
            <div class="stat-box">
                <span class="lbl">SYNC_RATE</span>
                <span id="stat-social" class="val">0%</span>
            </div>
        </div>

        <section class="leaderboard-section" style="margin-top: 45px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px;">
                <h3 style="font-family: 'Orbitron'; font-size: 10px; color: #fff; letter-spacing: 2px; opacity: 0.6;">GLOBAL_LEADERBOARD</h3>
                <span style="font-size: 8px; color: var(--p-green); font-family: 'Orbitron'; font-weight: 900; letter-spacing: 1px;">LIVE_FEED</span>
            </div>
            <div id="leaderboard-container"></div>
        </section>

        <button class="logout-btn" onclick="logout()">TERMINATE_SESSION</button>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠 HOME</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item active">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
        const userWallet = localStorage.getItem('adamas_user');

        window.onload = () => {
            if(!userWallet) window.location.href = "index.html";
            document.getElementById('user-wallet-full').innerText = userWallet;

            db.ref('users/' + userWallet.toLowerCase()).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('stat-balance').innerText = formatCurrency(data.balance || 0);
                    document.getElementById('stat-streak').innerText = (data.streak || 1) + " DAYS";
                    
                    // Task Sync logic
                    let tasksDone = 0;
                    for(let i=1; i<=4; i++) {
                        if(localStorage.getItem('adamas_task_t'+i) === 'verified') tasksDone++;
                    }
                    const engagement = Math.round((tasksDone / 4) * 100);
                    document.getElementById('stat-social').innerText = engagement + "%";
                    
                    // Fetch real-time referral count
                    db.ref('users').orderByChild('referredBy').equalTo(userWallet.toLowerCase()).once('value', refSnap => {
                        const refCount = refSnap.numChildren() || 0;
                        document.getElementById('stat-refs').innerText = refCount;
                        calculateAdvanceScore(data, engagement, refCount);
                        updateRankUI(data);
                    });
                }
            });
            loadLeaderboard();
        };

        function calculateAdvanceScore(data, engagement, refCount) {
            const minScore = 300;
            const maxScore = 900;
            
            // Score weightage logic
            let socialPoints = Math.min(refCount * 60, 350); 
            let activityPoints = (engagement / 100) * 150;
            let streakPoints = Math.min((data.streak || 1) * 20, 100);

            let totalScore = minScore + socialPoints + activityPoints + streakPoints;

            // Strict barrier: 550 is max without 5 nodes
            if (refCount < 5 && totalScore > 550) { totalScore = 550; }
            totalScore = Math.floor(Math.min(totalScore, maxScore));

            const scoreVal = document.getElementById('credit-score-val');
            const gaugeFill = document.getElementById('gauge-fill');
            const needle = document.getElementById('gauge-needle');
            
            scoreVal.innerText = totalScore;

            // Gauge calculations
            const percent = (totalScore - 300) / (maxScore - 300);
            const rotation = (percent * 180) - 90;
            needle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;

            const offset = 251 - (percent * 251);
            gaugeFill.style.strokeDashoffset = offset;

            // Trend & Color Logic
            const trend = document.getElementById('score-trend');
            if(totalScore >= 750) {
                gaugeFill.style.stroke = "var(--p-green)";
                scoreVal.style.color = "var(--p-green)";
                trend.innerHTML = `<span style="color: var(--p-green);">▲ ELITE_STATUS_ACTIVE</span>`;
            } else if (totalScore >= 550) {
                gaugeFill.style.stroke = "var(--cyan)";
                scoreVal.style.color = "var(--cyan)";
                trend.innerHTML = `<span style="color: var(--cyan);">▲ GROWTH_PHASE</span>`;
            } else {
                gaugeFill.style.stroke = "#ff3e3e";
                scoreVal.style.color = "#ff3e3e";
                trend.innerHTML = `<span style="color: #ff3e3e;">▼ CRITICAL_DATA_MINIMUM</span>`;
            }
        }

        function updateRankUI(data) {
            const title = document.getElementById('rank-title');
            const badge = document.getElementById('rank-glow');
            const score = parseInt(document.getElementById('credit-score-val').innerText);

            if(data.role === "FOUNDER") {
                title.innerText = "FOUNDER_NODE";
                badge.innerText = "💎";
            } else if(score >= 750) {
                title.innerText = "EXECUTIVE_VALIDATOR";
                badge.innerText = "🥇";
            } else if(score >= 550) {
                title.innerText = "PRIME_NODE";
                badge.innerText = "🥈";
            } else {
                title.innerText = "BASE_PARTICLE";
                badge.innerText = "🥉";
            }
        }

        function loadLeaderboard() {
            db.ref('users').orderByChild('balance').limitToLast(8).on('value', (snapshot) => {
                const container = document.getElementById('leaderboard-container');
                let users = [];
                snapshot.forEach(child => { users.push({ wallet: child.key, ...child.val() }); });
                users.reverse();
                let html = "";
                users.forEach((u, index) => {
                    let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1);
                    html += `<div class="leaderboard-item">
                                <div class="rank-num">${medal}</div>
                                <div class="rank-addr">${u.wallet.substring(0,6)}...${u.wallet.slice(-4)}</div>
                                <div class="rank-pts">${formatCurrency(u.balance || 0)}</div>
                             </div>`;
                });
                container.innerHTML = html;
            });
        }

        function logout() { localStorage.removeItem('adamas_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
