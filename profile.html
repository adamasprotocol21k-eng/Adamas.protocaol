<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | ADAMAS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .header {
            padding: 15px 20px; display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }
        .back-btn { text-decoration: none; color: var(--primary); font-size: 1.2rem; }

        .container { padding: 30px 20px 120px; max-width: 500px; margin: auto; text-align: center; }

        /* --- PREMIUIM GLOWING PROFILE SECTION --- */
        .profile-pic-container {
            position: relative; width: 140px; height: 140px; margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Rotating Neon Border */
        .profile-pic-container::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid transparent;
            border-top-color: var(--primary); border-bottom-color: var(--secondary);
            animation: spin 3s linear infinite;
        }

        .profile-pic {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            background: var(--dark); z-index: 2;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            transition: 0.5s;
        }

        .upload-icon {
            position: absolute; bottom: 5px; right: 5px; background: var(--secondary);
            width: 35px; height: 35px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            border: 2px solid white; font-size: 1rem; z-index: 10;
            box-shadow: 0 0 10px var(--secondary);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Form Styling */
        .profile-card {
            background: var(--glass); border-radius: 25px; padding: 30px 20px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; font-family: 'Orbitron'; font-size: 0.7rem;
            color: var(--primary); margin-bottom: 8px; letter-spacing: 1px;
        }
        .input-group input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; color: white; font-family: 'Rajdhani';
            font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        .note-box {
            background: rgba(255, 204, 0, 0.05); border-left: 4px solid var(--gold);
            padding: 15px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 25px;
            color: var(--gold); border-top: 1px solid rgba(255,204,0,0.1);
        }

        .save-btn {
            width: 100%; background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none; color: white; padding: 16px; border-radius: 100px;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            transition: 0.4s; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(112, 0, 255, 0.3);
        }
        .save-btn:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--primary); }

        /* Updated Nav Dock */
        .dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 11, 16, 0.85); backdrop-filter: blur(25px);
            padding: 12px 30px; border-radius: 100px; display: flex; gap: 25px;
            border: 1px solid rgba(0, 242, 255, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
        }
        .dock-item { text-decoration: none; font-size: 1.4rem; opacity: 0.4; transition: 0.4s; color: white; }
        .dock-item.active { opacity: 1; color: var(--primary); transform: scale(1.3) translateY(-5px); text-shadow: 0 0 15px var(--primary); }

    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <a href="dashboard.html" class="back-btn">←</a>
        <div style="font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px; color: var(--primary);">ADS IDENTITY</div>
    </div>

    <div class="container">
        <div class="profile-pic-container">
            <img src="assets/logo.png" id="profileDisplay" class="profile-pic" alt="User">
            <label for="fileInput" class="upload-icon">📷</label>
            <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="previewImage(event)">
        </div>

        <div style="font-family: 'Orbitron'; margin-bottom: 25px; font-size: 0.75rem; color: var(--gold); letter-spacing: 1px;" id="displayWallet">0x...Loading</div>

        <div class="profile-card">
            <div class="input-group">
                <label>NODE OPERATOR NAME</label>
                <input type="text" id="userName" placeholder="Enter full name">
            </div>

            <div class="input-group">
                <label>REGISTRATION EMAIL</label>
                <input type="email" id="userEmail" placeholder="name@example.com">
            </div>

            <div class="note-box">
                <strong>KYC COMPLIANCE:</strong> Ensure your name matches your government ID. Verification is required for the 5,000 ABP Mainnet Airdrop.
            </div>

            <button class="save-btn" onclick="saveProfile()">Update Identity</button>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item">🏠</a>
        <a href="games.html" class="dock-item">🎮</a>
        <a href="wallet.html" class="dock-item">💰</a>
        <a href="invite.html" class="dock-item">👥</a>
        <a href="profile.html" class="dock-item active">👤</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Particle Background Logic (Synchronized)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const posArray = new Float32Array(800 * 3);
        for(let i=0; i < 2400; i++) posArray[i] = (Math.random() - 0.5) * 10;
        const particlesGeometry = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0x00f2ff });
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh); camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); particlesMesh.rotation.y += 0.001; renderer.render(scene, camera); } animate();

        // 2. Image Logic
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('profileDisplay');
                output.src = reader.result;
                localStorage.setItem('userProfilePic', reader.result);
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        // 3. Save Identity
        function saveProfile() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            if(!name || !email) { alert("Please fill all fields!"); return; }
            localStorage.setItem('userName', name);
            localStorage.setItem('userEmail', email);
            alert("Node Identity Updated! 🚀");
        }

        window.onload = function() {
            const addr = localStorage.getItem('userWallet') || "0x71C8...3902";
            document.getElementById('displayWallet').innerText = addr;
            
            const savedPic = localStorage.getItem('userProfilePic');
            if(savedPic) document.getElementById('profileDisplay').src = savedPic;
            
            document.getElementById('userName').value = localStorage.getItem('userName') || "";
            document.getElementById('userEmail').value = localStorage.getItem('userEmail') || "";
        }
    </script>
</body>
</html>
