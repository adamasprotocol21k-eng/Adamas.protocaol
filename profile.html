<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Identity Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .brand-identity { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .nav-logo-img { width: 35px; height: 35px; filter: drop-shadow(0 0 8px var(--cyan-glow)); }

        .profile-wrapper { padding: 15px; padding-bottom: 120px; }

        .rank-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px;
            text-align: center; position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        
        .rank-badge {
            width: 85px; height: 85px; margin: 0 auto 15px;
            background: rgba(255,255,255,0.03); border: 2px solid var(--cyan);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; box-shadow: 0 0 25px var(--cyan-glow);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* GAUGE METER */
        .gauge-container { position: relative; width: 180px; height: 100px; margin: 20px auto 0; overflow: hidden; }
        .gauge-svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 10; stroke-linecap: round; }
        .gauge-track { fill: none; stroke-width: 10; stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 251; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .needle {
            position: absolute; bottom: 5px; left: 50%; width: 3px; height: 60px;
            background: #fff; transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg); transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .needle-pivot { position: absolute; bottom: -4px; left: 50%; width: 10px; height: 10px; background: #fff; border-radius: 50%; transform: translateX(-50%); }

        .score-display { margin-top: -5px; }
        .score-value { font-family: 'Orbitron'; font-size: 1.8rem; font-weight: 900; color: #fff; display: block; }
        .score-label { font-size: 8px; color: #555; font-family: 'Orbitron'; letter-spacing: 1px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { 
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; 
            border: 1px solid var(--glass-border); text-align: center;
        }

        .leaderboard-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; background: rgba(255,255,255,0.02);
            border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--glass-border);
        }
        .rank-num { font-family: 'Orbitron'; font-weight: 900; color: var(--cyan); font-size: 12px; }
        .rank-addr { font-size: 10px; color: #777; font-family: monospace; }
        .rank-pts { font-family: 'Orbitron'; font-size: 11px; color: #fff; }

        .logout-btn {
            width: 100%; margin-top: 30px; background: rgba(255,51,102,0.05); 
            border: 1px solid rgba(255,51,102,0.2); color: #ff3366; padding: 12px; 
            border-radius: 12px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="profile-wrapper">
        <div class="brand-identity">
            <img src="assets/dashboard-logo.png" class="nav-logo-img" alt="Logo">
        </div>

        <section class="rank-card">
            <div id="rank-glow" class="rank-badge">🎖️</div>
            <h2 id="rank-title" style="font-family: 'Orbitron'; color: #fff; margin-bottom: 5px; font-size: 1.1rem;">SYNCING...</h2>
            
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 60">
                    <path class="gauge-bg" d="M10 50 A40 40 0 0 1 90 50" />
                    <path id="gauge-fill" class="gauge-track" d="M10 50 A40 40 0 0 1 90 50" stroke="var(--cyan)" />
                </svg>
                <div id="gauge-needle" class="needle"></div>
                <div class="needle-pivot"></div>
            </div>

            <div class="score-display">
                <span id="credit-score-val" class="score-value">000</span>
                <span class="score-label">LOYALTY ELIGIBILITY SCORE</span>
            </div>
        </section>

        <div class="stat-grid">
            <div class="stat-box">
                <span style="font-size: 8px; color: #555; font-family: 'Orbitron';">TOTAL ABP</span>
                <span id="stat-balance" style="font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: #fff;">0</span>
            </div>
            <div class="stat-box">
                <span style="font-size: 8px; color: #555; font-family: 'Orbitron';">NODES</span>
                <span id="stat-refs" style="font-family: 'Orbitron'; font-size: 14px; font-weight: 900; color: #fff;">0</span>
            </div>
        </div>

        <section class="leaderboard-section" style="margin-top: 30px;">
            <h3 style="font-family: 'Orbitron'; font-size: 10px; color: #fff; letter-spacing: 2px; margin-bottom: 15px;">GLOBAL_LEADERBOARD</h3>
            <div id="leaderboard-container"></div>
        </section>

        <button class="logout-btn" onclick="logout()">TERMINATE_SESSION</button>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠 HOME</a>
            <a href="vault.html" class="nav-item">🔒 VAULT</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item active">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
        const userWallet = localStorage.getItem('adamas_user');

        window.onload = () => {
            if(!userWallet) window.location.href = "index.html";
            
            db.ref('users/' + userWallet.toLowerCase()).on('value', snap => {
                const data = snap.val();
                if(data) {
                    document.getElementById('stat-balance').innerText = Math.floor(data.balance || 0);
                    
                    // Fetch real L1 Node Count
                    db.ref('users').orderByChild('referredBy').equalTo(userWallet.toLowerCase()).once('value', refSnap => {
                        const refs = refSnap.numChildren() || 0;
                        document.getElementById('stat-refs').innerText = refs;
                        calculateLoyaltyScore(data, refs);
                    });
                }
            });
            loadLeaderboard();
        };

        function calculateLoyaltyScore(data, refs) {
            let baseScore = 300;
            // Reward for balance (max 200 pts)
            let balancePts = Math.min((data.balance / 5000) * 200, 200);
            // Reward for nodes (max 300 pts)
            let nodePts = Math.min(refs * 60, 300);
            // Reward for streak (max 100 pts)
            let streakPts = Math.min((data.streak || 0) * 20, 100);

            let total = Math.floor(baseScore + balancePts + nodePts + streakPts);
            updateGauge(total);
            updateRankTitle(total, data.role);
        }

        function updateGauge(score) {
            document.getElementById('credit-score-val').innerText = score;
            const percent = (score - 300) / 600;
            const rotation = (percent * 180) - 90;
            document.getElementById('gauge-needle').style.transform = `translateX(-50%) rotate(${rotation}deg)`;
            
            const fill = document.getElementById('gauge-fill');
            fill.style.strokeDashoffset = 251 - (percent * 125);
            fill.style.stroke = score > 700 ? "var(--p-green)" : (score > 500 ? "var(--cyan)" : "#ff3366");
        }

        function updateRankTitle(score, role) {
            const title = document.getElementById('rank-title');
            const badge = document.getElementById('rank-glow');
            if(role === "FOUNDER") { title.innerText = "DIAMOND FOUNDER"; badge.innerText = "💎"; }
            else if(score > 750) { title.innerText = "ELITE VALIDATOR"; badge.innerText = "💠"; }
            else if(score > 550) { title.innerText = "ACTIVE NODE"; badge.innerText = "⚡"; }
            else { title.innerText = "BRONZE CITIZEN"; badge.innerText = "🥉"; }
        }

        function loadLeaderboard() {
            db.ref('users').orderByChild('balance').limitToLast(10).once('value', snap => {
                const container = document.getElementById('leaderboard-container');
                let list = [];
                snap.forEach(u => list.push({wallet: u.key, bal: u.val().balance}));
                list.reverse();
                container.innerHTML = list.map((u, i) => `
                    <div class="leaderboard-item">
                        <span class="rank-num">#${i+1}</span>
                        <span class="rank-addr">${u.wallet.substring(0,12)}...</span>
                        <span class="rank-pts">${Math.floor(u.bal)} ABP</span>
                    </div>
                `).join('');
            });
        }

        function logout() { localStorage.removeItem('adamas_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
