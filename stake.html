<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staking | Adamas Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="initStaking()">

    <div class="header" style="padding: 20px; text-align: center;">
        <h2 style="color: #f1c40f;">🔐 STAKING VAULT</h2>
        <p style="font-size: 0.8rem; opacity: 0.7;">Lock ABP to Secure ADS Supply</p>
    </div>

    <div class="card" style="border-left: 5px solid #f1c40f;">
        <h4>Staking Protocol Rules:</h4>
        <ul style="font-size: 0.75rem; color: #8b949e; padding-left: 15px;">
            <li>Daily Reward Rate: 0.5%</li>
            <li>Claim Limit: 3 Times only</li>
            <li>Post-Claim Lock: 24 Days</li>
        </ul>
    </div>

    <div class="card" style="text-align: center;">
        <p>Staked Balance</p>
        <h1 id="stakedAmount" style="color: #f1c40f;">0.00</h1>
        <div id="lockTimer" style="font-size: 0.8rem; color: #f85149; margin-bottom: 10px; display: none;">
            Lock Active: <span id="daysLeft">24</span> Days Remaining
        </div>
        <button id="stakeBtn" class="btn-neon" style="width: 100%; border-color: #f1c40f; color: #f1c40f;" onclick="processStake()">Stake All ABP</button>
        <button id="claimBtn" class="btn-neon" style="width: 100%; margin-top: 10px; display: none;" onclick="processClaim()">Claim Rewards</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html">🏠<br>Home</a>
        <a href="earn.html">⛏️<br>Earn</a>
        <a href="stake.html" class="active">🔐<br>Stake</a>
        <a href="refer.html">👥<br>Refer</a>
        <a href="wallet.html">💰<br>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
    <script src="js/staking.js"></script>
</body>
</html>
