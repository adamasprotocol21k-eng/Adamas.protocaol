<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowledge Lab | ADAMAS PROTOCOL</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">ADAMAS <span>PROTOCOL</span></div>
            <nav class="nav-menu">
                <a href="index.html">Home</a>
                <a href="games.html">Games</a>
                <a href="knowledge.html" class="active">Knowledge</a>
                <a href="wallet.html">Wallet</a>
            </nav>
        </div>
    </header>

    <main class="quiz-container">
        <div class="glass-card quiz-box" id="quizBox">
            <h2 id="quizCategory">NEURAL TEST: MATHS</h2>
            <p class="reward-tag">Reward: 10 ABP</p>
            <div class="question-area">
                <h3 id="questionText">Loading Challenge...</h3>
            </div>
            <div class="options-grid" id="optionsGrid">
                </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        const questions = [
            { q: "What is 15 * 4?", a: ["50", "60", "70", "45"], correct: 1, cat: "MATHS" },
            { q: "Which blockchain is ADAMAS on?", a: ["Ethereum", "Solana", "Polygon", "Bitcoin"], correct: 2, cat: "CRYPTO" },
            { q: "What is the square root of 144?", a: ["10", "14", "12", "16"], correct: 2, cat: "MATHS" },
            { q: "What does PoS stand for?", a: ["Proof of Stake", "Price of Sale", "Point of Storage"], correct: 0, cat: "CRYPTO" }
        ];

        let currentQ = 0;

        function loadQuestion() {
            const qData = questions[currentQ];
            document.getElementById('quizCategory').innerText = `NEURAL TEST: ${qData.cat}`;
            document.getElementById('questionText').innerText = qData.q;
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';

            qData.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            if (idx === questions[currentQ].correct) {
                alert("CORRECT! +10 ABP Received.");
                window.addABP(10);
                currentQ = (currentQ + 1) % questions.length;
                loadQuestion();
            } else {
                alert("INCORRECT. Initializing next challenge.");
                currentQ = (currentQ + 1) % questions.length;
                loadQuestion();
            }
        }

        loadQuestion();
    </script>
</body>
</html>
