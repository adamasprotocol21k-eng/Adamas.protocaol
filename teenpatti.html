<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS - Teen Patti Room</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container { text-align: center; padding: 50px 20px; }
        .card-area { display: flex; justify-content: center; gap: 15px; margin: 30px 0; min-height: 150px; }
        .card { 
            width: 80px; height: 120px; background: white; color: black; 
            border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; font-weight: bold;
            box-shadow: 0 0 15px var(--diamond-blue);
        }
        .controls { margin-top: 20px; }
        .bet-input { background: #1a1a1a; border: 1px solid var(--diamond-blue); color: white; padding: 10px; border-radius: 5px; width: 100px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <button onclick="location.href='index.html'" class="btn-primary">⬅ Back</button>
        <h2 class="glow-text">Diamond Poker Room</h2>
    </header>

    <div class="game-container">
        <div class="balance-card">
            <p>Available Balance: <span id="gameBalance">0.00</span> ABP</p>
        </div>

        <div class="card-area" id="cardArea">
            <div class="card">?</div>
            <div class="card">?</div>
            <div class="card">?</div>
        </div>

        <div class="controls">
            <input type="number" id="betAmount" class="bet-input" value="50" min="10">
            <button class="btn-stake" onclick="playHand()">Deal Cards</button>
        </div>
        <p id="gameStatus" style="margin-top: 20px; font-weight: bold;"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="teenpatti.js"></script>
</body>
</html>
