<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Elite Teen Patti</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .table-container {
            height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 1000px;
        }

        .poker-table {
            position: relative; width: 320px; height: 320px;
            background: radial-gradient(circle, #1a4d2e 0%, #051a0d 100%);
            border-radius: 50%; border: 8px solid #3d2b1f;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,255,136,0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: rotateX(20deg);
        }

        .cards-hand { display: flex; gap: -15px; margin-top: 20px; }
        
        .poker-card {
            position: relative; width: 70px; height: 100px; background: white; border-radius: 8px;
            margin: 0 -10px; border: 2px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            color: black; font-weight: bold; font-size: 1.2rem;
            transform: rotateY(180deg); transition: 0.6s; transform-style: preserve-3d;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .poker-card.show { transform: rotateY(0deg); }

        .card-back {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(45deg, var(--secondary), var(--dark));
            border-radius: 6px; backface-visibility: hidden; z-index: 2;
            display: flex; align-items: center; justify-content: center; color: var(--primary);
        }

        .bet-bar {
            position: fixed; bottom: 100px; width: 100%; display: flex;
            justify-content: center; gap: 15px;
        }

        .chip {
            width: 60px; height: 60px; border-radius: 50%; border: 4px dashed white;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 0.8rem; cursor: pointer;
            transition: 0.3s; background: var(--secondary); box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .chip:hover { transform: scale(1.1) translateY(-10px); }

        .btn-action {
            background: var(--primary); color: black; border: none;
            padding: 10px 30px; border-radius: 50px; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        .pot-amount {
            position: absolute; top: 20%; font-family: 'Orbitron';
            color: var(--gold); font-size: 1.2rem; text-shadow: 0 0 10px var(--gold);
        }

        .balance-view { font-family: 'Orbitron'; color: var(--primary); font-size: 0.9rem; }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <a href="dashboard.html" style="text-decoration:none; color:var(--primary);">← BACK</a>
        <div class="balance-view">BAL: <span id="headerBal">0.00</span></div>
    </div>

    <div class="table-container">
        <div class="poker-table">
            <div class="pot-amount">POT: <span id="potValue">0</span> ABP</div>
            
            <div class="cards-hand" id="playerHand">
                <div class="poker-card"><div class="card-back">A</div><span class="val">?</span></div>
                <div class="poker-card"><div class="card-back">A</div><span class="val">?</span></div>
                <div class="poker-card"><div class="card-back">A</div><span class="val">?</span></div>
            </div>

            <button class="btn-action" id="dealBtn" onclick="dealCards()">DEAL CARDS</button>
        </div>

        <div class="bet-bar">
            <div class="chip" style="background:#ff4444" onclick="addBet(10)">10</div>
            <div class="chip" style="background:#00f2ff; color: black;" onclick="addBet(50)">50</div>
            <div class="chip" style="background:#7000ff" onclick="addBet(100)">100</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. 3D Background logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(400 * 3);
        for(let i=0; i<1200; i++) posArray[i] = (Math.random()-0.5)*10;
        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const mesh = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.005, color: 0x00ff88 }));
        scene.add(mesh);
        camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); mesh.rotation.y += 0.001; renderer.render(scene, camera); }
        animate();

        // 2. Teen Patti Logic with Sync
        let currentPot = 0;
        let totalBalance = parseFloat(localStorage.getItem('lastBalance') || "0");
        const cardValues = ['A♠', 'K♥', 'Q♣', 'J♦', '10♠', 'A♥', 'K♠'];

        function updateUI() {
            document.getElementById('headerBal').innerText = totalBalance.toFixed(2);
            document.getElementById('potValue').innerText = currentPot;
            localStorage.setItem('lastBalance', totalBalance.toString());
        }

        function addBet(amount) {
            if(amount > totalBalance) {
                alert("Bhai, balance nahi hai itna!");
                return;
            }
            totalBalance -= amount;
            currentPot += amount;
            updateUI();
        }

        function dealCards() {
            if(currentPot === 0) {
                alert("Pehle bet toh lagao!");
                return;
            }

            document.getElementById('dealBtn').disabled = true;
            const cards = document.querySelectorAll('.poker-card');
            
            cards.forEach((card, index) => {
                card.classList.remove('show');
                setTimeout(() => {
                    const randomVal = cardValues[Math.floor(Math.random() * cardValues.length)];
                    card.querySelector('.val').innerText = randomVal;
                    card.classList.add('show');
                }, index * 300);
            });

            // Winning Logic (Simulated)
            setTimeout(() => {
                let winAmount = currentPot * 2; // Dealer ko hara diya!
                totalBalance += winAmount;
                alert(`Mubarak ho! Aapne ${winAmount} ABP jeete! ✨`);
                currentPot = 0;
                updateUI();
                document.getElementById('dealBtn').disabled = false;
                
                // Sab cards reset
                cards.forEach(c => c.classList.remove('show'));
            }, 3000);
        }

        window.onload = updateUI;
    </script>
</body>
</html>
