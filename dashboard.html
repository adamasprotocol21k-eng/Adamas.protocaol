<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <div class="app-container">
        
        <div class="top-nav glass">
            <div class="user-id">
                <div class="status-dot"></div>
                <span id="walletShort">0x...000</span>
            </div>
            <div class="reward-streak" onclick="claimDaily()">
                🔥 <span id="streakDay">Day 1</span>
            </div>
        </div>

        <section class="mining-card glass-premium">
            <div class="node-header">
                <small>ADS MINING NODE</small>
                <div class="live-tag">LIVE</div>
            </div>
            <div class="balance-display">
                <h2 id="abpBalance">0.0000</h2>
                <p>ABP EARNED</p>
            </div>
            <div class="mining-animation">
                <div class="orbit">
                    <div class="electron"></div>
                </div>
                <div class="ads-coin">ADS</div>
            </div>
        </section>

        <section class="vault-section">
            <div class="section-title">STAKING VAULT</div>
            <div class="vault-card glass">
                <div class="vault-info">
                    <p>Locked: <span id="lockedABP">0</span> ABP</p>
                    <small>24-Day Lock Period</small>
                </div>
                <button class="action-btn small">DEPOSIT</button>
            </div>
        </section>

        <section class="games-section">
            <div class="section-title">GAMING ZONE</div>
            <div class="games-grid">
                <div class="game-card glass" onclick="openGame('mines')">
                    <span class="game-icon">💣</span>
                    <p>MINES</p>
                    <small class="hot">HOT</small>
                </div>
                <div class="game-card glass" onclick="openGame('patti')">
                    <span class="game-icon">🃏</span>
                    <p>3D PATTI</p>
                </div>
            </div>
        </section>

        <nav class="bottom-tab-nav glass">
            <div class="nav-item active">🏠<br>Home</div>
            <div class="nav-item">🧠<br>Quiz</div>
            <div class="nav-item">🏆<br>Rank</div>
            <div class="nav-item">💳<br>Wallet</div>
        </nav>

    </div>

    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/tasks.js"></script>
</body>
</html>
