<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Adamas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <div><small style="color:#848e9c">Miner</small><h3 style="margin:0">Active</h3></div>
        <div id="walletBadge" class="bal-badge" style="background:#1e2329; color:#F3BA2F; padding:5px 10px; border-radius:50px; font-size:0.7rem; border:1px solid #F3BA2F;">0x...</div>
    </div>

    <div class="balance-card" style="background:linear-gradient(135deg, #1e2329, #0b0e11); margin:20px; padding:40px 20px; border-radius:24px; text-align:center; border:1px solid rgba(243,186,47,0.3);">
        <p style="color:#848e9c; font-size:0.8rem;">TOTAL ABP POINTS</p>
        <h1 style="font-size:4rem; margin:0; color:#F3BA2F; text-shadow:0 0 20px rgba(243,186,47,0.4);"><span id="balance">0</span></h1>
        <small style="color:#00ff88">● Amoy Testnet Live</small>
    </div>

    <div style="padding:20px;">
        <h4 style="margin-bottom:15px;">📅 Extraction Streak</h4>
        <div id="streakGrid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
            </div>
        <button class="btn-neon" style="width:100%; margin-top:20px;" onclick="handleDailyClaim()">CLAIM REWARD</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">🏠 Home</a>
        <a href="games.html" class="nav-item">🎮 Games</a>
        <a href="earn.html" class="nav-item">⛏️ Earn</a>
        <a href="invite.html" class="nav-item">🔗 Invite</a>
        <a href="wallet.html" class="nav-item">💰 Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function handleDailyClaim() {
            const last = localStorage.getItem('adamas_claim');
            if(last === new Date().toDateString()) return showNotification("Come back tomorrow!");
            window.userStats.balance += 50;
            saveToFirebase();
            localStorage.setItem('adamas_claim', new Date().toDateString());
            showNotification("50 ABP Added to Fleet!");
        }
    </script>
</body>
</html>
