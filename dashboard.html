<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* BRAND IDENTITY */
        .brand-identity { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; }
        .logo-box {
            background: linear-gradient(135deg, var(--cyan) 0%, #0088ff 100%);
            width: 38px; height: 38px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 18px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); position: relative; overflow: hidden;
        }
        .brand-name { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .brand-sub { font-size: 8.5px; color: var(--cyan); letter-spacing: 1.5px; font-family: 'Orbitron'; }

        /* HERO CARD & MINING */
        .hero-balance-card {
            background: linear-gradient(145deg, rgba(15,15,15,0.9) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid rgba(0, 242, 255, 0.15); 
            border-radius: 30px; padding: 30px 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-bottom: 25px;
        }
        
        .mining-engine-vessel {
            width: 180px; height: 180px; margin: 20px auto;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .engine-glow {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px dashed rgba(0, 242, 255, 0.2);
            animation: spin 15s linear infinite;
        }
        .mining-trigger-btn {
            width: 130px; height: 130px; border-radius: 50%;
            background: #000; border: 3px solid var(--cyan);
            color: #fff; font-family: 'Orbitron'; font-weight: 900; font-size: 12px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            cursor: pointer; z-index: 5; transition: 0.3s; outline: none;
        }
        .mining-trigger-btn.active { border-color: #ffaa00; animation: pulse-orange 2s infinite; color: #ffaa00; }
        .mining-trigger-btn.ready { border-color: var(--p-green); animation: pulse-green 2s infinite; color: var(--p-green); }

        main { padding-bottom: 100px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-green { 0% { transform: scale(1); box-shadow: 0 0 10px var(--p-green); } 50% { transform: scale(1.05); box-shadow: 0 0 30px var(--p-green); } 100% { transform: scale(1); } }
        @keyframes pulse-orange { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .copy-btn { background: var(--cyan); color: #000; border: none; padding: 0 18px; border-radius: 12px; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 5px 2px;">
            <div class="brand-identity" onclick="window.location.href='profile.html'">
                <div class="logo-box">A</div>
                <div class="brand-text">
                    <span class="brand-name">ADAMAS</span>
                    <span class="brand-sub">QUANTUM PROTOCOL</span>
                </div>
            </div>
            <div style="text-align: right;">
                <div id="user-address" style="font-family: monospace; font-size: 10px; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);">0x...</div>
                <div style="font-size: 8px; color: var(--p-green); margin-top: 5px; font-family: 'Orbitron'; letter-spacing: 1px;">MINING_SECURE ✅</div>
            </div>
        </header>

        <main>
            <section class="hero-balance-card">
                <p style="font-size: 9px; letter-spacing: 3px; color: #666; font-family: 'Orbitron';">NODE_REWARD_BALANCE</p>
                <h1 id="total-balance" style="font-family: 'Orbitron'; font-size: 3rem; margin: 12px 0; font-weight: 900; color: #fff;">0.0000</h1>
                <div style="color: var(--cyan); font-family: 'Orbitron'; font-size: 11px; letter-spacing: 5px;">ABP_POINTS</div>
                
                <div style="margin-top: 25px; background: rgba(0,0,0,0.4); padding: 18px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03);">
                    <div style="display: flex; justify-content: space-between; font-size: 9px; color: var(--cyan); margin-bottom: 10px; font-family: 'Orbitron';">
                        <span id="mining-status-text">MINING_PROGRESS</span>
                        <span id="scarcity-percent">0%</span>
                    </div>
                    <div style="height: 6px; background: #111; border-radius: 10px; overflow: hidden;">
                        <div id="scarcity-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--cyan), var(--p-green)); transition: 0.5s;"></div>
                    </div>
                </div>
            </section>

            <div class="mining-engine-vessel">
                <div class="engine-glow"></div>
                <button class="mining-trigger-btn" onclick="handleMiningAction()" id="mining-btn">START MINING</button>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 25px;">
                <div class="premium-card" style="flex: 1; text-align: center; background: rgba(255,255,255,0.02);">
                    <span style="font-size: 8px; color: #555; font-family: 'Orbitron'; letter-spacing: 1px;">ACTIVE_NODES</span>
                    <span id="ref-count" style="display: block; font-size: 20px; font-family: 'Orbitron'; color: #fff; margin-top: 8px;">0</span>
                </div>
                <div class="premium-card" style="flex: 1; text-align: center; background: rgba(255,255,255,0.02);">
                    <span style="font-size: 8px; color: #555; font-family: 'Orbitron'; letter-spacing: 1px;">SYNC_STREAK</span>
                    <span id="streak-info-dash" style="display: block; font-size: 20px; font-family: 'Orbitron'; color: #fff; margin-top: 8px;">1</span>
                </div>
            </div>

            <div class="premium-card" style="display: flex; justify-content: space-between; align-items: center; border-color: rgba(173, 255, 47, 0.15); background: rgba(173, 255, 47, 0.02);">
                <div>
                    <h3 style="font-size: 11px; font-family: 'Orbitron'; color: var(--p-green); margin: 0; letter-spacing: 1px;">DAILY_REWARD_CLAIM</h3>
                    <p id="streak-text" style="font-size: 10px; color: #555; margin-top: 5px;">Secure 10 ABP daily sync bonus</p>
                </div>
                <button class="btn-primary" id="daily-claim-btn" style="width: auto; padding: 10px 20px; font-size: 10px; background: var(--p-green); color: #000; font-weight: 900;" onclick="claimDailyBonus()">SYNC</button>
            </div>

            <div class="premium-card" style="background: rgba(255,255,255,0.03); margin-top: 20px;">
                <p style="font-size: 8px; color: var(--cyan); margin-bottom: 12px; font-family: 'Orbitron'; letter-spacing: 2px;">UNIQUE_INVITE_IDENTIFIER</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="ref-link-input" readonly value="GENERATING..." style="flex: 1; background: #000; border: 1px solid #1a1a1a; color: #666; padding: 14px; border-radius: 14px; font-size: 10px; font-family: monospace; outline: none;">
                    <button class="copy-btn" onclick="copyRefLink()">COPY</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">🏠 HOME</a>
            <a href="vault.html" class="nav-item">🔒 VAULT</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
    const userWallet = localStorage.getItem('adamas_user');
    if (!userWallet) { window.location.href = "index.html"; }

    const userRef = db.ref('users/' + userWallet);
    const HOURLY_REWARD = 500; 
    let miningTimer;

    function formatABP(num) {
        if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return parseFloat(num).toFixed(2);
    }

    userRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('total-balance').innerText = formatABP(data.balance || 0);
            document.getElementById('user-address').innerText = userWallet.substring(0, 6) + "..." + userWallet.slice(-4);
            document.getElementById('streak-info-dash').innerText = data.streak || 1;
            
            const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
            document.getElementById('ref-link-input').value = baseUrl + "/index.html?ref=" + userWallet;
            
            db.ref('users').orderByChild('referredBy').equalTo(userWallet).once('value', (snap) => {
                document.getElementById('ref-count').innerText = snap.numChildren() || 0;
            });

            // ANTI-HACK: Fetching Server Offset
            const offsetRef = db.ref(".info/serverTimeOffset");
            offsetRef.once("value", (snap) => {
                const offset = snap.val() || 0;
                checkMiningStatus(data.lastMiningStart, offset);
                checkClaimStatus(data.lastClaim, offset);
            });
        }
    });

    function checkMiningStatus(startTime, offset) {
        const btn = document.getElementById('mining-btn');
        const fill = document.getElementById('scarcity-fill');
        const percentText = document.getElementById('scarcity-percent');
        
        if (!startTime) {
            resetMiningUI();
            return;
        }

        const now = Date.now() + offset; // Secure Server-Synced Time
        const start = startTime;
        const elapsedSecs = (now - start) / 1000;
        const totalSecs = 3600; 

        if (elapsedSecs < totalSecs) {
            const remaining = totalSecs - elapsedSecs;
            const minutes = Math.floor(remaining / 60);
            const seconds = Math.floor(remaining % 60);
            
            btn.innerText = `${minutes}:${seconds < 10 ? '0'+seconds : seconds}`;
            btn.classList.add('active');
            btn.classList.remove('ready');
            btn.disabled = true;

            const progress = (elapsedSecs / totalSecs) * 100;
            fill.style.width = progress + "%";
            percentText.innerText = Math.floor(progress) + "%";

            clearTimeout(miningTimer);
            miningTimer = setTimeout(() => checkMiningStatus(startTime, offset), 1000);
        } else {
            btn.innerText = `CLAIM ${HOURLY_REWARD}`;
            btn.classList.remove('active');
            btn.classList.add('ready');
            btn.disabled = false;
            fill.style.width = "100%";
            percentText.innerText = "100%";
        }
    }

    async function handleMiningAction() {
        const btn = document.getElementById('mining-btn');
        
        if (btn.classList.contains('ready')) {
            try {
                // Validate on Server-Side increment
                await userRef.update({
                    balance: firebase.database.ServerValue.increment(HOURLY_REWARD),
                    lastMiningStart: null 
                });
                alert(`Success! ${HOURLY_REWARD} ABP Points added.`);
            } catch (e) { alert("Claim Error: " + e.message); }
        } else {
            // ANTI-HACK: Using Server Timestamp for Start
            await userRef.update({ lastMiningStart: firebase.database.ServerValue.TIMESTAMP });
        }
    }

    function resetMiningUI() {
        const btn = document.getElementById('mining-btn');
        btn.innerText = "START MINING";
        btn.classList.remove('active', 'ready');
        btn.disabled = false;
        document.getElementById('scarcity-fill').style.width = "0%";
        document.getElementById('scarcity-percent').innerText = "0%";
    }

    function checkClaimStatus(lastClaimTime, offset) {
        const btn = document.getElementById('daily-claim-btn');
        if (!lastClaimTime) return;
        const now = Date.now() + offset;
        const hoursPassed = (now - lastClaimTime) / 3600000;
        if (hoursPassed < 24) {
            btn.innerText = "SYNCED";
            btn.style.opacity = "0.3";
            btn.style.pointerEvents = "none";
            document.getElementById('streak-text').innerText = "Next sync in " + (24 - hoursPassed).toFixed(1) + "h";
        }
    }

    async function claimDailyBonus() {
        await userRef.update({
            balance: firebase.database.ServerValue.increment(10),
            lastClaim: firebase.database.ServerValue.TIMESTAMP
        });
        alert("Daily Sync Complete! +10 ABP credited.");
    }

    function copyRefLink() {
        const copyText = document.getElementById("ref-link-input");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Invite Link Copied!");
    }
</script>
</body>
</html>
