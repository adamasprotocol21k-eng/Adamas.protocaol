<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header">
            <div class="brand-identity" onclick="window.location.href='profile.html'">
                <div class="logo-wrapper"><div class="main-logo-icon">A</div></div>
                <div class="brand-text">
                    <span class="protocol-name">ADAMAS</span>
                    <span class="protocol-sub">PROTOCOL</span>
                </div>
            </div>

            <div class="header-right">
                <div class="eligibility-info" style="text-align: right; margin-bottom: 5px;">
                    <div class="trust-meter-mini" style="width: 50px; height: 3px; background: #222; border-radius: 5px; margin-bottom: 4px; margin-left: auto; overflow: hidden;">
                        <div id="trust-fill" class="progress-fill" style="width: 65%;"></div>
                    </div>
                    <span id="eligibility-status" style="font-size: 9px; font-weight: bold; color: #adff2f;">NODE SECURED ✅</span>
                </div>
                <div id="user-address" class="wallet-pill">0x...</div>
            </div>
        </header>

        <main class="engine-room" style="padding: 15px;">
            <section class="premium-card" style="text-align: center; margin-bottom: 20px;">
                <p style="font-size: 10px; letter-spacing: 2px; color: #666;">TOTAL MINED POINTS</p>
                <h1 id="total-balance" class="balance-count" style="font-family: 'Orbitron'; font-size: 2.5rem; margin: 10px 0;">0.0000</h1>
                <span style="color: #00f2ff; font-weight: bold; letter-spacing: 2px;">ABP</span>
                
                <div class="scarcity-meter" style="margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between; font-size: 9px; color: #00f2ff; margin-bottom: 5px;">
                        <span>GENESIS TARGET: 21,000 $ADS</span>
                        <span id="scarcity-percent">0%</span>
                    </div>
                    <div class="progress-bar"><div id="scarcity-fill" class="progress-fill" style="width: 0%;"></div></div>
                </div>
            </section>

            <section class="action-grid">
                <button class="btn-primary" onclick="toggleMining()" id="mining-btn">INITIALIZE MINING</button>
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <div class="premium-card" style="flex: 1; padding: 12px; text-align: center;">
                        <span style="font-size: 10px; color: #555;">ACTIVE NODES</span>
                        <span id="ref-count" style="display: block; font-size: 1.2rem; font-weight: bold;">0</span>
                    </div>
                    <div class="premium-card" style="flex: 1; padding: 12px; text-align: center;">
                        <span style="font-size: 10px; color: #555;">STREAK</span>
                        <span id="streak-info-dash" style="display: block; font-size: 1.2rem; font-weight: bold;">1</span>
                    </div>
                </div>
            </section>

            <section style="margin-top: 20px;">
                <div class="premium-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <div>
                        <h3 style="font-size: 14px; font-family: 'Orbitron';">DAILY SYNC</h3>
                        <p id="streak-text" style="font-size: 11px; color: #666;">Sync daily for multipliers</p>
                    </div>
                    <button class="btn-primary" id="daily-claim-btn" style="width: auto; padding: 10px 20px; font-size: 12px;" onclick="claimDailyBonus()">CLAIM</button>
                </div>

                <div class="premium-card">
                    <p style="font-size: 10px; color: #00f2ff; margin-bottom: 10px; font-family: 'Orbitron';">NETWORK INVITE LINK</p>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="ref-link-input" readonly value="LOADING..." 
                               style="flex: 1; background: rgba(0,0,0,0.5); border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; font-size: 11px; outline: none;">
                        <button onclick="copyRefLink()" style="background: #00f2ff; color: #000; border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; font-family: 'Orbitron'; font-size: 10px;">COPY</button>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">🏠 HOME</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
            authDomain: "adamas-protocol-v2.firebaseapp.com",
            databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol-v2",
            appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // [SECURITY] Redirect if not logged in
        const userWallet = localStorage.getItem('adamas_user');
        if (!userWallet) { window.location.href = "index.html"; }

        const userRef = db.ref('users/' + userWallet);
        let currentBalance = 0;
        let isMining = false;

        // --- Data Sync ---
        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentBalance = parseFloat(data.balance || 0);
                if(!isMining) updateBalanceUI(currentBalance);
                
                document.getElementById('user-address').innerText = userWallet.substring(0, 6) + "..." + userWallet.slice(-4);
                
                // Invite Link logic
                const baseUrl = window.location.origin + window.location.pathname.replace('dashboard.html', 'index.html');
                document.getElementById('ref-link-input').value = baseUrl + "?ref=" + (data.refCode || "NODE");
                
                // Referral Count
                db.ref('users').orderByChild('referredBy').equalTo(data.refCode).once('value', (refSnap) => {
                    document.getElementById('ref-count').innerText = refSnap.numChildren() || 0;
                });

                updateScarcity(currentBalance);
                checkClaimStatus(data.lastClaim);
            }
        });

        function updateBalanceUI(val) {
            document.getElementById('total-balance').innerText = val.toFixed(4);
        }

        function updateScarcity(bal) {
            const progress = Math.min((bal / 21000) * 100, 100).toFixed(2);
            document.getElementById('scarcity-percent').innerText = progress + "%";
            document.getElementById('scarcity-fill').style.width = progress + "%";
        }

        // --- Mining Logic (Visual + DB) ---
        function toggleMining() {
            if(isMining) return;
            isMining = true;
            const btn = document.getElementById('mining-btn');
            btn.innerText = "MINING ACTIVE...";
            btn.style.background = "#adff2f";
            btn.style.color = "#000";

            // Har second UI update karo (0.0001 add karo)
            setInterval(() => {
                currentBalance += 0.0001;
                updateBalanceUI(currentBalance);
            }, 1000);

            // Har 30 seconds mein database update karo taaki data loss na ho
            setInterval(() => {
                userRef.update({ balance: currentBalance });
            }, 30000);
        }

        function checkClaimStatus(lastClaimTime) {
            const btn = document.getElementById('daily-claim-btn');
            if (!lastClaimTime) return;

            const now = new Date().getTime();
            const last = new Date(lastClaimTime).getTime();
            const hoursPassed = (now - last) / (1000 * 60 * 60);

            if (hoursPassed < 24) {
                btn.innerText = "LOCKED";
                btn.style.opacity = "0.5";
                btn.style.pointerEvents = "none";
                btn.style.background = "#222";
                document.getElementById('streak-text').innerText = "Next sync in " + (24 - hoursPassed).toFixed(1) + "h";
            }
        }

        async function claimDailyBonus() {
            try {
                await userRef.update({
                    balance: firebase.database.ServerValue.increment(10),
                    lastClaim: new Date().toISOString()
                });
                alert("Daily Sync Complete! +10 ABP credited.");
            } catch (e) { console.error(e); }
        }

        function copyRefLink() {
            const copyText = document.getElementById("ref-link-input");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Invite Link Copied!");
        }
    </script>
</body>
</html>
