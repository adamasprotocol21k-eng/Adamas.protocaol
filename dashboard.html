<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .balance-card {
            background: linear-gradient(145deg, rgba(243, 186, 47, 0.15), rgba(0, 0, 0, 0.5));
            border: 1px solid rgba(243, 186, 47, 0.3);
            position: relative;
            overflow: hidden;
            animation: glowPulse 3s infinite alternate;
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px rgba(243, 186, 47, 0.1); }
            100% { box-shadow: 0 0 25px rgba(243, 186, 47, 0.25); }
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px; padding: 10px;
            border-left: 3px solid var(--binance-yellow);
        }
    </style>
</head>
<body onload="updateUI()">

    <div class="news-ticker">
        <div class="ticker-content">
            <span class="ticker-item">🚀 ADAMAS PROTOCOL V2.0 IS LIVE</span>
            <span class="ticker-item">💎 TOTAL SUPPLY: 21,000 ADS ONLY</span>
            <span class="ticker-item">🔥 500+ ABP BURNED IN LAST 24H</span>
            <span class="ticker-item">💰 REWARD RATE: 1.5X BOOST ACTIVE</span>
        </div>
    </div>

    <div style="padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <div>
            <small style="color: var(--text-sub); font-size: 0.6rem;">IDENTITY</small>
            <h5 id="walletAddress" class="text-neon-blue" style="margin:0; font-family: monospace;">Connecting...</h5>
        </div>
        <div class="rank-badge">SILVER MINER</div>
    </div>

    <div class="glass-card balance-card" style="text-align: center; padding: 35px 20px;">
        <p style="color: var(--text-sub); font-size: 0.7rem; letter-spacing: 3px;">TOTAL ABP BALANCE</p>
        <h1 id="balance" style="font-size: 3.5rem; margin: 10px 0; color: #fff;">0</h1>
        <div style="display: flex; justify-content: center; gap: 15px;">
            <div class="stat-item"><small>Staked</small><br><b id="stakedVal" class="text-neon-yellow">0</b></div>
            <div class="stat-item"><small>Rewards</small><br><b class="text-neon-green">+120</b></div>
        </div>
    </div>

    <div style="padding: 0 15px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="glass-card" style="margin:0; text-align: center;" onclick="location.href='earn.html'">
                <div style="font-size: 1.5rem;">⛏️</div>
                <div style="font-size: 0.8rem; font-weight: bold;">Mining</div>
            </div>
            <div class="glass-card" style="margin:0; text-align: center;" onclick="location.href='bonus.html'">
                <div style="font-size: 1.5rem;">🎁</div>
                <div style="font-size: 0.8rem; font-weight: bold;">Secret Gift</div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active"><span>🏠</span>Home</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="stake.html" class="nav-item"><span>🔐</span>Stake</a>
        <a href="refer.html" class="nav-item"><span>👥</span>Refer</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
