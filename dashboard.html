<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | The Ultimate Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #7000ff;
            --bg: #000205;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- 1. THE DEEP VISUAL DEPTH (Premium Image Feel) --- */
        .visual-depth {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 50% 35%, rgba(0, 242, 255, 0.18) 0%, transparent 60%),
                radial-gradient(circle at 0% 100%, rgba(112, 0, 255, 0.1) 0%, transparent 40%);
        }
        /* Scanline Texture */
        .visual-depth::after {
            content: ""; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.2) 2px);
            background-size: 100% 3px; pointer-events: none;
        }

        /* --- 2. ELITE HEADER --- */
        header {
            padding: 45px 25px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .node-badge {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan);
            padding: 6px 15px; border-radius: 10px; font-family: 'Orbitron';
            font-size: 0.6rem; color: var(--cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* --- 3. THE CENTER ORB (Balance Display) --- */
        .center-stage {
            height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .main-orb {
            width: 250px; height: 250px; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 80%);
            backdrop-filter: blur(15px); display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }
        .main-orb::before {
            content: ""; position: absolute; inset: -10px; border-radius: 50%;
            border: 1px solid rgba(0, 242, 255, 0.1); animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .bal-label { font-size: 0.5rem; letter-spacing: 5px; color: #555; font-weight: 800; }
        .bal-value { 
            font-family: 'Orbitron'; font-size: 3.5rem; font-weight: 900; 
            text-shadow: 0 0 25px var(--cyan); margin: 10px 0;
        }

        /* --- 4. BENTO FEATURE GRID (Accurate Alignment) --- */
        .feature-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 25px;
        }
        .feature-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 25px; padding: 22px; display: flex; flex-direction: column;
            justify-content: space-between; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        .feature-card:active { transform: scale(0.92); border-color: var(--cyan); background: rgba(0, 242, 255, 0.05); }
        
        .card-top { font-size: 0.55rem; letter-spacing: 2px; color: #666; font-weight: 900; }
        .card-mid { font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 900; margin-top: 5px; color: #fff; }
        .card-icon { align-self: flex-end; font-size: 1.6rem; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }

        /* --- 5. THE HIGHLIGHTED ACTION (Claim) --- */
        .action-bar {
            padding: 30px 25px;
        }
        .harvest-btn {
            background: #fff; color: #000; padding: 22px; border-radius: 100px;
            text-align: center; font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem;
            letter-spacing: 3px; box-shadow: 0 0 40px rgba(255,255,255,0.2);
            cursor: pointer; transition: 0.3s;
        }
        .harvest-btn:active { transform: scale(0.95); box-shadow: 0 0 10px white; }

        /* --- 6. NEON BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 85px; left: 20px; right: 20px;
            background: rgba(5, 5, 5, 0.85); border: 1px solid var(--border);
            padding: 15px; border-radius: 25px; display: flex; justify-content: space-around;
            backdrop-filter: blur(25px);
        }
        .nav-link { font-size: 1.4rem; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .nav-link.active { opacity: 1; filter: drop-shadow(0 0 10px var(--cyan)); color: var(--cyan); }
    </style>
</head>
<body>

    <div class="visual-depth"></div>

    <header>
        <div class="node-badge" id="walletDisplay">LINK_PENDING</div>
        <div onclick="window.location.href='admin.html'" style="font-size: 1.5rem; opacity: 0.3;">⚙️</div>
    </header>

    <div class="center-stage">
        <div class="main-orb">
            <div class="bal-label">TOTAL ASSETS</div>
            <div class="bal-value" id="userBalance">0</div>
            <div style="font-family: 'Orbitron'; font-size: 0.5rem; color: var(--cyan); letter-spacing: 3px;">ADAMAS CORE</div>
        </div>
    </div>

    <div class="feature-grid">
        <div class="feature-card" onclick="window.location.href='mines.html'">
            <div class="card-top">ARCADE SYSTEM</div>
            <div class="card-mid">MINES</div>
            <div class="card-icon">💣</div>
        </div>
        <div class="feature-card" onclick="window.location.href='staking.html'">
            <div class="card-top">QUANTUM VAULT</div>
            <div class="card-mid">STAKING</div>
            <div class="card-icon">🛡️</div>
        </div>
        <div class="feature-card">
            <div class="card-top">CORE ENERGY</div>
            <div class="card-mid" id="userEnergy">100%</div>
            <div class="card-icon">⚡</div>
        </div>
        <div class="feature-card" onclick="window.location.href='referral.html'">
            <div class="card-top">NETWORK FLEET</div>
            <div class="card-mid">AIRDROP</div>
            <div class="card-icon">🚀</div>
        </div>
    </div>

    <div class="action-bar">
        <div class="harvest-btn" id="claimBtn">
            AUTHORIZE HARVEST 🎁
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link active">🏠</div>
        <div class="nav-link" onclick="window.location.href='game.html'">🎮</div>
        <div class="nav-link" onclick="window.location.href='wallet.html'">🏦</div>
        <div class="nav-link" onclick="window.location.href='tasks.html'">📋</div>
    </div>

    <script type="module">
        import { DBModule } from './js/database.js';

        async function startProtocol() {
            // Check Wallet Connection
            const wallet = localStorage.getItem('userWallet');
            if (!wallet) {
                console.warn("Wallet not found, redirecting...");
                window.location.href = 'index.html';
                return;
            }

            // Update Header UI
            document.getElementById('walletDisplay').innerText = 
                wallet.substring(0, 6).toUpperCase() + "..." + wallet.substring(wallet.length - 4).toUpperCase();

            // Firebase Real-time Sync
            DBModule.listenToProfile(wallet, (data) => {
                if (data) {
                    // Update Balance with Animation Feel
                    document.getElementById('userBalance').innerText = (data.balance || 0).toLocaleString();
                    document.getElementById('userEnergy').innerText = (data.energy || 0) + "%";
                    console.log("ADAMAS Protocol Live.");
                }
            });
        }

        window.onload = startProtocol;
    </script>
</body>
</html>
