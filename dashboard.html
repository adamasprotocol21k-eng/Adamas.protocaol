<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
            --nav-bg: rgba(10, 11, 16, 0.85);
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { padding: 20px; max-width: 500px; margin: auto; text-align: center; }

        /* Profile Header */
        .profile-header {
            display: flex; align-items: center; gap: 15px; margin-bottom: 25px;
            padding: 10px 20px; background: var(--glass); border-radius: 100px;
            border: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(10px);
        }
        .mini-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(112, 0, 255, 0.2));
            border-radius: 25px; padding: 35px 20px; text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.3); margin-bottom: 25px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
        }
        .balance-label { font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; }
        .balance-main { font-family: 'Orbitron'; font-size: 2.8rem; color: var(--gold); text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); margin: 10px 0; }

        /* Section Title */
        .section-title { font-family: 'Orbitron'; font-size: 0.8rem; text-align: left; margin-bottom: 12px; color: var(--primary); letter-spacing: 1px; }

        /* Daily Rewards */
        .daily-container {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 25px;
            scrollbar-width: none;
        }
        .daily-container::-webkit-scrollbar { display: none; }
        .day-box {
            min-width: 65px; height: 80px; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s; cursor: pointer; flex-shrink: 0;
        }
        .day-box.claimed { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); opacity: 0.6; }
        .day-box.active { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); box-shadow: 0 0 10px var(--primary); }
        .day-num { font-size: 0.65rem; opacity: 0.5; }
        .day-reward { font-family: 'Orbitron'; font-size: 0.85rem; font-weight: bold; margin-top: 5px; }

        /* Updated Games Grid (Modern Style) */
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 120px; }
        .game-item {
            background: var(--glass); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center;
            backdrop-filter: blur(10px);
        }
        .game-item:hover { transform: translateY(-5px); border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }
        .game-icon { font-size: 2.2rem; margin-bottom: 12px; }

        /* --- PREMIUM NAVIGATION DOCK --- */
        .dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--nav-bg); backdrop-filter: blur(25px);
            padding: 12px 25px; border-radius: 35px; display: flex; gap: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); z-index: 1000;
        }
        .dock-item {
            text-decoration: none; color: rgba(255, 255, 255, 0.4); font-size: 1.2rem;
            position: relative; transition: 0.4s; display: flex; flex-direction: column; align-items: center;
        }
        .dock-item span { font-size: 0.55rem; font-family: 'Orbitron'; position: absolute; bottom: -15px; opacity: 0; transition: 0.3s; color: var(--primary); letter-spacing: 1px; }
        .dock-item.active { color: var(--primary); transform: translateY(-5px); }
        .dock-item.active span { opacity: 1; transform: translateY(-3px); }
        .dock-item.active i { filter: drop-shadow(0 0 8px var(--primary)); }

    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="container">
        <div class="profile-header">
            <img src="assets/logo.png" class="mini-avatar" id="headerPic">
            <div style="text-align: left;">
                <div style="font-size: 0.65rem; opacity: 0.6; letter-spacing: 1px;">NODE OPERATOR</div>
                <div id="headerName" style="font-weight: bold; font-family: 'Orbitron'; font-size: 0.85rem; color: var(--primary);">Explorer</div>
            </div>
        </div>

        <div class="balance-card">
            <div class="balance-label">ADS MAINNET BALANCE</div>
            <div class="balance-main" id="mainBalance">0.00</div>
            <div style="font-size: 0.9rem; opacity: 0.5; font-family: 'Orbitron';">≈ $<span id="usdVal">0.00</span></div>
        </div>

        <div class="section-title">DAILY AIRDROP</div>
        <div class="daily-container">
            <div class="day-box active" onclick="claimDaily(1)" id="d1"><span class="day-num">Day 1</span><span class="day-reward">+10</span></div>
            <div class="day-box" onclick="claimDaily(2)" id="d2"><span class="day-num">Day 2</span><span class="day-reward">+20</span></div>
            <div class="day-box" onclick="claimDaily(3)" id="d3"><span class="day-num">Day 3</span><span class="day-reward">+30</span></div>
            <div class="day-box" onclick="claimDaily(4)" id="d4"><span class="day-num">Day 4</span><span class="day-reward">+50</span></div>
            <div class="day-box" onclick="claimDaily(5)" id="d5"><span class="day-num">Day 5</span><span class="day-reward">+80</span></div>
            <div class="day-box" onclick="claimDaily(6)" id="d6"><span class="day-num">Day 6</span><span class="day-reward">+100</span></div>
        </div>

        <div class="section-title">QUICK GAMES</div>
        <div class="games-grid">
            <a href="mines.html" class="game-item"><span class="game-icon">💣</span><span style="font-family: 'Orbitron'; font-size: 0.7rem;">MINES</span></a>
            <a href="scratch.html" class="game-item"><span class="game-icon">✨</span><span style="font-family: 'Orbitron'; font-size: 0.7rem;">SCRATCH</span></a>
            <a href="teenpatti.html" class="game-item"><span class="game-icon">🃏</span><span style="font-family: 'Orbitron'; font-size: 0.7rem;">POKER</span></a>
            <a href="lottery.html" class="game-item"><span class="game-icon">🎟️</span><span style="font-family: 'Orbitron'; font-size: 0.7rem;">LOTTERY</span></a>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item active">
            <i class="fas fa-th-large"></i>
            <span>HOME</span>
        </a>
        <a href="games.html" class="dock-item">
            <i class="fas fa-gamepad"></i>
            <span>GAMES</span>
        </a>
        <a href="wallet.html" class="dock-item">
            <i class="fas fa-wallet"></i>
            <span>WALLET</span>
        </a>
        <a href="invite.html" class="dock-item">
            <i class="fas fa-users"></i>
            <span>FRIENDS</span>
        </a>
        <a href="profile.html" class="dock-item">
            <i class="fas fa-user-astronaut"></i>
            <span>USER</span>
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. 3D Background Logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(500 * 3);
        for(let i=0; i<1500; i++) posArray[i] = (Math.random()-0.5)*10;
        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0x00f2ff });
        const mesh = new THREE.Points(geometry, material);
        scene.add(mesh); camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); mesh.rotation.y += 0.001; renderer.render(scene, camera); } animate();

        // 2. Balance & Mining Logic
        let totalABP = parseFloat(localStorage.getItem('lastBalance') || "0");

        function updateDisplay() {
            document.getElementById('mainBalance').innerText = totalABP.toFixed(2);
            document.getElementById('usdVal').innerText = (totalABP * 0.012).toFixed(2); // Updated Rate
            localStorage.setItem('lastBalance', totalABP);
        }

        function claimDaily(day) {
            const el = document.getElementById('d' + day);
            if(el.classList.contains('claimed')) return;
            totalABP += (day * 10);
            el.classList.add('claimed');
            el.innerHTML = `<span class="day-num">Day ${day}</span><span class="day-reward">✔️</span>`;
            updateDisplay();
        }

        window.onload = () => {
            // Set User Profile Info
            document.getElementById('headerName').innerText = localStorage.getItem('userName') || "Explorer";
            const savedPic = localStorage.getItem('userProfilePic');
            if(savedPic) document.getElementById('headerPic').src = savedPic;
            
            updateDisplay();
            
            // Auto-Mining (Cloud Simulation)
            setInterval(() => {
                totalABP += 0.001; // Real-time mining feel
                updateDisplay();
            }, 1000);
        };
    </script>
</body>
</html>
