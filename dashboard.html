<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header">
            <div class="header-left">
                <div class="user-avatar-gate">
                    <div class="avatar-icon">
                        <img src="logo.png" alt="P" onerror="this.style.display='none'">
                        <span class="avatar-placeholder">P</span>
                    </div>
                    <div class="eligibility-info">
                        <span class="status-label">TRUST SCORE</span>
                        <div class="trust-meter-mini">
                            <div id="trust-fill" class="trust-fill" style="width: 10%;"></div>
                        </div>
                        <span id="eligibility-status" class="status-val text-glitch">0% SECURE</span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <div class="wallet-container">
                    <span class="network-tag">AMOY</span>
                    <div id="user-address" class="wallet-pill">0x00...0000</div>
                </div>
            </div>
        </header>

        <main class="engine-room">
            <section class="balance-card">
                <p class="card-label">TOTAL MINED POINTS</p>
                <h1 id="total-balance" class="balance-count">0.0000</h1>
                <span class="currency-tag">ABP</span>
                
                <div class="scarcity-meter">
                    <div class="meter-bar">
                        <div id="scarcity-fill" class="fill" style="width: 5%;"></div>
                    </div>
                    <div class="meter-stats">
                        <span>ADS SUPPLY: 21,000</span>
                        <span>SCARCITY: ULTRA-HIGH</span>
                    </div>
                </div>
            </section>

            <section class="daily-checkin-area">
                <div class="checkin-box">
                    <div class="checkin-info">
                        <h3>DAILY PROTOCOL SYNC</h3>
                        <p id="streak-info">Current Streak: 0 Days</p>
                    </div>
                    <button id="claim-btn" class="btn-claim" onclick="claimDailyBonus()">CLAIM</button>
                </div>
            </section>

            <section class="action-grid">
                <button class="btn-mine-start" onclick="toggleMining()">INITIALIZE MINING</button>
                
                <div class="stats-row">
                    <div class="stat-box">
                        <span class="stat-label">REFERRALS</span>
                        <span id="ref-count" class="stat-val">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">MINING SCORE</span>
                        <span id="mining-score" class="stat-val">0.0</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
