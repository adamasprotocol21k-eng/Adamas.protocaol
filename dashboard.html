<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Logo Styling */
        .avatar-icon { 
            width: 45px; height: 45px; border-radius: 12px; 
            border: 1px solid var(--glass-border); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,242,255,0.05);
        }
        .brand-logo { width: 100%; height: 100%; object-fit: cover; }
        
        /* Status Text Animation */
        #eligibility-status {
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulseText 2s infinite;
        }
        @keyframes pulseText {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header">
            <div class="user-avatar-gate" style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar-icon" onclick="window.location.href='profile.html'">
                    <img src="your-logo-name.png" alt="ADAMAS" class="brand-logo" onerror="this.src='https://via.placeholder.com/45/00f2ff/000000?text=AD'">
                </div>
                
                <div class="eligibility-info">
                    <div class="trust-meter-mini" style="width: 70px; height: 3px; background: rgba(255,255,255,0.05); border-radius: 5px; margin-bottom: 6px; overflow: hidden;">
                        <div id="trust-fill" class="progress-fill" style="width: 100%; background: var(--cyan);"></div>
                    </div>
                    <span id="eligibility-status" style="font-size: 9px; font-weight: bold; color: var(--cyan); font-family: 'Orbitron';">AUTHENTICATING PROTOCOL...</span>
                </div>
            </div>

            <div class="header-right">
                <div class="wallet-container" style="text-align: right;">
                    <span style="font-size: 9px; color: #444; display: block; margin-bottom: 2px; font-family: 'Orbitron';">NETWORK: POLYGON</span>
                    <div id="user-address" class="wallet-pill" style="font-size: 10px; padding: 4px 10px; border: 1px solid rgba(0,242,255,0.2); border-radius: 20px; background: rgba(0,0,0,0.3);">0x...</div>
                </div>
            </div>
        </header>

        <main class="engine-room" style="padding: 15px;">
            <section class="premium-card" style="text-align: center; margin-bottom: 20px; background: radial-gradient(circle at top, rgba(0,242,255,0.05) 0%, rgba(0,0,0,0) 70%);">
                <p style="font-size: 10px; letter-spacing: 2px; color: #555; font-family: 'Orbitron';">TOTAL MINED ASSETS</p>
                <h1 id="total-balance" class="balance-count" style="font-family: 'Orbitron'; font-size: 2.2rem; margin: 10px 0; color: #fff;">0.0000</h1>
                <span style="color: var(--cyan); font-weight: bold; letter-spacing: 3px; font-size: 12px;">ABP</span>
                
                <div class="scarcity-meter" style="margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; font-size: 8px; color: #444; margin-bottom: 6px; font-family: 'Orbitron';">
                        <span>GENESIS TARGET: 21,000 $ADS</span>
                        <span id="scarcity-percent" style="color: var(--cyan);">0%</span>
                    </div>
                    <div class="progress-bar" style="height: 4px;">
                        <div id="scarcity-fill" class="progress-fill" style="width: 0%;"></div>
                    </div>
                </div>
            </section>

            <section class="premium-card" style="margin-bottom: 20px; border-left: 3px solid var(--neon-gold); background: rgba(255,204,0,0.02);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <p style="font-size: 10px; font-weight: bold; color: #555; font-family: 'Orbitron';">AIRDROP READINESS</p>
                    <span id="elite-tier-name" style="font-family: 'Orbitron'; font-size: 11px; color: var(--neon-gold); text-shadow: 0 0 10px rgba(255,204,0,0.2);">FETCHING RANK...</span>
                </div>
                <div class="progress-bar" style="height: 6px;">
                    <div id="tier-progress-fill" class="progress-fill" style="width: 0%; background: var(--neon-gold);"></div>
                </div>
            </section>

            <section class="action-grid">
                <button class="btn-primary" onclick="toggleMining()" id="mining-btn" style="height: 55px; font-size: 14px; letter-spacing: 2px;">INITIALIZE MINING</button>
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <div class="premium-card" style="flex: 1; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03);">
                        <span style="font-size: 9px; color: #444; font-family: 'Orbitron';">ACTIVE NODES</span>
                        <span id="ref-count" style="display: block; font-size: 1.4rem; font-weight: bold; color: var(--cyan); margin-top: 5px;">0</span>
                    </div>
                    <div class="premium-card" style="flex: 1; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.03);">
                        <span style="font-size: 9px; color: #444; font-family: 'Orbitron';">STREAK</span>
                        <span id="streak-info-dash" style="display: block; font-size: 1.4rem; font-weight: bold; color: var(--neon-green); margin-top: 5px;">0 DAYS</span>
                    </div>
                </div>
            </section>

            <section style="margin-top: 20px;">
                <div class="premium-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: linear-gradient(90deg, rgba(0,242,255,0.03) 0%, transparent 100%);">
                    <div>
                        <h3 style="font-size: 12px; font-family: 'Orbitron'; color: #fff;">DAILY SYNC</h3>
                        <p id="streak-text" style="font-size: 10px; color: #555; margin-top: 2px;">Sync daily for 2x multipliers</p>
                    </div>
                    <button id="claim-btn" class="btn-primary" style="width: auto; padding: 8px 18px; font-size: 11px; height: auto;" onclick="claimDailyBonus()">CLAIM</button>
                </div>
            </section>
        </main>
        
        </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="dashboard.js"></script>
    <script>
        // Status Text Sync: 2 seconds baad text change hoga
        setTimeout(() => {
            document.getElementById('eligibility-status').innerText = "PROTOCOL SECURED ✅";
            document.getElementById('eligibility-status').style.color = "var(--neon-green)";
        }, 3000);
    </script>
</body>
</html>
