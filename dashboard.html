<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ADAMAS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { padding: 20px; max-width: 500px; margin: auto; height: 100vh; overflow-y: auto; padding-bottom: 100px; }

        /* --- Header Section --- */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .network-badge { 
            background: rgba(0, 255, 136, 0.1); color: var(--success); 
            padding: 5px 12px; border-radius: 20px; font-family: 'Orbitron'; 
            font-size: 0.6rem; border: 1px solid var(--success);
            display: flex; align-items: center; gap: 5px;
        }

        /* --- Balance Card --- */
        .balance-card {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.2), rgba(0, 242, 255, 0.1));
            border-radius: 25px; padding: 30px 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden;
        }
        .main-balance { font-size: 2.8rem; font-weight: 700; margin: 10px 0; font-family: 'Orbitron'; text-shadow: 0 0 20px var(--primary); }
        .currency { font-size: 1rem; color: var(--gold); margin-left: 5px; }

        /* --- Daily Check-in UI --- */
        .checkin-card {
            background: rgba(0, 242, 255, 0.05); border-radius: 20px; padding: 15px;
            margin: 20px 0; border: 1px dashed var(--primary);
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-claim {
            background: var(--primary); color: black; border: none; padding: 10px 25px;
            border-radius: 50px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 10px var(--primary); font-size: 0.7rem;
        }
        .btn-claim:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        /* --- Action Hub --- */
        .action-hub { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .action-item { text-align: center; cursor: pointer; text-decoration: none; color: white; }
        .icon-box {
            width: 50px; height: 50px; background: var(--glass); border-radius: 15px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 8px;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .action-item:hover .icon-box { background: var(--primary); color: black; }
        .action-item span { font-size: 0.65rem; font-family: 'Orbitron'; color: rgba(255,255,255,0.6); }

        .stat-card {
            background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px); border-radius: 25px; padding: 15px;
            display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-link { color: rgba(255,255,255,0.4); text-decoration: none; text-align: center; }
        .nav-link.active { color: var(--primary); }
        .nav-link span { display: block; font-size: 0.55rem; font-family: 'Orbitron'; margin-top: 5px; }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="container">
        <div class="header">
            <div>
                <h3 style="margin:0; font-family: 'Orbitron'; font-size: 0.9rem;">ADAMAS <span style="color: var(--primary);">PROTOCOL</span></h3>
                <p style="margin:0; font-size: 0.6rem; opacity: 0.5;">WELCOME BACK, OPERATOR</p>
            </div>
            <div class="network-badge"><i class="fas fa-circle"></i> MAINNET ACTIVE</div>
        </div>

        <div class="balance-card">
            <div class="balance-label">CURRENT ASSETS</div>
            <div class="main-balance" id="totalBalance">0.00<span class="currency">ABP</span></div>
        </div>

        <div class="checkin-card">
            <div>
                <div style="font-family: 'Orbitron'; font-size: 0.7rem; color: var(--primary);">DAILY REWARD</div>
                <div id="checkinStatus" style="font-size: 0.6rem; opacity: 0.7;">Day 1: 100 ABP Ready</div>
                <div id="timerText" style="font-size: 0.6rem; color: #ff4444; display:none; margin-top:5px;"></div>
            </div>
            <button id="checkinBtn" class="btn-claim" onclick="claimDaily()">CLAIM</button>
        </div>

        <div class="action-hub">
            <a href="scratch.html" class="action-item"><div class="icon-box"><i class="fas fa-ticket-alt"></i></div><span>SCRATCH</span></a>
            <a href="games.html" class="action-item"><div class="icon-box"><i class="fas fa-dice"></i></div><span>CASINO</span></a>
            <a href="spin.html" class="action-item"><div class="icon-box"><i class="fas fa-sync-alt"></i></div><span>SPIN</span></a>
            <a href="invite.html" class="action-item"><div class="icon-box"><i class="fas fa-user-plus"></i></div><span>REFER</span></a>
        </div>

        <div class="stat-card">
            <div style="display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.6rem; margin-bottom: 10px;">
                <span>AIRDROP ELIGIBILITY</span>
                <span id="progressText">0%</span>
            </div>
            <div style="width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden;">
                <div id="barFill" style="width:0%; height:100%; background:linear-gradient(90deg, var(--secondary), var(--primary));"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-link active"><i class="fas fa-th-large"></i><span>HOME</span></a>
        <a href="games.html" class="nav-link"><i class="fas fa-gamepad"></i><span>GAMES</span></a>
        <a href="wallet.html" class="nav-link"><i class="fas fa-wallet"></i><span>WALLET</span></a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user-astronaut"></i><span>USER</span></a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wallet = "0x6DbC17D9950e0b3A7627ec6bFc6b210A998da690";
        const userPath = 'users/' + wallet.substring(0, 10);
        
        const dailyRewards = [100, 200, 300, 500, 700, 1000, 2500];
        let currentBalance = 0;

        onValue(ref(db, userPath), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentBalance = data.currentBalance || 0;
                document.getElementById('totalBalance').innerHTML = `${parseFloat(currentBalance).toLocaleString()}<span class="currency">ABP</span>`;
                
                // KYC Progress
                if(data.tasks) {
                    const done = Object.values(data.tasks).filter(v => v === true).length;
                    const percent = (done / 4) * 100;
                    document.getElementById('barFill').style.width = percent + '%';
                    document.getElementById('progressText').innerText = percent + '%';
                }

                // Check-in Status
                checkDailyStatus(data);
            }
        });

        function checkDailyStatus(data) {
            const lastTime = data.lastCheckin || 0;
            const day = data.checkinDay || 0;
            const now = Date.now();
            const diff = now - lastTime;
            const btn = document.getElementById('checkinBtn');
            const statusText = document.getElementById('checkinStatus');

            if (diff < 24 * 60 * 60 * 1000) {
                btn.disabled = true;
                btn.innerText = "LOCKED";
                startTimer(24 * 60 * 60 * 1000 - diff);
                statusText.innerText = `Day ${day} Claimed!`;
            } else {
                btn.disabled = false;
                btn.innerText = "CLAIM";
                document.getElementById('timerText').style.display = 'none';
                const nextDay = (day % 7) + 1;
                statusText.innerText = `Day ${nextDay}: ${dailyRewards[nextDay-1]} ABP Ready`;
            }
        }

        window.claimDaily = async () => {
            const snap = await get(ref(db, userPath));
            const data = snap.val() || {};
            const lastTime = data.lastCheckin || 0;
            const day = data.checkinDay || 0;

            if (Date.now() - lastTime < 24 * 60 * 60 * 1000) return;

            const nextDay = (day % 7) + 1;
            const reward = dailyRewards[nextDay - 1];
            
            await update(ref(db, userPath), {
                currentBalance: currentBalance + reward,
                lastCheckin: Date.now(),
                checkinDay: nextDay
            });

            alert(`Mubarak ho! Day ${nextDay} reward mil gaya.`);
        };

        function startTimer(ms) {
            const timerBox = document.getElementById('timerText');
            timerBox.style.display = 'block';
            const interval = setInterval(() => {
                ms -= 1000;
                const h = Math.floor(ms / 3600000);
                const m = Math.floor((ms % 3600000) / 60000);
                const s = Math.floor((ms % 60000) / 1000);
                timerBox.innerText = `Next: ${h}h ${m}m ${s}s`;
                if (ms <= 0) {
                    clearInterval(interval);
                    location.reload();
                }
            }, 1000);
        }

        // 3D background logic stays same...
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const particles = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(1500), 3)), new THREE.PointsMaterial({size: 0.005, color: 0x00f2ff}));
        scene.add(particles); camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); } animate();
    </script>
</body>
</html>
