<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { padding: 20px; max-width: 500px; margin: auto; text-align: center; }

        /* Profile Header */
        .profile-header {
            display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-bottom: 15px;
            padding: 10px 20px; background: var(--glass); border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(10px);
        }
        .mini-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        /* PREMIUM TOP NAVIGATION */
        .top-nav-bar {
            display: flex; justify-content: space-around; background: rgba(255, 255, 255, 0.03);
            padding: 15px 10px; border-radius: 25px; border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(15px); margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-btn {
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.3s;
        }
        .nav-btn i { font-size: 1.2rem; }
        .nav-btn span { font-size: 0.6rem; font-family: 'Orbitron'; letter-spacing: 1px; }
        .nav-btn.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1), rgba(112, 0, 255, 0.2));
            border-radius: 25px; padding: 35px 20px; text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.3); margin-bottom: 25px;
            position: relative; overflow: hidden;
        }
        .balance-label { font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; }
        .balance-main { font-family: 'Orbitron'; font-size: 2.8rem; color: var(--gold); text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); margin: 10px 0; }

        .section-title { font-family: 'Orbitron'; font-size: 0.8rem; text-align: left; margin: 20px 0 12px; color: var(--primary); letter-spacing: 1px; }

        /* IDENTITY & LOCATION SECTION */
        .verification-card {
            background: var(--glass); border-radius: 25px; padding: 20px;
            border: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(10px);
            margin-bottom: 100px; /* Space for bottom scroll */
        }
        #camera-area {
            width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 15px;
            margin-bottom: 15px; position: relative; overflow: hidden;
            border: 1px dashed var(--primary); display: flex; align-items: center; justify-content: center;
        }
        #webcam, #photo-canvas { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; }

        .action-btn {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            font-family: 'Orbitron'; font-size: 0.65rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-bottom: 10px;
        }
        .btn-capture { background: var(--primary); color: black; }
        .btn-open { background: rgba(0, 242, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }

        .location-box {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px;
            text-align: left; border: 1px solid rgba(255,255,255,0.05);
        }

        .network-tag {
            font-size: 0.6rem; color: #00ff88; font-family: 'Orbitron';
            background: rgba(0, 255, 136, 0.1); padding: 5px 12px;
            border-radius: 50px; display: inline-block; margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="container">
        <div class="profile-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="assets/logo.png" class="mini-avatar">
                <div style="text-align: left;">
                    <div style="font-size: 0.55rem; opacity: 0.6; letter-spacing: 1px;">NODE OPERATOR</div>
                    <div style="font-weight: bold; font-family: 'Orbitron'; font-size: 0.9rem; color: var(--primary);">Hanuman Verma</div>
                </div>
            </div>
            <div class="network-tag" style="margin-bottom: 0;"><i class="fas fa-circle" style="font-size: 0.4rem; vertical-align: middle;"></i> POLYGON</div>
        </div>

        <div class="top-nav-bar">
            <a href="dashboard.html" class="nav-btn active"><i class="fas fa-th-large"></i><span>HOME</span></a>
            <a href="games.html" class="nav-btn"><i class="fas fa-gamepad"></i><span>GAMES</span></a>
            <a href="wallet.html" class="nav-btn"><i class="fas fa-wallet"></i><span>WALLET</span></a>
            <a href="invite.html" class="nav-btn"><i class="fas fa-shield-alt"></i><span>VERIFY</span></a>
            <a href="profile.html" class="nav-btn"><i class="fas fa-user-astronaut"></i><span>USER</span></a>
        </div>

        <div class="balance-card">
            <div class="balance-label">ADS MAINNET BALANCE</div>
            <div class="balance-main" id="mainBalance">0.00</div>
            <div style="font-size: 0.9rem; opacity: 0.5; font-family: 'Orbitron';">≈ $<span id="usdVal">0.00</span></div>
        </div>

        <div class="section-title">IDENTITY & NODE LOCATION</div>
        <div class="verification-card">
            <div id="camera-area">
                <video id="webcam" autoplay playsinline style="display: none;"></video>
                <canvas id="photo-canvas" style="display: none;"></canvas>
                <div id="camera-placeholder" style="text-align: center; opacity: 0.5;">
                    <i class="fas fa-camera" style="font-size: 2rem; color: var(--primary);"></i>
                    <p style="font-size: 0.6rem; font-family: 'Orbitron'; margin-top: 10px;">READY TO SCAN</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="startCamera()" class="action-btn btn-open">OPEN CAMERA</button>
                <button onclick="takeSnapshot()" class="action-btn btn-capture">CAPTURE</button>
            </div>

            <div class="location-box">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span style="font-size: 0.6rem; font-family: 'Orbitron'; color: var(--gold);">NODE LOCATION</span>
                    <button onclick="getLocation()" style="background: none; border: none; color: var(--primary); cursor: pointer;"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div id="location-text" style="font-size: 0.8rem; opacity: 0.8;">Click sync to fetch GPS...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. 3D Background Logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(400 * 3);
        for(let i=0; i<1200; i++) posArray[i] = (Math.random()-0.5)*10;
        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0x00f2ff });
        const mesh = new THREE.Points(geometry, material);
        scene.add(mesh); camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); mesh.rotation.y += 0.001; renderer.render(scene, camera); } animate();

        // 2. Core Logic
        let totalABP = parseFloat(localStorage.getItem('lastBalance') || "104084.48");

        function updateDisplay() {
            document.getElementById('mainBalance').innerText = totalABP.toFixed(2);
            document.getElementById('usdVal').innerText = (totalABP * 0.012).toFixed(2);
            localStorage.setItem('lastBalance', totalABP);
        }

        // Camera Logic
        async function startCamera() {
            const video = document.getElementById('webcam');
            const placeholder = document.getElementById('camera-placeholder');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                placeholder.style.display = 'none';
            } catch (err) { alert("Camera access denied."); }
        }

        function takeSnapshot() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('photo-canvas');
            const context = canvas.getContext('2d');
            if (video.style.display === 'none') return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            video.style.display = 'none';
            canvas.style.display = 'block';
            alert("Node Identity Verified! 📸");
        }

        // Location Logic
        function getLocation() {
            const locDisplay = document.getElementById('location-text');
            locDisplay.innerText = "Syncing with Satellites...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    locDisplay.innerHTML = `<span style="color:var(--primary)">LAT:</span> ${pos.coords.latitude.toFixed(4)} | <span style="color:var(--primary)">LON:</span> ${pos.coords.longitude.toFixed(4)}`;
                }, () => { locDisplay.innerText = "GPS Access Denied."; });
            }
        }

        window.onload = () => {
            updateDisplay();
            setInterval(() => {
                totalABP += 0.001;
                updateDisplay();
            }, 1000);
        };
    </script>
</body>
</html>
