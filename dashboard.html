<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas Dashboard | Premium Ecosystem</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-theme">

    <header class="pro-header">
        <div class="header-left">
            <span class="testnet-label">AMOY v1.2</span>
            <div id="walletAddr" class="address-chip">0x...0000</div>
        </div>
        <div class="header-right">
            <div class="balance-pill">
                <span class="coin-icon">💎</span>
                <span id="balance">0</span> <small>ABP</small>
            </div>
        </div>
    </header>

    <main class="dashboard-content">
        <section class="mining-card glass-effect">
            <div class="mining-header">
                <h3>ADS MINING NODE</h3>
                <span class="status-badge">● LIVE</span>
            </div>
            <div class="mining-body">
                <div class="ads-counter">
                    <span id="liveAds" class="ultra-glow-text">0.0000</span>
                    <small>ADS MINED</small>
                </div>
                <div class="mining-progress-bg">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </section>

        <h3 class="section-title">GAMING ZONE</h3>
        <div class="grid-2x2">
            <div class="game-card pro-card" onclick="openGame('mines')">
                <div class="game-icon">💣</div>
                <div class="game-info">
                    <h4>MINES</h4>
                    <small>High Risk</small>
                </div>
            </div>
            <div class="game-card pro-card" onclick="openGame('patti')">
                <div class="game-icon">🃏</div>
                <div class="game-info">
                    <h4>3D PATTI</h4>
                    <small>Casino Style</small>
                </div>
            </div>
        </div>

        <section id="taskContainer" class="tasks-section">
            </section>
    </main>

    <div id="gameModal" class="modal-overlay">
        <div class="modal-content glass-effect game-window">
            <span class="close-btn" onclick="closeGame()">&times;</span>
            <div id="gameContainer"></div>
        </div>
    </div>

    <nav class="bottom-dock">
        <div class="dock-item active">🏠 <span>Home</span></div>
        <div class="dock-item">🏆 <span>Rank</span></div>
        <div class="dock-item">💳 <span>Wallet</span></div>
    </nav>

    <script src="js/web3.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/game-mines.js"></script>
    <script src="js/game-patti.js"></script>
</body>
</html>
