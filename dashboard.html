<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- PRO BRANDING & LOGO FIX --- */
        .brand-identity { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        
        /* Fixed Square to Circle Logo */
        .logo-box {
            width: 44px; height: 44px; border-radius: 50%; /* Goaal Logo */
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            position: relative; overflow: hidden;
            box-shadow: 0 0 15px var(--cyan-glow);
        }
        .nav-logo-img {
            width: 85%; height: 85%; object-fit: cover; border-radius: 50%;
            filter: drop-shadow(0 0 5px var(--cyan-glow));
        }
        .brand-name { font-family: 'Orbitron'; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .brand-sub { font-size: 8px; color: var(--cyan); letter-spacing: 1.5px; font-family: 'Orbitron'; display: block; margin-top: -2px; opacity: 0.7; }

        /* --- HERO BALANCE CARD (SYSTEMATIC) --- */
        .hero-balance-card {
            background: linear-gradient(145deg, rgba(15,15,15,0.9) 0%, rgba(5,5,5,1) 100%);
            border: 1px solid rgba(0, 242, 255, 0.15); 
            border-radius: 28px; padding: 35px 20px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 25px;
            position: relative; overflow: hidden;
        }
        
        /* --- PRO MINING ENGINE --- */
        .mining-engine-vessel {
            width: 190px; height: 190px; margin: 25px auto;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .engine-outer-ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px dashed rgba(0, 242, 255, 0.15);
            animation: spin 20s linear infinite;
        }
        .engine-glow-aura {
            position: absolute; width: 140px; height: 140px;
            background: radial-gradient(circle, var(--cyan-glow) 0%, transparent 70%);
            border-radius: 50%; animation: pulseGlow 3s infinite ease-in-out;
        }
        .mining-trigger-btn {
            width: 130px; height: 130px; border-radius: 50%;
            background: rgba(0,0,0,0.8); border: 2px solid var(--cyan);
            color: #fff; font-family: 'Orbitron'; font-weight: 900; font-size: 11px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.1);
            cursor: pointer; z-index: 5; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            outline: none; backdrop-filter: blur(10px);
        }
        
        /* State Based Styles */
        .mining-trigger-btn.active { border-color: #ffaa00; color: #ffaa00; box-shadow: 0 0 30px rgba(255, 170, 0, 0.2); }
        .mining-trigger-btn.ready { border-color: var(--p-green); color: var(--p-green); box-shadow: 0 0 30px rgba(173, 255, 47, 0.3); animation: pulse-green 2s infinite; }
        .mining-trigger-btn:active { transform: scale(0.92); }

        main { padding-bottom: 110px; }

        /* Animations */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-green { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(173, 255, 47, 0.2); } 50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(173, 255, 47, 0.4); } }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } }
        
        .copy-btn { background: var(--cyan); color: #000; border: none; padding: 0 20px; border-radius: 12px; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .copy-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px 5px;">
            <div class="brand-identity" onclick="window.location.href='profile.html'">
                <div class="logo-box">
                    <img src="assets/dashboard-logo.png" alt="A" class="nav-logo-img">
                </div>
                <div class="brand-text">
                    <span class="brand-name">ADAMAS</span>
                    <span class="brand-sub">QUANTUM TERMINAL</span>
                </div>
            </div>
            <div style="text-align: right;">
                <div id="user-address" style="font-family: monospace; font-size: 10px; color: #888; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);">0x...</div>
                <div style="font-size: 8px; color: var(--p-green); margin-top: 5px; font-family: 'Orbitron'; letter-spacing: 1px; text-shadow: 0 0 10px var(--p-green);">ACTIVE_SESSION_01</div>
            </div>
        </header>

        <main>
            <section class="hero-balance-card">
                <p style="font-size: 8.5px; letter-spacing: 4px; color: #555; font-family: 'Orbitron'; margin-bottom: 5px;">QUANTUM_BALANCE_NODE</p>
                <h1 id="total-balance" style="font-family: 'Orbitron'; font-size: 3.2rem; margin: 5px 0; font-weight: 900; color: #fff; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));">0.00</h1>
                <div style="color: var(--cyan); font-family: 'Orbitron'; font-size: 10px; letter-spacing: 6px; opacity: 0.8;">ABP_PROTOCOL_ASSETS</div>
                
                <div style="margin-top: 30px; background: rgba(0,0,0,0.4); padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03);">
                    <div style="display: flex; justify-content: space-between; font-size: 8.5px; color: var(--cyan); margin-bottom: 10px; font-family: 'Orbitron'; letter-spacing: 1px;">
                        <span id="mining-status-text">MINING_PROGRESS</span>
                        <span id="scarcity-percent">0%</span>
                    </div>
                    <div style="height: 5px; background: #0a0a0a; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.02);">
                        <div id="scarcity-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--cyan), var(--p-green)); transition: 0.5s; box-shadow: 0 0 10px var(--cyan);"></div>
                    </div>
                </div>
            </section>

            <div class="mining-engine-vessel">
                <div class="engine-outer-ring"></div>
                <div class="engine-glow-aura"></div>
                <button class="mining-trigger-btn" onclick="handleMiningAction()" id="mining-btn">START MINING</button>
            </div>

            <div style="display: flex; gap: 12px; margin-bottom: 25px;">
                <div class="premium-card" style="flex: 1; text-align: center; background: rgba(255,255,255,0.01); border-radius: 20px; padding: 15px;">
                    <span style="font-size: 7.5px; color: #444; font-family: 'Orbitron'; letter-spacing: 1.5px;">ACTIVE_NODES</span>
                    <span id="ref-count" style="display: block; font-size: 22px; font-family: 'Orbitron'; color: #fff; margin-top: 5px;">0</span>
                </div>
                <div class="premium-card" style="flex: 1; text-align: center; background: rgba(255,255,255,0.01); border-radius: 20px; padding: 15px;">
                    <span style="font-size: 7.5px; color: #444; font-family: 'Orbitron'; letter-spacing: 1.5px;">SYNC_STREAK</span>
                    <span id="streak-info-dash" style="display: block; font-size: 22px; font-family: 'Orbitron'; color: #fff; margin-top: 5px;">1</span>
                </div>
            </div>

            <div class="premium-card" style="display: flex; justify-content: space-between; align-items: center; border-radius: 22px; border-color: rgba(173, 255, 47, 0.1); background: rgba(173, 255, 47, 0.01);">
                <div>
                    <h3 style="font-size: 10px; font-family: 'Orbitron'; color: var(--p-green); margin: 0; letter-spacing: 1px;">DAILY_REWARD_CLAIM</h3>
                    <p id="streak-text" style="font-size: 9.5px; color: #555; margin-top: 4px;">Secure 10 ABP daily sync bonus</p>
                </div>
                <button class="btn-primary" id="daily-claim-btn" style="width: auto; padding: 10px 18px; font-size: 9px; background: var(--p-green); color: #000; font-weight: 900; border-radius: 10px;" onclick="claimDailyBonus()">SYNC</button>
            </div>

            <div class="premium-card" style="background: rgba(0,0,0,0.2); margin-top: 20px; border-radius: 22px;">
                <p style="font-size: 8px; color: var(--cyan); margin-bottom: 12px; font-family: 'Orbitron'; letter-spacing: 2.5px;">UNIQUE_INVITE_IDENTIFIER</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="ref-link-input" readonly value="GENERATING..." style="flex: 1; background: #050505; border: 1px solid #111; color: #555; padding: 14px; border-radius: 14px; font-size: 10px; font-family: monospace; outline: none;">
                    <button class="copy-btn" onclick="copyRefLink()">COPY</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">🏠 HOME</a>
            <a href="vault.html" class="nav-item">🔒 VAULT</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
    const userWallet = localStorage.getItem('adamas_user');
    if (!userWallet) { window.location.href = "index.html"; }

    const userRef = db.ref('users/' + userWallet);
    const HOURLY_REWARD = 500; 
    let miningTimer;
    let serverOffset = 0;

    function formatABP(num) {
        if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return parseFloat(num).toFixed(2);
    }

    db.ref(".info/serverTimeOffset").on("value", (snap) => {
        serverOffset = snap.val() || 0;
    });

    userRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('total-balance').innerText = formatABP(data.balance || 0);
            document.getElementById('user-address').innerText = userWallet.substring(0, 6) + "..." + userWallet.slice(-4);
            document.getElementById('streak-info-dash').innerText = data.streak || 1;
            
            const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
            document.getElementById('ref-link-input').value = baseUrl + "/index.html?ref=" + userWallet;
            
            db.ref('users').orderByChild('referredBy').equalTo(userWallet).once('value', (snap) => {
                document.getElementById('ref-count').innerText = snap.numChildren() || 0;
            });

            checkMiningStatus(data.lastMiningStart);
            checkClaimStatus(data.lastClaim);
        }
    });

    function checkMiningStatus(startTime) {
        const btn = document.getElementById('mining-btn');
        const fill = document.getElementById('scarcity-fill');
        const percentText = document.getElementById('scarcity-percent');
        
        if (!startTime) {
            resetMiningUI();
            return;
        }

        const now = Date.now() + serverOffset; 
        const elapsedSecs = (now - startTime) / 1000;
        const totalSecs = 3600; 

        if (elapsedSecs < totalSecs) {
            const remaining = totalSecs - elapsedSecs;
            const minutes = Math.floor(remaining / 60);
            const seconds = Math.floor(remaining % 60);
            
            btn.innerText = `${minutes}:${seconds < 10 ? '0'+seconds : seconds}`;
            btn.classList.add('active');
            btn.classList.remove('ready');
            btn.disabled = true;

            const progress = (elapsedSecs / totalSecs) * 100;
            fill.style.width = progress + "%";
            percentText.innerText = Math.floor(progress) + "%";

            clearTimeout(miningTimer);
            miningTimer = setTimeout(() => checkMiningStatus(startTime), 1000);
        } else {
            btn.innerText = `CLAIM ${HOURLY_REWARD}`;
            btn.classList.remove('active');
            btn.classList.add('ready');
            btn.disabled = false;
            fill.style.width = "100%";
            percentText.innerText = "100%";
        }
    }

    async function handleMiningAction() {
        const btn = document.getElementById('mining-btn');
        if (btn.classList.contains('ready')) {
            try {
                await userRef.update({
                    balance: firebase.database.ServerValue.increment(HOURLY_REWARD),
                    lastMiningStart: null 
                });
            } catch (e) { alert("Claim Error"); }
        } else {
            await userRef.update({ lastMiningStart: firebase.database.ServerValue.TIMESTAMP });
        }
    }

    function resetMiningUI() {
        const btn = document.getElementById('mining-btn');
        btn.innerText = "START MINING";
        btn.classList.remove('active', 'ready');
        btn.disabled = false;
        document.getElementById('scarcity-fill').style.width = "0%";
        document.getElementById('scarcity-percent').innerText = "0%";
    }

    function checkClaimStatus(lastClaimTime) {
        const btn = document.getElementById('daily-claim-btn');
        if (!lastClaimTime) return;
        const now = Date.now() + serverOffset;
        const hoursPassed = (now - lastClaimTime) / 3600000;
        if (hoursPassed < 24) {
            btn.innerText = "SYNCED";
            btn.style.opacity = "0.3";
            btn.style.pointerEvents = "none";
            document.getElementById('streak-text').innerText = "Next sync in " + (24 - hoursPassed).toFixed(1) + "h";
        }
    }

    async function claimDailyBonus() {
        await userRef.update({
            balance: firebase.database.ServerValue.increment(10),
            lastClaim: firebase.database.ServerValue.TIMESTAMP
        });
    }

    function copyRefLink() {
        const copyText = document.getElementById("ref-link-input");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Invite Link Copied!");
    }
</script>
</body>
</html>
