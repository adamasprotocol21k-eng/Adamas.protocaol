<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-mode">

    <div class="dashboard-container">
        <header class="db-nav glass">
            <div class="user-meta">
                <div class="live-dot"></div>
                <span id="displayWallet">0x...000</span>
            </div>
            <div id="dailyStreakBtn" class="streak-pill" onclick="handleDailyClaim()">
                🔥 <span id="streakText">Claim Day 1</span>
            </div>
        </header>

        <section class="node-master glass-premium">
            <div class="node-header">
                <small>ADS MINING NODE</small>
                <div class="tag">ACTIVE</div>
            </div>
            
            <div class="counter-box">
                <h1 id="abpBalance">0.0000</h1>
                <p>TOTAL ABP EARNED</p>
            </div>

            <div class="visual-engine">
                <div class="core-glow"></div>
                <div class="rotating-diamond">ADS</div>
            </div>
        </section>

        <div class="feature-grid">
            <div class="f-card glass" onclick="location.href='mines.html'">
                <span class="icon">💣</span>
                <h3>MINES</h3>
                <small class="badge-hot">HOT</small>
            </div>
            <div class="f-card glass" onclick="location.href='quiz.html'">
                <span class="icon">🧠</span>
                <h3>QUIZ</h3>
                <small>EARN</small>
            </div>
            <div class="f-card glass" onclick="location.href='vault.html'">
                <span class="icon">🔒</span>
                <h3>VAULT</h3>
                <small>24D LOCK</small>
            </div>
            <div class="f-card glass" onclick="location.href='referral.html'">
                <span class="icon">👥</span>
                <h3>INVITE</h3>
                <small>+200 ABP</small>
            </div>
        </div>

        <nav class="footer-nav glass">
            <div class="nav-item active">🏠<br>Home</div>
            <div class="nav-item" onclick="location.href='leaderboard.html'">🏆<br>Rank</div>
            <div class="nav-item" onclick="location.href='wallet.html'">💳<br>Wallet</div>
        </nav>
    </div>

    <script>
        // 1. Initial Setup
        let balance = parseFloat(localStorage.getItem('abp_balance')) || 0;
        let wallet = localStorage.getItem('adamas_user') || "0x000...000";
        
        document.getElementById('displayWallet').innerText = wallet.substring(0,6) + "..." + wallet.substring(38);
        document.getElementById('abpBalance').innerText = balance.toFixed(4);

        // 2. Real-time Mining Simulation (0.0001 ABP every 3 seconds)
        setInterval(() => {
            balance += 0.0001;
            document.getElementById('abpBalance').innerText = balance.toFixed(4);
            localStorage.setItem('abp_balance', balance);
        }, 3000);

        // 3. Daily Streak Logic
        function handleDailyClaim() {
            const lastClaim = localStorage.getItem('last_claim_date');
            const today = new Date().toDateString();

            if (lastClaim === today) {
                alert("Already claimed today! Come back tomorrow.");
            } else {
                balance += 100; // Day 1 reward
                localStorage.setItem('abp_balance', balance);
                localStorage.setItem('last_claim_date', today);
                document.getElementById('abpBalance').innerText = balance.toFixed(4);
                alert("Congratulations! 100 ABP added to your vault.");
            }
        }
    </script>
</body>
</html>
