<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Ultimate Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #7000ff;
            --bg: #000205;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- VISUAL DEPTH BACKGROUND (As per your Screenshot) --- */
        .visual-depth {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 50% 35%, rgba(0, 242, 255, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 0% 100%, rgba(112, 0, 255, 0.1) 0%, transparent 40%);
        }

        /* --- PREMIUM HEADER --- */
        header {
            padding: 45px 25px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .node-badge {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan);
            padding: 6px 15px; border-radius: 10px; font-family: 'Orbitron';
            font-size: 0.6rem; color: var(--cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* --- CENTRAL ASSET ORB --- */
        .center-stage {
            height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .main-orb {
            width: 250px; height: 250px; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 80%);
            backdrop-filter: blur(15px); display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }
        .bal-value { 
            font-family: 'Orbitron'; font-size: 3.5rem; font-weight: 900; 
            text-shadow: 0 0 25px var(--cyan); margin: 10px 0;
        }

        /* --- BENTO GRID (Perfectly Aligned) --- */
        .feature-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 25px;
        }
        .feature-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 25px; padding: 22px; display: flex; flex-direction: column;
            justify-content: space-between; transition: 0.4s;
        }
        .feature-card:active { transform: scale(0.95); border-color: var(--cyan); }
        .card-mid { font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 900; margin-top: 5px; }

        /* --- HARVEST BUTTON --- */
        .action-bar { padding: 30px 25px; }
        .harvest-btn {
            background: #fff; color: #000; padding: 22px; border-radius: 100px;
            text-align: center; font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem;
            letter-spacing: 3px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="visual-depth"></div>

    <header>
        <div class="node-badge" id="walletDisplay">CONNECTING...</div>
        <div onclick="window.location.href='admin.html'" style="font-size: 1.5rem; opacity: 0.3;">⚙️</div>
    </header>

    <div class="center-stage">
        <div class="main-orb">
            <div style="font-size: 0.5rem; letter-spacing: 5px; color: #555;">TOTAL ASSETS</div>
            <div class="bal-value" id="userBalance">0</div>
            <div style="font-family: 'Orbitron'; font-size: 0.5rem; color: var(--cyan); letter-spacing: 3px;">ADAMAS CORE</div>
        </div>
    </div>

    <div class="feature-grid">
        <div class="feature-card" onclick="window.location.href='mines.html'">
            <div style="font-size: 0.55rem; color: #666;">ARCADE</div>
            <div class="card-mid">MINES</div>
            <div style="align-self: flex-end; font-size: 1.5rem;">💣</div>
        </div>
        <div class="feature-card" onclick="window.location.href='staking.html'">
            <div style="font-size: 0.55rem; color: #666;">QUANTUM</div>
            <div class="card-mid">VAULT</div>
            <div style="align-self: flex-end; font-size: 1.5rem;">🛡️</div>
        </div>
    </div>

    <div class="action-bar">
        <div class="harvest-btn" id="claimBtn">AUTHORIZE HARVEST</div>
    </div>

    <script type="module">
        import { DBModule } from './js/database.js';

        async function startSync() {
            // 1. Fetch from LocalStorage (Jo index.html ne save kiya)
            const wallet = localStorage.getItem('userWallet');
            
            if (!wallet) {
                console.error("No Wallet Found. Redirecting to Connect Page...");
                window.location.href = 'index.html';
                return;
            }

            // 2. Display Truncated Wallet
            document.getElementById('walletDisplay').innerText = 
                wallet.substring(0, 6).toUpperCase() + "..." + wallet.substring(wallet.length - 4).toUpperCase();

            // 3. Firebase Listen (This is where data comes live)
            DBModule.listenToProfile(wallet, (data) => {
                if (data) {
                    document.getElementById('userBalance').innerText = (data.balance || 0).toLocaleString();
                    console.log("Wallet Connected & Synced Successfully.");
                } else {
                    console.warn("New Profile Detected.");
                }
            });
        }

        window.onload = startSync;
    </script>
</body>
</html>
