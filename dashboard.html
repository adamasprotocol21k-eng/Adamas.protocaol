<div class="container">
    
    <div class="glass-card" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="width: 50px; height: 50px; background: linear-gradient(45deg, #00f2ff, #7000ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px;">💎</div>
            <div>
                <h4 id="userAddr" style="margin:0; font-size: 0.9rem;">0x00...000</h4>
                <div style="display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: #00ff88;">
                    <span style="width: 8px; height: 8px; background: #00ff88; border-radius: 50%; display: inline-block;"></span> Verified Founder
                </div>
            </div>
        </div>
        <button onclick="AuthModule.logout()" style="background: none; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem;">Disconnect</button>
    </div>

    <div class="glass-card" style="text-align: center; padding: 30px 20px; margin-bottom: 25px; border: 1px solid rgba(0, 242, 255, 0.3);">
        <p style="color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;">Total ABP Balance</p>
        <h1 id="balance" style="font-size: 3rem; font-weight: 900; margin: 10px 0;">0.00</h1>
        <div style="display: inline-block; padding: 5px 15px; background: rgba(0, 242, 255, 0.1); border-radius: 20px; color: var(--primary-neon); font-size: 0.8rem;">
            Airdrop Status: <span id="eligibility">0</span>% Ready
        </div>
    </div>

    <div class="game-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 80px;">
        <div class="glass-card" onclick="RewardsModule.claimDailyBonus()" style="text-align: center; cursor: pointer;">
            <div style="font-size: 30px;">📆</div>
            <p style="margin-top: 10px; font-weight: bold;">Daily Bonus</p>
        </div>
        <div class="glass-card" onclick="showGames()" style="text-align: center; cursor: pointer;">
            <div style="font-size: 30px;">🎮</div>
            <p style="margin-top: 10px; font-weight: bold;">Games Hub</p>
        </div>
        <div class="glass-card" style="text-align: center; cursor: pointer;">
            <div style="font-size: 30px;">🔗</div>
            <p style="margin-top: 10px; font-weight: bold;">Invite Friends</p>
        </div>
        <div class="glass-card" style="text-align: center; cursor: pointer;">
            <div style="font-size: 30px;">🛡️</div>
            <p style="margin-top: 10px; font-weight: bold;">Staking</p>
        </div>
    </div>

    <nav style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 11, 16, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100;">
        <div style="color: var(--primary-neon); text-align: center;">🏠<br><span style="font-size: 0.6rem;">Home</span></div>
        <div style="color: var(--text-dim); text-align: center;">🎰<br><span style="font-size: 0.6rem;">Play</span></div>
        <div style="color: var(--text-dim); text-align: center;">📊<br><span style="font-size: 0.6rem;">Airdrop</span></div>
        <div style="color: var(--text-dim); text-align: center;" onclick="window.location.href='admin.html'">⚙️<br><span style="font-size: 0.6rem;">Admin</span></div>
    </nav>

</div>
