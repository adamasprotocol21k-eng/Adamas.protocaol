<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #ff00ff;
            --neon-gold: #ffd700;
            --deep-space: #05050a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; background: var(--deep-space);
            color: white; font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* --- Dynamic Animated Background --- */
        .dashboard-bg {
            position: fixed; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #05050a 100%);
            z-index: -2;
        }

        /* Scanline Effect */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: -1; pointer-events: none;
        }

        /* --- PRO Top Header --- */
        header {
            padding: 25px 20px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .wallet-text { font-family: 'Orbitron'; font-size: 1.1rem; text-shadow: 0 0 10px var(--neon-cyan); }
        .system-status { font-size: 0.6rem; color: var(--neon-cyan); letter-spacing: 3px; font-weight: 700; }

        /* --- Quantum Balance Ring (Animated) --- */
        .hero-section {
            padding: 40px 20px; text-align: center;
        }
        .balance-ring {
            position: relative; width: 230px; height: 230px;
            margin: 0 auto; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-radius: 50%;
            border: 2px dashed var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            animation: rotate-border 20s linear infinite;
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }

        .balance-content { transform: rotate(-360deg); animation: counter-rotate 20s linear infinite; }
        @keyframes counter-rotate { 100% { transform: rotate(-360deg); } }

        .abp-val { font-family: 'Orbitron'; font-size: 2.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon-cyan); }

        /* --- Neon Glass Cards (Stats) --- */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-top: -30px; }
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px;
            padding: 18px; border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Premium Floating Daily Button --- */
        .daily-claim-btn {
            background: linear-gradient(135deg, var(--neon-gold), #b8860b);
            color: #000; padding: 12px 25px; border-radius: 50px;
            font-weight: 900; font-size: 0.8rem; letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            cursor: pointer; z-index: 100; font-family: 'Orbitron';
            animation: pulse-button 2s infinite;
        }
        @keyframes pulse-button {
            0% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); transform: translateX(-50%) scale(1); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); transform: translateX(-50%) scale(1.03); }
            100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); transform: translateX(-50%) scale(1); }
        }

        /* --- Liquid Glass Nav Bar --- */
        #navbar-placeholder {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; z-index: 10000;
        }
    </style>
</head>
<body>
    <div class="dashboard-bg"></div>

    <header>
        <div>
            <div class="system-status">SYSTEM ACTIVE</div>
            <div class="wallet-text" id="walletDisplay">0x...</div>
        </div>
        <div style="opacity: 0.5;">⚙️</div>
    </header>

    <section class="hero-section">
        <div class="balance-ring">
            <div class="balance-content">
                <div style="font-size: 0.7rem; color: #aaa; letter-spacing: 3px;">TOTAL ASSETS</div>
                <div class="abp-val">3,003</div>
                <div style="font-size: 0.7rem; color: var(--neon-cyan); font-weight: 700;">ABP TOKENS</div>
            </div>
        </div>
    </section>

    <div class="stats-grid">
        <div class="stat-card" style="border-left: 3px solid #00ff88;">
            <div style="font-size: 1.8rem;">⚡</div>
            <div>
                <div style="font-size: 0.6rem; color: #888; letter-spacing: 2px;">ENERGY</div>
                <div style="font-size: 1rem; font-weight: 700; color: #00ff88;">0</div>
            </div>
        </div>
        <div class="stat-card" style="border-left: 3px solid var(--neon-gold);">
            <div style="font-size: 1.8rem;">💎</div>
            <div>
                <div style="font-size: 0.6rem; color: #888; letter-spacing: 2px;">STAKED</div>
                <div style="font-size: 1rem; font-weight: 700; color: var(--neon-gold);">0</div>
            </div>
        </div>
    </div>

    <div class="daily-claim-btn" onclick="alert('Gift Claimed!')">
        CLAIM GIFT 🎁
    </div>

    <div id="navbar-placeholder"></div>

    <script type="module">
        import { DBModule } from './js/database.js';
        // Your database logic here to update fields
    </script>
    <script src="js/nav.js"></script> </body>
</html>
