<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS HUB | 3D Mining Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
            perspective: 1000px; /* For 3D depth */
        }

        /* Animated 3D Background */
        canvas#canvas3d {
            position: fixed; top: 0; left: 0; z-index: -1;
        }

        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            position: sticky; top: 0; z-index: 100;
        }

        .user-info {
            background: linear-gradient(90deg, var(--secondary), transparent);
            padding: 8px 20px; border-radius: 50px; border-left: 3px solid var(--primary);
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
        }

        .main-container {
            padding: 30px 20px 100px; max-width: 500px; margin: auto;
            animation: sceneEnter 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        @keyframes sceneEnter {
            from { opacity: 0; transform: translateZ(-200px) translateY(50px); }
            to { opacity: 1; transform: translateZ(0) translateY(0); }
        }

        /* Central Mining Unit */
        .mining-core {
            background: var(--glass); border-radius: 30px; padding: 40px 20px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            position: relative; margin-bottom: 30px;
            transform-style: preserve-3d; transition: 0.5s;
        }

        .mining-core:hover { transform: rotateX(5deg) rotateY(-5deg); }

        .diamond-glow {
            font-size: 4rem; margin-bottom: 10px;
            filter: drop-shadow(0 0 20px var(--primary));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .balance-text {
            font-family: 'Orbitron', sans-serif; font-size: 3rem;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        /* 3D Grid Buttons */
        .game-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }

        .game-card {
            background: var(--glass); padding: 25px 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            transition: 0.4s; cursor: pointer; position: relative; overflow: hidden;
        }

        .game-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotateBorder 4s linear infinite; z-index: -1;
        }

        @keyframes rotateBorder { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .game-card:hover {
            background: rgba(0, 242, 255, 0.1); border-color: var(--primary);
            transform: translateZ(20px) scale(1.05);
        }

        .game-card i { font-size: 2rem; margin-bottom: 10px; display: block; }

        /* Navigation Dock */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 11, 16, 0.8); backdrop-filter: blur(20px);
            padding: 10px 25px; border-radius: 100px; display: flex; gap: 25px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dock-item {
            text-decoration: none; color: white; font-size: 1.2rem; opacity: 0.5;
            transition: 0.3s;
        }

        .dock-item:hover, .dock-item.active { opacity: 1; color: var(--primary); transform: scale(1.2); }

    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <div style="font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px;">ADAMAS <span style="color: var(--primary);">PRO</span></div>
        <div class="user-info" id="userAddress">0x000...0000</div>
    </div>

    <div class="main-container">
        <div class="mining-core">
            <div class="diamond-glow">💎</div>
            <div style="font-size: 0.8rem; letter-spacing: 3px; opacity: 0.6;">MINING LIVE</div>
            <div class="balance-text" id="mainBalance">0.00</div>
            <div style="color: #00ff88; font-size: 0.9rem;">+0.01 ABP / Sec</div>
        </div>

        <div class="game-grid">
            <div class="game-card" onclick="location.href='mines.html'">
                <i>💣</i>
                <strong>MINES</strong>
            </div>
            <div class="game-card" onclick="location.href='teenpatti.html'">
                <i>🃏</i>
                <strong>POKER</strong>
            </div>
            <div class="game-card" onclick="location.href='spin.html'">
                <i>✨</i>
                <strong>SCRATCH</strong>
            </div>
            <div class="game-card" onclick="location.href='lottery.html'">
                <i>🎟️</i>
                <strong>LOTTERY</strong>
            </div>
        </div>

        <div style="background: rgba(112, 0, 255, 0.1); border: 1px solid var(--secondary); border-radius: 20px; padding: 20px; margin-top: 30px;">
            <h4 style="margin: 0 0 10px 0; color: var(--primary);">🚀 AIRDROP STATUS</h4>
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                <span>Wallet Connected</span>
                <span style="color: #00ff88;">✓</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-top: 5px;">
                <span>Social Tasks</span>
                <span style="color: #ff4444;">✖</span>
            </div>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item active">🏠</a>
        <a href="wallet.html" class="dock-item">💰</a>
        <a href="invite.html" class="dock-item">👥</a>
        <a href="profile.html" class="dock-item">👤</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/app.js"></script>

    <script>
        // 1. THREE.JS Background (Char Chand logic)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i=0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 10;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0x00f2ff });
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);

        camera.position.z = 3;

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // 2. Load Wallet
        window.onload = function() {
            const addr = localStorage.getItem('userWallet');
            if(addr) {
                document.getElementById('userAddress').innerText = addr.substring(0,6) + '...' + addr.substring(38);
            }
        }
    </script>
</body>
</html>
