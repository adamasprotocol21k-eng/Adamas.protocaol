<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | The Monarch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --monarch-white: #ffffff;
            --monarch-grey: #121212;
            --monarch-accent: #333333;
            --glow: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            background: #000; color: var(--monarch-white);
            font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
        }

        /* --- 1. THE VOID BACKGROUND (Deep Texture) --- */
        .void {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% -20%, #111 0%, #000 70%);
        }

        /* --- 2. MINIMALIST MONARCH HEADER --- */
        header {
            padding: 50px 40px; display: flex; justify-content: space-between; align-items: center;
        }
        .brand { font-family: 'Space Grotesk'; font-weight: 700; letter-spacing: 8px; font-size: 0.7rem; opacity: 0.4; }
        .node-id { font-family: 'Space Grotesk'; font-size: 0.6rem; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 4px; }

        /* --- 3. THE KINETIC BALANCE (The Main Attraction) --- */
        .hero-container {
            margin-top: 5vh; padding: 0 40px;
        }
        .label-upper { font-size: 0.55rem; letter-spacing: 6px; color: #444; font-weight: 800; margin-bottom: 15px; }
        
        .main-balance {
            font-size: 7rem; font-weight: 200; line-height: 0.8; letter-spacing: -6px;
            background: linear-gradient(to bottom, #fff 40%, #222 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-left: -8px;
        }

        /* --- 4. BOLD STATUS BAR (Expensive Interface) --- */
        .status-grid {
            margin-top: 60px; display: flex; gap: 40px; padding: 0 40px;
        }
        .status-item { flex: 1; }
        .status-tag { font-size: 0.5rem; letter-spacing: 3px; color: #333; font-weight: 900; margin-bottom: 10px; }
        .status-val { font-family: 'Space Grotesk'; font-size: 1.4rem; font-weight: 300; }
        .status-bar { width: 100%; height: 1px; background: #111; margin-top: 15px; position: relative; }
        .status-progress { position: absolute; top: 0; left: 0; height: 100%; background: #fff; width: 65%; }

        /* --- 5. THE COMMAND ICONS (Stealth Mode) --- */
        .dock {
            position: fixed; bottom: 150px; left: 40px; display: flex; gap: 30px;
        }
        .dock-icon {
            font-size: 1.2rem; opacity: 0.3; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }
        .dock-icon:hover, .dock-icon:active { opacity: 1; transform: translateY(-10px); }

        /* --- 6. THE "UNTOUCHABLE" EXECUTION BUTTON --- */
        .execute-terminal {
            position: fixed; bottom: 60px; left: 0; width: 100%;
            padding: 30px 40px; display: flex; justify-content: space-between; align-items: center;
            background: #050505; border-top: 1px solid #111;
        }
        .btn-label { font-family: 'Space Grotesk'; font-weight: 700; font-size: 0.6rem; letter-spacing: 4px; }
        .btn-arrow { font-size: 1.2rem; }

        /* Micro-Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hero-container { animation: fadeUp 1.2s ease-out; }
    </style>
</head>
<body>

    <div class="void"></div>

    <header>
        <div class="brand">ADAMAS INSTITUTIONAL</div>
        <div class="node-id" id="walletDisplay">NODE_07X</div>
    </header>

    <div class="hero-container">
        <div class="label-upper">TOTAL SECURED VOLUME</div>
        <h1 class="main-balance" id="userBalance">3,003</h1>
        <div style="margin-top: 20px; font-size: 0.6rem; color: #333; letter-spacing: 4px;">CURRENCY: ABP_QUANTUM_V3</div>
    </div>

    <div class="status-grid">
        <div class="status-item">
            <div class="status-tag">CORE_ENERGY</div>
            <div class="status-val" id="userEnergy">100%</div>
            <div class="status-bar"><div class="status-progress"></div></div>
        </div>
        <div class="status-item">
            <div class="status-tag">LOCKED_VAULT</div>
            <div class="status-val" id="userStaked">0.00</div>
            <div class="status-bar"><div class="status-progress" style="width: 10%; opacity: 0.2;"></div></div>
        </div>
    </div>

    <div class="dock">
        <div class="dock-icon" onclick="window.location.href='game.html'">🕹️</div>
        <div class="dock-icon" onclick="window.location.href='mines.html'">💣</div>
        <div class="dock-icon" onclick="window.location.href='staking.html'">🛡️</div>
        <div class="dock-icon" onclick="window.location.href='referral.html'">🛰️</div>
    </div>

    <div class="execute-terminal" onclick="alert('Accessing Protocol...')">
        <div class="btn-label">INITIALIZE DAILY HARVEST</div>
        <div class="btn-arrow">→</div>
    </div>

    <script src="js/nav.js"></script>
    <script type="module">
        import { DBModule } from './js/database.js';
        // Logic remains same for syncing...
    </script>
</body>
</html>
