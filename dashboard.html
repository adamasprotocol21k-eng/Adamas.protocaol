<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Supernova Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Bento:wght@700&family=Outfit:wght@200;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --bg-black: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg-black);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 1. THE DEEP SPACE BACKGROUND (Clean but Glossy) --- */
        .supernova-bg {
            position: fixed; inset: 0; z-index: -1;
            background: 
                radial-gradient(circle at 50% -10%, rgba(0, 242, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(188, 19, 254, 0.1) 0%, transparent 40%);
        }

        /* --- 2. ELITE HEADER --- */
        header {
            padding: 40px 25px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar-glow {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), #bc13fe);
            box-shadow: 0 0 15px var(--accent);
        }
        .id-text { font-family: 'Syncopate'; font-size: 0.55rem; letter-spacing: 2px; color: #666; }

        /* --- 3. THE HIGH-LIGHTED ASSET CORE --- */
        .hero-assets {
            text-align: center; margin: 20px 0 40px;
        }
        .label-vibe { font-family: 'Syncopate'; font-size: 0.5rem; letter-spacing: 5px; color: #444; margin-bottom: 10px; }
        .main-balance {
            font-size: 5.5rem; font-weight: 900; letter-spacing: -4px;
            line-height: 1; margin: 0;
            background: linear-gradient(180deg, #fff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(0, 242, 255, 0.25));
        }

        /* --- 4. THE BENTO GRID (Clean, Sharp & Clear) --- */
        .bento-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            grid-template-rows: 140px 140px;
            gap: 15px; padding: 0 20px;
        }
        .bento-item {
            background: var(--glass);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            backdrop-filter: blur(20px);
            transition: 0.3s;
        }
        .bento-item:active { transform: scale(0.96); border-color: var(--accent); }
        
        .bento-title { font-size: 0.6rem; font-weight: 900; letter-spacing: 2px; color: #555; text-transform: uppercase; }
        .bento-val { font-size: 1.5rem; font-weight: 900; color: #fff; margin-top: 5px; }
        .bento-icon { font-size: 1.8rem; align-self: flex-end; }

        /* Special Styling for prominent cards */
        .wide { grid-column: span 1; }
        .tall { grid-row: span 2; display: flex; flex-direction: column; justify-content: space-between; }

        /* --- 5. THE ULTIMATE NAVIGATION BAR (Crystal Style) --- */
        .nav-glass {
            position: fixed; bottom: 120px; left: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 15px; border-radius: 25px;
            display: flex; justify-content: space-around; backdrop-filter: blur(30px);
        }
        .nav-btn { font-size: 1.4rem; filter: grayscale(1); opacity: 0.5; transition: 0.3s; }
        .nav-btn.active { filter: grayscale(0); opacity: 1; transform: scale(1.2); }

        /* --- 6. THE ACTION TRIGGER (Max Highlight) --- */
        .action-trigger {
            position: fixed; bottom: 40px; left: 20px; right: 20px;
            background: #ffffff; color: #000;
            padding: 22px; border-radius: 24px;
            text-align: center; font-family: 'Syncopate'; font-size: 0.75rem; font-weight: 900;
            letter-spacing: 4px; box-shadow: 0 15px 45px rgba(0, 242, 255, 0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="supernova-bg"></div>

    <header>
        <div class="user-profile">
            <div class="avatar-glow"></div>
            <div>
                <div class="id-text">NODE STATUS</div>
                <div style="font-size: 0.7rem; font-weight: 900;">SECURED</div>
            </div>
        </div>
        <div onclick="window.location.href='admin.html'" style="font-size: 1.5rem; opacity: 0.2;">⚙️</div>
    </header>

    <div class="hero-assets">
        <div class="label-vibe">AVAILABLE LIQUIDITY</div>
        <h1 class="main-balance" id="userBalance">3,003</h1>
        <div style="font-size: 0.6rem; color: var(--accent); font-weight: 900; margin-top: 15px; letter-spacing: 3px;">$ADAMAS CORE</div>
    </div>

    <div class="bento-grid">
        <div class="bento-item" onclick="window.location.href='mines.html'">
            <div class="bento-title">Arcade</div>
            <div class="bento-val">MINES</div>
            <div class="bento-icon">💣</div>
        </div>
        <div class="bento-item tall" onclick="window.location.href='staking.html'">
            <div class="bento-title">Security</div>
            <div class="bento-val">VAULT</div>
            <div class="bento-icon" style="font-size: 3rem; margin-top: 50px;">🛡️</div>
        </div>
        <div class="bento-item" onclick="window.location.href='referral.html'">
            <div class="bento-title">Network</div>
            <div class="bento-val">FLEET</div>
            <div class="bento-icon">🚀</div>
        </div>
    </div>

    <div class="nav-glass">
        <div class="nav-btn active">🏠</div>
        <div class="nav-btn" onclick="window.location.href='game.html'">🎮</div>
        <div class="nav-btn" onclick="window.location.href='wallet.html'">🏦</div>
        <div class="nav-btn" onclick="window.location.href='tasks.html'">📋</div>
    </div>

    <div class="action-trigger" onclick="alert('Harvesting Rewards...')">
        COLLECT DAILY YIELD
    </div>

    <script type="module">
        import { DBModule } from './js/database.js';
        // Real-time update logic...
    </script>
</body>
</html>
