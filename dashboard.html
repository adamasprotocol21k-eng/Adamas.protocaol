<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ADAMAS Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        /* Top Header */
        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-badge {
            background: linear-gradient(45deg, var(--secondary-neon), #000);
            padding: 5px 15px; border-radius: 50px; border: 1px solid var(--primary-neon);
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
        }

        .container { padding: 20px; max-width: 600px; margin: auto; }

        /* Mining Status Card */
        .mining-card {
            background: var(--glass); border-radius: 20px; padding: 25px;
            text-align: center; border: 1px solid rgba(0, 242, 255, 0.2);
            margin-bottom: 20px; position: relative; overflow: hidden;
        }

        .mining-anim {
            width: 80px; height: 80px; margin: 0 auto 15px;
            border: 3px dashed var(--primary-neon); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .abp-balance {
            font-size: 2.5rem; font-family: 'Orbitron', sans-serif;
            color: var(--primary-neon); text-shadow: 0 0 20px var(--primary-neon);
        }

        /* Grid for Actions */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        .action-card {
            background: var(--glass); padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s; cursor: pointer;
        }
        .action-card:hover { border-color: var(--primary-neon); transform: translateY(-5px); }
        .action-card i { font-size: 1.5rem; display: block; margin-bottom: 10px; }

        /* Checklist */
        .checklist {
            background: rgba(0,0,0,0.4); border-radius: 15px; padding: 20px;
            margin-top: 20px; border-left: 4px solid var(--secondary-neon);
        }
        .check-item { display: flex; justify-content: space-between; margin-bottom: 10px; opacity: 0.8; }
        .status-ok { color: #00ff88; }
        .status-no { color: #ff4444; }

        /* Bottom Nav */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 11, 16, 0.95); display: flex;
            justify-content: space-around; padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { text-decoration: none; color: white; font-size: 0.8rem; opacity: 0.6; }
        .nav-item.active { color: var(--primary-neon); opacity: 1; }

    </style>
</head>
<body>

    <div class="header">
        <div style="font-family: 'Orbitron'; color: var(--primary-neon);">ADAMAS</div>
        <div class="user-badge" id="userAddress">0x...Loading</div>
    </div>

    <div class="container">
        <div class="mining-card">
            <div class="mining-anim">💎</div>
            <div style="font-size: 0.9rem; opacity: 0.7;">TOTAL ABP MINED</div>
            <div class="abp-balance" id="mainBalance">0.00</div>
            <div style="color: #00ff88; font-size: 0.8rem; margin-top: 10px;">● Mining Active (+0.01/sec)</div>
        </div>

        <div class="grid">
            <div class="action-card" onclick="location.href='mines.html'">💣<br>Mines</div>
            <div class="action-card" onclick="location.href='teenpatti.html'">🃏<br>Teen Patti</div>
            <div class="action-card" onclick="location.href='spin.html'">🎡<br>Lucky Spin</div>
            <div class="action-card" onclick="location.href='lottery.html'">🎟️<br>Lottery</div>
        </div>

        <div class="checklist">
            <h3 style="margin-top: 0; font-size: 1rem;">AIRDROP ELIGIBILITY</h3>
            <div class="check-item"><span>Wallet Connection</span> <span class="status-ok">✔</span></div>
            <div class="check-item"><span>ABP Threshold (5k)</span> <span class="status-no">✖</span></div>
            <div class="check-item"><span>Social Tasks</span> <span class="status-no">✖</span></div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="dashboard.html" class="nav-item active">🏠 Home</a>
        <a href="wallet.html" class="nav-item">💰 Wallet</a>
        <a href="invite.html" class="nav-item">👥 Invite</a>
        <a href="profile.html" class="nav-item">👤 Profile</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Dashboard specific UI logic
        window.onload = function() {
            const addr = localStorage.getItem('userWallet');
            if(addr) {
                document.getElementById('userAddress').innerText = addr.substring(0,6) + '...' + addr.substring(38);
            }

            // Fake live counter for visual feel
            let balance = 0;
            setInterval(() => {
                balance += 0.01;
                document.getElementById('mainBalance').innerText = balance.toFixed(2);
            }, 1000);
        }
    </script>
</body>
</html>
