<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Elite Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        :root {
            --luxury-gold: #c39a6b;
            --black-diamond: #050609;
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --emerald: #00ff88;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--black-diamond);
            color: #fff;
            margin: 0;
            padding-bottom: 120px;
            background: radial-gradient(circle at top right, #1a1b25, #050609);
        }

        .brand-font { font-family: 'Cinzel', serif; }

        /* --- LUXURY HEADER --- */
        .header-lux {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(195, 154, 107, 0.1);
        }

        /* --- THE VAULT (BALANCE) --- */
        .vault-card {
            margin: 25px 20px;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(195, 154, 107, 0.05) 0%, rgba(0, 0, 0, 0.8) 100%);
            border: 1px solid rgba(195, 154, 107, 0.2);
            border-radius: 32px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .balance-label {
            color: var(--luxury-gold);
            letter-spacing: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .balance-main {
            font-size: 3.8rem;
            font-weight: 800;
            margin: 15px 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- ACTION GRID --- */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px;
        }

        .lux-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px 15px;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .lux-box:active { transform: scale(0.92); border-color: var(--luxury-gold); }

        .lux-icon { font-size: 35px; margin-bottom: 12px; display: block; }

        /* --- ADVANCED FLOATING NAV BAR --- */
        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            padding: 12px 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #666;
            transition: 0.4s;
            padding: 10px;
        }

        .nav-item.active.home { color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
        .nav-item:hover.play { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }
        .nav-item:hover.vault { color: var(--luxury-gold); text-shadow: 0 0 15px var(--luxury-gold); }
        .nav-item:hover.admin { color: var(--emerald); text-shadow: 0 0 15px var(--emerald); }

        .nav-dot {
            width: 5px; height: 5px; background: currentColor; border-radius: 50%;
            margin-top: 5px; opacity: 0; transition: 0.3s;
        }
        .nav-item.active .nav-dot { opacity: 1; box-shadow: 0 0 10px currentColor; }

        .nav-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; }

        /* Airdrop Pill */
        .airdrop-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(195, 154, 107, 0.1);
            border: 1px solid rgba(195, 154, 107, 0.3);
            padding: 8px 18px; border-radius: 100px;
            color: var(--luxury-gold); font-size: 0.75rem; font-weight: 700;
        }
    </style>
</head>
<body>

    <header class="header-lux">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 48px; height: 48px; border-radius: 15px; background: #000; border: 1px solid var(--luxury-gold); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(195, 154, 107, 0.3);">
                <span class="brand-font" style="color: var(--luxury-gold); font-size: 20px;">A</span>
            </div>
            <div>
                <p id="userAddr" style="font-size: 0.85rem; font-weight: 700; margin:0;">0x00...000</p>
                <p style="font-size: 0.65rem; color: var(--emerald); margin:0; font-weight: 800;">● FOUNDER VERIFIED</p>
            </div>
        </div>
        <div onclick="AuthModule.logout()" style="cursor: pointer; opacity: 0.6;">🔌</div>
    </header>

    <div class="vault-card">
        <p class="balance-label">Available Assets</p>
        <h1 class="balance-main" id="balanceDisplay">0.00</h1>
        <div class="airdrop-pill">
            <span style="width: 8px; height: 8px; background: var(--luxury-gold); border-radius: 50%;"></span>
            READY FOR AIRDROP: <span id="eligibilityPerc">0</span>%
        </div>
    </div>

    <div class="action-grid">
        <div class="lux-box" onclick="RewardsModule.claimDailyBonus()">
            <span class="lux-icon">💎</span>
            <span style="font-size: 0.85rem; font-weight: 700; color: var(--luxury-gold);">DAILY CLAIM</span>
        </div>
        <div class="lux-box" onclick="Notify.show('Arena unlocking soon...', 'info')">
            <span class="lux-icon">🎡</span>
            <span style="font-size: 0.85rem; font-weight: 700;">LUCKY WHEEL</span>
        </div>
        <div class="lux-box" onclick="Notify.show('Invite link generated in Profile', 'info')">
            <span class="lux-icon">👥</span>
            <span style="font-size: 0.85rem; font-weight: 700;">NETWORK</span>
        </div>
        <div class="lux-box" onclick="window.location.href='admin.html'">
            <span class="lux-icon">🛡️</span>
            <span style="font-size: 0.85rem; font-weight: 700;">GOVERNANCE</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item home active">
            <span style="font-size: 22px;">🏠</span>
            <span class="nav-label">Home</span>
            <div class="nav-dot"></div>
        </a>
        <a href="#" class="nav-item play" onclick="Notify.show('Gaming Sector Locked', 'info')">
            <span style="font-size: 22px;">🎮</span>
            <span class="nav-label">Games</span>
            <div class="nav-dot"></div>
        </a>
        <a href="#" class="nav-item vault" onclick="Notify.show('Vault Syncing...', 'info')">
            <span style="font-size: 22px;">💰</span>
            <span class="nav-label">Vault</span>
            <div class="nav-dot"></div>
        </a>
        <a href="admin.html" class="nav-item admin">
            <span style="font-size: 22px;">⚙️</span>
            <span class="nav-label">Admin</span>
            <div class="nav-dot"></div>
        </a>
    </nav>

    <script src="js/notify.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/rewards.js"></script>

    <script type="module">
        import { DBModule } from './js/database.js';

        window.addEventListener('DOMContentLoaded', async () => {
            const wallet = localStorage.getItem('userWallet');
            if (!wallet) return window.location.href = "index.html";

            const displayAddr = wallet.substring(0, 6) + "..." + wallet.substring(wallet.length - 4);
            document.getElementById('userAddr').innerText = displayAddr;

            const data = await DBModule.getUserData(wallet);
            if (data) {
                document.getElementById('balanceDisplay').innerText = parseFloat(data.balance).toLocaleString();
                const progress = Math.min((data.balance / 1000) * 100, 100);
                document.getElementById('eligibilityPerc').innerText = Math.floor(progress);
            }
        });
    </script>
</body>
</html>
