<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .mining-power-card {
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.1) 0%, rgba(0,0,0,0.5) 100%);
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; text-align: center;
        }
        .mining-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--cyan);
            background: rgba(0,0,0,0.6); color: white; font-family: 'Orbitron'; font-weight: 900;
            font-size: 14px; cursor: pointer; transition: 0.3s; margin: 20px auto;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); display: flex; align-items: center; justify-content: center;
        }
        .mining-btn.active { animation: pulse-mining 1.5s infinite; border-color: var(--p-green); color: var(--p-green); }
        @keyframes pulse-mining { 0% { box-shadow: 0 0 0 0 rgba(173, 255, 47, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(173, 255, 47, 0); } 100% { box-shadow: 0 0 0 0 rgba(173, 255, 47, 0); } }
    </style>
</head>
<body>

    <div class="dashboard-wrapper" style="padding: 15px;">
        <header class="premium-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <span style="font-size: 10px; color: #666; letter-spacing: 1px;">TOTAL_ABP</span>
                <span id="main-balance" style="display:block; color:white; font-family:'Orbitron'; font-size: 1.5rem; font-weight: 900;">0.00</span>
            </div>
            <div id="user-rank" class="status-pill" style="border: 1px solid var(--neon-gold); color: var(--neon-gold);">BRONZE</div>
        </header>

        <section class="mining-power-card">
            <h3 style="font-family: 'Orbitron'; font-size: 12px; color: var(--cyan); letter-spacing: 1px;">CORE_MINER_V12</h3>
            <button id="mining-btn" class="mining-btn" onclick="startMining()">START<br>MINING</button>
            <div id="mining-status" style="font-size: 10px; color: #555; font-family: 'Orbitron';">READY TO SYNC</div>
        </section>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
            <div class="stat-box" style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); text-align: center;">
                <span style="font-size: 9px; color: #666;">SPEED</span>
                <span style="display:block; font-family:'Orbitron'; color:var(--p-green); font-size: 12px;">1.2x ABP/h</span>
            </div>
            <div class="stat-box" style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); text-align: center;">
                <span style="font-size: 9px; color: #666;">SESSION</span>
                <span id="session-gain" style="display:block; font-family:'Orbitron'; color:white; font-size: 12px;">+0.00</span>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">🏠<br>HOME</a>
            <a href="vault.html" class="nav-item">🔒<br>VAULT</a>
            <a href="missions.html" class="nav-item">⚡<br>TASKS</a>
            <a href="referral.html" class="nav-item">👥<br>NETWORK</a>
            <a href="profile.html" class="nav-item">🏆<br>RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
            authDomain: "adamas-protocol-v2.firebaseapp.com",
            databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol-v2",
            appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userWallet = localStorage.getItem('adamas_user');

        let isMining = false;
        let sessionEarned = 0;

        window.onload = () => {
            if(!userWallet) window.location.href = "index.html";
            
            // Real-time Balance Fetch
            db.ref('users/' + userWallet).on('value', snap => {
                const data = snap.val();
                if(data) {
                    document.getElementById('main-balance').innerText = parseFloat(data.balance || 0).toFixed(2);
                    document.getElementById('user-rank').innerText = data.role === "FOUNDER" ? "FOUNDER" : (data.rank || "BRONZE");
                }
            });
        };

        function startMining() {
            if(isMining) return;
            
            isMining = true;
            const btn = document.getElementById('mining-btn');
            const status = document.getElementById('mining-status');
            
            btn.classList.add('active');
            btn.innerHTML = "MINING...";
            status.innerText = "PROTOCOL SYNC ACTIVE";
            status.style.color = "var(--p-green)";

            // Sem waisa hi function: Har 3 second mein balance badhega
            setInterval(async () => {
                const increase = 0.05; // Aap isse change kar sakte ho
                sessionEarned += increase;
                document.getElementById('session-gain').innerText = "+" + sessionEarned.toFixed(2);
                
                // Update Firebase
                await db.ref('users/' + userWallet + '/balance').transaction(b => (b || 0) + increase);
            }, 3000);
        }
    </script>
</body>
</html>
