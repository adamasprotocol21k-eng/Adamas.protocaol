<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Neural Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Space+Grotesk:wght@300;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hyper-cyan: #00f2ff;
            --deep-violet: #7000ff;
            --pure-white: #ffffff;
            --obsidian: #020205;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; background: var(--obsidian); 
            color: var(--pure-white); font-family: 'Space Grotesk', sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* --- 1. NEURAL GRID BACKGROUND (The Matrix Feel) --- */
        .neural-bg {
            position: fixed; width: 100vw; height: 100vh;
            background: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            perspective: 1000px; z-index: -1;
        }
        .neural-bg::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 20%, var(--obsidian) 80%);
        }

        /* --- 2. FLOATING ASSET RING (Hyper-Premium) --- */
        .asset-core {
            position: relative; height: 45vh; display: flex;
            justify-content: center; align-items: center;
        }
        .core-glow {
            position: absolute; width: 280px; height: 280px;
            background: var(--hyper-cyan); filter: blur(120px);
            opacity: 0.15; animation: core-pulse 4s infinite alternate ease-in-out;
        }
        .main-ring {
            width: 240px; height: 240px; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative; z-index: 2;
        }
        .token-symbol { font-family: 'Syncopate'; font-size: 0.5rem; letter-spacing: 5px; color: var(--hyper-cyan); }
        .balance-val { 
            font-family: 'Space Grotesk'; font-size: 3.5rem; font-weight: 700; 
            margin: 10px 0; letter-spacing: -2px; 
        }

        /* --- 3. THE "RANK-1" STATS DECK --- */
        .stats-deck {
            display: flex; justify-content: space-around; padding: 0 20px;
            margin-top: -20px;
        }
        .deck-item { text-align: center; width: 45%; position: relative; }
        .deck-label { font-size: 0.5rem; font-family: 'Syncopate'; color: #555; letter-spacing: 2px; }
        .deck-value { font-size: 1.4rem; font-weight: 700; margin-top: 5px; color: var(--pure-white); }
        .deck-line { width: 100%; height: 2px; background: rgba(255,255,255,0.05); margin-top: 10px; overflow: hidden; }
        .deck-progress { height: 100%; background: var(--hyper-cyan); box-shadow: 0 0 10px var(--hyper-cyan); }

        /* --- 4. HUD NAVIGATION (Lakhon mein Ek) --- */
        .hud-actions {
            position: absolute; bottom: 180px; width: 100%;
            display: flex; justify-content: center; gap: 30px;
        }
        .hud-btn {
            width: 50px; height: 50px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; transform: rotate(45deg); transition: 0.3s;
        }
        .hud-btn span { transform: rotate(-45deg); }
        .hud-btn:active { background: var(--hyper-cyan); color: #000; transform: rotate(45deg) scale(0.9); }

        /* --- 5. THE PROTOCOL TRIGGER (Claim Button) --- */
        .protocol-trigger {
            position: fixed; bottom: 100px; left: 5%; width: 90%;
            background: var(--pure-white); color: #000;
            padding: 20px; border-radius: 15px; text-align: center;
            font-family: 'Syncopate'; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 3px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            cursor: pointer; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        /* Animations */
        @keyframes core-pulse { 0% { transform: scale(1); opacity: 0.1; } 100% { transform: scale(1.3); opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="neural-bg"></div>

    <header style="padding: 30px; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-family: 'Cinzel'; font-size: 1.2rem; letter-spacing: 2px;">ADAMAS</div>
        <div id="walletDisplay" style="font-size: 0.7rem; color: #555;">0X...7DAB</div>
    </header>

    <div class="asset-core">
        <div class="core-glow"></div>
        <div class="main-ring">
            <div class="token-symbol">LIQUID ASSETS</div>
            <div class="balance-val" id="userBalance">3,003</div>
            <div style="font-size: 0.6rem; color: #555;">PROTOCOL v3.0</div>
        </div>
    </div>

    <div class="stats-deck">
        <div class="deck-item">
            <div class="deck-label">ENERGY SOURCE</div>
            <div class="deck-value" id="userEnergy">100%</div>
            <div class="deck-line"><div class="deck-progress" style="width: 100%;"></div></div>
        </div>
        <div class="deck-item">
            <div class="deck-label">STAKED VALUE</div>
            <div class="deck-value" id="userStaked" style="color: var(--hyper-cyan);">0</div>
            <div class="deck-line"><div class="deck-progress" style="width: 20%; background: var(--deep-violet);"></div></div>
        </div>
    </div>

    <div class="hud-actions">
        <div class="hud-btn" onclick="window.location.href='game.html'"><span>🎮</span></div>
        <div class="hud-btn" onclick="window.location.href='mines.html'"><span>💣</span></div>
        <div class="hud-btn" onclick="window.location.href='staking.html'"><span>🛡️</span></div>
        <div class="hud-btn" onclick="window.location.href='referral.html'"><span>🚀</span></div>
    </div>

    <div class="protocol-trigger" onclick="document.getElementById('rewardModal').style.display='flex';">
        INITIALIZE DAILY PROTOCOL
    </div>

    <div id="navbar-placeholder"></div>

    <script type="module">
        import { DBModule } from './js/database.js';
        // Your existing Firebase Sync Logic here...
    </script>
    <script src="js/nav.js"></script>
</body>
</html>
