<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas | Diamond Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <header class="fixed-header">
        <div class="wallet-section">
            <div class="status-dot"></div>
            <span id="userWallet" class="wallet-badge">0x7a...4D2E</span>
        </div>
        <div class="points-badge pulse-active">
            <span class="diamond-sparkle">💎</span>
            <span id="abpBalance">1,250</span>
            <small>ABP</small>
        </div>
    </header>

    <main class="dash-container">
        
        <div id="homeTab" class="tab-content active">
            <section class="pro-card status-card">
                <div class="card-glow"></div>
                <h3 class="ultra-glow-text">SYSTEM ACTIVE</h3>
                <p>Polygon Amoy Testnet • 1.2 ADS/hr</p>
                <div class="progress-bar-container">
                    <div class="progress-fill" style="width: 65%;"></div>
                </div>
            </section>

            <div class="game-grid">
                <div class="game-card pro-card" onclick="openModal('spinModal')">
                    <div class="game-icon-3d">🎡</div>
                    <h4>LUCKY SPIN</h4>
                    <span class="reward-tag">WIN 500</span>
                </div>
                <div class="game-card pro-card" onclick="openModal('scratchModal')">
                    <div class="game-icon-3d">🎫</div>
                    <h4>SCRATCH</h4>
                    <span class="reward-tag">DAILY LUCK</span>
                </div>
            </div>

            <section class="pro-card referral-section">
                <div class="flex-between">
                    <h4>NETWORK</h4>
                    <span class="cyan-text">+200 ABP</span>
                </div>
                <div class="ref-link-area">
                    <input type="text" id="referralLink" value="adamas.io/ref/0x123" readonly>
                    <button class="btn-copy" onclick="copyRef()">COPY</button>
                </div>
            </section>

            <section class="pro-card daily-tasks">
                <div class="task-row">
                    <div class="task-text">
                        <strong>Daily Bonus</strong>
                        <p>Available in 12:44:02</p>
                    </div>
                    <button class="btn-claim-diamond" onclick="claimDaily()">CLAIM</button>
                </div>
            </section>
        </div>

        <div id="rankTab" class="tab-content">
            <section class="pro-card">
                <h3 class="ultra-glow-text">LEADERBOARD</h3>
                <div class="rank-item"><span>1. 0x44...12</span> <strong>50k ABP</strong></div>
            </section>
        </div>

        <div id="walletTab" class="tab-content">
            <section class="pro-card">
                <h3 class="ultra-glow-text">YOUR ASSETS</h3>
                <div class="balance-main">
                    <h2>0.00 ADS</h2>
                    <p>≈ $0.00 USD</p>
                </div>
                <button class="btn-ultra-diamond" style="margin-top:20px;">WITHDRAW TO MAINNET</button>
            </section>
        </div>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <span class="icon-nav">🏠</span>
            <span class="label-nav">HOME</span>
        </div>
        <div class="nav-item" onclick="switchTab('rank', this)">
            <span class="icon-nav">🏆</span>
            <span class="label-nav">RANK</span>
        </div>
        <div class="nav-item" onclick="switchTab('wallet', this)">
            <span class="icon-nav">💳</span>
            <span class="label-nav">WALLET</span>
        </div>
    </nav>

    <script src="js/engine.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Smooth Tab Switcher
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId + 'Tab').classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            
            // Haptic feedback feel
            if(window.navigator.vibrate) window.navigator.vibrate(10);
        }
    </script>
</body>
</html>
