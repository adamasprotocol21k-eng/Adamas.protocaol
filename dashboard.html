<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- PREMIUM GLOBAL STYLES --- */
        :root { 
            --cyan: #00f2ff; 
            --cyan-glow: rgba(0, 242, 255, 0.4); 
            --p-green: #adff2f; 
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.03); 
        }

        body { background: #000; color: #fff; margin: 0; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .dashboard-wrapper { min-height: 100vh; padding: 15px; width: 100%; max-width: 440px; margin: 0 auto; padding-bottom: 120px; box-sizing: border-box; }

        /* Branding Fix */
        .logo-box { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); position: relative; overflow: hidden; box-shadow: 0 0 15px var(--cyan-glow); }
        .nav-logo-img { width: 85%; height: 85%; object-fit: cover; border-radius: 50%; filter: drop-shadow(0 0 5px var(--cyan-glow)); }

        /* Hero Balance Card */
        .hero-balance-card { background: linear-gradient(145deg, rgba(15,15,15,0.9) 0%, rgba(5,5,5,1) 100%); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; padding: 35px 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .balance-amount { font-size: 3.5rem; margin: 10px 0; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }

        /* --- 🛠️ PRO MINING ENGINE (LOGO + STATUS FIX) --- */
        .mining-engine-vessel { width: 220px; height: 220px; margin: 15px auto 30px; position: relative; display: flex; align-items: center; justify-content: center; }
        .engine-outer-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px dashed rgba(0, 242, 255, 0.2); animation: spin 30s linear infinite; }
        .engine-glow-aura { position: absolute; width: 160px; height: 160px; background: radial-gradient(circle, var(--cyan-glow) 0%, transparent 75%); border-radius: 50%; animation: pulseGlow 4s infinite ease-in-out; }
        
        /* The Central Logo Button */
        .mining-trigger-btn {
            width: 150px; height: 150px; border-radius: 50%;
            background: #000; border: 2.5px solid var(--cyan);
            position: relative; overflow: hidden; z-index: 5;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s; box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* Spinning Logo Background */
        .btn-logo-bg {
            position: absolute; width: 80%; height: 80%; object-fit: cover;
            opacity: 0.2; border-radius: 50%;
            animation: slowRotate 15s linear infinite; z-index: 1;
        }

        /* Dynamic Status Texts */
        .btn-status-label { font-size: 8px; letter-spacing: 2px; color: #666; z-index: 2; margin-bottom: 4px; text-transform: uppercase; }
        .btn-main-text { font-size: 16px; font-weight: 900; color: #fff; z-index: 2; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* Active State (Green/Orange) */
        .mining-trigger-btn.active { border-color: var(--gold); }
        .mining-trigger-btn.active .btn-status-label { color: var(--gold); animation: pulse-opacity 1.5s infinite; }
        
        /* Ready/Claim State (Green Glow) */
        .mining-trigger-btn.ready { border-color: var(--p-green); box-shadow: 0 0 30px rgba(173, 255, 47, 0.4); animation: pulse-scale 2s infinite; }
        .mining-trigger-btn.ready .btn-status-label { color: var(--p-green); font-weight: 900; }
        .mining-trigger-btn.ready .btn-main-text { color: var(--p-green); font-size: 18px; }

        /* Stats Cards */
        .premium-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 25px; margin-bottom: 15px; }
        
        /* Animations */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slowRotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.15); opacity: 0.6; } }
        @keyframes pulse-opacity { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes pulse-scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .copy-btn { background: var(--cyan); color: #000; border: none; padding: 12px 20px; border-radius: 14px; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="main-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px 5px;">
            <div class="brand-identity" onclick="window.location.href='profile.html'" style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                <div class="logo-box"><img src="assets/dashboard-logo.png" class="nav-logo-img"></div>
                <div class="brand-text">
                    <span style="font-family: 'Orbitron'; font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 2px;">ADAMAS</span>
                    <span style="font-size: 8px; color: var(--cyan); letter-spacing: 1.5px; font-family: 'Orbitron'; display: block; opacity: 0.7;">QUANTUM TERMINAL</span>
                </div>
            </div>
            <div style="text-align: right;">
                <div id="user-address" style="font-family: monospace; font-size: 10px; color: #888; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 20px;">0x...</div>
                <div style="font-size: 8px; color: var(--p-green); margin-top: 5px; font-family: 'Orbitron';">ACTIVE_SESSION</div>
            </div>
        </header>

        <main>
            <section class="hero-balance-card">
                <p style="font-size: 8.5px; letter-spacing: 4px; color: #555; font-family: 'Orbitron';">TOTAL_ASSETS_NODE</p>
                <h1 id="total-balance" class="balance-amount">0.00</h1>
                <div style="color: var(--cyan); font-family: 'Orbitron'; font-size: 10px; letter-spacing: 6px; opacity: 0.6;">ABP_PROTOCOL</div>
                
                <div style="margin-top: 30px; background: rgba(0,0,0,0.4); padding: 18px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.03);">
                    <div style="display: flex; justify-content: space-between; font-size: 8px; color: var(--cyan); margin-bottom: 8px; font-family: 'Orbitron';">
                        <span id="mining-status-text">INITIALIZING_ENGINE</span>
                        <span id="scarcity-percent">0%</span>
                    </div>
                    <div style="height: 6px; background: #0a0a0a; border-radius: 10px; overflow: hidden;">
                        <div id="scarcity-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--cyan), var(--p-green)); transition: 0.5s;"></div>
                    </div>
                </div>
            </section>

            <div class="mining-engine-vessel">
                <div class="engine-outer-ring"></div>
                <div class="engine-glow-aura"></div>
                
                <button class="mining-trigger-btn" onclick="handleMiningAction()" id="mining-btn">
                    <img src="assets/dashboard-logo.png" class="btn-logo-bg" alt="Logo">
                    
                    <span class="btn-status-label" id="btn-status">READY</span>
                    <span class="btn-main-text" id="btn-timer">START</span>
                </button>
            </div>

            <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                <div class="premium-card" style="flex: 1; text-align: center;">
                    <span style="font-size: 7.5px; color: #444; font-family: 'Orbitron';">NODES</span>
                    <span id="ref-count" style="display: block; font-size: 22px; font-weight: 900;">0</span>
                </div>
                <div class="premium-card" style="flex: 1; text-align: center;">
                    <span style="font-size: 7.5px; color: #444; font-family: 'Orbitron';">STREAK</span>
                    <span id="streak-info-dash" style="display: block; font-size: 22px; font-weight: 900;">1</span>
                </div>
            </div>

            <div class="premium-card" style="display: flex; justify-content: space-between; align-items: center; border-color: rgba(173, 255, 47, 0.1);">
                <div>
                    <h3 style="font-size: 10px; color: var(--p-green); margin: 0;">DAILY_SYNC</h3>
                    <p id="streak-text" style="font-size: 9px; color: #555; margin-top: 4px;">+10 ABP Rewards</p>
                </div>
                <button id="daily-claim-btn" style="background: var(--p-green); color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-size: 9px; font-weight: 900; cursor: pointer;" onclick="claimDailyBonus()">SYNC</button>
            </div>

            <div class="premium-card">
                <p style="font-size: 8px; color: var(--cyan); margin-bottom: 12px;">REFERRAL_LINK</p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="ref-link-input" readonly style="flex: 1; background: #000; border: 1px solid #111; color: #444; padding: 12px; border-radius: 12px; font-size: 10px;">
                    <button class="copy-btn" onclick="copyRefLink()">COPY</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item active">🏠HOME</a>
            <a href="vault.html" class="nav-item">🔒VAULT</a>
            <a href="missions.html" class="nav-item">⚡TASKS</a>
            <a href="referral.html" class="nav-item">👥NETWORK</a>
            <a href="profile.html" class="nav-item">🏆RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
    // --- 100% ORIGINAL LOGIC MAINTAINED ---
    const userWallet = localStorage.getItem('adamas_user');
    if (!userWallet) { window.location.href = "index.html"; }

    const userRef = db.ref('users/' + userWallet);
    const HOURLY_REWARD = 500; 
    let miningTimer;
    let serverOffset = 0;

    function formatABP(num) {
        if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return parseFloat(num).toFixed(2);
    }

    db.ref(".info/serverTimeOffset").on("value", (snap) => { serverOffset = snap.val() || 0; });

    userRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('total-balance').innerText = formatABP(data.balance || 0);
            document.getElementById('user-address').innerText = userWallet.substring(0, 6) + "..." + userWallet.slice(-4);
            document.getElementById('streak-info-dash').innerText = data.streak || 1;
            
            const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
            document.getElementById('ref-link-input').value = baseUrl + "/index.html?ref=" + userWallet;
            
            db.ref('users').orderByChild('referredBy').equalTo(userWallet).once('value', (snap) => {
                document.getElementById('ref-count').innerText = snap.numChildren() || 0;
            });

            checkMiningStatus(data.lastMiningStart);
            checkClaimStatus(data.lastClaim);
        }
    });

    // --- UPDATED MINING UI SYNC ---
    function checkMiningStatus(startTime) {
        const btn = document.getElementById('mining-btn');
        const statusLbl = document.getElementById('btn-status');
        const timerVal = document.getElementById('btn-timer');
        const fill = document.getElementById('scarcity-fill');
        const percentText = document.getElementById('scarcity-percent');
        const statusText = document.getElementById('mining-status-text');
        
        if (!startTime) {
            statusLbl.innerText = "STANDBY";
            timerVal.innerText = "START";
            btn.classList.remove('active', 'ready');
            fill.style.width = "0%";
            percentText.innerText = "0%";
            statusText.innerText = "AWAITING_INITIALIZATION";
            return;
        }

        const now = Date.now() + serverOffset; 
        const elapsedSecs = (now - startTime) / 1000;
        const totalSecs = 3600; 

        if (elapsedSecs < totalSecs) {
            const remaining = totalSecs - elapsedSecs;
            const mins = Math.floor(remaining / 60);
            const secs = Math.floor(remaining % 60);
            
            statusLbl.innerText = "ACTIVE_NODE";
            timerVal.innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
            
            btn.classList.add('active');
            btn.classList.remove('ready');
            statusText.innerText = "MINING_IN_PROGRESS";

            const progress = (elapsedSecs / totalSecs) * 100;
            fill.style.width = progress + "%";
            percentText.innerText = Math.floor(progress) + "%";

            clearTimeout(miningTimer);
            miningTimer = setTimeout(() => checkMiningStatus(startTime), 1000);
        } else {
            statusLbl.innerText = "MINED";
            timerVal.innerText = "CLAIM";
            btn.classList.remove('active');
            btn.classList.add('ready');
            fill.style.width = "100%";
            percentText.innerText = "100%";
            statusText.innerText = "REWARD_LOCKED";
        }
    }

    async function handleMiningAction() {
        const btn = document.getElementById('mining-btn');
        if (btn.classList.contains('ready')) {
            try {
                await userRef.update({
                    balance: firebase.database.ServerValue.increment(HOURLY_REWARD),
                    lastMiningStart: null 
                });
            } catch (e) { alert("Claim Error"); }
        } else if (!btn.classList.contains('active')) {
            await userRef.update({ lastMiningStart: firebase.database.ServerValue.TIMESTAMP });
        }
    }

    function checkClaimStatus(lastClaimTime) {
        const btn = document.getElementById('daily-claim-btn');
        if (!lastClaimTime) return;
        const now = Date.now() + serverOffset;
        const hoursPassed = (now - lastClaimTime) / 3600000;
        if (hoursPassed < 24) {
            btn.innerText = "SYNCED";
            btn.style.opacity = "0.3";
            btn.style.pointerEvents = "none";
        }
    }

    async function claimDailyBonus() {
        await userRef.update({
            balance: firebase.database.ServerValue.increment(10),
            lastClaim: firebase.database.ServerValue.TIMESTAMP
        });
    }

    function copyRefLink() {
        const copyText = document.getElementById("ref-link-input");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Invite Link Copied!");
    }
</script>
</body>
</html>
