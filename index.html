        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }

        .pulse-animation { animation: pulse 2s infinite; }

        let account;
        let contract;

        document.getElementById('connectWallet').addEventListener('click', connectWallet);
        document.getElementById('claimPoints').addEventListener('click', claimPoints);

        async function connectWallet() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                document.getElementById('connectWallet').innerText = account.substring(0,6) + "...";
                initContract();
            } else {
                alert("Please install MetaMask! 🦊");
            }
        }

        async function initContract() {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, contractABI, signer);
            updateBalance();
        }

        async function updateBalance() {
            if (!contract) return;
            const balance = await contract.balanceOf(account);
            document.getElementById('abpBalance').innerText = ethers.utils.formatEther(balance) + " ABP 💎";
        }

        async function claimPoints() {
            if (!contract) return alert("Connect Wallet First!");
            try {
                // Claim 100 ABP points
                const tx = await contract.mint(account, ethers.utils.parseEther("100")); 
                alert("🎉 Congratulations! Transaction submitted! Scarcity is building! 💎💎💎");
                await tx.wait();
                updateBalance();
            } catch (error) {
                console.error(error);
                alert("❌ Transaction failed. Try again! 🚀");
            }
        }
