<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adamas Protocol</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f0f1a;
--card:#1a1a2e;
--accent:#00f5ff;
--gold:#ffd700;
--text:#ffffff;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:var(--bg);
color:var(--text);
text-align:center;
}

h1{
color:var(--gold);
margin-top:20px;
}

.balance-box{
background:var(--card);
margin:15px auto;
padding:15px;
border-radius:15px;
width:90%;
max-width:400px;
box-shadow:0 0 20px #000;
}

.btn{
background:var(--accent);
color:#000;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
margin:5px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

.section{
background:var(--card);
margin:20px auto;
padding:15px;
border-radius:20px;
width:95%;
max-width:500px;
box-shadow:0 0 20px #000;
}

.card-container{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.card{
width:60px;
height:80px;
background:#fff;
color:#000;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
font-weight:bold;
font-size:20px;
}

.mines-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:10px;
}

.mine{
background:#333;
padding:20px;
border-radius:10px;
cursor:pointer;
}

.spin-btn{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
background:var(--gold);
color:#000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
box-shadow:0 0 20px #000;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--accent);
color:#000;
padding:20px;
border-radius:20px;
font-weight:bold;
z-index:999;
}

footer{
margin:30px 0;
color:#aaa;
font-size:12px;
}
</style>
</head>

<body>

<h1>🚀 ADAMAS PROTOCOL 💎</h1>

<div class="balance-box">
<h3>💰 ABP Balance</h3>
<h2 id="balance">0</h2>
</div>

<!-- TEEN PATTI -->
<div class="section">
<h3>🃏 Teen Patti (50 ABP)</h3>
<div class="card-container">
<div class="card" id="c1">?</div>
<div class="card" id="c2">?</div>
<div class="card" id="c3">?</div>
</div>
<button class="btn" onclick="playTeen()">Play</button>
</div>

<!-- MINES -->
<div class="section">
<h3>💣 Mines Game</h3>
<div class="mines-grid" id="mines"></div>
</div>

<!-- QUIZ -->
<div class="section">
<h3>❓ Daily Quiz (2x)</h3>
<p id="question"></p>
<div id="options"></div>
</div>

<div class="spin-btn" onclick="spin()">🎡</div>

<footer>
✨ Earn ABP • Play Games • Future ADS Token Integration ✨
</footer>

<script>
let user={
balance:500,
quizCount:0,
lastQuiz:""
};

function update(){
document.getElementById("balance").innerText=user.balance;
}

function popup(text){
let div=document.createElement("div");
div.className="popup";
div.innerText=text;
document.body.appendChild(div);
setTimeout(()=>div.remove(),1500);
}

const SYMBOLS=["10","J","Q","K","A"];

function playTeen(){
if(user.balance<50) return popup("Not enough ABP!");
user.balance-=50;

let r1=SYMBOLS[Math.floor(Math.random()*5)];
let r2=SYMBOLS[Math.floor(Math.random()*5)];
let r3=SYMBOLS[Math.floor(Math.random()*5)];

c1.innerText=r1;
c2.innerText=r2;
c3.innerText=r3;

if(r1===r2 && r2===r3){
let reward=500;
if(r1==="10") reward=800;
if(r1==="J") reward=600;
if(r1==="Q") reward=1000;
if(r1==="K") reward=1500;
if(r1==="A") reward=2000;
user.balance+=reward;
popup("🎉 WIN +"+reward+" ABP");
}

update();
}

function initMines(){
let grid=document.getElementById("mines");
grid.innerHTML="";
let bombs=[];
while(bombs.length<4){
let r=Math.floor(Math.random()*16);
if(!bombs.includes(r)) bombs.push(r);
}
for(let i=0;i<16;i++){
let div=document.createElement("div");
div.className="mine";
div.innerText="●";
div.onclick=function(){
if(bombs.includes(i)){
popup("💣 Boom!");
initMines();
}else{
div.innerText="💎";
user.balance+=10;
popup("+10 ABP");
}
update();
};
grid.appendChild(div);
}
}

const QUIZ=[
{q:"ABP stands for?",o:["Adamas Base Point","Adamas Bonus Protocol"],a:"Adamas Base Point"},
{q:"Stake generates?",o:["Rewards","Loss"],a:"Rewards"}
];

function loadQuiz(){
let today=new Date().toDateString();
if(user.lastQuiz!==today){
user.quizCount=0;
user.lastQuiz=today;
}
if(user.quizCount>=2){
question.innerText="Come tomorrow!";
options.innerHTML="";
return;
}
let q=QUIZ[Math.floor(Math.random()*QUIZ.length)];
question.innerText=q.q;
options.innerHTML=q.o.map(opt=>`<button class="btn" onclick="checkQuiz('${opt}','${q.a}')">${opt}</button>`).join("");
}

function checkQuiz(sel,ans){
if(sel===ans){
user.balance+=100;
user.quizCount++;
popup("+100 ABP");
}else{
popup("Wrong ❌");
}
update();
loadQuiz();
}

function spin(){
let last=localStorage.getItem("spin");
let now=Date.now();
if(last && now-last<86400000) return popup("Spin after 24h");
let reward=Math.floor(Math.random()*2000);
user.balance+=reward;
localStorage.setItem("spin",now);
popup("🎡 +"+reward+" ABP");
update();
}

update();
initMines();
loadQuiz();
</script>

</body>
</html>
