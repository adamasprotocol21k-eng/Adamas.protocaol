<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Quantum Node Infrastructure</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .app-container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; text-align: center; position: relative; padding: 20px; }
        section { display: none; }
        section.active-phase { display: flex; flex-direction: column; animation: fadeIn 0.8s ease; }
        
        #top-wallet-box { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .wallet-connect-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 8px 14px; border-radius: 12px;
            font-family: 'Orbitron'; font-size: 10px; cursor: pointer;
            backdrop-filter: blur(15px); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .task-container { width: 100%; margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
        .task-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
            padding: 22px 20px; border-radius: 20px; text-align: left; cursor: pointer;
        }
        .task-card.verified { border-color: var(--p-green); background: rgba(173, 255, 47, 0.06); }
        
        /* GLOWING FOLLOW BUTTON EFFECT */
        .status-pill { 
            font-size: 10px; 
            background: rgba(0, 242, 255, 0.15); 
            padding: 8px 14px; 
            border-radius: 10px; 
            color: #00f2ff; 
            font-family: 'Orbitron';
            min-width: 80px;
            text-align: center;
            border: 1px solid #00f2ff;
            text-shadow: 0 0 8px #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
            animation: followGlow 1.2s infinite alternate;
        }

        @keyframes followGlow {
            from { box-shadow: 0 0 5px rgba(0, 242, 255, 0.3); transform: scale(1); }
            to { box-shadow: 0 0 18px rgba(0, 242, 255, 0.8); transform: scale(1.05); }
        }

        .main-logo { font-size: clamp(2.8rem, 12vw, 4rem); font-family: 'Orbitron'; font-weight: 900; background: linear-gradient(180deg, #fff 20%, var(--cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #phase-social { margin-top: 60px; }
        .sync-spinner { width: 10px; height: 10px; border: 2px solid #fff; border-top-color: var(--cyan); border-radius: 50%; display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="top-wallet-box">
            <button id="connect-trigger" class="wallet-connect-btn" onclick="handleEntry()">CONNECT WALLET</button>
        </div>

        <section id="phase-intro" class="active-phase">
            <h1 class="main-logo">ADAMAS</h1>
            <button class="btn-primary" style="margin-top: 30px;" onclick="handleEntry()">DEPLOY NODE ENGINE</button>
        </section>

        <section id="phase-social">
            <h2 style="font-family: 'Orbitron'; color: var(--p-green);">VERIFICATION</h2>
            <div class="task-container">
                <div class="task-card" id="card-t1" onclick="handleVerify('t1', 'https://t.me/ADSProtocol')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-family: 'Orbitron'; font-size: 12px; color: #fff;">JOIN TELEGRAM</span>
                        <div id="pill-t1" class="status-pill">FOLLOW</div>
                    </div>
                </div>
                <div class="task-card" id="card-t2" onclick="handleVerify('t2', 'https://t.me/adsprotocolcommunity')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-family: 'Orbitron'; font-size: 12px; color: #fff;">JOIN COMMUNITY</span>
                        <div id="pill-t2" class="status-pill">FOLLOW</div>
                    </div>
                </div>
                <div class="task-card" id="card-t3" onclick="handleVerify('t3', 'https://x.com/DiamoProtocol')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-family: 'Orbitron'; font-size: 12px; color: #fff;">FOLLOW DIAMO ON X</span>
                        <div id="pill-t3" class="status-pill">FOLLOW</div>
                    </div>
                </div>
                <div class="task-card" id="card-t4" onclick="handleVerify('t4', 'https://x.com/AdamasADS')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-family: 'Orbitron'; font-size: 12px; color: #fff;">FOLLOW ADAMAS ON X</span>
                        <div id="pill-t4" class="status-pill">FOLLOW</div>
                    </div>
                </div>
            </div>

            <button id="wallet-btn" class="btn-primary" style="margin-top: 35px; opacity: 1; pointer-events: all; background: linear-gradient(90deg, var(--cyan), #8e2de2); box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);" onclick="finalRegistration()">UNLOCK DASHBOARD</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script> 
    
    <script>
        let activeWallet = null;

        window.onload = function() {
            // Check if user is already registered
            if(localStorage.getItem('adamas_user')) {
                window.location.href = "dashboard.html";
                return;
            }

            // NO REFRESH FIX: If session is active, stay in social phase
            const sessionWallet = sessionStorage.getItem('active_session_wallet');
            if(sessionWallet) {
                activeWallet = sessionWallet;
                document.getElementById('connect-trigger').innerText = activeWallet.substring(0,6) + "..." + activeWallet.slice(-4);
                switchToSocialPhase();
            } else {
                document.getElementById('phase-intro').style.display = 'flex';
                document.getElementById('phase-social').style.display = 'none';
            }
            restoreTaskState();
        }

        async function handleEntry() {
            if (!window.ethereum) return alert("Use Trust Wallet/MetaMask Browser");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                activeWallet = accounts[0].toLowerCase();
                sessionStorage.setItem('active_session_wallet', activeWallet);
                
                const snapshot = await db.ref('users/' + activeWallet).once('value');
                if (snapshot.exists()) {
                    localStorage.setItem('adamas_user', activeWallet);
                    window.location.href = "dashboard.html";
                } else {
                    switchToSocialPhase();
                }
            } catch (e) { alert("Error connecting."); }
        }

        function switchToSocialPhase() {
            document.getElementById('phase-intro').style.display = 'none';
            document.getElementById('phase-social').style.display = 'flex';
            document.getElementById('phase-social').classList.add('active-phase');
            window.scrollTo(0,0);
        }

        // --- UPDATED 12-SECOND TIMER LOGIC ---
        function handleVerify(id, link) {
            if(!activeWallet) return alert("Connect Wallet!");
            if(localStorage.getItem('adamas_task_'+id) === 'verified') return;

            window.open(link, "_blank");
            const pill = document.getElementById('pill-' + id);
            pill.style.animation = "none";
            
            let secondsLeft = 12;
            pill.innerHTML = `<span class="sync-spinner"></span> ${secondsLeft}s`;

            const timer = setInterval(() => {
                secondsLeft--;
                if(secondsLeft > 0) {
                    pill.innerHTML = `<span class="sync-spinner"></span> ${secondsLeft}s`;
                } else {
                    clearInterval(timer);
                    localStorage.setItem('adamas_task_'+id, 'verified');
                    markVerifiedUI(id);
                }
            }, 1000);
        }

        function markVerifiedUI(id) {
            const card = document.getElementById('card-' + id);
            const pill = document.getElementById('pill-' + id);
            if(card && pill) {
                pill.innerText = "FOLLOWED";
                pill.style.background = "var(--p-green)";
                pill.style.color = "#000";
                pill.style.animation = "none";
                pill.style.boxShadow = "0 0 10px rgba(173, 255, 47, 0.4)";
                card.classList.add('verified');
            }
        }

        function restoreTaskState() {
            for(let i=1; i<=4; i++) {
                if(localStorage.getItem('adamas_task_t'+i) === 'verified') markVerifiedUI('t'+i);
            }
        }

        async function finalRegistration() {
            if(!activeWallet) return alert("Connect wallet first!");
            try {
                const ref = localStorage.getItem('adamas_referrer') || "DIRECT";
                await db.ref('users/' + activeWallet).set({
                    balance: 800, wallet: activeWallet, referredBy: ref, joinedAt: new Date().toISOString()
                });
                localStorage.setItem('adamas_user', activeWallet);
                window.location.href = "dashboard.html";
            } catch (e) { alert("Registration Error."); }
        }
    </script>
</body>
</html>
