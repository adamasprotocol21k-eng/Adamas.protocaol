<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Terminal</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Screenshot theme sync */
        #phase-intro, #phase-social { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #fff; font-family: 'Orbitron', sans-serif; text-align: center; }
        .active-phase { display: flex !important; animation: fadeIn 0.5s ease; }
        .terminal-box { background: rgba(15, 15, 15, 0.7); border: 1px solid #adff2f; border-radius: 20px; padding: 20px; width: 85%; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .spec-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 10px; border-bottom: 1px solid rgba(173, 255, 47, 0.1); padding-bottom: 5px; }
        .btn-slanted { background: #adff2f; color: #000; border: none; padding: 15px 40px; font-family: 'Orbitron'; font-weight: 900; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); cursor: pointer; width: 80%; letter-spacing: 2px; }
        .task-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(173, 255, 47, 0.3); border-radius: 12px; padding: 12px; margin-bottom: 10px; width: 90%; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: #fff; }
        .verified { border-color: #adff2f; background: rgba(173, 255, 47, 0.1); }
    </style>
</head>
<body>

    <div id="phase-intro" class="active-phase">
        <div style="border: 1px solid #adff2f; color: #adff2f; padding: 2px 10px; font-size: 8px; border-radius: 10px; margin-bottom: 15px;">AUTHORIZED BY: SYSTEM-ROOT-V12</div>
        <h1 style="color: #adff2f; font-size: 2.2rem; margin: 0; letter-spacing: 3px;">ADAMAS</h1>
        <h1 style="color: #adff2f; font-size: 2.2rem; margin: 0; letter-spacing: 3px; margin-bottom: 20px;">PROTOCOL</h1>
        
        <div class="terminal-box">
            <div class="spec-row"><span>Administrator</span><span style="color: #00f2ff;">PRO-ELITE CYBER</span></div>
            <div class="spec-row"><span>Status</span><span style="color: #adff2f;">● ACTIVE NODE</span></div>
            <div class="spec-row" style="border:none;"><span>Network</span><span>MAINNET ALPHA</span></div>
        </div>
        <button class="btn-slanted" onclick="startJourney()">INITIALIZE NODE</button>
    </div>

    <div id="phase-social">
        <h2 style="color: #adff2f;">ELITE ACCESS</h2>
        <p style="font-size: 10px; margin-bottom: 20px;">COMPLETE TASKS TO UNLOCK 800 ABP</p>

        <div class="task-card" id="t1" onclick="verifyTask('t1')">
            <div style="text-align: left;"><span style="font-size: 10px; display: block;">JOIN TELEGRAM</span><span style="font-size: 8px; color: #adff2f;">+200 ABP</span></div>
            <span id="s1" style="font-size: 10px; color: #666;">PENDING</span>
        </div>
        <div class="task-card" id="t2" onclick="verifyTask('t2')">
            <div style="text-align: left;"><span style="font-size: 10px; display: block;">FOLLOW ON X</span><span style="font-size: 8px; color: #adff2f;">+200 ABP</span></div>
            <span id="s2" style="font-size: 10px; color: #666;">PENDING</span>
        </div>
        <button id="auth-btn" class="btn-slanted" style="margin-top: 20px; opacity: 0.3; pointer-events: none;" onclick="connectAndSync()">AUTHORIZE NODE</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // Firebase Config (Aapki original settings)
        const firebaseConfig = {
            apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
            authDomain: "adamas-protocol-v2.firebaseapp.com",
            databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol-v2",
            appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function startJourney() {
            document.getElementById('phase-intro').classList.remove('active-phase');
            document.getElementById('phase-social').classList.add('active-phase');
        }

        let taskCount = 0;
        function verifyTask(id) {
            const card = document.getElementById(id);
            const status = document.getElementById('s' + id.charAt(1));
            if(!card.classList.contains('verified')) {
                status.innerText = "VERIFYING...";
                setTimeout(() => {
                    card.classList.add('verified');
                    status.innerText = "CLAIMED ✅";
                    taskCount++;
                    if(taskCount >= 2) { // 2 ya 4 jo bhi aapka limit ho
                        document.getElementById('auth-btn').style.opacity = "1";
                        document.getElementById('auth-btn').style.pointerEvents = "all";
                    }
                }, 2000);
            }
        }

        async function connectAndSync() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const wallet = accounts[0];

                // 🔥 Dashboard connection connection FIX:
                // Hum dashboard ki sabhi requirements ko ek saath save kar rahe hain
                const userRef = database.ref('users/' + wallet);
                const referrer = new URLSearchParams(window.location.search).get('ref') || "DIRECT";

                userRef.once('value').then((snapshot) => {
                    const bonus = 800;
                    if (!snapshot.exists()) {
                        userRef.set({
                            balance: bonus, // Dashboard uses this
                            abp_balance: bonus, // Backup for Missions
                            wallet: wallet,
                            referredBy: referrer,
                            streak: 1,
                            joinedAt: new Date().toISOString(),
                            miningStatus: false,
                            lastClaim: "NEVER"
                        });

                        // Referral bonus update for the inviter
                        if(referrer !== "DIRECT") {
                            database.ref('users/' + referrer + '/balance').transaction(b => (b || 0) + 100);
                        }
                    }
                    
                    // Critical for Dashboard Connection
                    localStorage.setItem('adamas_user', wallet);
                    window.location.href = "dashboard.html";
                });
            } else {
                alert("Please open in Trust/MetaMask browser.");
            }
        }
    </script>
</body>
</html>
