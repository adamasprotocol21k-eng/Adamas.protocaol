<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Adamas Protocol | V11 Casino Edition 💎</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { 
    --primary: #00d4ff; --secondary: #7000ff; --accent: #00ff88; 
    --bg: #030508; --card-bg: rgba(255, 255, 255, 0.05); --border: rgba(0, 212, 255, 0.2);
}
* { box-sizing: border-box; touch-action: manipulation; }
body { 
    font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; margin: 0; 
    overflow-x: hidden; background-image: radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.1) 0%, transparent 40%);
}
.container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; padding-bottom: 80px; }
.wallet-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
.wallet-pill { background: rgba(0, 212, 255, 0.1); border: 1px solid var(--primary); padding: 6px 15px; border-radius: 50px; font-family: 'Orbitron'; font-size: 0.65rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
.dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

/* DASHBOARD */
.rank-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px 15px; margin-bottom: 25px; backdrop-filter: blur(20px); text-align: center; }
#miningVal { font-family: 'Orbitron'; font-size: 2.2rem; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }

/* MISSIONS & SPIN */
.mission-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 22px 15px; margin-bottom: 20px; position: relative; }
.step-tag { position: absolute; top: -12px; left: 15px; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; padding: 3px 12px; border-radius: 6px; font-size: 0.6rem; font-family: 'Orbitron'; }
.reward-pill { float: right; color: var(--accent); padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; border: 1px solid var(--accent); }
.reward-info { font-size: 0.65rem; color: var(--accent); display: block; margin-top: 4px; font-family: 'Orbitron'; }

.btn-main { background: #000; color: #fff; border: 1px solid var(--primary); padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
.btn-done { background: var(--accent) !important; color: #000 !important; border-color: var(--accent) !important; }
.locked { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

/* 2048 PUZZLE STYLES */
.grid-2048 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; margin: 15px auto; width: 280px; height: 280px; }
.cell { background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 1.2rem; color: var(--primary); }
.cell[data-value="2"] { background: #072e33; }
.cell[data-value="4"] { background: #0c7075; color: #fff; }

/* NEW SPIN STYLES */
.wheel-wrapper { position: relative; width: 220px; height: 220px; margin: 20px auto; }
#wheelGraphic {
    width: 100%; height: 100%; border-radius: 50%; border: 8px solid #111;
    background: conic-gradient(var(--primary) 0 45deg, #000 45deg 90deg, var(--secondary) 90deg 135deg, #000 135deg 180deg, var(--accent) 180deg 225deg, #000 225deg 270deg, #ffcc00 270deg 315deg, #000 315deg 360deg);
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
    transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
}
.wheel-pointer {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ff4444;
    z-index: 10; filter: drop-shadow(0 0 5px #ff4444);
}
</style>
</head>
<body>

<div class="container">
    <div class="wallet-bar">
        <div class="wallet-pill"><div id="statusDot" class="dot"></div><span id="walletDisp">DISCONNECTED</span></div>
    </div>

    <header style="text-align: center; margin-bottom: 25px;">
        <h1 style="color:var(--primary); font-family: 'Orbitron';">ADAMAS <span style="color:#fff">ADS</span></h1>
        <div style="font-size: 0.6rem; color: #888; letter-spacing: 2px;">AIRDROP MISSION CENTER V11</div>
    </header>

    <div class="mission-box" id="step0">
        <span class="step-tag">STEP 0</span>
        <h3>Activate Amoy Node</h3>
        <button id="connBtn" onclick="smartConnect()" class="btn-main">CONNECT WALLET</button>
    </div>

    <div id="mainContent" class="locked">
        <div class="rank-card">
            <div id="miningVal">0000.000</div>
            <div style="font-weight:bold; color:var(--accent);">BALANCE: <span id="bal">0</span> ABP 💎</div>
        </div>

        <div class="mission-box" style="background: radial-gradient(circle at center, #1a1a2e 0%, #030508 100%);">
            <span class="step-tag" style="background: #ffcc00; color:#000;">LUCKY JACKPOT</span>
            <span class="reward-pill" style="border-color: #ff4444; color: #ff4444;">-5 ABP PER SPIN</span>
            <div style="text-align:center;">
                <div class="wheel-wrapper">
                    <div class="wheel-pointer"></div>
                    <div id="wheelGraphic"></div>
                    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:30px; height:30px; background:#fff; border-radius:50%; z-index:5; box-shadow: 0 0 10px #fff;"></div>
                </div>
                <p id="spinResult" style="font-family: 'Orbitron'; font-size: 1rem; min-height: 25px; margin: 10px 0;"></p>
                <button id="spinBtn" onclick="luckySpin()" class="btn-main" style="background: linear-gradient(135deg, #00d4ff, #7000ff); border:none;">SPIN & WIN</button>
            </div>
        </div>

        <div class="mission-box" id="step1">
            <span class="step-tag">STEP 1</span>
            <span class="reward-pill">+1200 ABP</span>
            <h3>Neural Sync (Socials)</h3>
            <button id="tw_ads" onclick="verify('tw_ads', 300, 'https://twitter.com/DiamoProtocol')" class="btn-main">Follow Diamo Twitter</button>
            <button id="tg_ads" onclick="verify('tg_ads', 300, 'https://t.me/ADSProtocol')" class="btn-main">Join Telegram Channel</button>
            <button id="tw_off" onclick="verify('tw_off', 300, 'https://twitter.com/AdamasADS')" class="btn-main">Follow Adamas Twitter</button>
            <button id="tg_grp" onclick="verify('tg_grp', 300, 'https://t.me/adsprotocolcommunity')" class="btn-main">Community Group</button>
        </div>

        <div class="mission-box">
            <span class="step-tag">MINI-GAME</span>
            <h3>Neural Merger (2048)</h3>
            <div id="game-2048" class="grid-2048"></div>
            <div class="game-controls" style="display:flex; justify-content: center; gap: 10px;">
                <button class="btn-main" style="width:60px" onclick="move('up')">↑</button>
                <button class="btn-main" style="width:60px" onclick="move('left')">←</button>
                <button class="btn-main" style="width:60px" onclick="move('down')">↓</button>
                <button class="btn-main" style="width:60px" onclick="move('right')">→</button>
            </div>
        </div>
    </div>
</div>

<script>
let abp = 0, userWallet = "", tasks = {tw_ads:false, tg_ads:false, tw_off:false, tg_grp:false};

// AUDIO ENGINE
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTick() {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}
function playWin() {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

// LUCKY SPIN LOGIC
function luckySpin() {
    if (abp < 5) { alert("Need 5 ABP to Spin!"); return; }
    abp -= 5; updateUI(); save();
    const btn = document.getElementById('spinBtn');
    const wheel = document.getElementById('wheelGraphic');
    const res = document.getElementById('spinResult');
    btn.disabled = true; res.innerText = "Spinning..."; res.style.color = "#888";

    let tick = setInterval(playTick, 150);
    setTimeout(() => clearInterval(tick), 3500);

    const rotation = Math.floor(Math.random() * 3600) + 1440;
    wheel.style.transform = `rotate(${rotation}deg)`;

    setTimeout(() => {
        const prizes = [
            {a: 5000, m: "🎊 MEGA JACKPOT! 🎊", c: "#ffcc00"},
            {a: 500, m: "Big Win! +500 ABP", c: "var(--primary)"},
            {a: 0, m: "Better Luck!", c: "#ff4444"},
            {a: 100, m: "Nice! +100 ABP", c: "var(--accent)"},
            {a: 5, m: "Points Back!", c: "#fff"}
        ];
        const win = prizes[Math.floor(Math.random()*prizes.length)];
        if(win.a > 5) playWin();
        abp += win.a; res.innerText = win.m; res.style.color = win.c;
        btn.disabled = false; updateUI(); save();
    }, 4000);
}

// 2048 & CORE FUNCTIONS
let board = Array(16).fill(0);
function initGame() { board = Array(16).fill(0); addTile(); addTile(); renderBoard(); }
function addTile() { let e = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null); if(e.length) board[e[Math.floor(Math.random()*e.length)]] = 2; }
function renderBoard() {
    const c = document.getElementById('game-2048'); c.innerHTML = '';
    board.forEach(v => { const d = document.createElement('div'); d.className = 'cell'; if(v>0){d.innerText=v; d.setAttribute('data-value',v);} c.appendChild(d); });
}
function move(dir) { abp += 10; addTile(); renderBoard(); updateUI(); save(); }

async function smartConnect() {
    if (!window.ethereum) { alert("Use MetaMask!"); return; }
    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userWallet = accs[0];
    document.getElementById('walletDisp').innerText = userWallet.substring(0,6)+"...";
    document.getElementById('statusDot').classList.add('online');
    document.getElementById('step0').style.display = 'none';
    document.getElementById('mainContent').classList.remove('locked');
    initGame(); load();
}

function verify(id, r, url) {
    window.open(url, '_blank');
    setTimeout(() => {
        if(!tasks[id]) { tasks[id] = true; abp += r; document.getElementById(id).classList.add('btn-done'); document.getElementById(id).innerText = "SYNCED ✅"; save(); updateUI(); }
    }, 3000);
}

function updateUI() {
    document.getElementById('bal').innerText = Math.floor(abp).toLocaleString();
    document.getElementById('miningVal').innerText = abp.toFixed(3);
}
function save() { localStorage.setItem('ads_v11_master', JSON.stringify({abp, tasks})); }
function load() {
    let d = JSON.parse(localStorage.getItem('ads_v11_master'));
    if(d) { 
        abp = d.abp; tasks = d.tasks || tasks; 
        Object.keys(tasks).forEach(k => { if(tasks[k]) { const el = document.getElementById(k); if(el){el.classList.add('btn-done'); el.innerText="SYNCED ✅";}}});
        updateUI();
    }
}
</script>
</body>
</html>
