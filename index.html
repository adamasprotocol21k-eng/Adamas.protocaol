<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamas Protocol | Future of Scarcity</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-section {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .logo-glow {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
            margin-bottom: 5px;
            letter-spacing: -2px;
        }
        .subtitle {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            margin-top: 30px;
        }
        .small-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-dim);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="logo-glow">ADAMAS</div>
        <div class="subtitle">21,000 SCARCITY PROTOCOL</div>
        
        <div class="glass-card" style="width: 100%; max-width: 350px; border: 1px solid rgba(0, 210, 255, 0.2);">
            <p style="margin-bottom: 25px; font-size: 0.9rem; color: var(--text-sub);">
                Experience the world's rarest <br>
                <span class="text-neon-blue">Digital Asset Ecosystem</span>
            </p>
            
            <button id="launchBtn" class="btn-neon" style="width: 100%; padding: 20px; border-color: var(--binance-yellow); color: var(--binance-yellow);" onclick="connectWallet()">
                LAUNCH APP
            </button>
        </div>

        <div class="feature-grid">
            <div class="small-badge"><span class="text-neon-green">✓</span> Fixed Supply</div>
            <div class="small-badge"><span class="text-neon-green">✓</span> Proof of Activity</div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
