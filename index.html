<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADS Crypto Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">🚀 ADS Crypto Hub</div>
    <div class="header-right">
      <button class="wallet-btn">Connect Wallet 🔗</button>
      <div class="notifications">💬 <span id="notif-count">0</span></div>
      <input type="text" placeholder="Search Crypto" class="search-bar">
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="gaming">Gaming</button>
    <button class="tab-btn" data-tab="lottery">Lottery</button>
    <button class="tab-btn" data-tab="referral">Referral</button>
  </nav>

  <!-- Tab Contents -->
  <section id="dashboard" class="tab-content active">
    <div class="dashboard-boxes">
      <div class="social-links">
  <a href="https://t.me/daimodmo" target="_blank">Telegram 1️⃣</a>
  <a href="https://t.me/adsprotocolcommunity" target="_blank">Adamas Community 🚀</a>
  <a href="https://t.me/ADSProtocol" target="_blank">Official Channel 🌟</a>
  <a href="https://x.com/DiamoProtocol" target="_blank">Old Twitter X 🐦</a>
  <a href="https://x.com/AdamasADS" target="_blank">New Twitter X 🐦</a>
      </div>
      <div class="box points-box">
        <h3>Your ABP Points</h3>
        <p id="userPoints">0 💰</p>
      </div>
      <div class="box checkin-box">
        <h3>Daily Check-in</h3>
        <button id="dailyCheckinBtn">Check-in ✅</button>
      </div>
      <div class="box staking-box">
        <h3>Staking</h3>
        <input type="number" id="stakeAmount" placeholder="Enter points">
        <button id="stakeBtn">Stake 📈</button>
        <p>Staked: <span id="stakedPoints">0</span> 🔒</p>
      </div>
      <div class="box claim-box">
        <h3>Claim Rewards</h3>
        <button id="claimStakeBtn">Claim 🎁</button>
      </div>
    </div>
  </section>

  <section id="gaming" class="tab-content">
    <h2>Games</h2>
    <div class="game-cards">
      <div class="game-card">🎰 Teen Patti <button>Play</button></div>
      <div class="game-card">💎 Diamond Mines <button>Play</button></div>
    </div>
  </section>

  <section id="lottery" class="tab-content">
    <h2>Lottery</h2>
    <div class="lottery-cards">
      <div class="lottery-card">🎟️ Mega Lottery <button>Buy Ticket</button></div>
    </div>
  </section>

  <section id="referral" class="tab-content">
    <h2>Refer & Earn</h2>
    <input type="text" value="https://adamas-protocaol.vercel.app" id="refLink">
    <button id="copyBtn">Copy Link</button>
  </section>

  <script src="app.js"></script>
</body>
</html>
