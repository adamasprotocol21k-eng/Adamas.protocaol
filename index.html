<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS Protocol | Diamond Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #00e6e6; /* Electric Blue */
            --diamond-glow: rgba(0, 230, 230, 0.4);
            --dark-bg: #050505; /* Deep Black */
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #001a1a, #050505);
        }

        /* Navbar / Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid rgba(0, 230, 230, 0.1);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary-blue);
            text-shadow: 0 0 10px var(--diamond-glow);
        }

        /* Connect Button - Premium Style */
        .connect-btn {
            background: transparent;
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--diamond-glow);
        }

        .connect-btn:hover {
            background: var(--primary-blue);
            color: black;
            box-shadow: 0 0 30px var(--primary-blue);
        }

        /* Main Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px 5%;
            filter: blur(5px); /* Initially locked */
            transition: 0.5s;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 230, 230, 0.05), transparent);
        }

<div class="social-links" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
    
    <a href="https://t.me/ADSProtocol" target="_blank" id="tg-channel" onclick="markFollowed('tg-channel')" 
       style="background: #0088cc; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold;">
       🚀 Official Channel ✅
    </a>

    <a href="https://t.me/adsprotocolcommunity" target="_blank" id="tg-group" onclick="markFollowed('tg-group')" 
       style="background: #24A1DE; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold;">

    </a>

    <a href="https://x.com/AdamasADS" target="_blank" id="tw-new" onclick="markFollowed('tw-new')" 
       style="background: #000000; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 1px solid #333;">
       🐦 Follow Adamas X ✅
    </a>

</div>

<button class="connect-btn" id="verify-final-btn" onclick="verifyAndUnlock()" style="margin-top:20px; width: 100%; background: linear-gradient(45deg, #00e6e6, #008080); color: black; font-weight: bold;">
    ✅ VERIFY & UNLOCK DASHBOARD
</button>

</header>

<div id="social-lock">
    <div class="popup-box">

        <p>Follow our socials to claim your Welcome ABP Points</p>
        <a href="https://t.me/adsprotocolcommunity" target="_blank" class="social-link">Join Community Group</a>
        <a href="https://t.me/ADSProtocol" target="_blank" class="social-link">Join Official Channel</a>
        <a href="https://x.com/AdamasADS" target="_blank" class="social-link">Follow Adamas X</a>
        <button class="connect-btn" style="margin-top: 20px; width: 100%;" onclick="verifyAndUnlock()">VERIFY & UNLOCK</button>

</div>

<div class="dashboard-grid" id="main-grid">
    <div class="card">
        <h3>💰 YOUR WALLET BALANCE</h3>
        <div id="user-points" style="font-size: 2.5rem; color: var(--primary-blue);">0.00 ABP</div>

    </div>

    <div class="card" id="staking-section">

    <input type="number" id="stake-input" placeholder="Amount to Stake" style="width: 85%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary-blue); background: #000; color: white; margin-bottom: 15px; font-family: 'Rajdhani';">

</div>


   <div class="card" id="game-section">

    </div>
</div>
