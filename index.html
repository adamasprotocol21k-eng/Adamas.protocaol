<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamas Protocol | Enter Ecosystem</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
</head>
<body class="landing-body">

    <div class="container">
        <section class="landing-hero">
            <div class="diamond-logo">💎</div>
            <h1 style="font-family: 'Exo 2'; font-size: 2.5rem; margin-bottom: 10px;">ADAMAS</h1>
            <p style="color: var(--primary-cyan); letter-spacing: 3px; font-weight: bold;">WEB3 GAMING PROTOCOL</p>
            
            <div class="social-gate-container">
                <p style="margin-top: 30px; opacity: 0.6;">Complete Tasks to Unlock Dashboard</p>
                
                <button class="btn-social" onclick="handleTask('twitter')">
                    🐦 Follow Twitter
                </button>
                
                <button class="btn-social" onclick="handleTask('telegram')">
                    📢 Join Telegram
                </button>

                <button id="connectWallet" class="btn-main-upgrade" style="width: 100%; margin-top: 20px; opacity: 0.5;" disabled>
                    Connect Wallet
                </button>
            </div>
        </section>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
