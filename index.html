<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS Protocol | Future of Web3</title>
    <link rel="stylesheet" href="css/style.css">
    </head>
<body>
    <div class="bg-animation"></div>

    <div class="container" style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        
        <div class="diamond-container" style="margin-bottom: 2rem;">
        <img src="https://raw.githubusercontent.com/Tushar-Adamas/Adamas-Protocol/main/assets/diamond.png" alt="Adamas Logo" style="width: 150px; filter: drop-shadow(0 0 20px var(--primary-neon));">
        </div>

        <div class="glass-card" style="text-align: center; max-width: 500px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">ADAMAS <span style="color: var(--primary-neon);">PROTOCOL</span></h1>
            <p style="opacity: 0.7; margin-bottom: 30px;">Connect your wallet to start mining ABP points and secure your future ADS Airdrop.</p>
            
            <button class="neon-btn" onclick="connectWallet()">Connect Wallet</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
