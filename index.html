<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamo Protocol | Decentralized Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px;">

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222;">
        <h2 style="color: #00e6e6; margin: 0; letter-spacing: 1px;">💎 DIAMO</h2>
        <button id="wallet-btn" onclick="connectWallet()" style="background: #00e6e6; color: #000; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(0,230,230,0.3);">CONNECT WALLET</button>
    </div>

    <div id="main-grid" style="filter: blur(8px); pointer-events: none; transition: 0.8s ease-in-out; max-width: 600px; margin: 20px auto;">
        
        <div style="background: linear-gradient(145deg, #1a1a1a, #111); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; margin-bottom: 20px;">
            <p style="margin: 0; color: #888; text-transform: uppercase; font-size: 12px;">Available Balance</p>
            <h1 id="user-points" style="font-size: 36px; margin: 10px 0; color: #00e6e6;">0.00 ABP</h1>
            <button onclick="dailyCheckIn()" style="background: rgba(0,230,230,0.1); border: 1px solid #00e6e6; color: #00e6e6; padding: 8px 15px; border-radius: 20px; cursor: pointer;">📅 Daily Check-in</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div style="background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center;">
                <h3>🃏 Triple Card</h3>
                <div id="cards-container" style="display: flex; justify-content: center; gap: 5px; font-size: 24px; margin: 10px 0;">
                    <span>❓</span><span>❓</span><span>❓</span>
                </div>
                <p id="game-status" style="font-size: 12px; height: 15px;"></p>
                <button onclick="playTripleCard()" style="width: 100%; background: #00e6e6; border: none; padding: 10px; border-radius: 8px; font-weight: bold;">SPIN (50 ABP)</button>
            </div>

            <div style="background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center;">
                <h3>💣 Mines</h3>
                <div id="mines-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0;">
                    <button onclick="openMine(0)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                    <button onclick="openMine(1)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                    <button onclick="openMine(2)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                    <button onclick="openMine(3)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                    <button onclick="openMine(4)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                    <button onclick="openMine(5)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                    <button onclick="openMine(6)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                    <button onclick="openMine(7)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                    <button onclick="openMine(8)" style="height: 30px; background: #333; border: none; border-radius: 4px; color: #fff;">?</button>
                </div>
                <button onclick="startMinesGame()" style="width: 100%; background: #00e6e6; border: none; padding: 10px; border-radius: 8px; font-weight: bold;">START (100 ABP)</button>
            </div>
        </div>

        <div style="margin-top: 20px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333;">
            <h3>💎 ABP Staking</h3>
            <input type="number" id="stake-input" placeholder="Amount to stake" style="width: 70%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px;">
            <button onclick="stakePoints()" style="padding: 10px; background: #00e6e6; border: none; border-radius: 5px; font-weight: bold;">STAKE</button>
            <p style="font-size: 12px; color: #888; margin-top: 10px;">Referral Link: <span id="ref-link" style="color: #00e6e6;">Connect wallet to see...</span></p>
        </div>

        <div style="margin-top: 20px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333;">
            <h3 style="margin-top: 0;">🏆 Top Earners</h3>
            <div id="leaderboard-list" style="font-size: 14px; color: #ccc;">Loading...</div>
        </div>
    </div>

    <div id="social-lock" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 99999; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: #111; padding: 35px; border-radius: 25px; border: 2px solid #00e6e6; text-align: center; max-width: 380px; width: 90%; box-shadow: 0 0 30px rgba(0,230,230,0.2);">
            <h2 style="color: #00e6e6;">🔓 Unlock Diamo</h2>
            <p style="color: #888; margin-bottom: 25px;">Complete tasks to access games and get 500 ABP bonus.</p>
            <a href="https://t.me/daimodmo" target="_blank" style="display: block; margin: 10px 0; color: #fff; text-decoration: none; background: #0088cc; padding: 12px; border-radius: 10px; font-weight: bold;">1. Join Telegram</a>
            <a href="https://twitter.com/DiamoProtocol" target="_blank" style="display: block; margin: 10px 0; color: #fff; text-decoration: none; background: #000; border: 1px solid #333; padding: 12px; border-radius: 10px; font-weight: bold;">2. Follow X (Twitter)</a>
            <button onclick="verifyAndUnlock()" style="background: #00e6e6; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; font-size: 16px;">VERIFY & ACTIVATE</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
