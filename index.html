<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Adamas Protocol | V13 Staking & Fix 💎</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { 
    --primary: #00d4ff; --secondary: #7000ff; --accent: #00ff88; 
    --bg: #030508; --card-bg: rgba(255, 255, 255, 0.08); --border: rgba(0, 212, 255, 0.2);
}
* { box-sizing: border-box; touch-action: manipulation; }
body { 
    font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; margin: 0; 
    overflow-x: hidden; background-image: radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.1) 0%, transparent 40%);
}
.container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; padding-bottom: 80px; }
.wallet-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
.wallet-pill { background: rgba(0, 212, 255, 0.1); border: 1px solid var(--primary); padding: 6px 15px; border-radius: 50px; font-family: 'Orbitron'; font-size: 0.65rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
.dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

.rank-card { background: var(--card-bg); border: 2px solid var(--primary); border-radius: 20px; padding: 20px; margin-bottom: 25px; backdrop-filter: blur(20px); text-align: center; box-shadow: 0 0 15px rgba(0, 212, 255, 0.1); }
#miningVal { font-family: 'Orbitron'; font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px var(--primary); margin: 5px 0; }

.mission-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 22px 15px; margin-bottom: 20px; position: relative; }
.step-tag { position: absolute; top: -12px; left: 15px; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; padding: 3px 12px; border-radius: 6px; font-size: 0.6rem; font-family: 'Orbitron'; }
.reward-pill { float: right; color: var(--accent); padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; border: 1px solid var(--accent); }

.btn-main { background: #000; color: #fff; border: 1px solid var(--primary); padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; margin-top: 10px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
.btn-main:active { transform: scale(0.95); background: var(--primary); color: #000; }
.btn-done { background: var(--accent) !important; color: #000 !important; border-color: var(--accent) !important; }
.locked { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

/* ENHANCED SPIN WHEEL */
.wheel-wrapper { position: relative; width: 220px; height: 220px; margin: 20px auto; }
#wheelGraphic {
    width: 100%; height: 100%; border-radius: 50%; border: 8px solid #111;
    background: conic-gradient(
        #ffcc00 0deg 72deg,    /* 5000 🥳*/
        #00d4ff 72deg 144deg,  /* 300 🫡*/
        #ff4444 144deg 216deg, /* ZERO😭 */
        #00ff88 216deg 288deg, /* 100 😌*/
        #7000ff 288deg 360deg  /* 5 😒*/
    );
    box-shadow: 0 0 30px var(--primary);
    transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
    position: relative;
}
.wheel-label {
    position: absolute; width: 100%; height: 100%;
    text-align: center; font-family: 'Orbitron'; font-weight: bold;
    font-size: 0.7rem; color: #000; padding-top: 20px;
}
.pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #fff; z-index: 10; filter: drop-shadow(0 0 10px #00d4ff); }

/* STAKING UI */
.stake-info { display: flex; justify-content: space-around; margin-top: 10px; font-size: 0.8rem; }
.stake-val { color: var(--accent); font-family: 'Orbitron'; }
</style>
</head>
<body>

<div class="container">
    <div class="wallet-bar">
        <div class="wallet-pill"><div id="statusDot" class="dot"></div><span id="walletDisp">DISCONNECTED</span></div>
    </div>

    <header style="text-align: center; margin-bottom: 25px;">
        <h1 style="color:var(--primary); font-family: 'Orbitron'; margin:0;">ADAMAS <span style="color:#fff">ADS</span></h1>
        <div style="font-size: 0.6rem; color: #888; letter-spacing: 2px;">V13 STAKING & HUB</div>
    </header>

    <div id="step0">
        <div class="mission-box">
            <span class="step-tag">ACTIVATE</span>
            <h3>Connect to Diamo Network</h3>
            <button onclick="smartConnect()" class="btn-main">CONNECT WALLET</button>
        </div>
    </div>

    <div id="mainContent" class="locked">
        <div class="rank-card">
            <div style="font-size:0.7rem; color:var(--primary); font-family:'Orbitron';">TOTAL ABP BALANCE</div>
            <div id="miningVal">0.000</div>
            <div id="stakeStatus" style="font-size:0.65rem; color:#888;">Staking: <span style="color:#ff4444;">Inactive</span></div>
        </div>

        <div class="mission-box">
            <span class="step-tag">STAKING POOL</span>
            <span class="reward-pill">12% APY</span>
            <h3>ABP Vault</h3>
            <div class="stake-info">
                <div>Staked: <span id="stakedAmt" class="stake-val">0</span></div>
                <div>Reward: <span id="rewardAmt" class="stake-val">0</span></div>
            </div>
            <div id="timerDisp" style="font-size:0.6rem; color:#ffcc00; margin-top:10px; text-align:center;">Login every 24h to keep staking!</div>
            <button id="stakeBtn" onclick="toggleStake()" class="btn-main" style="border-color:var(--accent);">STAKE ALL POINTS</button>
        </div>

        <div class="mission-box" style="background: radial-gradient(circle at center, #1a1a2e 0%, #030508 100%);">
            <span class="step-tag" style="background: #ffcc00; color:#000;">LUCKY SPIN</span>
            <span class="reward-pill" id="spinCounter">50 FREE</span>
            <div style="text-align:center;">
                <div class="wheel-wrapper">
                    <div class="pointer"></div>
                    <div id="wheelGraphic">
                        <div class="wheel-label" style="transform: rotate(36deg);">5000</div>
                        <div class="wheel-label" style="transform: rotate(108deg);">500</div>
                        <div class="wheel-label" style="transform: rotate(180deg); color:#fff;">ZERO</div>
                        <div class="wheel-label" style="transform: rotate(252deg);">100</div>
                        <div class="wheel-label" style="transform: rotate(324deg); color:#fff;">5</div>
                    </div>
                </div>
                <p id="spinResult" style="font-family:'Orbitron'; font-size:0.9rem; min-height:20px;"></p>
                <button id="spinBtn" onclick="luckySpin()" class="btn-main" style="background:linear-gradient(90deg, var(--primary), var(--secondary)); border:none;">SPIN NOW</button>
            </div>
        </div>

        <div class="mission-box">
            <span class="step-tag">TASKS</span>
            <h3>Community Missions</h3>
            <button id="tw_ads" onclick="verify('tw_ads', 300, 'https://twitter.com/DiamoProtocol')" class="btn-main">Follow Twitter</button>
            <button id="tg_ads" onclick="verify('tg_ads', 300, 'https://t.me/ADSProtocol')" class="btn-main">Join Telegram</button>
        </div>
    </div>
</div>

<script>
let abp = 0, staked = 0, rewards = 0, freeSpins = 50, lastLogin = Date.now();
let isStaking = false, userWallet = "", tasks = {};

// STAKING LOGIC
function toggleStake() {
    if(!isStaking) {
        if(abp <= 0) { alert("Balance zero hai!"); return; }
        staked = abp; abp = 0;
        isStaking = true;
        lastLogin = Date.now();
        alert("Staking Started! Login daily to avoid reset.");
    } else {
        abp += staked + rewards;
        staked = 0; rewards = 0;
        isStaking = false;
        alert("Funds Unstaked!");
    }
    updateUI(); save();
}

function processStaking() {
    if(isStaking) {
        let now = Date.now();
        let diff = (now - lastLogin) / 1000; // seconds

        // 24 Hour Check (86400 seconds)
        if(diff > 86400) {
            abp += staked; // Reset: No rewards if missed login
            staked = 0; rewards = 0;
            isStaking = false;
            alert("Staking inactive! 24h limit crossed. Funds returned.");
        } else {
            rewards += staked * 0.00001; // Tiny reward every second
        }
    }
    updateUI();
}
setInterval(processStaking, 1000);

// FIXED SPIN LOGIC
function luckySpin() {
    if (freeSpins <= 0 && abp < 5) { alert("Need 5 ABP!"); return; }
    if (freeSpins > 0) freeSpins--; else abp -= 5;

    const wheel = document.getElementById('wheelGraphic'), res = document.getElementById('spinResult'), btn = document.getElementById('spinBtn');
    btn.disabled = true; res.innerText = "Spinning...";

    let win = 0, msg = "", col = "#fff", targetAngle = 0;
    let chance = Math.random() * 100;

    // Fixed Angles (Pointer is at top/0deg)
    if (chance <= 7) { win = 5000; msg = "JACKPOT! 🎊"; col="#ffcc00"; targetAngle = 0; }
    else if (chance <= 25) { win = 500; msg = "BIG WIN!"; col="var(--primary)"; targetAngle = 288; }
    else if (chance <= 60) { win = 100; msg = "NICE +100"; col="var(--accent)"; targetAngle = 144; }
    else if (chance <= 85) { win = 5; msg = "POINTS BACK"; col="#fff"; targetAngle = 72; }
    else { win = 0; msg = "TRY AGAIN"; col="#ff4444"; targetAngle = 216; }

    const totalRotation = (10 * 360) - targetAngle; // 10 rounds + target
    wheel.style.transform = `rotate(${totalRotation}deg)`;

    setTimeout(() => {
        abp += win;
        res.innerText = msg; res.style.color = col;
        btn.disabled = false;
        updateUI(); save();
    }, 4000);
}

// CORE
async function smartConnect() {
    if (!window.ethereum) { alert("MetaMask use karein!"); return; }
    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userWallet = accs[0];
    document.getElementById('walletDisp').innerText = userWallet.substring(0,6)+"...";
    document.getElementById('statusDot').classList.add('online');
    document.getElementById('step0').style.display = 'none';
    document.getElementById('mainContent').classList.remove('locked');
    lastLogin = Date.now(); // Update login on connect
    load();
}

function updateUI() {
    document.getElementById('miningVal').innerText = (abp + rewards).toFixed(3);
    document.getElementById('stakedAmt').innerText = Math.floor(staked);
    document.getElementById('rewardAmt').innerText = rewards.toFixed(4);
    document.getElementById('spinCounter').innerText = freeSpins > 0 ? `${freeSpins} FREE` : "COST: 5";
    document.getElementById('stakeStatus').innerHTML = isStaking ? `<span style="color:var(--accent);">Active</span>` : `<span style="color:#ff4444;">Inactive</span>`;
}

function verify(id, r, url) {
    window.open(url, '_blank');
    setTimeout(() => {
        if(!tasks[id]) { tasks[id]=true; abp += r; document.getElementById(id).classList.add('btn-done'); save(); updateUI(); }
    }, 3000);
}

function save() {
    localStorage.setItem('adamas_v13_data', JSON.stringify({abp, staked, rewards, freeSpins, lastLogin, isStaking, tasks}));
}

function load() {
    let d = JSON.parse(localStorage.getItem('adamas_v13_data'));
    if(d) {
        abp = d.abp; staked = d.staked; rewards = d.rewards;
        freeSpins = d.freeSpins; lastLogin = d.lastLogin;
        isStaking = d.isStaking; tasks = d.tasks || {};
        updateUI();
    }
}
</script>
</body>
</html>
