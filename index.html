<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Adamas Protocol | V19.0 Final Mega 💎</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { --primary: #00d4ff; --secondary: #7000ff; --accent: #00ff88; --bg: #030508; --card-bg: rgba(255, 255, 255, 0.05); --border: rgba(0, 212, 255, 0.2); }
* { box-sizing: border-box; touch-action: manipulation; }
body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
.container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; padding-bottom: 80px; }

/* 🔒 SESSION OVERLAY */
#sessionLock { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; align-items:center; justify-content:center; text-align:center; backdrop-filter:blur(10px); }

/* 🎟️ LOTTERY UI */
.lottery-box { border: 2px solid #ffcc00; border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 25px; background: rgba(255, 204, 0, 0.05); }
.tkt-num { font-family: 'Orbitron'; font-size: 1.5rem; color: #ffcc00; margin: 10px 0; border: 1px dashed #ffcc00; padding: 5px; }

.rank-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px 15px; margin-bottom: 25px; text-align: center; }
#miningVal { font-family: 'Orbitron'; font-size: 2.2rem; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.mission-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 22px 15px; margin-bottom: 20px; position: relative; }
.step-tag { position: absolute; top: -12px; left: 15px; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; padding: 3px 12px; border-radius: 6px; font-size: 0.6rem; font-family: 'Orbitron'; }

/* SNAKE BOARD */
.snake-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: #222; margin-top: 10px; }
.sq { aspect-ratio: 1; background: #111; font-size: 0.5rem; display: flex; align-items: center; justify-content: center; position: relative; }
.sq.active { border: 2px solid var(--primary); box-shadow: inset 0 0 5px var(--primary); }

.btn-main { background: #000; color: #fff; border: 1px solid var(--primary); padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; margin-top: 10px; }
.btn-main:disabled { opacity: 0.3; }
.locked { opacity: 0.1; filter: grayscale(1); pointer-events: none; }
</style>
</head>
<body>

<div id="sessionLock">
    <div>
        <h2 style="color:var(--primary); font-family:'Orbitron';">SESSION EXPIRED</h2>
        <p>Aapka 1 ghanta poora hua. <br>Wapas mining start karein!</p>
        <button onclick="resumeSession()" class="btn-main" style="width:180px;">RESUME</button>
    </div>
</div>

<div class="container">
    <div class="lottery-box">
        <span style="font-family:'Orbitron'; font-size:0.6rem; color:#ffcc00;">🏆 MEGA DRAW</span>
        <div id="dispTkt" class="tkt-num">NO TICKET</div>
        <button id="buyBtn" onclick="buyTicket()" class="btn-main" style="border-color:#ffcc00; color:#ffcc00;">BUY TICKET (500 ABP)</button>
        <p style="font-size:0.55rem; color:#888; margin-top:10px;">Winner: 1,00,000 ABP | 2nd: 50,000 ABP</p>
    </div>

    <div class="rank-card">
        <div id="miningVal">0000.000</div>
        <div style="font-weight:bold; color:var(--accent);">BALANCE: <span id="bal">0</span> ABP</div>
    </div>

    <div id="step0" class="mission-box" style="text-align:center;">
        <button onclick="smartConnect()" class="btn-main" style="background:var(--primary); color:#000;">CONNECT WALLET</button>
    </div>

    <div id="mainContent" class="locked">
        <div class="mission-box">
            <span class="step-tag">GAME</span>
            <h3>Neural Snake & Ladder</h3>
            <div id="board" class="snake-grid"></div>
            <button id="diceBtn" onclick="rollDice()" class="btn-main">ROLL DICE 🎲</button>
        </div>
        
        <div class="mission-box">
            <span class="step-tag">MINI-GAME</span>
            <h3>Mines & Rewards</h3>
            <p style="font-size:0.7rem; color:var(--accent);">Double points protection active ✅</p>
            <button onclick="alert('Mines Initialized!')" class="btn-main">START MINES</button>
        </div>
    </div>
</div>

<script>
let abp = 0, snakePos = 1, userWallet = "", lastAction = Date.now(), myTkt = "EMPTY";
const snakes = { 32: 10, 62: 18, 97: 5 };
const ladders = { 4: 14, 28: 76, 50: 67 };

async function smartConnect() {
    if (!window.ethereum) return;
    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userWallet = accs[0].toLowerCase();
    document.getElementById('step0').style.display = 'none';
    document.getElementById('mainContent').classList.remove('locked');
    renderBoard(); load(); startTimer();
}

function startTimer() {
    setInterval(() => {
        if(Date.now() - lastAction > 3600000) document.getElementById('sessionLock').style.display = 'flex';
    }, 10000);
}

function resumeSession() {
    lastAction = Date.now();
    document.getElementById('sessionLock').style.display = 'none';
    save();
}

function buyTicket() {
    if(abp < 500) { alert("Balance low!"); return; }
    if(myTkt !== "EMPTY") { alert("Limit: 1 Ticket!"); return; }
    abp -= 500;
    myTkt = Math.floor(100000 + Math.random()*900000);
    document.getElementById('dispTkt').innerText = "#" + myTkt;
    save();
}

function renderBoard() {
    const b = document.getElementById('board'); b.innerHTML = '';
    for(let i=100; i>=1; i--) {
        let d = document.createElement('div'); d.className = 'sq'; d.id = 'sq'+i; d.innerText = i;
        b.appendChild(d);
    }
    document.getElementById('sq1').classList.add('active');
}

function rollDice() {
    lastAction = Date.now();
    let d = Math.floor(Math.random()*6)+1;
    document.getElementById('sq'+snakePos).classList.remove('active');
    snakePos += d;
    if(snakePos > 100) snakePos = 100;
    
    if(ladders[snakePos]) snakePos = ladders[snakePos];
    else if(snakes[snakePos]) snakePos = snakes[snakePos];
    
    if(snakePos === 100) { abp += 5000; snakePos = 1; alert("JACKPOT!"); }
    document.getElementById('sq'+snakePos).classList.add('active');
    save();
}

function save() {
    localStorage.setItem('ads_v19_' + userWallet, JSON.stringify({abp, snakePos, myTkt, lastAction}));
    updateUI();
}

function load() {
    let data = JSON.parse(localStorage.getItem('ads_v19_' + userWallet));
    if(data) {
        abp = data.abp; snakePos = data.snakePos; myTkt = data.myTkt;
        if(myTkt !== "EMPTY") document.getElementById('dispTkt').innerText = "#" + myTkt;
        updateUI();
    }
}

function updateUI() {
    document.getElementById('bal').innerText = Math.floor(abp);
    document.getElementById('miningVal').innerText = abp.toFixed(3);
}
</script>
</body>
</html>
