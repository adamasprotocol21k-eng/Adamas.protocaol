<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | Premium Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="screen active">
            <div class="tech-grid-overlay"></div>
            <div class="diamond-glow-core"></div>
            <div class="content-wrapper">
                <div class="logo-area">
                    <h1 id="typing-logo" class="premium-glitch-text"></h1>
                </div>
                <div id="entry-controls" class="ui-reveal">
                    <p class="future-tagline"><span>ENTER</span> YOUR FUTURE</p>
                    <button class="btn-pro-entry" onclick="startJourney()">
                        <span class="btn-text">ENTER ADAMAS</span>
                        <div class="btn-glimmer"></div>
                    </button>
                </div>
            </div>
        </section>

        <section id="phase-social" class="screen">
            <div class="intro-card-premium">
                <h2 class="title-modern">ADAMAS <span>PROTOCOL</span></h2>
                <div class="protocol-info">
                    <p>Accessing the 21,000 Scarcity Standard. Please validate your nodes to initialize wallet connection.</p>
                </div>
                
                <div class="node-validation-list">
                    <div class="node-item" onclick="verifyTask(this, 'https://t.me/ADSProtocol')" data-status="pending">
                        <div class="node-info">
                            <span class="node-label">NODE 01</span>
                            <span class="node-name">TELEGRAM NETWORK</span>
                        </div>
                        <div class="node-status">PENDING</div>
                    </div>

                    <div class="node-item" onclick="verifyTask(this, 'https://x.com/AdamasADS')" data-status="pending">
                        <div class="node-info">
                            <span class="node-label">NODE 02</span>
                            <span class="node-name">X PROTOCOL</span>
                        </div>
                        <div class="node-status">PENDING</div>
                    </div>
                </div>

                <div class="wallet-trigger-area">
                    <button id="connect-wallet-btn" class="btn-lock-status" disabled onclick="connectWeb3()">
                        CONNECT WALLET
                    </button>
                    <p id="wallet-instruction" class="instruction-faded">Verify all nodes to unlock wallet</p>
                </div>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
    // --- 1. FIREBASE & ADMIN CONFIG ---
    const ADMIN_WALLET = "0xYourActualWalletAddressHere"; // <-- APNA WALLET ADDRESS YAHAN DALEIN

    const firebaseConfig = {
      apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
      authDomain: "adamas-protocol-v2.firebaseapp.com",
      databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
      projectId: "adamas-protocol-v2",
      storageBucket: "adamas-protocol-v2.firebasestorage.app",
      messagingSenderId: "197711342782",
      appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef",
      measurementId: "G-FKP19J67TT"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- 2. UI & TYPING ENGINE ---
    const logoText = "ADAMAS PROTOCOL | Real Diamond";
    const typingEl = document.getElementById("typing-logo");
    let charIndex = 0;

    function typeEffect() {
        if (charIndex < logoText.length) {
            typingEl.innerHTML += logoText.charAt(charIndex);
            charIndex++;
            setTimeout(typeEffect, 70); // Slightly faster for better UX
        }
    }

    window.onload = () => {
        typeEffect();
        if (sessionStorage.getItem('adamas_step') === 'social_phase') {
            showSocialPhase();
            checkExistingTasks(); 
        }
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) localStorage.setItem('adamas_referrer', refCode);
    };

    function startJourney() {
        sessionStorage.setItem('adamas_step', 'social_phase');
        showSocialPhase();
    }

    function showSocialPhase() {
        document.getElementById('phase-intro').classList.remove('active');
        document.getElementById('phase-social').classList.add('active');
    }

    // --- 3. TASK VERIFICATION ---
    function verifyTask(element, link) {
        if (element.getAttribute('data-status') === 'completed') return;
        window.open(link, '_blank');
        element.querySelector('.node-status').innerText = 'VERIFYING...';
        setTimeout(() => {
            element.setAttribute('data-status', 'completed');
            element.querySelector('.node-status').innerText = 'VERIFIED';
            element.style.borderColor = '#00f2ff';
            sessionStorage.setItem('task_' + element.querySelector('.node-name').innerText, 'done');
            checkTasksStatus();
        }, 4000); 
    }

    function checkExistingTasks() {
        document.querySelectorAll('.node-item').forEach(item => {
            const taskName = item.querySelector('.node-name').innerText;
            if (sessionStorage.getItem('task_' + taskName) === 'done') {
                item.setAttribute('data-status', 'completed');
                item.querySelector('.node-status').innerText = 'VERIFIED';
                item.style.borderColor = '#00f2ff';
            }
        });
        checkTasksStatus();
    }

    function checkTasksStatus() {
        const total = document.querySelectorAll('.node-item').length;
        const done = document.querySelectorAll('.node-item[data-status="completed"]').length;
        const btn = document.getElementById('connect-wallet-btn');
        if (done === total && total > 0) {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.innerText = "INITIALIZE CONNECTION";
            document.getElementById('wallet-instruction').innerText = 'ALL NODES VALIDATED';
        }
    }

    // --- 4. WEB3 CONNECTION (FOUNDER OPTIMIZED) ---
    async function connectWeb3() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                await checkAndSwitchNetwork();
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const wallet = accounts[0];
                localStorage.setItem('adamas_user', wallet);

                const isAdmin = wallet.toLowerCase() === ADMIN_WALLET.toLowerCase();
                const userRef = database.ref('users/' + wallet);

                userRef.once('value').then((snapshot) => {
                    if (!snapshot.exists()) {
                        const referrer = localStorage.getItem('adamas_referrer') || "DIRECT";
                        userRef.set({
                            balance: isAdmin ? 1000000 : 0, // Admin gets 1M initial flex
                            referredBy: referrer,
                            streak: 0,
                            lastClaim: "NEVER",
                            trustScore: isAdmin ? 100 : 10,
                            role: isAdmin ? "FOUNDER" : "USER",
                            joinedAt: new Date().toISOString(),
                            currentMultiplier: isAdmin ? 5.0 : 1.0
                        });
                        if (referrer !== "DIRECT" && !isAdmin) {
                            database.ref('users/' + referrer + '/myReferrals/' + wallet).set(true);
                        }
                    }
                    
                    document.getElementById('connect-wallet-btn').innerText = "AUTHORIZED ✅";
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1200);
                });
            } catch (err) {
                alert("Auth failed: " + err.message);
            }
        } else {
            alert("Web3 Wallet not found! Please use Metamask.");
        }
    }

    async function checkAndSwitchNetwork() {
        const amoyChainId = '0x13882';
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: amoyChainId }],
            });
        } catch (err) {
            if (err.code === 4902) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: amoyChainId,
                        chainName: 'Polygon Amoy Testnet',
                        nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                        rpcUrls: ['https://rpc-amoy.polygon.technology/'],
                        blockExplorerUrls: ['https://amoy.polygonscan.com/']
                    }]
                });
            }
        }
    }
    </script>
</body>
</html>
