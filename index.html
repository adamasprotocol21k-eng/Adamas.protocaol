<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas Protocol | Official Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .ads-glow { box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); } /* Blue glow for Adamas */
        .app-container { max-width: 450px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 100px; }
    </style>
</head>
<body>

    <div id="followGate" class="fixed inset-0 bg-black/98 z-[100] flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[40px] w-full border-blue-500/30 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/10 blur-3xl"></div>
            
            <i data-lucide="shield-check" class="mx-auto text-blue-400 w-12 h-12 mb-4"></i>
            <h2 class="text-2xl font-black mb-1 uppercase italic tracking-tighter text-white">Adamas Protocol</h2>
            <p class="text-gray-500 text-[10px] mb-8 tracking-[0.2em] uppercase font-bold">Verification Required</p>

            <div class="space-y-3">
                <a href="https://t.me/ADSProtocol" target="_blank" onclick="verifyTask(1)" class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-blue-500/50 transition-all">
                    <span class="text-[11px] font-bold uppercase tracking-wider text-gray-300">Join Official Channel</span>
                    <i data-lucide="send" class="w-4 h-4 text-blue-500"></i>
                </a>
                <a href="https://t.me/adsprotocolcommunity" target="_blank" onclick="verifyTask(2)" class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-blue-500/50 transition-all">
                    <span class="text-[11px] font-bold uppercase tracking-wider text-gray-300">ADS Community</span>
                    <i data-lucide="users" class="w-4 h-4 text-blue-500"></i>
                </a>
                <a href="https://x.com/AdamasADS" target="_blank" onclick="verifyTask(3)" class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-blue-400/50 transition-all">
                    <span class="text-[11px] font-bold uppercase tracking-wider text-gray-300">Follow Adamas (X)</span>
                    <i data-lucide="twitter" class="w-4 h-4 text-blue-400"></i>
                </a>
                <a href="https://t.me/daimodmo" target="_blank" onclick="verifyTask(4)" class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10 hover:border-blue-400/50 transition-all">
                    <span class="text-[11px] font-bold uppercase tracking-wider text-gray-300">Support Chat</span>
                    <i data-lucide="message-circle" class="w-4 h-4 text-blue-400"></i>
                </a>
            </div>

            <button id="unlockBtn" disabled class="mt-8 w-full py-4 rounded-2xl bg-gray-800 text-gray-500 font-black text-xs uppercase tracking-widest cursor-not-allowed">
                Complete Tasks to Unlock
            </button>
        </div>
    </div>

    <div class="app-container p-5">
        <header class="flex justify-between items-center py-4">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-tr from-blue-600 to-blue-300 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                    <i data-lucide="diamond" class="text-black w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter italic uppercase">Adamas</h1>
            </div>
            <button id="walletBtn" onclick="connectWallet()" class="glass px-4 py-2 rounded-2xl text-[10px] font-bold tracking-widest border border-white/10 transition-all">
                CONNECT WALLET
            </button>
        </header>

        <section class="mt-8 relative">
            <div class="glass p-8 rounded-[35px] text-center border-white/10 ads-glow">
                <p class="text-[10px] uppercase tracking-[0.3em] text-blue-400 font-bold mb-3">ADS Mining Pool</p>
                <div class="flex justify-center items-end gap-2">
                    <span id="balance" class="text-5xl font-black tracking-tighter text-white">0</span>
                    <span class="text-blue-500 font-bold mb-1">ADS</span>
                </div>
                
                <div class="mt-8">
                    <button id="miningBtn" onclick="toggleMining()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-[0.1em] shadow-lg shadow-blue-600/20 active:scale-95 transition-all">
                        START MINING
                    </button>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4 mt-8">
            <div class="glass p-5 rounded-[28px] border border-white/5">
                <i data-lucide="zap" class="text-yellow-400 mb-3 w-6 h-6"></i>
                <p class="text-[11px] font-black uppercase tracking-tighter">Staking</p>
                <p class="text-[9px] text-gray-500">Live 12% APY</p>
            </div>
            <div class="glass p-5 rounded-[28px] border border-white/5">
                <i data-lucide="gamepad-2" class="text-purple-400 mb-3 w-6 h-6"></i>
                <p class="text-[11px] font-black uppercase tracking-tighter">Games</p>
                <p class="text-[9px] text-gray-500">Teen Patti</p>
            </div>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] glass py-4 px-8 rounded-full flex justify-between items-center shadow-2xl z-50">
            <i data-lucide="home" class="w-5 h-5 text-blue-500"></i>
            <i data-lucide="layout-grid" class="w-5 h-5 text-gray-500"></i>
            <div class="bg-blue-600 p-3 rounded-full -mt-12 border-[6px] border-[#050505]">
                <i data-lucide="diamond" class="w-6 h-6 text-white"></i>
            </div>
            <i data-lucide="gift" class="w-5 h-5 text-gray-500"></i>
            <i data-lucide="user" class="w-5 h-5 text-gray-500"></i>
        </nav>
    </div>

    <script>
        lucide.createIcons();
        let balance = 0;
        let isMining = false;
        let interval;
        let tasksDone = 0;

        function verifyTask(n) {
            tasksDone++;
            if(tasksDone >= 4) {
                const btn = document.getElementById('unlockBtn');
                btn.disabled = false;
                btn.classList.replace('bg-gray-800', 'bg-blue-600');
                btn.classList.replace('text-gray-500', 'text-white');
                btn.innerHTML = "LAUNCH APP";
                btn.onclick = () => document.getElementById('followGate').style.display = 'none';
            }
        }

        function toggleMining() {
            const btn = document.getElementById('miningBtn');
            if (!isMining) {
                isMining = true;
                btn.innerHTML = "MINING ACTIVE...";
                btn.classList.add('animate-pulse', 'bg-blue-900');
                interval = setInterval(() => {
                    balance += 1;
                    document.getElementById('balance').innerText = balance;
                }, 1000);
            } else {
                isMining = false;
                clearInterval(interval);
                btn.innerHTML = "START MINING";
                btn.classList.remove('animate-pulse', 'bg-blue-900');
            }
        }

        async function connectWallet() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('walletBtn').innerText = accounts[0].slice(0,6)+"..."+accounts[0].slice(-4);
            }
        }
    </script>
</body>
</html>
