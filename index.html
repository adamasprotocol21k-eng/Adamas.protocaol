<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <section id="phase-intro" class="screen active">
        <div class="diamond-glow"></div>
        <div class="logo-wrap">
            <h1 id="typing-logo" class="glitch-text"></h1> </div>
        <div id="entry-controls" class="fade-in-delayed">
            <p class="tagline">ENTER YOUR FUTURE</p>
            <button class="btn-premium" onclick="startJourney()">ENTER ADAMAS</button>
        </div>
    </section>

    <section id="phase-social" class="screen">
        <div class="intro-box">
            <h2 class="title-modern">PROTOCOL PROTOCOL</h2>
            <div class="info-text">
                <p>Welcome to the 21,000 Scarcity Standard. Adamas is a decentralized engagement layer built for the elite.</p>
            </div>
            
            <div class="social-verification">
                <div class="task-row" onclick="verifyTask(this)">
                    <span>FOLLOW TELEGRAM</span>
                    <div class="status-box">✕</div>
                </div>
                <div class="task-row" onclick="verifyTask(this)">
                    <span>FOLLOW X (TWITTER)</span>
                    <div class="status-box">✕</div>
                </div>
            </div>

            <button id="connect-wallet-btn" class="btn-locked" disabled onclick="connectWeb3()">
                CONNECT WALLET
            </button>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
