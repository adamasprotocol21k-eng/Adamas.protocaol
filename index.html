<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamas Protocol | Future of Gaming</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 3D Floating Animation */
        .coin-float {
            position: absolute; width: 100px; height: 100px;
            background: url('https://cryptologos.cc/logos/bitcoin-btc-logo.png');
            background-size: cover; filter: drop-shadow(0 0 20px #f3ba2f);
            animation: float 6s infinite ease-in-out; z-index: -1;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-50px) rotate(20deg); }
        }
        .hero-glow {
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            background: linear-gradient(90deg, #fff, #00ff88);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="crypto-theme">
    <div class="coin-float" style="top:10%; left:10%;"></div>
    <div class="coin-float" style="top:60%; right:15%; animation-delay: 2s;"></div>

    <div class="landing-content" style="text-align: center; padding-top: 100px;">
        <h1 class="hero-glow" style="font-size: 3rem; margin-bottom: 10px;">ADAMAS PROTOCOL</h1>
        <p style="color: #848e9c; padding: 0 20px;">Decentralized Gaming & Reward Ecosystem.<br>Play. Earn. Evolve.</p>
        
        <div class="features-list" style="margin: 40px 0; font-size: 0.8rem; color: #00ff88;">
            <p>● 3D Gaming Hub ● Social Mining ● Referral Rewards</p>
        </div>

        <button class="btn-neon-large" onclick="connectWallet()">LAUNCH APP / CONNECT</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
