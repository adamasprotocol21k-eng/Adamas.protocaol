<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | Premium Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="screen active">
            <div class="tech-grid-overlay"></div>
            <div class="diamond-glow-core"></div>

            <div class="content-wrapper">
                <div class="logo-area">
                    <h1 id="typing-logo" class="premium-glitch-text"></h1>
                </div>
                
                <div id="entry-controls" class="ui-reveal">
                    <p class="future-tagline"><span>ENTER</span> YOUR FUTURE</p>
                    <button class="btn-pro-entry" onclick="startJourney()">
                        <span class="btn-text">ENTER ADAMAS</span>
                        <div class="btn-glimmer"></div>
                    </button>
                </div>
            </div>
        </section>

        <section id="phase-social" class="screen">
            <div class="intro-card-premium">
                <h2 class="title-modern">ADAMAS <span>PROTOCOL</span></h2>
                
                <div class="protocol-info">
                    <p>Accessing the 21,000 Scarcity Standard. Please validate your nodes to initialize wallet connection.</p>
                </div>
                
                <div class="node-validation-list">
                    <div class="node-item" onclick="verifyTask(this, 'https://t.me/your_telegram')" data-status="pending">
                        <div class="node-info">
                            <span class="node-label">NODE 01</span>
                            <span class="node-name">TELEGRAM NETWORK</span>
                        </div>
                        <div class="node-status">PENDING</div>
                    </div>

                    <div class="node-item" onclick="verifyTask(this, 'https://x.com/your_twitter')" data-status="pending">
                        <div class="node-info">
                            <span class="node-label">NODE 02</span>
                            <span class="node-name">X PROTOCOL (TWITTER)</span>
                        </div>
                        <div class="node-status">PENDING</div>
                    </div>
                </div>

                <div class="wallet-trigger-area">
                    <button id="connect-wallet-btn" class="btn-lock-status" disabled onclick="connectWeb3()">
                        CONNECT WALLET
                    </button>
                    <p id="wallet-instruction" class="instruction-faded">Verify all nodes to unlock wallet</p>
                </div>
            </div>
        </section>
    </div>

    <script src="main.js"></script>

    <script>
    // 1. TYPING ANIMATION
    const logoText = "ADAMAS";
    const typingEl = document.getElementById("typing-logo");
    let charIndex = 0;

    function typeEffect() {
        if (charIndex < logoText.length) {
            typingEl.innerHTML += logoText.charAt(charIndex);
            charIndex++;
            setTimeout(typeEffect, 150);
        }
    }

    // 2. STATE & MEMORY MANAGEMENT
    window.onload = () => {
        typeEffect();

        // Memory check for Phase 2
        if (sessionStorage.getItem('adamas_step') === 'social_phase') {
            showSocialPhase();
            checkExistingTasks(); 
        }

        // Referral Capture (Fixed)
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode && refCode.startsWith('0x')) {
            localStorage.setItem('adamas_referrer', refCode);
        }
    };

    function startJourney() {
        sessionStorage.setItem('adamas_step', 'social_phase');
        showSocialPhase();
    }

    function showSocialPhase() {
        document.getElementById('phase-intro').classList.remove('active');
        document.getElementById('phase-social').classList.add('active');
    }

    // 3. TASK VERIFICATION LOGIC
    function verifyTask(element, link) {
        if (element.getAttribute('data-status') === 'completed') return;

        window.open(link, '_blank');
        element.querySelector('.node-status').innerText = 'VERIFYING...';
        element.style.borderColor = '#ffaa00';

        // Auto-Verify after 3 seconds
        setTimeout(() => {
            element.setAttribute('data-status', 'completed');
            element.querySelector('.node-status').innerText = 'VERIFIED';
            element.style.borderColor = '#00f2ff';
            element.style.background = 'rgba(0, 242, 255, 0.05)';
            
            // Save to memory
            sessionStorage.setItem('task_' + element.querySelector('.node-name').innerText, 'done');
            checkTasksStatus();
        }, 3000); 
    }

    function checkExistingTasks() {
        document.querySelectorAll('.node-item').forEach(item => {
            const taskName = item.querySelector('.node-name').innerText;
            if (sessionStorage.getItem('task_' + taskName) === 'done') {
                item.setAttribute('data-status', 'completed');
                item.querySelector('.node-status').innerText = 'VERIFIED';
                item.style.borderColor = '#00f2ff';
                item.style.background = 'rgba(0, 242, 255, 0.05)';
            }
        });
        checkTasksStatus();
    }

    function checkTasksStatus() {
        const total = document.querySelectorAll('.node-item').length;
        const done = document.querySelectorAll('.node-item[data-status="completed"]').length;
        const btn = document.getElementById('connect-wallet-btn');
        
        if (done === total && total > 0) {
            btn.disabled = false;
            btn.style.background = "#00f2ff";
            btn.style.color = "#000";
            btn.style.cursor = "pointer";
            btn.style.opacity = "1";
            btn.innerText = "CONNECT WALLET";
            document.getElementById('wallet-instruction').innerText = 'ALL SYSTEMS READY';
            checkAndSwitchNetwork();
        }
    }

    // 4. NETWORK SWITCH
    async function checkAndSwitchNetwork() {
        if (!window.ethereum) return;
        const amoyChainId = '0x13882';
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: amoyChainId }],
            });
        } catch (err) {
            if (err.code === 4902) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: amoyChainId,
                        chainName: 'Polygon Amoy Testnet',
                        nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                        rpcUrls: ['https://rpc-amoy.polygon.technology/'],
                        blockExplorerUrls: ['https://amoy.polygonscan.com/']
                    }]
                });
            }
        }
    }
    </script>
</body>
</html>
