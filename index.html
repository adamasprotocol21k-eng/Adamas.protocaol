<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | Premium Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="screen active">
            <div class="tech-grid-overlay"></div>
            <div class="diamond-glow-core"></div>

            <div class="content-wrapper">
                <div class="logo-area">
                    <h1 id="typing-logo" class="premium-glitch-text">ADAMAS</h1>
                </div>
                
                <div id="entry-controls" class="ui-reveal">
                    <p class="future-tagline"><span>ENTER</span> YOUR FUTURE</p>
                    <button class="btn-pro-entry" onclick="startJourney()">
                        <span class="btn-text">ENTER ADAMAS</span>
                        <div class="btn-glimmer"></div>
                    </button>
                </div>
            </div>
        </section>

        <section id="phase-social" class="screen">
            <div class="intro-card-premium">
                <h2 class="title-modern">ADAMAS <span>PROTOCOL</span></h2>
                
                <div class="protocol-info">
                    <p>Accessing the 21,000 Scarcity Standard. Please validate your nodes to initialize wallet connection.</p>
                </div>
                
                <div class="node-validation-list">
                    <div class="node-item" onclick="verifyTask(this, 'https://t.me/yourchannel')" data-status="pending">
                        <div class="node-info">
                            <span class="node-label">NODE 01</span>
                            <span class="node-name">TELEGRAM NETWORK</span>
                        </div>
                        <div class="node-status">PENDING</div>
                    </div>

                    <div class="node-item" onclick="verifyTask(this, 'https://twitter.com/yourprofile')" data-status="pending">
                        <div class="node-info">
                            <span class="node-label">NODE 02</span>
                            <span class="node-name">X PROTOCOL (TWITTER)</span>
                        </div>
                        <div class="node-status">PENDING</div>
                    </div>
                </div>

                <div class="wallet-trigger-area">
                    <button id="connect-wallet-btn" class="btn-lock-status" disabled onclick="connectWeb3()">
                        CONNECT WALLET
                    </button>
                    <p id="wallet-instruction" class="instruction-faded">Verify all nodes to unlock wallet</p>
                </div>
            </div>
        </section>
    </div>

    <script src="main.js"></script>

    <script>
        // 1. REFERRAL CAPTURE (Fixed Logic)
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search); // Fixed 'location'
            const refCode = urlParams.get('ref');
            
            if (refCode && refCode.startsWith('0x')) {
                localStorage.setItem('adamas_referrer', refCode);
                console.log("Adamas Node: Referrer Linked -> " + refCode);
            }
        });

        // 2. NETWORK SWITCH LOGIC (Polygon Amoy)
        async function checkAndSwitchNetwork() {
            if (!window.ethereum) return;

            const amoyChainId = '0x13882'; // Polygon Amoy Testnet Hex ID
            const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });

            if (currentChainId !== amoyChainId) {
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: amoyChainId }],
                    });
                } catch (switchError) {
                    // Agar network add nahi hai, toh auto-add karo
                    if (switchError.code === 4902) {
                        try {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: amoyChainId,
                                    chainName: 'Polygon Amoy Testnet',
                                    nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                                    rpcUrls: ['https://rpc-amoy.polygon.technology/'],
                                    blockExplorerUrls: ['https://amoy.polygonscan.com/']
                                }],
                            });
                        } catch (addError) {
                            console.error("Failed to add network");
                        }
                    }
                }
            }
        }

        // 3. TASK VERIFICATION HELPER
        function verifyTask(element, link) {
            window.open(link, '_blank');
            setTimeout(() => {
                element.setAttribute('data-status', 'completed');
                element.querySelector('.node-status').innerText = 'VERIFIED';
                element.style.borderColor = 'var(--cyan)';
                checkAllTasks();
            }, 2000);
        }

        function checkAllTasks() {
            const pending = document.querySelectorAll('.node-item[data-status="pending"]');
            if (pending.length === 0) {
                const btn = document.getElementById('connect-wallet-btn');
                btn.disabled = false;
                btn.className = 'btn-pro-entry'; // Style change on unlock
                document.getElementById('wallet-instruction').innerText = 'System Ready for Connection';
                checkAndSwitchNetwork(); // Auto-prompt network switch
            }
        }
    </script>
</body>
</html>
