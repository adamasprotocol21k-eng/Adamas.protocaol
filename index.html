<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS Protocol</title>
    <style>
        :root { --primary-neon: #00f2ff; --bg-dark: #0a0b10; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); color: white;
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }
        .container { 
            text-align: center; width: 90%; max-width: 400px; 
            z-index: 10; position: relative;
        }
        /* Logo Fix: Image nahi bhi hogi toh layout nahi bigdega */
        .logo-wrapper {
            width: 150px; height: 150px; margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
        }
        .main-logo {
            max-width: 100%; max-height: 100%;
            filter: drop-shadow(0 0 15px var(--primary-neon));
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px 20px; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { font-size: 2.2rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--primary-neon); text-shadow: 0 0 10px var(--primary-neon); }
        p { opacity: 0.8; font-size: 1rem; line-height: 1.5; margin: 20px 0 35px; }
        .neon-btn {
            background: var(--primary-neon); color: black;
            border: none; width: 100%; padding: 15px;
            border-radius: 50px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }
        .neon-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="assets/logo.png" class="main-logo" alt="ADAMAS">
        </div>
        <div class="glass-card">
            <h1>ADAMAS <span>PROTOCOL</span></h1>
            <p>Unlock the future of Web3 mining. Connect your wallet to claim your ABP points.</p>
            <button class="neon-btn" id="connectBtn">CONNECT WALLET</button>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
