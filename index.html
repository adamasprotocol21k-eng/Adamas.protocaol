<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS Protocol | Entrance</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gate-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .task-box { display: none; margin-top: 30px; width: 100%; max-width: 400px; }
        .social-link { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; text-decoration: none; color: white; border: 1px solid rgba(0,242,255,0.2);
        }
        .verify-btn { width: 100%; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="universe-bg"></div>

    <div class="gate-container" id="authSection">
        <h1 class="title-font gradient-text" style="font-size: 2.5rem;">ADAMAS PROTOCOL</h1>
        <p style="color: #888; margin: 15px 0 30px;">Decentralized Gaming & Rewards Ecosystem</p>
        
        <button id="connectBtn" class="btn-cosmic" onclick="handleConnect()">CONNECT WALLET</button>

        <div id="taskSection" class="task-box">
            <h3 class="title-font" style="font-size: 0.9rem; color: var(--gold); margin-bottom: 20px;">COMPLETE TASKS TO UNLOCK</h3>
            
            <a href="https://twitter.com/DiamoProtocol" target="_blank" class="social-link" onclick="markTask('tw')">
                <span>Follow Twitter (+50 ABP)</span>
                <span id="tw-status">⭕</span>
            </a>

            <a href="https://t.me/daimodmo" target="_blank" class="social-link" onclick="markTask('tg')">
                <span>Join Telegram (+50 ABP)</span>
                <span id="tg-status">⭕</span>
            </a>

            <button id="enterBtn" class="btn-cosmic verify-btn" onclick="enterApp()">ENTER DASHBOARD</button>
        </div>
    </div>

    <script src="js/notify.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let tasks = { tw: false, tg: false };

        async function handleConnect() {
            // Hum auth.js ka connect call karenge
            const wallet = await AuthModule.connect();
            if(wallet) {
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('taskSection').style.display = 'block';
                Notify.show("Wallet Linked. Complete tasks.", "info");
            }
        }

        function markTask(type) {
            tasks[type] = true;
            document.getElementById(`${type}-status`).innerText = "✅";
            if(tasks.tw && tasks.tg) {
                document.getElementById('enterBtn').style.display = 'block';
            }
        }

        function enterApp() {
            // Reward point add karke redirect
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
