<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Adamas Protocol | V20 Master 💎</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { --primary: #00d4ff; --secondary: #7000ff; --accent: #00ff88; --bg: #030508; --card-bg: rgba(255, 255, 255, 0.05); --border: rgba(0, 212, 255, 0.2); }
* { box-sizing: border-box; touch-action: manipulation; }
body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; background-image: radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.1) 0%, transparent 40%); }
.container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; padding-bottom: 80px; }

/* 🔒 HOURLY SESSION LOCK */
#sessionLock { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; display:none; align-items:center; justify-content:center; text-align:center; backdrop-filter:blur(15px); }

/* 🎟️ LOTTERY UI */
.lottery-box { border: 2px dashed #ffcc00; border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 25px; background: rgba(255, 204, 0, 0.05); }
.tkt-display { font-family: 'Orbitron'; font-size: 1.4rem; color: #ffcc00; margin: 10px 0; letter-spacing: 4px; border: 1px solid rgba(255,204,0,0.3); padding: 5px; }

.rank-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px 15px; margin-bottom: 25px; text-align: center; }
#miningVal { font-family: 'Orbitron'; font-size: 2.2rem; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.mission-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 20px 15px; margin-bottom: 20px; position: relative; }
.step-tag { position: absolute; top: -12px; left: 15px; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; padding: 3px 12px; border-radius: 6px; font-size: 0.6rem; font-family: 'Orbitron'; }

/* 🐍 SNAKE GRID Visuals */
.snake-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: #222; margin: 15px 0; border: 1px solid #444; }
.sq { aspect-ratio: 1; background: #111; font-size: 0.4rem; display: flex; align-items: center; justify-content: center; position: relative; }
.sq.ladder { background: rgba(0, 255, 136, 0.1); border: 1px solid var(--accent); }
.sq.snake { background: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; }
.player { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); z-index: 5; }

.btn-main { background: #000; color: #fff; border: 1px solid var(--primary); padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
.btn-main:active { transform: scale(0.95); }
.locked { opacity: 0.1; filter: grayscale(1); pointer-events: none; }

/* Purane code ki styles... */
.mines-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px auto; width: 280px; }
.mine-card { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
#wheelGraphic { width: 200px; height: 200px; border-radius: 50%; border: 5px solid #111; transition: 5s cubic-bezier(0.15, 0, 0.15, 1); margin: 20px auto; background: conic-gradient(#ffcc00 0% 12.5%, #00d4ff 12.5% 25%, #ff4444 25% 37.5%, #00ff88 37.5% 50%, #7000ff 50% 62.5%, #ff8800 62.5% 75%, #ffffff 75% 87.5%, #333 87.5% 100%); }
</style>
</head>
<body>

<div id="sessionLock">
    <div>
        <h1 style="color:var(--primary); font-family:'Orbitron';">SESSION PAUSED</h1>
        <p>Aapka 1 ghanta poora hua. <br>Click "RESUME" to continue mining.</p>
        <button onclick="resumeSession()" class="btn-main" style="width:200px; background:var(--primary); color:#000;">RESUME WORK</button>
    </div>
</div>

<div class="container">
    <div class="lottery-box">
        <span style="font-family:'Orbitron'; font-size:0.6rem; color:#ffcc00;">OFFICIAL ADAMAS DRAW</span>
        <div id="myTicket" class="tkt-display">NO TICKET</div>
        <button id="buyBtn" onclick="buyTicket()" class="btn-main" style="border-color:#ffcc00; color:#ffcc00;">GET TICKET (500 ABP)</button>
    </div>

    <div id="step0" class="mission-box" style="text-align:center;">
        <button onclick="smartConnect()" class="btn-main" style="background:var(--primary); color:#000;">CONNECT WALLET</button>
    </div>

    <div id="mainContent" class="locked">
        <div class="rank-card">
            <div id="miningVal">0000.000</div>
            <div style="font-weight:bold; color:var(--accent);">BALANCE: <span id="bal">0</span> ABP 💎</div>
        </div>

        <div class="mission-box">
            <span class="step-tag">NEW GAME</span>
            <h3>Neural Snake Board</h3>
            <div id="board" class="snake-grid"></div>
            <button id="diceBtn" onclick="rollDice()" class="btn-main">ROLL DICE 🎲 (WIN 5000 ABP)</button>
        </div>

        <div class="mission-box">
            <span class="step-tag">STAKING</span>
            <h3>Stake Vault</h3>
            <button onclick="toggleStake()" class="btn-main">STAKE / CLAIM</button>
        </div>

        <div class="mission-box" id="minesBox">
            <span class="step-tag">MINI-GAME</span>
            <h3>Mines & Rewards 💣</h3>
            <div id="minesDisplay" class="mines-grid"></div>
            <p id="minesStatus" style="text-align:center; font-size:0.8rem;"></p>
        </div>

        </div>
</div>

<script>
let abp = 0, staked = 0, rewards = 0, snakePos = 1, userWallet = "";
let myTkt = "EMPTY", lastAction = Date.now(), isStaking = false;
let mineChances = 5, minesCooldown = false;

const snakes = { 32: 10, 62: 18, 95: 5 };
const ladders = { 4: 14, 28: 76, 50: 67 };

// 🕒 SESSION LOCK LOGIC
function startTimer() {
    setInterval(() => {
        if(Date.now() - lastAction > 3600000) document.getElementById('sessionLock').style.display = 'flex';
    }, 10000);
}
function resumeSession() { lastAction = Date.now(); document.getElementById('sessionLock').style.display = 'none'; save(); }

// 🎟️ LOTTERY LOGIC
function buyTicket() {
    if(abp < 500) { alert("Points kam hain!"); return; }
    if(myTkt !== "EMPTY") { alert("Monthly limit: 1 Ticket!"); return; }
    abp -= 500;
    myTkt = Math.floor(100000 + Math.random() * 900000);
    document.getElementById('myTicket').innerText = "#" + myTkt;
    save();
}

// 🐍 SNAKE LOGIC
function renderBoard() {
    const b = document.getElementById('board'); b.innerHTML = '';
    for(let i=100; i>=1; i--) {
        let d = document.createElement('div'); d.className = 'sq'; d.id = 'sq'+i; d.innerText = i;
        if(ladders[i]) d.classList.add('ladder');
        if(snakes[i]) d.classList.add('snake');
        b.appendChild(d);
    }
    updateGoti();
}
function rollDice() {
    lastAction = Date.now();
    let d = Math.floor(Math.random()*6)+1;
    snakePos += d; if(snakePos > 100) snakePos = 100;
    setTimeout(() => {
        if(ladders[snakePos]) snakePos = ladders[snakePos];
        else if(snakes[snakePos]) snakePos = snakes[snakePos];
        if(snakePos === 100) { abp += 5000; snakePos = 1; alert("WINNER! +5000 ABP"); }
        updateGoti(); save();
    }, 500);
}
function updateGoti() {
    document.querySelectorAll('.sq').forEach(s => s.innerHTML = s.innerText);
    document.getElementById('sq'+snakePos).innerHTML = `<div class="player"></div>`;
}

// AAPKA PURANA MINES LOGIC
function initMines() {
    const grid = document.getElementById('minesDisplay'); grid.innerHTML = '';
    let mPos = []; while(mPos.length<4) { let r=Math.floor(Math.random()*16); if(!mPos.includes(r)) mPos.push(r); }
    for(let i=0; i<16; i++) {
        let c = document.createElement('div'); c.className = 'mine-card'; c.innerText = "?";
        c.onclick = () => {
            if(minesCooldown) return; lastAction = Date.now();
            if(mPos.includes(i)) { 
                c.innerText="💣"; minesCooldown=true; 
                setTimeout(() => { minesCooldown=false; initMines(); }, 120000);
            } else { c.innerText="💎"; abp += 15; save(); }
        };
        grid.appendChild(c);
    }
}

// CORE FUNCTIONS
async function smartConnect() {
    if (!window.ethereum) return;
    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userWallet = accs[0].toLowerCase();
    document.getElementById('step0').style.display = 'none';
    document.getElementById('mainContent').classList.remove('locked');
    renderBoard(); initMines(); load(); startTimer();
}

function save() {
    const data = { abp, snakePos, myTkt, lastAction, staked, isStaking };
    localStorage.setItem('ads_v20_master_' + userWallet, JSON.stringify(data));
    updateUI();
}

function load() {
    let d = JSON.parse(localStorage.getItem('ads_v20_master_' + userWallet));
    if(d) {
        abp = d.abp; snakePos = d.snakePos || 1; myTkt = d.myTkt || "EMPTY";
        staked = d.staked; isStaking = d.isStaking;
        if(myTkt !== "EMPTY") document.getElementById('myTicket').innerText = "#" + myTkt;
        updateGoti(); updateUI();
    }
}

function updateUI() {
    document.getElementById('bal').innerText = Math.floor(abp);
    document.getElementById('miningVal').innerText = abp.toFixed(3);
}
</script>
</body>
</html>
