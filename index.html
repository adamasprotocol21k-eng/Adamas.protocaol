<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS Protocol | High-End Web3 Gaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="assets/logo.png" alt="ADAMAS" class="logo">
            <h1 class="glow-text">ADAMAS PROTOCOL</h1>
        </div>
        <button id="walletConnect" class="btn-primary" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <main>
        <section class="balance-card">
            <div class="diamond-icon">💎</div>
            <h3>My ABP Points</h3>
            <div class="amount-display">
                <span id="abpBalance">0.00</span> <small>ABP</small>
            </div>
            <p class="wallet-addr" id="userAddr">Wallet: Not Connected</p>
        </section>

        <section class="stats-grid">
            <div class="stat-box">
                <p>Staked Amount</p>
                <strong id="stakedAmt">0.00 ABP</strong>
            </div>
            <div class="stat-box">
                <p>Total Earnings</p>
                <strong id="totalEarned" style="color: #00ff41;">0.00 ABP</strong>
            </div>
        </section>

        <section class="mining-section">
            <div class="mining-status">
                <p>Next Reward Generation</p>
                <div id="timer">24h : 00m : 00s</div>
            </div>
            <button id="mainActionBtn" class="btn-stake" onclick="handleMining()">Start Mining Session</button>
        </section>

        <nav class="action-tabs">
            <button class="tab-btn" onclick="claimDailyReward()">🎁 Daily Claim</button>
            <button class="tab-btn" onclick="openGame('TeenPatti')">🃏 Teen Patti</button>
            <button class="tab-btn" onclick="openGame('Mime')">🎮 Mime Game</button>
            <button class="tab-btn" onclick="openGame('Lottery')">🎟️ Jackpot Lottery</button>
        </nav>
    </main>

    <footer>
        <div class="social-links">
            <a href="https://t.me/ADSProtocol" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://x.com/AdamasADS" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://t.me/daimodmo" target="_blank"><i class="fas fa-headset"></i></a>
        </div>
        <p>&copy; 2026 ADAMAS Protocol. Smart Contract: 0x1E12...DADB</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
