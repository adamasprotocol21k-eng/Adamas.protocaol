<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 Adamas Protocol DApp</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Rajdhani',sans-serif; background:#030508; color:#00d4ff; display:flex; flex-direction:column; align-items:center; min-height:100vh;}
h1,h2,h3 { font-family:'Orbitron',sans-serif; color:#ffcc00; margin:0 0 10px 0;}
.container{width:95%; max-width:600px; margin-top:15px;}
.section{background:#111214; padding:15px; border-radius:12px; margin-bottom:20px; box-shadow:0 0 20px #00d4ff44; position:relative;}
button{padding:10px 20px; margin:5px 0; font-size:16px; border:none; border-radius:8px; cursor:pointer; color:#030508; background:linear-gradient(45deg,#00ff88,#00d4ff); transition:0.2s;}
button:hover{background:linear-gradient(45deg,#ffcc00,#00ff88); color:#030508;}
.hidden{display:none;}
a{color:#ffcc00;text-decoration:none;}
a:hover{text-decoration:underline;}
.reward-list{background:#000; padding:10px; border-radius:10px; margin-top:10px; color:#fff;}
.reward-item{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #222;}
.reward-item:last-child{border:none;}
.reward-title{color:#ffcc00; font-weight:bold; margin-top:5px; margin-bottom:5px;}
.tabs{display:flex; justify-content:space-around; margin-bottom:15px;}
.tab{padding:10px 15px; border-radius:8px; cursor:pointer; background:#111214; color:#00d4ff; font-weight:bold; box-shadow:0 0 5px #00d4ff44;}
.tab.active{background:#00d4ff; color:#030508; box-shadow:0 0 15px #00ff88;}
#miningGrid{display:grid; grid-template-columns:repeat(4,1fr); gap:5px;}
.mineBox{width:60px; height:60px; background:#222; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; color:#fff; transition:0.3s;}
.mineBox.revealed{background:#00ff88; color:#030508;}
.cardContainer{display:flex; justify-content:space-around; margin-top:10px;}
.card{width:60px; height:90px; background:#222; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff; cursor:pointer; perspective:1000px; transition:0.5s;}
.card.flipped{transform: rotateY(180deg); background:#00ff88; color:#030508;}
@media(max-width:600px){button{width:100%;}.mineBox{width:50px;height:50px;}.card{width:50px;height:75px;}}
</style>
</head>
<body>
<h1>💎 Adamas Protocol DApp</h1>
<div class="container">

<div class="tabs">
  <div class="tab active" data-tab="tasksTab">Tasks</div>
  <div class="tab" data-tab="miningTab">Mining</div>
  <div class="tab" data-tab="quizTab">Quiz</div>
  <div class="tab" data-tab="gamesTab">Games</div>
  <div class="tab" data-tab="referralTab">Referral</div>
</div>

<!-- Tasks -->
<div id="tasksTab" class="section tabContent">
  <h2>📱 Step-wise Tasks</h2>
  <p id="walletAddress">Wallet: Not Connected</p>
  <button id="connectWalletBtn">Connect Wallet</button>
  <div class="reward-list">
    <div class="reward-item">Daily Fuel <span>+50 ABP</span></div>
    <div class="reward-item">Link Telegram & X <span>+250 ABP</span></div>
  </div>
  <button id="dailyFuelBtn">Claim Daily Fuel ✅</button>
  <button id="joinTelegramBtn">Join Telegram Base</button>
  <button id="followTwitterBtn">Follow ADS on X</button>
  <button id="initDashboardBtn" class="hidden">Initialize Dashboard</button>
</div>

<!-- Mining -->
<div id="miningTab" class="section tabContent hidden">
  <h2>⛏️ Mining Scratch</h2>
  <p>Balance: <span id="miningCounter">0.000</span> ABP</p>
  <div id="miningGrid"></div>
</div>

<!-- Quiz -->
<div id="quizTab" class="section tabContent hidden">
  <h2>🧠 Intelligence Lab</h2>
  <p>Next mission in: <span id="quizTimer">--:--:--</span></p>
  <div id="quizSection"></div>
</div>

<!-- Games -->
<div id="gamesTab" class="section tabContent hidden">
  <h2>🎴 Teen Patti Cards</h2>
  <div class="cardContainer" id="cardsContainer"></div>
</div>

<!-- Referral -->
<div id="referralTab" class="section tabContent hidden">
  <h2>🔗 Referral System</h2>
  <p id="refLink"></p>
  <div class="reward-list">
    <div class="reward-item">Per Referral <span>+1000 ABP</span></div>
  </div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.8.0/dist/ethers.min.js"></script>
<script>
// Firebase Config
const firebaseConfig={apiKey:"YOUR_API_KEY",authDomain:"YOUR_PROJECT.firebaseapp.com",projectId:"YOUR_PROJECT",storageBucket:"YOUR_PROJECT.appspot.com",messagingSenderId:"SENDER_ID",appId:"APP_ID"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let walletAddress=""; let userData={balance:0, telegram:false, twitter:false, dailyFuel:false, quizLocked:0};

// Tabs
const tabs=document.querySelectorAll(".tab");
const tabContents=document.querySelectorAll(".tabContent");
tabs.forEach(tab=>tab.addEventListener("click",()=>{tabs.forEach(t=>t.classList.remove("active")); tab.classList.add("active"); tabContents.forEach(tc=>tc.classList.add("hidden")); document.getElementById(tab.dataset.tab).classList.remove("hidden");}));

// Wallet Connect
const connectWalletBtn=document.getElementById("connectWalletBtn");
const walletAddressP=document.getElementById("walletAddress");
connectWalletBtn.onclick=async()=>{
  if(window.ethereum){
    const accounts=await ethereum.request({method:'eth_requestAccounts'});
    walletAddress=accounts[0];
    walletAddressP.textContent="Wallet: "+walletAddress;
    loadUserData();
    initReferral();
  }else{alert("Install MetaMask or TrustWallet");}
};

// Load / Save
async function loadUserData(){
  const docRef=db.collection('users').doc(walletAddress);
  const doc=await docRef.get();
  if(doc.exists){userData=doc.data();}else{await docRef.set(userData);}
  updateUI();
}
function saveUserData(){if(walletAddress){db.collection('users').doc(walletAddress).set(userData);}}

// Tasks
const dailyFuelBtn=document.getElementById("dailyFuelBtn");
const joinTelegramBtn=document.getElementById("joinTelegramBtn");
const followTwitterBtn=document.getElementById("followTwitterBtn");
const initDashboardBtn=document.getElementById("initDashboardBtn");

dailyFuelBtn.onclick=()=>{
  if(!userData.dailyFuel){userData.balance+=50; userData.dailyFuel=true; saveUserData(); alert("+50 ABP Claimed!"); updateUI();}
  else alert("Already claimed today!");
};

joinTelegramBtn.onclick=()=>{window.open("https://t.me/adsprotocolcommunity","_blank"); userData.telegram=true; saveUserData(); checkTasks();};
followTwitterBtn.onclick=()=>{window.open("https://x.com/AdamasADS","_blank"); userData.twitter=true; saveUserData(); checkTasks();};

function checkTasks(){if(userData.telegram && userData.twitter){initDashboardBtn.classList.remove("hidden");}}

// Mining Grid
const miningCounterP=document.getElementById("miningCounter");
const miningGrid=document.getElementById("miningGrid");
function createMiningGrid(){
  miningGrid.innerHTML="";
  const bomb=Math.floor(Math.random()*16);
  for(let i=0;i<16;i++){
    const box=document.createElement("div");
    box.classList.add("mineBox");
    box.dataset.index=i;
    box.onclick=function(){
      if(box.classList.contains("revealed")) return;
      box.classList.add("revealed");
      if(i===bomb){alert("💣 Bomb! 30s lock.");} else {let reward=Math.floor(Math.random()*550)+50; userData.balance+=reward; alert(`💎 Diamond! +${reward} ABP`);}
      saveUserData(); updateUI();
    };
    miningGrid.appendChild(box);
  }
}
createMiningGrid();
setInterval(()=>{miningCounterP.textContent=userData.balance.toFixed(3);},1000);

// Teen Patti Cards
const cardsContainer=document.getElementById("cardsContainer");
const cards=["A","K","Q","J"];
function dealCards(){
  cardsContainer.innerHTML="";
  for(let i=0;i<3;i++){
    const card=document.createElement("div"); card.classList.add("card");
    card.innerHTML="?";
    card.onclick=function(){
      if(card.classList.contains("flipped")) return;
      card.classList.add("flipped");
      const val=cards[Math.floor(Math.random()*4)];
      card.innerHTML=val;
      let reward=0;
      if(val==="A") reward=500;
      else if(val==="K") reward=300;
      else if(val==="Q") reward=200;
      else reward=100;
      userData.balance+=reward; saveUserData(); alert(`Card: ${val} | +${reward} ABP`);
    };
    cardsContainer.appendChild(card);
  }
}
dealCards();

// Referral
function initReferral(){document.getElementById("refLink").textContent=`https://dapp.adamasprotocol.io/?ref=${walletAddress.slice(-6)}`;}

// Update UI
function updateUI(){miningCounterP.textContent=userData.balance.toFixed(3);}
</script>
</body>
</html>
