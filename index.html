<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas Protocol | Mission Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --cyan: #00f2ff; --gold: #ffcc00; --bg: #010812; --glass: rgba(0, 20, 40, 0.7); }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Premium Glows */
        .neon-border { border: 2px solid var(--cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .glass-card { background: var(--glass); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(0, 242, 255, 0.15); }
        
        /* Navigation Styling */
        .nav-item.active { color: var(--cyan); filter: drop-shadow(0 0 8px var(--cyan)); }
        .tab-pane { display: none; animation: slideUp 0.3s ease-out; }
        .tab-pane.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Card Slot Animation */
        .card-slot { width: 70px; height: 100px; background: white; border-radius: 10px; color: black; font-weight: 900; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; border: 3px solid var(--gold); transition: 0.4s; }
        .card-back { background: #0a1a2f; border-color: var(--cyan); color: transparent; transform: rotateY(180deg); }
    </style>
</head>
<body>

<div id="app" class="max-w-[450px] mx-auto min-h-screen px-4 pt-6 pb-32">
    
    <header class="flex flex-col items-center mb-6">
        <div class="w-20 h-20 mb-3 relative flex items-center justify-center">
            <div class="absolute inset-0 border-2 border-cyan-400 rounded-full animate-spin-slow shadow-[0_0_15px_#00f2ff]"></div>
            <span class="orbitron text-3xl font-black text-cyan-400">A</span>
        </div>
        <h1 class="orbitron text-sm font-black tracking-[0.4em] uppercase">ADS MISSION HUB</h1>
        <p class="text-[9px] text-cyan-500 font-bold tracking-widest mt-1 italic">Amoy Testnet Phase</p>
    </header>

    <section class="glass-card p-6 text-center mb-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 p-2 opacity-20"><i data-lucide="info" class="w-4 h-4"></i></div>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3">Status: <span class="text-cyan-400">Amoy Recruit</span></p>
        <div class="orbitron text-4xl font-black text-cyan-400 tracking-tighter mb-2" id="live-balance">0.000</div>
        <div class="flex items-center justify-center gap-2">
            <span class="text-[10px] font-bold text-gray-500 uppercase">Current Balance:</span>
            <span class="text-xs font-black"><span id="total-abp">0</span> ABP</span>
            <span class="text-sm">💎</span>
        </div>
    </section>

    <main>
        <div id="tab-home" class="tab-pane active space-y-4">
            <div class="glass-card p-5 flex items-center justify-between border-l-4 border-green-500">
                <div>
                    <h4 class="text-sm font-bold">Daily Fuel ⛽</h4>
                    <p class="text-[10px] text-gray-500">+50 ABP Daily Reward</p>
                </div>
                <button onclick="claimFuel(this)" class="bg-green-500 text-black px-4 py-2 rounded-lg text-[10px] font-black orbitron uppercase">CLAIM</button>
            </div>

            <div class="glass-card p-5">
                <h4 class="text-sm font-bold mb-4">Link Socials 📡 <span class="text-[9px] text-green-400 ml-2">+500 ABP</span></h4>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="window.open('https://twitter.com/DiamoProtocol')" class="bg-black/40 border border-white/10 py-3 rounded-xl text-[10px] font-bold">FOLLOW ON X</button>
                    <button onclick="window.open('https://t.me/daimodmo')" class="bg-black/40 border border-white/10 py-3 rounded-xl text-[10px] font-bold">JOIN TELEGRAM</button>
                </div>
            </div>

            <div class="glass-card p-6 border-dashed border-cyan-500/30 opacity-80">
                <div class="flex justify-between items-center mb-2">
                    <h4 class="text-sm font-bold text-cyan-400">Intelligence Lab 🧪</h4>
                    <span class="text-[9px] text-orange-400 font-bold" id="iq-timer">10h 53m 49s</span>
                </div>
                <p class="text-[10px] text-gray-500">Analyze network data to earn premium ABP rewards.</p>
                <button disabled class="w-full mt-4 py-3 rounded-xl border border-white/5 text-[10px] font-black text-gray-600">MISSION LOCKED</button>
            </div>
        </div>

        <div id="tab-games" class="tab-pane space-y-6">
            <div class="glass-card p-6">
                <h4 class="orbitron text-[10px] font-bold text-gold mb-4 uppercase">Teen Patti Jackpot</h4>
                <div class="flex justify-center gap-3 mb-6" id="patti-slots">
                    <div class="card-slot card-back">?</div>
                    <div class="card-slot card-back">?</div>
                    <div class="card-slot card-back">?</div>
                </div>
                <button onclick="playPatti()" class="w-full py-4 rounded-xl bg-white text-black orbitron text-[11px] font-black uppercase">Roll Cards (100 ABP)</button>
            </div>

            <div class="glass-card p-6">
                <h4 class="orbitron text-[10px] font-bold text-cyan-400 mb-4 uppercase">Adamas Mines</h4>
                <div id="mines-grid" class="grid grid-cols-4 gap-2 mb-4"></div>
                <button onclick="initMines()" class="w-full py-2 rounded-lg border border-white/10 text-[9px] font-bold text-gray-500">RESET GRID</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-[#010812]/95 backdrop-blur-xl border-t border-cyan-500/20 px-6 py-4 flex justify-between items-center z-50">
        <button onclick="switchTab('home', this)" class="nav-item active flex flex-col items-center gap-1">
            <i data-lucide="home" class="w-5 h-5"></i><span class="text-[8px] font-black">HOME</span>
        </button>
        <button onclick="switchTab('games', this)" class="nav-item flex flex-col items-center gap-1 text-gray-600">
            <i data-lucide="gamepad-2" class="w-5 h-5"></i><span class="text-[8px] font-black">GAMES</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-600">
            <i data-lucide="users" class="w-5 h-5"></i><span class="text-[8px] font-black">SQUAD</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-600">
            <i data-lucide="layout-grid" class="w-5 h-5"></i><span class="text-[8px] font-black">APPS</span>
        </button>
    </nav>
</div>

<script>
    lucide.createIcons();

    // Config & Stats
    let abp = 0, lastFuel = 0;
    const db = firebase.database(); 
    // Note: Add your Wallet Connection Logic here to load/save from DB [cite: 2026-02-26]

    function syncUI() {
        document.getElementById('live-balance').innerText = abp.toFixed(3);
        document.getElementById('total-abp').innerText = Math.floor(abp).toLocaleString();
    }

    function claimFuel(btn) {
        abp += 50;
        btn.innerText = "DONE ✅";
        btn.disabled = true;
        btn.classList.replace('bg-green-500', 'bg-gray-800');
        btn.classList.add('text-green-500');
        syncUI();
    }

    // Teen Patti Logic
    function playPatti() {
        if(abp < 100) return alert("Not enough ABP!");
        abp -= 100; syncUI();
        const slots = document.getElementById('patti-slots');
        slots.innerHTML = '<div class="card-slot card-back">?</div>'.repeat(3);
        
        setTimeout(() => {
            const vals = ['A','K','Q','J','10'];
            const res = [vals[Math.floor(Math.random()*5)], vals[Math.floor(Math.random()*5)], vals[Math.floor(Math.random()*5)]];
            slots.innerHTML = res.map(v => `<div class="card-slot animate-bounce">${v}</div>`).join('');
            if(res[0] === res[1] && res[1] === res[2]) { abp += 1000; alert("Set! +1000 ABP"); }
            syncUI();
        }, 1000);
    }

    // Mines Logic
    function initMines() {
        const grid = document.getElementById('mines-grid');
        grid.innerHTML = '';
        const bomb = Math.floor(Math.random()*16);
        for(let i=0; i<16; i++) {
            const b = document.createElement('button');
            b.className = "aspect-square bg-white/5 border border-white/5 rounded-lg flex items-center justify-center text-xs";
            b.innerText = "?";
            b.onclick = function() {
                if(i === bomb) { this.innerText = "💣"; this.classList.add('bg-red-500/20'); alert("BOOM!"); initMines(); }
                else { this.innerText = "💎"; this.classList.add('bg-green-500/20'); abp += 10; syncUI(); this.disabled = true; }
            };
            grid.appendChild(b);
        }
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'text-gray-600'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.add('text-gray-600'));
        btn.classList.add('active');
        btn.classList.remove('text-gray-600');
    }

    initMines();
</script>
</body>
</html>
