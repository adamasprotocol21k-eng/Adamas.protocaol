<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS Protocol - Decentralized Entertainment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="assets/logo.png" alt="ADAMAS Logo" class="logo">
            <h1>ADAMAS Protocol</h1>
        </div>
        <button id="walletConnect" class="btn-primary">Connect Wallet</button>
    </header>

    <main>
        <section class="balance-card">
            <h3>ABP Point Balance</h3>
            <div class="amount-display">
                <span id="abpBalance">1000.00</span> <small>ABP</small>
            </div>
            <p class="wallet-addr">Wallet: 0x1E12...DADB</p>
        </section>

        <section class="stats-grid">
            <div class="stat-box">
                <p>My Staking</p>
                <strong>4.7520 BFIC</strong>
            </div>
            <div class="stat-box">
                <p>Staking Rewards</p>
                <strong>5.4508 BFIC</strong>
            </div>
        </section>

        <section class="mining-section">
            <div class="mining-status">
                <p>Next Mining Session In</p>
                <div id="timer">15h : 27m : 40s</div>
            </div>
            <button class="btn-stake" onclick="startMining()">Stake Amount</button>
        </section>

        <nav class="action-tabs">
            <button class="tab-btn">Daily Check-in</button>
            <button class="tab-btn">Teen Patti</button>
            <button class="tab-btn">Mime Game</button>
            <button class="tab-btn">Lottery</button>
        </nav>
    </main>

    <footer>
        <div class="social-links">
            <a href="https://t.me/ADSProtocol" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://x.com/AdamasADS" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://t.me/daimodmo" target="_blank"><i class="fas fa-headset"></i></a>
        </div>
        <p>&copy; 2026 ADAMAS Protocol. All Rights Reserved.</p>
    </footer>

    <script src="wallet.js"></script>
    <script src="app.js"></script>
</body>
</html>
