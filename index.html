<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS PROTOCOL | Secure Entry</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <section id="front-view" class="hero-container">
        <div class="diamond-bg-glow"></div>
        <div class="diamond-3d-wrap">
            <div class="diamond-shape"></div>
        </div>

        <div class="content-overlay">
            <h1 class="main-title">ADAMAS <span>PROTOCOL</span></h1>
            <p class="subtitle">THE 21,000 SCARCITY STANDARD</p>
            <button class="enter-btn" onclick="openPortal()">ENTER PROTOCOL</button>
        </div>
    </section>

    <div id="modal-portal" class="portal-overlay">
        <div class="portal-card">
            <h2>PROTOCOL ACCESS</h2>
            <p>Follow our Social Nodes & Connect Wallet to Proceed</p>
            
            <div class="social-links">
                <a href="#" class="social-btn">TELEGRAM</a>
                <a href="#" class="social-btn">X (TWITTER)</a>
            </div>

            <div class="wallet-section">
                <small>IDENTITY PORTAL</small>
                <button id="connectBtn" class="connect-btn" onclick="connectMetaMask()">CONNECT WALLET</button>
                <p id="statusMsg" class="status-text"></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="main.js" type="module"></script>
</body>
</html>
