<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Adamas Protocol | V9 Final 💎</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { 
    --primary: #00d4ff; --secondary: #7000ff; --accent: #00ff88; 
    --bg: #030508; --card-bg: rgba(255, 255, 255, 0.05); --border: rgba(0, 212, 255, 0.2);
}
* { box-sizing: border-box; touch-action: manipulation; }
body { 
    font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; margin: 0; 
    overflow-x: hidden; background-image: radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.1) 0%, transparent 40%);
}
.container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; padding-bottom: 80px; }
.wallet-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
.wallet-pill { background: rgba(0, 212, 255, 0.1); border: 1px solid var(--primary); padding: 6px 15px; border-radius: 50px; font-family: 'Orbitron'; font-size: 0.65rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
.dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

/* DASHBOARD */
.rank-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px 15px; margin-bottom: 25px; backdrop-filter: blur(20px); text-align: center; }
#miningVal { font-family: 'Orbitron'; font-size: 2.2rem; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }

/* MISSIONS */
.mission-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 22px 15px; margin-bottom: 20px; position: relative; }
.step-tag { position: absolute; top: -12px; left: 15px; background: linear-gradient(90deg, var(--secondary), var(--primary)); color: #fff; padding: 3px 12px; border-radius: 6px; font-size: 0.6rem; font-family: 'Orbitron'; }
.reward-pill { float: right; color: var(--accent); padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; border: 1px solid var(--accent); }
.btn-main { background: #000; color: #fff; border: 1px solid var(--primary); padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
.btn-done { background: var(--accent) !important; color: #000 !important; border-color: var(--accent) !important; }
.locked { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

/* SNAKE GAME */
#snakeCanvas { background: #000; border: 1px solid var(--primary); display: block; margin: 10px auto; border-radius: 8px; width: 100%; max-width: 300px; box-shadow: 0 0 15px rgba(0,212,255,0.2); }
.game-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 180px; margin: 0 auto; }
.ctrl-btn { background: rgba(0,212,255,0.1); border: 1px solid var(--primary); color: #fff; padding: 12px; border-radius: 8px; font-size: 0.6rem; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
    <div class="wallet-bar">
        <div class="wallet-pill"><div id="statusDot" class="dot"></div><span id="walletDisp">DISCONNECTED</span></div>
    </div>

    <header style="text-align: center; margin-bottom: 25px;">
        <h1 style="color:var(--primary);">ADAMAS <span style="color:#fff">ADS</span></h1>
        <div style="font-size: 0.6rem; color: #888; letter-spacing: 2px;">AIRDROP MISSION CENTER V9</div>
    </header>

    <div class="mission-box" id="step0">
        <span class="step-tag">STEP 0</span>
        <h3>Activate Amoy Node</h3>
        <button id="connBtn" onclick="smartConnect()" class="btn-main">CONNECT WALLET</button>
    </div>

    <div id="mainContent" class="locked">
        <div class="rank-card">
            <div id="miningVal">0000.000</div>
            <div style="font-weight:bold; color:var(--accent);">BALANCE: <span id="bal">0</span> ABP 💎</div>
        </div>

        <div class="mission-box" id="step1">
            <span class="step-tag">STEP 1</span>
            <span class="reward-pill">+1200 ABP</span>
            <h3>Neural Sync (Socials)</h3>
            <button id="tw_ads" onclick="verify('tw_ads', 300, 'https://twitter.com/DiamoProtocol')" class="btn-main">Follow Diamo Twitter</button>
            <button id="tg_ads" onclick="verify('tg_ads', 300, 'https://t.me/ADSProtocol')" class="btn-main">Join Telegram Channel</button>
            <button id="tw_off" onclick="verify('tw_off', 300, 'https://twitter.com/AdamasADS')" class="btn-main">Follow Adamas Twitter</button>
            <button id="tg_grp" onclick="verify('tg_grp', 300, 'https://t.me/adsprotocolcommunity')" class="btn-main">Community Group</button>
        </div>

        <div class="mission-box">
            <span class="step-tag">MINI-GAME</span>
            <h3>Snake Data Collector</h3>
            <canvas id="snakeCanvas" width="300" height="200"></canvas>
            <div class="game-controls">
                <div></div><button class="ctrl-btn" onclick="changeDir('up')">UP</button><div></div>
                <button class="ctrl-btn" onclick="changeDir('left')">LEFT</button>
                <button class="ctrl-btn" onclick="changeDir('down')">DOWN</button>
                <button class="ctrl-btn" onclick="changeDir('right')">RIGHT</button>
            </div>
        </div>

        <div class="mission-box">
            <span class="step-tag">DAILY QUIZ</span>
            <h3>Intelligence Lab (GS/CA)</h3>
            <div id="quizArea">
                <p id="quesText" style="font-weight:bold; color:var(--primary);"></p>
                <div id="optionsList"></div>
            </div>
        </div>

        <div class="mission-box">
            <span class="step-tag">STEP 4</span>
            <h3>Network Growth</h3>
            <div style="background:#000; padding:10px; border:1px dashed var(--primary); font-size:0.7rem; word-break:break-all;" id="refLink">Link wallet first...</div>
            <button onclick="copyRef()" class="btn-main" style="border-color:var(--accent); color:var(--accent);">COPY INVITE LINK</button>
        </div>
    </div>
</div>

<script>
let abp = 0, userWallet = "", tasks = {tw_ads:false, tg_ads:false, tw_off:false, tg_grp:false};
const AMOY_ID = '0x13882';

// Quiz Data
const quizData = [
    { q: "GST Bharat mein kab lagu hua?", a: "1 July 2017", o: ["1 April 2017", "1 July 2017", "1 Jan 2018"] },
    { q: "Bharat ka pehla AI City kahan ban raha hai?", a: "Lucknow", o: ["Delhi", "Lucknow", "Mumbai"] }
];

async function smartConnect() {
    if (!window.ethereum) { alert("Use MetaMask Mobile!"); return; }
    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userWallet = accs[0];
    document.getElementById('walletDisp').innerText = userWallet.substring(0,6)+"...";
    document.getElementById('statusDot').classList.add('online');
    document.getElementById('step0').style.display = 'none';
    document.getElementById('mainContent').classList.remove('locked');
    load(); loadQuiz(); generateRef();
}

function verify(id, r, url) {
    window.open(url, '_blank');
    setTimeout(() => {
        if(!tasks[id]) {
            tasks[id] = true; abp += r;
            document.getElementById(id).classList.add('btn-done');
            document.getElementById(id).innerText = "SYNCED ✅";
            save(); updateUI();
        }
    }, 3000);
}

function loadQuiz() {
    const today = new Date().toDateString();
    if(localStorage.getItem('lastQ') === today) {
        document.getElementById('quizArea').innerHTML = "Completed for today! ✅"; return;
    }
    const q = quizData[new Date().getDate() % quizData.length];
    document.getElementById('quesText').innerText = q.q;
    document.getElementById('optionsList').innerHTML = q.o.map(opt => `<button class="btn-main" onclick="ans('${opt}','${q.a}')">${opt}</button>`).join('');
}

function ans(u, a) {
    if(u === a) { abp += 500; alert("Correct! +500 ABP"); }
    localStorage.setItem('lastQ', new Date().toDateString());
    loadQuiz(); save(); updateUI();
}

// SNAKE ENGINE
const canvas = document.getElementById('snakeCanvas');
const ctx = canvas.getContext('2d');
let snake = [{x: 150, y: 100}], food = {x: 80, y: 80}, dx = 10, dy = 0;

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 300, 200);
    ctx.fillStyle = '#00ff88'; ctx.fillRect(food.x, food.y, 10, 10);
    ctx.fillStyle = '#00d4ff'; snake.forEach(p => ctx.fillRect(p.x, p.y, 10, 10));
    let head = {x: snake[0].x + dx, y: snake[0].y + dy};
    snake.unshift(head);
    if(head.x === food.x && head.y === food.y) {
        abp += 5; food = {x: Math.floor(Math.random()*29)*10, y: Math.floor(Math.random()*19)*10};
    } else { snake.pop(); }
    if(head.x<0 || head.x>=300 || head.y<0 || head.y>=200) snake = [{x: 150, y: 100}];
    updateUI();
}
function changeDir(d) {
    if(d==='up' && dy===0){dx=0; dy=-10}
    if(d==='down' && dy===0){dx=0; dy=10}
    if(d==='left' && dx===0){dx=-10; dy=0}
    if(d==='right' && dx===0){dx=10; dy=0}
}
setInterval(draw, 150);

function generateRef() { document.getElementById('refLink').innerText = window.location.origin + "?ref=" + userWallet.substring(2,10); }
function copyRef() { navigator.clipboard.writeText(document.getElementById('refLink').innerText); alert("Link Copied!"); }
function updateUI() {
    document.getElementById('bal').innerText = Math.floor(abp).toLocaleString();
    document.getElementById('miningVal').innerText = abp.toFixed(3);
}
function save() { localStorage.setItem('ads_v9_final', JSON.stringify({abp, tasks})); }
function load() {
    let d = JSON.parse(localStorage.getItem('ads_v9_final'));
    if(d) { abp = d.abp; tasks = d.tasks || tasks; 
        Object.keys(tasks).forEach(k => { if(tasks[k]) { document.getElementById(k).classList.add('btn-done'); document.getElementById(k).innerText="SYNCED ✅"; }});
    }
}
</script>
</body>
</html>
