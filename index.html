<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Quantum Node Infrastructure</title>
    <style>
        :root { --cyan: #00f2ff; --cyan-glow: rgba(0, 242, 255, 0.4); --p-green: #adff2f; --glass: rgba(255, 255, 255, 0.03); }
        
        body { background: #000; color: #fff; margin: 0; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .app-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }

        /* Wallet Button - Fixed & Glowing */
        #top-wallet-box { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 40px; }
        .wallet-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 8px 15px; border-radius: 10px;
            font-size: 10px; cursor: pointer; box-shadow: 0 0 15px var(--cyan-glow);
        }

        /* Sections Toggle */
        section { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; text-align: center; }
        section.active-phase { display: flex; animation: fadeIn 0.5s ease-out; }

        /* Phase 1: Landing Style */
        .main-logo { 
            font-size: 3.5rem; font-weight: 900; margin-top: 20%;
            background: linear-gradient(180deg, #fff, var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--cyan-glow)); letter-spacing: 5px;
        }
        .sub-text { color: var(--cyan); font-size: 12px; letter-spacing: 3px; margin-top: -10px; margin-bottom: 30px; }

        /* Phase 2: Systematic Task Cards */
        .page-title { color: var(--p-green); font-size: 1.5rem; margin-bottom: 5px; text-transform: uppercase; }
        .page-desc { color: #666; font-size: 11px; margin-bottom: 30px; letter-spacing: 1px; }

        .task-list { width: 100%; display: flex; flex-direction: column; gap: 18px; } /* Space between cards */
        
        .task-card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08);
            padding: 18px 20px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .task-info { text-align: left; }
        .task-name { font-size: 11px; color: #eee; display: block; margin-bottom: 4px; }
        .task-reward { font-size: 10px; color: var(--p-green); font-weight: bold; }

        .status-pill { 
            font-size: 10px; background: transparent; padding: 8px 18px; 
            border-radius: 8px; color: var(--cyan); border: 1px solid var(--cyan);
            cursor: pointer; min-width: 80px; transition: 0.3s;
        }
        .status-pill.verify-mode { background: #ffcc00; color: #000; border-color: #ffcc00; font-weight: bold; }
        .task-card.verified { border-color: var(--p-green); background: rgba(173,255,47,0.04); }

        /* Action Buttons */
        .btn-action { 
            background: var(--cyan); color: #000; padding: 18px; border-radius: 12px;
            width: 100%; margin-top: 35px; font-weight: bold; border: none;
            cursor: pointer; box-shadow: 0 0 20px var(--cyan-glow);
        }
        .locked { opacity: 0.2; pointer-events: none; filter: grayscale(1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="top-wallet-box">
            <button id="connect-trigger" class="wallet-btn" onclick="handleEntry()">CONNECT WALLET</button>
        </div>

        <section id="phase-intro" class="active-phase">
            <h1 class="main-logo">ADAMAS</h1>
            <div class="sub-text">ADAMAS_PROTOCOL_V2</div>
            <p style="font-size: 11px; color: #aaa; line-height: 1.6; margin-bottom: 40px;">QUANTUM NODE INFRASTRUCTURE<br>TESTNET ECOSYSTEM</p>
            <button class="btn-action" onclick="handleEntry()">DEPLOY NODE ENGINE</button>
        </section>

        <section id="phase-social">
            <h2 class="page-title">NODE VERIFICATION</h2>
            <p class="page-desc">Follow all channels to verify your node address.</p>

            <div class="task-list">
                <div class="task-card" id="card-t1">
                    <div class="task-info">
                        <span class="task-name">TELEGRAM CHANNEL</span>
                        <span class="task-reward">+200 ABP</span>
                    </div>
                    <div id="pill-t1" class="status-pill" onclick="handleTaskAction('t1', 'https://t.me/ADSProtocol')">FOLLOW</div>
                </div>

                <div class="task-card" id="card-t2">
                    <div class="task-info">
                        <span class="task-name">TELEGRAM GROUP</span>
                        <span class="task-reward">+200 ABP</span>
                    </div>
                    <div id="pill-t2" class="status-pill" onclick="handleTaskAction('t2', 'https://t.me/adsprotocolcommunity')">FOLLOW</div>
                </div>

                <div class="task-card" id="card-t3">
                    <div class="task-info">
                        <span class="task-name">FOLLOW X @DIAMO</span>
                        <span class="task-reward">+200 ABP</span>
                    </div>
                    <div id="pill-t3" class="status-pill" onclick="handleTaskAction('t3', 'https://x.com/DiamoProtocol')">FOLLOW</div>
                </div>

                <div class="task-card" id="card-t4">
                    <div class="task-info">
                        <span class="task-name">FOLLOW X @ADAMAS</span>
                        <span class="task-reward">+200 ABP</span>
                    </div>
                    <div id="pill-t4" class="status-pill" onclick="handleTaskAction('t4', 'https://x.com/AdamasADS')">FOLLOW</div>
                </div>
            </div>

            <button id="final-btn" class="btn-action locked" onclick="finalRegistration()">UNLOCK DASHBOARD</button>
            <p id="lock-msg" style="font-size: 10px; color: #ff4444; margin-top: 15px;">4 SYNCS REQUIRED</p>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script> 

    <script>
        let activeWallet = null;
        let taskStates = JSON.parse(localStorage.getItem('adamas_tasks')) || { t1:'init', t2:'init', t3:'init', t4:'init' };

        window.onload = function() {
            // Safe logic for Landing vs Social
            const savedUser = localStorage.getItem('adamas_user');
            const sessionWallet = sessionStorage.getItem('active_session_wallet');

            if(savedUser) { window.location.href = "dashboard.html"; return; }

            if(sessionWallet) {
                activeWallet = sessionWallet;
                updateWalletUI();
                switchToSocial();
                syncUI();
            }
        };

        async function handleEntry() {
            if (!window.ethereum) return alert("Please use Trust/MetaMask browser.");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                activeWallet = accounts[0].toLowerCase();
                sessionStorage.setItem('active_session_wallet', activeWallet);
                updateWalletUI();

                const snapshot = await db.ref('users/' + activeWallet).once('value');
                if(snapshot.exists()) {
                    localStorage.setItem('adamas_user', activeWallet);
                    window.location.href = "dashboard.html";
                } else {
                    switchToSocial();
                }
            } catch (e) { console.log(e); }
        }

        function switchToSocial() {
            document.getElementById('phase-intro').classList.remove('active-phase');
            document.getElementById('phase-social').classList.add('active-phase');
        }

        function updateWalletUI() {
            document.getElementById('connect-trigger').innerText = activeWallet.substring(0,6) + "..." + activeWallet.slice(-4);
        }

        function handleTaskAction(id, link) {
            const pill = document.getElementById('pill-' + id);
            if(taskStates[id] === 'init') {
                window.open(link, '_blank');
                taskStates[id] = 'awaiting';
                pill.innerText = "VERIFY";
                pill.classList.add('verify-mode');
                save();
            } else if(taskStates[id] === 'awaiting') {
                pill.style.pointerEvents = 'none';
                let sec = 12;
                const timer = setInterval(() => {
                    sec--;
                    pill.innerText = sec + "S";
                    if(sec <= 0) {
                        clearInterval(timer);
                        taskStates[id] = 'verified';
                        markVerified(id);
                        save();
                        checkUnlock();
                    }
                }, 1000);
            }
        }

        function syncUI() {
            Object.keys(taskStates).forEach(id => {
                if(taskStates[id] === 'awaiting') {
                    const pill = document.getElementById('pill-' + id);
                    pill.innerText = "VERIFY"; pill.classList.add('verify-mode');
                } else if(taskStates[id] === 'verified') {
                    markVerified(id);
                }
            });
            checkUnlock();
        }

        function markVerified(id) {
            const pill = document.getElementById('pill-' + id);
            const card = document.getElementById('card-' + id);
            pill.innerText = "DONE"; 
            pill.style.borderColor = "var(--p-green)";
            pill.style.color = "var(--p-green)";
            card.classList.add('verified');
        }

        function save() { localStorage.setItem('adamas_tasks', JSON.stringify(taskStates)); }

        function checkUnlock() {
            const verifiedCount = Object.values(taskStates).filter(s => s === 'verified').length;
            if(verifiedCount >= 4) {
                document.getElementById('final-btn').classList.remove('locked');
                document.getElementById('lock-msg').innerText = "NODE READY";
                document.getElementById('lock-msg').style.color = "var(--p-green)";
            }
        }

        async function finalRegistration() {
            // (Same Firebase Registration Logic as discussed)
            try {
                const ref = localStorage.getItem('adamas_referrer') || "DIRECT";
                await db.ref('users/' + activeWallet).set({
                    balance: 800, wallet: activeWallet, referredBy: ref,
                    referralCount: 0, joinedAt: new Date().toISOString()
                });
                localStorage.setItem('adamas_user', activeWallet);
                window.location.href = "dashboard.html";
            } catch (e) { alert("Error"); }
        }
    </script>
</body>
</html>
