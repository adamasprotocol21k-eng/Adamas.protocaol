<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamo Protocol | VIP Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .diamond-glow {
            box-shadow: 0 0 30px rgba(234, 179, 8, 0.15);
        }
        .mining-animate {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* Mobile container styling */
        .app-container {
            max-width: 450px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 100px;
        }
    </style>
</head>
<body>

    <div class="app-container p-5">
        <div class="absolute top-0 left-0 w-full h-64 bg-yellow-600/10 blur-[100px] -z-10"></div>

        <header class="flex justify-between items-center py-4">
            <div class="flex items-center gap-2">
                <div class="bg-gradient-to-tr from-yellow-500 to-yellow-200 p-2 rounded-xl">
                    <i data-lucide="diamond" class="text-black w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter italic">DIAMO</h1>
            </div>
            <button onclick="connectWallet()" id="walletBtn" class="glass px-4 py-2 rounded-2xl text-[10px] font-bold tracking-widest border border-white/10 hover:bg-white/10 transition-all">
                CONNECT WALLET
            </button>
        </header>

        <section class="mt-8 relative">
            <div class="glass p-8 rounded-[35px] text-center border-white/10 diamond-glow">
                <p class="text-[10px] uppercase tracking-[0.3em] text-yellow-500/70 font-bold mb-3">Portfolio Balance</p>
                <div class="flex justify-center items-end gap-2">
                    <span id="balance" class="text-5xl font-black tracking-tighter">0</span>
                    <span class="text-yellow-500 font-bold mb-1">ABP</span>
                </div>
                
                <div class="mt-8">
                    <button id="miningBtn" onclick="toggleMining()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black text-sm uppercase tracking-[0.1em] shadow-lg shadow-yellow-500/20 active:scale-95 transition-all">
                        START MINING
                    </button>
                </div>
            </div>
        </section>

        <div class="flex gap-3 mt-4">
            <div class="glass flex-1 p-4 rounded-3xl text-center">
                <i data-lucide="flame" class="mx-auto text-orange-500 mb-1 w-5 h-5"></i>
                <p class="text-[10px] text-gray-400 font-bold">STREAK</p>
                <p class="text-sm font-black">1 DAY</p>
            </div>
            <div class="glass flex-1 p-4 rounded-3xl text-center">
                <i data-lucide="users" class="mx-auto text-blue-500 mb-1 w-5 h-5"></i>
                <p class="text-[10px] text-gray-400 font-bold">TEAM</p>
                <p class="text-sm font-black">0</p>
            </div>
        </div>

        <h2 class="mt-8 mb-4 text-[11px] font-black tracking-widest text-gray-500 uppercase">Premium Hub</h2>
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-5 rounded-[28px] active:scale-95 transition-all cursor-pointer border border-white/5">
                <i data-lucide="gamepad-2" class="text-purple-400 mb-3 w-6 h-6"></i>
                <p class="text-[11px] font-black uppercase tracking-tighter">Teen Patti</p>
                <p class="text-[9px] text-gray-500">Play & Earn</p>
            </div>
            <div class="glass p-5 rounded-[28px] active:scale-95 transition-all cursor-pointer border border-white/5">
                <i data-lucide="zap" class="text-yellow-400 mb-3 w-6 h-6"></i>
                <p class="text-[11px] font-black uppercase tracking-tighter">Staking</p>
                <p class="text-[9px] text-gray-500">APY 12%</p>
            </div>
            <div class="glass p-5 rounded-[28px] active:scale-95 transition-all cursor-pointer border border-white/5">
                <i data-lucide="trophy" class="text-orange-400 mb-3 w-6 h-6"></i>
                <p class="text-[11px] font-black uppercase tracking-tighter">Lottery</p>
                <p class="text-[9px] text-gray-500">Big Win</p>
            </div>
            <div class="glass p-5 rounded-[28px] active:scale-95 transition-all cursor-pointer border border-white/5">
                <i data-lucide="gift" class="text-green-400 mb-3 w-6 h-6"></i>
                <p class="text-[11px] font-black uppercase tracking-tighter">Airdrop</p>
                <p class="text-[9px] text-gray-500">Follow Gate</p>
            </div>
        </div>

        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] glass py-4 px-8 rounded-full flex justify-between items-center shadow-2xl z-50 border border-white/10">
            <i data-lucide="home" class="w-5 h-5 text-yellow-500"></i>
            <i data-lucide="layout-grid" class="w-5 h-5 text-gray-500"></i>
            <div class="bg-yellow-500 p-3 rounded-full -mt-12 border-[6px] border-[#050505] shadow-xl">
                <i data-lucide="diamond" class="w-6 h-6 text-black"></i>
            </div>
            <i data-lucide="share-2" class="w-5 h-5 text-gray-500"></i>
            <i data-lucide="user" class="w-5 h-5 text-gray-500"></i>
        </nav>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        let balance = 0;
        let isMining = false;
        let interval;

        function toggleMining() {
            const btn = document.getElementById('miningBtn');
            const balanceEl = document.getElementById('balance');

            if (!isMining) {
                isMining = true;
                btn.innerHTML = "MINING...";
                btn.classList.add('mining-animate');
                btn.classList.replace('bg-yellow-500', 'bg-red-500/20');
                btn.classList.add('text-red-500', 'border', 'border-red-500/50');

                interval = setInterval(() => {
                    balance += 1;
                    balanceEl.innerText = balance.toLocaleString();
                }, 1000);
            } else {
                isMining = false;
                clearInterval(interval);
                btn.innerHTML = "START MINING";
                btn.classList.remove('mining-animate');
                btn.classList.replace('bg-red-500/20', 'bg-yellow-500');
                btn.classList.remove('text-red-500', 'border', 'border-red-500/50');
                btn.classList.add('text-black');
            }
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('walletBtn').innerText = accounts[0].slice(0, 6) + "..." + accounts[0].slice(-4);
                } catch (err) {
                    alert("Connection failed");
                }
            } else {
                alert("Please install MetaMask!");
            }
        }
    </script>
</body>
</html>
