<!<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADS Protocol | The Cyber Quest ⚔️</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --neon-blue:#00d4ff; --neon-green:#00ff88; --dark-space:#05070a; --glass: rgba(255,255,255,0.03);
}
body{
    font-family:'Rajdhani', sans-serif; background:var(--dark-space); color:#fff; margin:0; 
    background-image: linear-gradient(to bottom, #001122, #05070a);
    min-height: 100vh; overflow-x:hidden;
}
.adventure-container{ width:90%; max-width:600px; margin: 0 auto; padding: 20px; }

/* Glowing Logo Area */
.header-quest{ margin: 30px 0; text-align: center; }
.rank-badge{ 
    display: inline-block; padding: 5px 15px; border-radius: 20px; background: var(--neon-blue);
    color: #000; font-family: 'Orbitron'; font-weight: 700; font-size: 0.7rem; box-shadow: 0 0 15px var(--neon-blue);
}

/* Quest Cards */
.quest-card{ 
    background: var(--glass); border: 1px solid rgba(0,212,255,0.1); border-radius: 20px;
    padding: 25px; margin-bottom: 25px; position: relative; transition: 0.4s; backdrop-filter: blur(10px);
}
.quest-card:hover{ border-color: var(--neon-blue); transform: scale(1.02); box-shadow: 0 0 20px rgba(0,212,255,0.1); }
.locked{ opacity: 0.3; filter: grayscale(1); pointer-events: none; }

/* Mining Pulse */
#liveXP{ font-family: 'Orbitron'; font-size: 2.5rem; color: var(--neon-blue); margin: 15px 0; letter-spacing: 2px; }

/* Tomorrow's Countdown Hook */
.countdown-box{ 
    background: rgba(255,165,0,0.1); border: 1px solid orange; padding: 15px; 
    border-radius: 12px; margin-top: 15px; display: none; color: orange; font-weight: 700;
}

/* Action Buttons */
.btn-action{
    background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue);
    padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron';
    font-size: 0.8rem; transition: 0.3s; margin-top: 10px;
}
.btn-action:hover{ background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
.btn-claimed{ border-color: var(--neon-green); color: var(--neon-green); pointer-events: none; }

.quest-icon{ font-size: 1.5rem; margin-bottom: 10px; display: block; }
</style>
</head>
<body>

<div class="adventure-container">
    <div class="header-quest">
        <div class="rank-badge" id="rankBadge">RECRUIT LEVEL 1</div>
        <h1 style="font-family:'Orbitron'; margin:10px 0; font-size:1.5rem;">ADS PROTOCOL <span style="color:var(--neon-blue);">QUEST</span></h1>
    </div>

    <div class="quest-card" id="miningCard">
        <span class="quest-icon">⚡</span>
        <div id="liveXP">0000.00</div>
        <div style="font-size:1.2rem; font-weight:700; color:var(--neon-green);">TOTAL XP: <span id="balanceDisplay">0</span></div>
        <div style="font-size:0.7rem; color:#666; margin-top:5px;">NEXT LEVEL AT 5,000 XP</div>
    </div>

    <div class="quest-card" id="socialQuest">
        <span class="quest-icon">🌐</span>
        <h3>Mission: Establish Comm-Link</h3>
        <p style="font-size:0.8rem; color:#aaa;">Synchronize your digital footprint with the ADS mainframe.</p>
        <button id="twBtn" onclick="runMission('twitter', 1000)" class="btn-action">LINK X (TWITTER)</button>
        <button id="tgBtn" onclick="runMission('telegram', 1500)" class="btn-action">LINK TELEGRAM</button>
    </div>

    <div class="quest-card locked" id="quizQuest">
        <span class="quest-icon">🧠</span>
        <h3>Daily Intelligence Scan</h3>
        <div id="quizArea">
            <p id="qText" style="font-size:0.9rem; color:#00d4ff;">Analyzing neural pathways...</p>
            <div id="qOptions"></div>
        </div>
        <div id="nextMissionCounter" class="countdown-box">
            MISSION COMPLETE. NEXT SCAN IN: <span id="timer">00:00:00</span>
        </div>
    </div>

    <button id="connectBtn" onclick="initQuest()" class="btn-action" style="background:var(--neon-blue); color:#000;">INITIALIZE CONNECTION 🦊</button>
</div>

<script>
let xp = 0, missions = { twitter:false, telegram:false }, lastQuiz = null;
const accountId = "ads_quest_user_";

function initQuest() {
    if(window.ethereum) {
        window.ethereum.request({method:'eth_requestAccounts'}).then(res => {
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('socialQuest').classList.remove('locked');
            loadQuestData(res[0]);
            startPulse();
        });
    }
}

function runMission(type, reward) {
    let btn = document.getElementById(type === 'twitter' ? 'twBtn' : 'tgBtn');
    btn.innerText = "SYNCHRONIZING...";
    btn.style.borderColor = "gold";
    
    // Fake server-side sync feel
    setTimeout(() => {
        missions[type] = true;
        xp += reward;
        btn.innerHTML = "MISSION SUCCESS + " + reward + " XP";
        btn.classList.add('btn-claimed');
        checkUnlockNext();
        saveQuestData();
        updateUI();
    }, 3000);
}

function checkUnlockNext() {
    if(missions.twitter && missions.telegram) {
        document.getElementById('quizQuest').classList.remove('locked');
        loadQuizMission();
    }
}

function loadQuizMission() {
    const today = new Date().toDateString();
    const qArea = document.getElementById('quizArea');
    const cBox = document.getElementById('nextMissionCounter');

    if(lastQuiz === today) {
        qArea.style.display = 'none';
        cBox.style.display = 'block';
        startCountdown();
        return;
    }

    const questList = [
        { q: "Is ADS Protocol a Decentralized Network?", a: "YES", o: ["YES", "NO", "MAYBE"] },
        { q: "What is the primary goal of our mining hub?", a: "XP GAIN", o: ["GAMING", "XP GAIN", "BROWSING"] }
    ];
    let pick = questList[Math.floor(Math.random()*questList.length)];
    document.getElementById('qText').innerText = pick.q;
    document.getElementById('qOptions').innerHTML = pick.o.map(opt => 
        `<button class="btn-action" onclick="finishQuiz('${opt}', '${pick.a}')">${opt}</button>`).join('');
}

function finishQuiz(ans, correct) {
    lastQuiz = new Date().toDateString();
    if(ans === correct) {
        xp += 500;
        alert("CRITICAL HIT! +500 XP Added.");
    } else {
        alert("MISSION FAILED. System Locked until Tomorrow.");
    }
    saveQuestData();
    updateUI();
    loadQuizMission();
}

function startCountdown() {
    setInterval(() => {
        const now = new Date();
        const tomorrow = new Date();
        tomorrow.setHours(24,0,0,0);
        const diff = tomorrow - now;
        const h = Math.floor(diff/3600000);
        const m = Math.floor((diff%3600000)/60000);
        const s = Math.floor((diff%60000)/1000);
        document.getElementById('timer').innerText = `${h}h ${m}m ${s}s`;
    }, 1000);
}

function startPulse() {
    setInterval(() => {
        if(missions.twitter && missions.telegram) {
            document.getElementById('liveXP').innerText = (xp + Math.random()).toFixed(2);
        }
    }, 100);
}

function saveQuestData() {
    localStorage.setItem(accountId, JSON.stringify({ xp, missions, lastQuiz }));
}

function loadQuestData() {
    const data = JSON.parse(localStorage.getItem(accountId));
    if(data) {
        xp = data.xp; missions = data.missions; lastQuiz = data.lastQuiz;
        if(missions.twitter) { document.getElementById('twBtn').classList.add('btn-claimed'); document.getElementById('twBtn').innerText="SYNCED"; }
        if(missions.telegram) { document.getElementById('tgBtn').classList.add('btn-claimed'); document.getElementById('tgBtn').innerText="SYNCED"; }
        checkUnlockNext();
        updateUI();
    }
}

function updateUI() {
    document.getElementById('balanceDisplay').innerText = xp.toLocaleString();
    if(xp > 5000) document.getElementById('rankBadge').innerText = "ELITE PIONEER LVL 2";
}
</script>
</body>
</html>
