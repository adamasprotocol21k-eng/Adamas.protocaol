<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adamas Protocol Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">💎 Adamas Protocol</div>
    <div class="wallet-connect">
      <span id="wallet-address">Connect Wallet</span>
      <button id="connect-btn">Connect</button>
    </div>
  </header>

  <!-- Dashboard Sections -->
  <main class="dashboard">

    <!-- ABP Points -->
    <section class="abp-section">
      <h2>💎 ABP Balance</h2>
      <div id="abp-balance">0</div>
    </section>

    <!-- Daily Fuel -->
    <section class="daily-fuel">
      <h3>STEP 1 — Daily Fuel</h3>
      <button id="daily-claim">Claim +50 ABP</button>
    </section>

    <!-- Social Tasks -->
    <section class="social-tasks">
      <h3>STEP 2 — Telegram & X</h3>
      <button id="join-telegram">Join Telegram</button>
      <button id="follow-x">Follow on X</button>
    </section>

    <!-- Intelligence Lab / Missions -->
    <section class="missions">
      <h3>STEP 3 — Intelligence Lab</h3>
      <div id="next-mission">Next mission in 23:59:42</div>
    </section>

    <!-- Game Tabs -->
    <section class="games-tab">
      <h2>🎮 Games</h2>
      <div class="games-container">
        <div class="game-card" id="teen-patti">🥇 Teen Patti <button>Play</button></div>
        <div class="game-card" id="diamond-mines">💎 Diamond Mines <button>Play</button></div>
      </div>
    </section>

    <section class="lottery-tab">
      <h2
