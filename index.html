<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS PROTOCOL | The Digital Diamond</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow-overlay"></div>

    <section class="hero-section">
        <div class="container">
            <div class="diamond-wrapper">
                <div class="main-logo pulse">
                    <img src="assets/logo.png" alt="ADS" onerror="this.style.display='none'">
                    <div class="fallback-logo">ADS</div>
                </div>
            </div>

            <h1 class="glitch-text" data-text="ADAMAS PROTOCOL">ADAMAS PROTOCOL</h1>
            <p class="tagline">Gold is heavy. Diamonds are Forever.</p>
            
            <div class="stats-ticker">
                <div class="stat-item"><span>SUPPLY:</span> 21,000 (Final)</div>
                <div class="stat-item"><span>NETWORK:</span> Polygon Amoy</div>
            </div>

            <div class="action-box">
                <p class="mission-text">Mining the world's scarcest digital asset. Limited seats in the 21,000 club.</p>
                <button id="connectBtn" class="btn-primary-glow">CLAIM YOUR DESTINY</button>
            </div>
        </div>
    </section>

    <div id="authModal" class="modal">
        <div class="modal-content glass">
            <h3>PROTOCOL ACCESS</h3>
            <p>Connect your wallet and verify social tasks to enter the mining hub.</p>
            <div id="walletInfo"></div>
            <button id="verifyBtn" class="btn-secondary">VERIFY & ENTER</button>
        </div>
    </div>

    <script src="js/web3.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
