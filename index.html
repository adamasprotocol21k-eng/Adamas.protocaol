<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas | The Digital Diamond</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700&display=swap" rel="stylesheet">
</head>
<body class="entry-page">

    <div class="glow-layer"></div>

    <section class="hero-container" id="hero">
        <div class="diamond-logo-3d">💎</div>
        <h1 class="brand-name">ADAMAS</h1>
        <p class="tagline">Mining the future on Polygon Amoy</p>
        <button id="connectBtn" class="btn-primary" onclick="handleAuth()">CONNECT WALLET</button>
    </section>

    <div id="socialModal" class="modal-overlay">
        <div class="modal-card glass-effect">
            <h2>COMMUNITY LOCK</h2>
            <p>Verify your profile to unlock $ADS Mining.</p>
            
            <div class="task-list">
                <a href="https://x.com/adamas" target="_blank" class="task-item" onclick="taskDone('x')">
                    <span>Follow on X</span>
                    <span id="x-status">❌</span>
                </a>
                <a href="https://t.me/adamas" target="_blank" class="task-item" onclick="taskDone('tg')">
                    <span>Join Telegram</span>
                    <span id="tg-status">❌</span>
                </a>
            </div>

            <button id="verifyBtn" class="btn-disabled" disabled onclick="enterDashboard()">VERIFY & ENTER</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
