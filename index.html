<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Adamas Protocol</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

</head>

<body>

<div class="layout">

<!-- Sidebar -->

<div class="sidebar">

<h2>💎 ADAMAS</h2>

<ul>

<li onclick="openTab('dashboard')">🏠 Dashboard</li>

<li onclick="openTab('airdrop')">🎁 Airdrop</li>

<li onclick="openTab('games')">🎮 Games</li>

<li onclick="openTab('lottery')">🎰 Lottery</li>

<li onclick="openTab('leaderboard')">🏆 Leaderboard</li>

<li onclick="openTab('profile')">👤 Profile</li>

</ul>

</div>

<!-- Main Content -->

<div class="main">

<div class="topbar">

<button id="connectBtn">🔗 Connect Wallet</button>

<p id="walletAddress"></p>

</div>

<!-- Dashboard -->

<div id="dashboard" class="tab">

<h1>🚀 Welcome to Adamas Protocol</h1>

<div class="diamondBox">

<h3>💎 ABP Points</h3>

<div class="diamond">

<span id="points">0</span>

</div>

</div>

</div>

<!-- Airdrop -->

<div id="airdrop" class="tab hidden">

<h1>🎁 Airdrop Center</h1>

<button onclick="dailyCheckin()">Daily Check-In</button>

<p id="checkinStatus"></p>

</div>

<!-- Games -->

<div id="games" class="tab hidden">

<h1>🎮 Gaming Arena</h1>

<button onclick="playGame()">Play Mini Game</button>

</div>

<!-- Lottery -->

<div id="lottery" class="tab hidden">

<h1>🎰 Spin Lottery</h1>

<button onclick="spinLottery()">Spin</button>

<p id="lotteryResult"></p>

</div>

<!-- Leaderboard -->

<div id="leaderboard" class="tab hidden">

<h1>🏆 Leaderboard</h1>

<ul id="leaderboardList">

<li>Loading...</li>

</ul>

</div>

<!-- Profile -->

<div id="profile" class="tab hidden">

<h1>👤 User Profile</h1>

<p>Wallet:</p>

<p id="profileWallet"></p>

</div>

</div>

</div>

<script src="config.js"></script>

<script src="app.js"></script>

</body>

</html>
