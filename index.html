<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS Protocol | High-End Crypto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body class="bg-main">

    <div id="maintenance-screen" class="hidden">
        <div class="maintenance-content">
            <h1>System Upgrade 🛠️</h1>
            <p>Polishing the Diamonds. Back soon!</p>
        </div>
    </div>

    <nav class="glass-nav">
        <div class="logo">
            <img src="assets/logo.png" alt="💎" class="logo-img">
            <span>ADAMAS</span>
        </div>
        <button id="walletBtn" class="premium-btn" onclick="connectWallet()">
            <i data-lucide="wallet"></i> Connect Wallet
        </button>
    </nav>

    <main class="container">
        <section class="card-abp fade-in">
            <p>Total Balance</p>
            <div class="balance-display">
                <span id="abpBalance">0.00</span> <small>ABP</small>
            </div>
        </section>

        <section class="reward-section glass-card">
            <h3>Daily Rewards 🎁</h3>
            <div class="checkin-container">
                <p id="checkinStatus">Day 1: 50 ABP Ready</p>
                <button id="checkInBtn" class="premium-btn gold-btn" onclick="handleDailyCheckIn()">
                    <i data-lucide="calendar-check"></i> Check-In Today
                </button>
            </div>
        </section>

        <section class="action-grid">
            <button class="action-btn claim-btn" onclick="processClaim()">
                <i data-lucide="download"></i> Claim Rewards
            </button>
            <button class="action-btn stake-btn" onclick="openStaking()">
                <i data-lucide="layers"></i> Staking Pool
            </button>
        </section>

        <div class="features-grid">
            <div class="feature-item" onclick="playTeenPatti()">
                <i data-lucide="gamepad-2"></i>
                <p>Games</p>
            </div>
            <div class="feature-item" onclick="buyTicket()">
                <i data-lucide="ticket"></i>
                <p>Lottery</p>
            </div>
            <div class="feature-item" onclick="openKnowledge()">
                <i data-lucide="book-open"></i>
                <p>Knowledge</p>
            </div>
            <div class="feature-item" onclick="openReferral()">
                <i data-lucide="users"></i>
                <p>Referral</p>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="firebase.js" type="module"></script>
    <script src="app.js" type="module"></script>
    <script src="games.js" type="module"></script>
    <script src="lottery.js" type="module"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
