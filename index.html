<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADS Protocol | Elite Rewards Hub 💎</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#00d4ff; --secondary:#0a0e17; --card-bg: rgba(22,27,38,0.7); --text:#fff; --success:#28a745; --danger:#dc3545; --disabled:#555;
}
body{font-family:'Poppins',sans-serif;background:#0a0e17;color:var(--text);margin:0; text-align:center; overflow-x:hidden;}
.main-container{width:90%; max-width:1000px; margin: 0 auto; padding: 20px;}
.navbar{display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:20px;}
.logo-placeholder{height:50px; width:50px; border-radius:50%; background:linear-gradient(45deg, #00d4ff, #0055ff); display:flex; align-items:center; justify-content:center; font-weight:700; border:2px solid var(--primary); box-shadow: 0 0 15px var(--primary);}
.card{background:var(--card-bg); backdrop-filter:blur(10px); padding:25px; border-radius:20px; border:1px solid rgba(255,255,255,0.05); margin-bottom:20px;}
.btn-primary{background:linear-gradient(90deg,#00d4ff,#0055ff); color:#fff; border:none; padding:12px 24px; border-radius:10px; cursor:pointer; font-weight:600; transition:0.3s;}
.btn-secondary{background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--primary); padding:12px; border-radius:10px; width:100%; margin:10px 0; cursor:pointer; font-weight:600; display:inline-block; text-decoration:none; box-sizing:border-box;}
.highlight{color:var(--primary); font-size:2.5em; font-weight:700; margin:10px 0;}
.disabled{opacity:0.4; cursor:not-allowed; pointer-events:none; border-color:var(--disabled)!important;}
.reward-box{background:linear-gradient(45deg, #1a1a2e, #16213e); padding:15px; border-radius:15px; border:1px dashed var(--primary); margin-top:15px;}
.streak-container{display:flex; justify-content:space-between; gap:5px; margin-top:15px;}
.day-box{flex:1; background:rgba(255,255,255,0.05); border:1px solid #333; padding:5px; border-radius:8px; font-size:0.8em;}
.day-box.claimed{background:var(--success); color:#fff; border:none;}
.ref-box{background:#000; padding:10px; border-radius:10px; border:1px solid #333; margin-top:10px; font-size:0.8em; word-break:break-all;}
</style>
</head>
<body>

<div class="main-container">
    <nav class="navbar">
        <div class="logo-section" style="display:flex; align-items:center; gap:10px;">
            <div class="logo-placeholder">ADS</div>
            <h1>ADS Protocol ✨</h1>
        </div>
        <button id="connectWallet" class="btn-primary">Connect Wallet 🦊</button>
    </nav>

    <div class="card disabled" id="referralSection">
        <h3>Invite & Earn 🤝</h3>
        <p>Har referral par paayein <span style="color:var(--success);">+500 ABP</span></p>
        <div class="ref-box" id="refLinkDisplay">Connect wallet to get link</div>
        <button onclick="copyRef()" class="btn-primary" style="margin-top:10px; padding:8px 15px; font-size:0.9em;">Copy Link</button>
    </div>

    <div class="card disabled" id="streakSection">
        <h3>Daily Check-in 📅</h3>
        <div class="streak-container" id="streakContainer">
            <div class="day-box" id="day1">D1</div><div class="day-box" id="day2">D2</div><div class="day-box" id="day3">D3</div><div class="day-box" id="day4">D4</div><div class="day-box" id="day5">D5</div><div class="day-box" id="day6">D6</div><div class="day-box" id="day7">D7</div>
        </div>
        <button onclick="claimDaily()" id="dailyBtn" class="btn-primary" style="margin-top:10px; width:100%;">Claim Bonus</button>
    </div>

    <div class="card disabled" id="dashboardSection">
        <h3>Your Dashboard</h3>
        <div id="balanceDisplay" class="highlight">0 ABP 💎</div>
        <div class="reward-box">
            <p>Estimated Reward: <span id="adsRewardDisplay" style="color:#00ffcc; font-weight:bold;">0.0000000 ADS</span></p>
            <div style="width:100%; background:#222; height:10px; border-radius:5px; overflow:hidden;">
                <div id="progressBar" style="width:0%; background:var(--primary); height:100%; transition:0.5s;"></div>
            </div>
            <small id="progressText">Target: 0 / 500,000 ABP</small><br>
            <small style="color:#666; font-size:0.7em;">(Ratio: 500k ABP = 0.1 ADS)</small>
        </div>
        <button id="claimPoints" class="btn-primary" style="width:100%; margin-top:15px;">🔥 Claim 100 ABP</button>
    </div>
</div>

<script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
<script>
let account, currentABP = 0;
const targetABP = 500000; // 5 Lakh Target
const contractAddress = "0xe920151B9d3d4511D9F7664beB7D8Da0c1dD54fD";
const contractABI = ["function balanceOf(address owner) view returns (uint256)", "function mint(address to, uint256 amount) public"];

async function connectWallet(){
    if(window.ethereum){
        const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
        account = accounts[0];
        document.getElementById('connectWallet').innerText = account.substring(0,6)+"..."+account.substring(38);
        
        checkReferral();
        document.querySelectorAll('.card').forEach(c => c.classList.remove('disabled'));
        generateRefLink();
        loadPersistentData();
    }
}

function generateRefLink() {
    const refLink = window.location.origin + window.location.pathname + "?ref=" + account;
    document.getElementById('refLinkDisplay').innerText = refLink;
}

function copyRef() {
    const link = document.getElementById('refLinkDisplay').innerText;
    navigator.clipboard.writeText(link);
    alert("Referral link copied!");
}

function checkReferral() {
    const urlParams = new URLSearchParams(window.location.search);
    const refBy = urlParams.get('ref');
    const hasBeenReferred = localStorage.getItem('referred_by_' + account);

    if(refBy && refBy !== account && !hasBeenReferred) {
        currentABP += 500;
        localStorage.setItem('referred_by_' + account, refBy);
        alert("Referral Bonus Added! +500 ABP 🎉");
        updateUI();
    }
}

function loadPersistentData() {
    const saved = localStorage.getItem('ads_user_data_' + account);
    if(saved) {
        currentABP = JSON.parse(saved).points || 0;
        updateUI();
    }
}

async function claimPoints(){
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const contract = new ethers.Contract(contractAddress, contractABI, provider.getSigner());
    try {
        const tx = await contract.mint(account, ethers.utils.parseEther("100"));
        await tx.wait();
        currentABP += 100;
        saveData();
        updateUI();
    } catch(e) { alert("MetaMask error!"); }
}

function claimDaily() {
    currentABP += 10;
    saveData();
    updateUI();
}

function saveData() {
    localStorage.setItem('ads_user_data_' + account, JSON.stringify({points: currentABP}));
}

// --- NEW RATIO CALCULATION (500k : 0.1) ---
function updateUI() {
    document.getElementById('balanceDisplay').innerText = currentABP.toLocaleString() + " ABP 💎";
    
    // Formula: (currentABP / 500,000) * 0.1
    let adsAmount = (currentABP / targetABP) * 0.1;
    document.getElementById('adsRewardDisplay').innerText = adsAmount.toFixed(7) + " ADS 🚀";
    
    let prog = (currentABP / targetABP) * 100;
    document.getElementById('progressBar').style.width = (prog > 100 ? 100 : prog) + "%";
    document.getElementById('progressText').innerText = `Target: ${currentABP.toLocaleString()} / 500,000 ABP`;
}

document.getElementById('connectWallet').addEventListener('click', connectWallet);
document.getElementById('claimPoints').addEventListener('click', claimPoints);
</script>
</body>
</html>
