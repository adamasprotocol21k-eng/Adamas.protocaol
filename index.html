<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas Protocol | Master Intelligence 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc00; --gold-dark: #b8860b; --primary: #00d4ff; --secondary: #7000ff; 
            --accent: #00ff88; --bg: #030508; --card-bg: rgba(255, 255, 255, 0.05); --border: rgba(255, 204, 0, 0.3);
        }
        * { box-sizing: border-box; touch-action: manipulation; outline: none; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; background-image: radial-gradient(circle at center, #1a1a2e 0%, #030508 100%); }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }

        /* MANDATORY GATES */
        #followGate { position: fixed; top:0; left:0; width:100%; height:100%; z-index:10000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(25px); background: rgba(0,0,0,0.95); }
        .modal-content { background:#111; border:2px solid var(--gold); border-radius:25px; padding:30px; width:90%; max-width:400px; text-align:center; box-shadow: 0 0 50px rgba(255, 204, 0, 0.3); }
        
        /* NAVIGATION */
        .tab-nav-system { display: flex; justify-content: space-around; background: rgba(0,0,0,0.85); border: 1px solid var(--border); border-radius: 15px; padding: 12px 5px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 1000; backdrop-filter: blur(15px); }
        .tab-trigger { background: none; border: none; color: #666; font-family: 'Orbitron'; font-size: 0.65rem; cursor: pointer; transition: 0.3s; padding: 5px; }
        .tab-trigger.active-tab { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        
        .tab-pane { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-pane.show { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* COMPONENTS */
        .rank-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 25px 15px; margin-bottom: 25px; text-align: center; }
        #miningVal { font-family: 'Orbitron'; font-size: 2.2rem; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
        .mission-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 18px; padding: 20px 15px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .step-tag { position: absolute; top: 0; left: 0; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); color: #000; padding: 3px 12px; border-bottom-right-radius: 12px; font-size: 0.55rem; font-family: 'Orbitron'; font-weight: bold; }
        .btn-main { background: #000; color: #fff; border: 1px solid var(--primary); padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-top: 8px; }
        
        .locked-content { opacity: 0.1; filter: blur(10px); pointer-events: none; }
        .card-area { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .card-box { width: 60px; height: 90px; background: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #000; font-weight: bold; border: 2px solid #ccc; }
        .card-back { background: #222 !important; color: transparent !important; }
        .mines-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px auto; max-width: 280px; }
        .mine-card { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .penalty-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:100; border-radius:18px; color:#fff; font-weight:bold; }
    </style>
</head>
<body>

<div id="followGate">
    <div class="modal-content">
        <h2 style="color:var(--gold); font-family: 'Orbitron';">ADAMAS NODE</h2>
        
        <div id="step-wallet">
            <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 15px;">Connect your wallet to begin</p>
            <button onclick="connectWallet()" class="btn-main" style="border-color: var(--primary);">CONNECT WALLET 🦊</button>
        </div>

        <div id="step-social" style="display:none;">
            <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 15px;">Mandatory Community Tasks</p>
            <button id="btn-tw" onclick="verifyTask('tw', 500, 'https://twitter.com/DiamoProtocol')" class="btn-main" style="border-color: #1DA1F2;">FOLLOW TWITTER (+500) 🐦</button>
            <button id="btn-tg" onclick="verifyTask('tg', 500, 'https://t.me/daimodmo')" class="btn-main" style="border-color: #0088cc;">JOIN TELEGRAM (+500) ✈️</button>
            <button id="btn-unlock" onclick="finalUnlock()" class="btn-main" style="display:none; background:var(--accent); color:#000; margin-top:20px;">INITIALIZE DASHBOARD 💎</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="rank-card">
        <div id="miningVal">0.000</div>
        <div style="font-weight:bold; color:var(--gold);">WALLET: <span id="walletShort" style="color:var(--primary);">Not Connected</span></div>
        <div style="font-weight:bold; color:var(--accent);">TOTAL: <span id="balDisplay">0</span> ABP 💎</div>
    </div>

    <div class="tab-nav-system">
        <button class="tab-trigger active-tab" onclick="switchTab('core', this)">MINING</button>
        <button class="tab-trigger" onclick="switchTab('games', this)">GAMES</button>
        <button class="tab-trigger" onclick="switchTab('vault', this)">QUIZ</button>
        <button class="tab-trigger" onclick="switchTab('refer', this)">REFER</button>
    </div>

    <div id="mainDashboard" class="locked-content">
        <div id="pane-core" class="tab-pane show">
            <div class="mission-box" style="border-color: var(--secondary);">
                <span class="step-tag">STAKING</span>
                <div style="display:flex; justify-content:space-between;">
                    <div><small>Staked</small><br><b id="stakedAmt">0</b></div>
                    <div><small>Rewards</small><br><b id="rewardAmt" style="color:var(--accent);">0.000</b></div>
                </div>
                <button onclick="toggleStake()" class="btn-main">STAKE ALL / UNSTAKE</button>
            </div>
        </div>

        <div id="pane-games" class="tab-pane">
            <div class="mission-box" style="border-color: #ff4444;">
                <span class="step-tag">TEEN PATTI 🃏</span>
                <div class="card-area">
                    <div id="c1" class="card-box card-back">?</div>
                    <div id="c2" class="card-box card-back">?</div>
                    <div id="c3" class="card-box card-back">?</div>
                </div>
                <button onclick="playTeenPatti()" class="btn-main">DEAL (50 ABP)</button>
            </div>

            <div class="mission-box" id="mineBox">
                <span class="step-tag">MINES 💣</span>
                <div id="minesGrid" class="mines-grid"></div>
                <p style="font-size:0.6rem; text-align:center;">Daily Chances: <span id="mCount">50</span>/50</p>
            </div>
        </div>

        <div id="pane-vault" class="tab-pane">
            <div class="mission-box">
                <span class="step-tag">INTELLIGENCE</span>
                <div id="quizContent">
                    <p id="qText" style="font-weight:bold;">Loading question...</p>
                    <div id="qOptions"></div>
                </div>
            </div>
        </div>

        <div id="pane-refer" class="tab-pane">
            <div class="mission-box">
                <span class="step-tag">NETWORK</span>
                <p style="font-size:0.7rem;">Share your link and earn 1000 ABP per friend!</p>
                <div id="refBox" style="background:#000; padding:10px; border:1px dashed var(--gold); font-size:0.6rem;">...</div>
                <button onclick="copyRef()" class="btn-main">COPY LINK</button>
            </div>
        </div>
    </div>
</div>

<script>
let user = { 
    wallet: "", balance: 0, staked: 0, rewards: 0, 
    tasks: {tw:false, tg:false}, mineChances: 50,
    quizLocked: false, lastQuizDay: "" 
};

const SYMBOLS = ["A", "K", "Q", "J", "10"];
const QUIZ_DATA = [
    { q: "GST Bharat mein kab aaya?", a: "1 July 2017", o: ["1 April 2017", "1 July 2017", "15 Aug 2016"] },
    { q: "Bitcoin ka creator kaun hai?", a: "Satoshi Nakamoto", o: ["Elon Musk", "Satoshi Nakamoto", "Vitalik"] }
];

async function connectWallet() {
    if(!window.ethereum) return alert("MetaMask download karein!");
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    user.wallet = accounts[0];
    document.getElementById('step-wallet').style.display = 'none';
    document.getElementById('step-social').style.display = 'block';
    document.getElementById('walletShort').innerText = user.wallet.slice(0,6) + "..." + user.wallet.slice(-4);
    loadData();
}

function verifyTask(id, rew, url) {
    window.open(url, '_blank');
    setTimeout(() => {
        user.tasks[id] = true;
        user.balance += rew;
        document.getElementById('btn-'+id).innerText = "VERIFIED ✅";
        document.getElementById('btn-'+id).style.borderColor = "var(--accent)";
        if(user.tasks.tw && user.tasks.tg) document.getElementById('btn-unlock').style.display = 'block';
        saveData();
    }, 4000);
}

function finalUnlock() {
    document.getElementById('followGate').style.display = 'none';
    document.getElementById('mainDashboard').classList.remove('locked-content');
    initMines();
    loadQuiz();
    updateRef();
    setInterval(() => {
        if(user.staked > 0) user.rewards += user.staked * 0.0000015;
        updateUI();
    }, 1000);
}

function updateUI() {
    let tot = user.balance + user.rewards;
    document.getElementById('balDisplay').innerText = Math.floor(tot);
    document.getElementById('miningVal').innerText = tot.toFixed(3);
    document.getElementById('stakedAmt').innerText = Math.floor(user.staked);
    document.getElementById('rewardAmt').innerText = user.rewards.toFixed(4);
    document.getElementById('mCount').innerText = user.mineChances;
}

// TEEN PATTI REWARDS
function playTeenPatti() {
    if(user.balance < 50) return alert("Low ABP!");
    user.balance -= 50;
    const cards = [document.getElementById('c1'), document.getElementById('c2'), document.getElementById('c3')];
    cards.forEach(c => c.classList.add('card-back'));

    setTimeout(() => {
        let res = [SYMBOLS[Math.floor(Math.random()*5)], SYMBOLS[Math.floor(Math.random()*5)], SYMBOLS[Math.floor(Math.random()*5)]];
        cards.forEach((c, i) => { c.innerText = res[i]; c.classList.remove('card-back'); });

        if(res[0] === res[1] && res[1] === res[2]) {
            let win = (res[0] === 'A') ? 1500 : (res[0] === 'K') ? 900 : (res[0] === 'Q') ? 600 : 300;
            user.balance += win; alert(`TRIO! +${win} ABP`);
        } else {
            alert("No Match! Reward: 0");
        }
        saveData();
    }, 800);
}

// MINES WITH 30S PENALTY
function initMines() {
    const grid = document.getElementById('minesGrid'); grid.innerHTML = '';
    let bomb = Math.floor(Math.random()*16);
    for(let i=0; i<16; i++) {
        let d = document.createElement('div'); d.className = 'mine-card'; d.innerText = '●';
        d.onclick = () => {
            if(user.mineChances <= 0) return alert("No chances left!");
            user.mineChances--;
            if(i === bomb) {
                d.innerText = '💣'; d.style.background = 'red';
                let over = document.createElement('div'); over.className = 'penalty-overlay';
                over.innerHTML = 'BOMB! LOCK: <span id="pt">30</span>s';
                document.getElementById('mineBox').appendChild(over);
                let s = 30;
                let t = setInterval(() => {
                    s--; document.getElementById('pt').innerText = s;
                    if(s <= 0) { clearInterval(t); over.remove(); initMines(); }
                }, 1000);
            } else {
                d.innerText = '💎'; d.style.background = 'green';
                user.balance += 50;
            }
            saveData();
        };
        grid.appendChild(d);
    }
}

// QUIZ LOCK
function loadQuiz() {
    const today = new Date().toLocaleDateString();
    if(user.quizLocked && user.lastQuizDay === today) {
        document.getElementById('quizContent').innerHTML = "<p style='color:red;'>LOCKED! Try after 24 hours.</p>";
        return;
    }
    const q = QUIZ_DATA[Math.floor(Math.random()*QUIZ_DATA.length)];
    document.getElementById('qText').innerText = q.q;
    document.getElementById('qOptions').innerHTML = q.o.map(o => `<button class="btn-main" onclick="checkQ('${o}','${q.a}')">${o}</button>`).join('');
}

function checkQ(s, c) {
    if(s === c) { user.balance += 500; alert("Correct! +500"); loadQuiz(); }
    else { user.quizLocked = true; user.lastQuizDay = new Date().toLocaleDateString(); alert("WRONG! Quiz Locked."); loadQuiz(); }
    saveData();
}

function toggleStake() {
    if(user.staked === 0) { user.staked = user.balance; user.balance = 0; }
    else { user.balance += (user.staked + user.rewards); user.staked = 0; user.rewards = 0; }
    saveData();
}

function updateRef() { document.getElementById('refBox').innerText = window.location.origin + "?ref=" + user.wallet.slice(0,8); }
function copyRef() { navigator.clipboard.writeText(document.getElementById('refBox').innerText); alert("Link Copied!"); }

function switchTab(id, b) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('show'));
    document.querySelectorAll('.tab-trigger').forEach(t => t.classList.remove('active-tab'));
    document.getElementById('pane-' + id).classList.add('show');
    b.classList.add('active-tab');
}

function saveData() { localStorage.setItem('adamas_v4', JSON.stringify(user)); }
function loadData() { 
    let d = localStorage.getItem('adamas_v4'); 
    if(d) Object.assign(user, JSON.parse(d)); 
}
</script>
</body>
</html>
