<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADAMAS Protocol | Web3 Engagement Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#00f2ff;
--secondary:#7000ff;
--dark:#05060a;
}

body,html{
margin:0;
padding:0;
background:var(--dark);
color:white;
font-family:'Rajdhani',sans-serif;
height:100%;
overflow:hidden;
}

/* background canvas */

canvas#canvas3d{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* hero */

.hero-section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* portal */

.portal-container{
position:relative;
width:200px;
height:200px;
margin-bottom:25px;
display:flex;
align-items:center;
justify-content:center;
}

.portal-ring{
position:absolute;
width:100%;
height:100%;
border:2px solid var(--primary);
border-radius:50%;
border-top-color:transparent;
border-bottom-color:transparent;
animation:rotate 3s linear infinite;
box-shadow:0 0 25px var(--primary);
}

.main-logo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
filter:drop-shadow(0 0 10px var(--primary));
animation:float 4s ease-in-out infinite;
}

@keyframes rotate{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

/* text */

h1{
font-family:'Orbitron',sans-serif;
font-size:2.6rem;
margin:0;
letter-spacing:5px;
background:linear-gradient(to bottom,#fff,var(--primary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.protocol-text{
font-family:'Orbitron';
color:var(--primary);
letter-spacing:8px;
font-size:1.1rem;
margin-top:5px;
}

p{
font-size:1rem;
opacity:0.75;
max-width:420px;
margin:15px 0 35px;
line-height:1.6;
}

/* button */

.connect-btn{
background:transparent;
border:2px solid var(--primary);
color:var(--primary);
padding:16px 45px;
border-radius:100px;
font-family:'Orbitron';
font-weight:bold;
font-size:0.9rem;
text-transform:uppercase;
cursor:pointer;
transition:0.4s;
letter-spacing:2px;
}

.connect-btn:hover{
background:var(--primary);
color:black;
box-shadow:0 0 35px var(--primary);
transform:scale(1.05);
}

.footer-note{
position:absolute;
bottom:25px;
font-size:0.75rem;
opacity:0.4;
letter-spacing:2px;
}

</style>
</head>

<body>

<canvas id="canvas3d"></canvas>

<div class="hero-section">

<div class="portal-container">
<div class="portal-ring"></div>
<img src="38682.jpg" class="main-logo">
</div>

<h1>ADAMAS</h1>
<div class="protocol-text">PROTOCOL</div>

<p>
Join the next generation Web3 engagement platform.
Connect your wallet and start earning ABP activity points.
</p>

<button class="connect-btn" id="connectBtn">
Connect Wallet
</button>

<div class="footer-note">
WEB3 COMMUNITY PROTOCOL
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* 3D BACKGROUND */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("canvas3d"),
alpha:true,
antialias:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

const starsGeometry=new THREE.BufferGeometry()

const starCount=2500
const posArray=new Float32Array(starCount*3)

for(let i=0;i<starCount*3;i++){
posArray[i]=(Math.random()-0.5)*15
}

starsGeometry.setAttribute(
'position',
new THREE.BufferAttribute(posArray,3)
)

const material=new THREE.PointsMaterial({
size:0.008,
color:0x00f2ff
})

const starsMesh=new THREE.Points(starsGeometry,material)

scene.add(starsMesh)

camera.position.z=2

function animate(){
requestAnimationFrame(animate)

starsMesh.rotation.z+=0.001

renderer.render(scene,camera)
}

animate()

/* WALLET CONNECT */

const connectBtn=document.getElementById("connectBtn")

connectBtn.addEventListener("click",connectWallet)

async function connectWallet(){

if(!window.ethereum){
alert("MetaMask wallet not detected")
window.open("https://metamask.io/download/","_blank")
return
}

connectBtn.innerText="Connecting..."

try{

const accounts=await window.ethereum.request({
method:"eth_requestAccounts"
})

const wallet=accounts[0]

localStorage.setItem("userWallet",wallet)

connectBtn.innerText="Connected"

setTimeout(()=>{
window.location.href="dashboard.html"
},1000)

}
catch(error){

console.log(error)

connectBtn.innerText="Connect Wallet"

alert("Wallet connection rejected")

}

}

/* CHECK EXISTING WALLET */

window.addEventListener("load",async()=>{

if(window.ethereum){

const accounts=await window.ethereum.request({
method:"eth_accounts"
})

if(accounts.length>0){
localStorage.setItem("userWallet",accounts[0])
}

}

})

</script>

</body>
</html>
