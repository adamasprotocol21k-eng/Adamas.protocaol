<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | Elite Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #phase-intro, #phase-social { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .active-phase { display: flex !important; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Typing Effect & Logo */
        #typing-logo::after { content: "|"; animation: blink 0.7s infinite; margin-left: 5px; color: var(--parrot-green); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        .btn-entry { 
            background: transparent; color: var(--parrot-green); border: 1px solid var(--parrot-green); 
            padding: 15px 40px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            letter-spacing: 2px; box-shadow: 0 0 15px rgba(173, 255, 47, 0.2);
        }
        .btn-entry:hover { background: var(--parrot-green); color: #000; box-shadow: 0 0 30px var(--parrot-green); }

        /* Reward Tags */
        .reward-badge {
            background: var(--parrot-green); color: #000; font-family: 'Orbitron';
            font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 4px;
            box-shadow: 0 0 10px var(--parrot-green); margin-left: 10px;
        }

        .task-card {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 18px; margin-top: 12px; transition: 0.3s;
        }
        .task-card:hover { border-color: var(--parrot-green); background: rgba(173, 255, 47, 0.02); }
        
        .btn-claim-mini {
            background: linear-gradient(90deg, var(--neon-red), var(--neon-purple));
            color: #fff; border: none; padding: 8px 12px; border-radius: 8px;
            font-family: 'Orbitron'; font-size: 9px; font-weight: bold; cursor: pointer;
            text-decoration: none; display: inline-block;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="active-phase">
            <div style="text-align: center;">
                <h1 id="typing-logo" class="glow-text" style="font-family: 'Orbitron'; font-size: 2.2rem; letter-spacing: 5px; min-height: 40px;"></h1>
                <p style="font-size: 10px; color: #666; margin-top: 10px; letter-spacing: 3px; text-transform: uppercase;">Decentralized Node Infrastructure</p>
                <div style="margin-top: 50px;">
                    <button class="btn-entry" onclick="startJourney()">INITIALIZE NODE</button>
                </div>
            </div>
        </section>

        <section id="phase-social">
            <div class="premium-card" style="width: 92%; max-width: 400px; text-align: center;">
                <h2 style="font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 5px; letter-spacing: 1px;">ELITE <span style="color: var(--parrot-green);">REWARDS</span></h2>
                <p style="font-size: 11px; color: #888; margin-bottom: 20px;">Claim <span style="color: var(--parrot-green); font-weight: bold;">800 ABP</span> to Activate Your Node</p>
                
                <div class="task-list" style="margin-bottom: 25px;">
                    <div class="task-card">
                        <div style="text-align: left;">
                            <div style="display: flex; align-items: center;">
                                <span style="font-size: 9px; color: var(--neon-purple); font-family: 'Orbitron';">STEP 01</span>
                                <span class="reward-badge">+400 ABP</span>
                            </div>
                            <p style="font-weight: bold; font-size: 13px; color: #eee; margin-top: 4px;">TELEGRAM HUB</p>
                            <div style="margin-top: 8px; display: flex; gap: 5px;">
                                <a href="https://t.me/ADSProtocol" target="_blank" class="btn-claim-mini" onclick="markTask(this)">CHANNEL</a>
                                <a href="https://t.me/adsprotocolcommunity" target="_blank" class="btn-claim-mini" onclick="markTask(this)">COMMUNITY</a>
                            </div>
                        </div>
                    </div>

                    <div class="task-card">
                        <div style="text-align: left;">
                            <div style="display: flex; align-items: center;">
                                <span style="font-size: 9px; color: var(--neon-blue); font-family: 'Orbitron';">STEP 02</span>
                                <span class="reward-badge">+400 ABP</span>
                            </div>
                            <p style="font-weight: bold; font-size: 13px; color: #eee; margin-top: 4px;">X COMMAND CENTER</p>
                            <div style="margin-top: 8px; display: flex; gap: 5px;">
                                <a href="https://x.com/DiamoProtocol" target="_blank" class="btn-claim-mini" onclick="markTask(this)">FOLLOW X1</a>
                                <a href="https://x.com/AdamasADS" target="_blank" class="btn-claim-mini" onclick="markTask(this)">FOLLOW X2</a>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="connect-wallet-btn" class="btn-primary" onclick="connectWeb3()" style="letter-spacing: 1px; background: linear-gradient(90deg, #333, #555);">CONNECT WEB3 WALLET</button>
                <p style="font-size: 9px; color: #555; margin-top: 15px; font-style: italic;">*Claim bonus points to unlock wallet authorization.</p>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
    const ADMIN_WALLET = "0xC9267828a11dB4cb32f0A5Ea5FC29b38FF0fF25e";

    // ... Firebase Config (Same as your code) ...
    const firebaseConfig = {
      apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
      authDomain: "adamas-protocol-v2.firebaseapp.com",
      databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
      projectId: "adamas-protocol-v2",
      storageBucket: "adamas-protocol-v2.firebasestorage.app",
      messagingSenderId: "197711342782",
      appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef",
      measurementId: "G-FKP19J67TT"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const logoText = "ADAMAS PROTOCOL";
    let charIndex = 0;
    function typeEffect() {
        if (charIndex < logoText.length) {
            document.getElementById("typing-logo").innerHTML += logoText.charAt(charIndex);
            charIndex++;
            setTimeout(typeEffect, 100);
        }
    }

    window.onload = typeEffect;

    function startJourney() {
        document.getElementById('phase-intro').classList.remove('active-phase');
        document.getElementById('phase-social').classList.add('active-phase');
    }

    let tasksDone = 0;
    function markTask(btn) {
        btn.innerText = "CLAIMED ✅";
        btn.style.background = "var(--parrot-green)";
        btn.style.color = "#000";
        tasksDone++;
        if(tasksDone >= 2) {
            const connectBtn = document.getElementById('connect-wallet-btn');
            connectBtn.style.background = "linear-gradient(90deg, var(--cyan), var(--neon-purple))";
            connectBtn.style.boxShadow = "0 0 20px var(--purple-glow)";
        }
    }

    async function connectWeb3() {
        // ... Web3 Logic (Updated balance from 50 to 800) ...
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const wallet = accounts[0];
        const isAdmin = wallet.toLowerCase() === ADMIN_WALLET.toLowerCase();
        const userRef = database.ref('users/' + wallet);

        userRef.once('value').then((snapshot) => {
            if (!snapshot.exists()) {
                const referrer = localStorage.getItem('adamas_referrer') || "DIRECT";
                // 💎 WELCOME BONUS UPDATED TO 800 ABP
                let welcomeBonus = isAdmin ? 1000000 : 800; 

                userRef.set({
                    balance: welcomeBonus,
                    referredBy: referrer,
                    streak: 0,
                    lastClaim: "NEVER",
                    role: isAdmin ? "FOUNDER" : "USER",
                    joinedAt: new Date().toISOString(),
                    currentMultiplier: isAdmin ? 5.0 : 1.0,
                    miningStatus: false
                }).then(() => {
                    if (referrer !== "DIRECT" && !isAdmin) {
                        database.ref('users/' + referrer + '/balance').transaction((b) => (b || 0) + 100);
                    }
                });
            }
            window.location.href = "dashboard.html";
        });
    }
    </script>
</body>
</html>
