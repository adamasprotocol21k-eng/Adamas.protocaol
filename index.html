<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adamas Protocol | Premium Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #00d4ff;
    --accent: #00ff88;
    --bg: #030508;
    --card-bg: rgba(0,0,0,0.7);
    --border: rgba(0,212,255,0.4);
    --gold: #00d4ff;
    --gold-glow: rgba(0,212,255,0.4);
}
body {
    font-family: 'Rajdhani', sans-serif;
    margin:0; padding:0; background: var(--bg); color:#fff;
    background-image: radial-gradient(circle at 20% 20%, #0a0a2e 0%, #030508 100%);
}
.container { max-width: 450px; margin:0 auto; padding:15px 15px 120px; }
.card-box { background: var(--card-bg); border:1px solid var(--border); border-radius:20px; padding:20px; margin-bottom:20px; backdrop-filter: blur(8px); position: relative; }
.card-label { position:absolute; top:-10px; left:15px; background:var(--primary); color:#000; padding:4px 12px; border-radius:8px; font-size:0.65rem; font-family:'Orbitron'; font-weight:bold; }
.main-btn { background: linear-gradient(180deg, #111, #000); color:#fff; border:1px solid var(--primary); padding:14px; border-radius:15px; width:100%; cursor:pointer; font-family:'Orbitron'; font-size:0.75rem; font-weight:bold; text-transform:uppercase; margin-top:10px; }
.nav-bar { display:flex; justify-content:space-around; background:rgba(0,0,0,0.8); border-top:1px solid var(--border); padding:12px; position:fixed; bottom:0; width:100%; max-width:450px; }
.nav-item { background:none; border:none; color:#666; font-family:'Orbitron'; font-size:0.65rem; cursor:pointer; }
.nav-item.active { color:var(--primary); text-shadow:0 0 10px var(--primary); }
.tab-content { display:none; }
.tab-content.active { display:block; animation: fadeInUp 0.4s ease; }
@keyframes fadeInUp { from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
#walletDisplay { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
#walletDisplay button { width:auto; padding:8px 12px; }
#rewardToast { position: fixed; top:15%; left:50%; transform:translateX(-50%); background: linear-gradient(90deg, var(--accent), var(--primary)); color:#000; padding:15px 40px; border-radius:50px; font-family:'Orbitron'; font-weight:bold; z-index:9999; display:none; box-shadow:0 0 30px var(--accent); animation: popScale 0.4s ease; }
@keyframes popScale { 0% {transform:translateX(-50%) scale(0.5);} 100% {transform:translateX(-50%) scale(1);} }
.wheel-container { position:relative; width:240px; height:240px; margin:20px auto; border:6px solid #222; border-radius:50%; overflow:hidden; box-shadow:0 0 30px var(--gold-glow); transition:4s cubic-bezier(0.15,0,0.15,1); }
.wheel-seg { position:absolute; width:50%; height:50%; transform-origin:100% 100%; display:flex; align-items:center; justify-content:center; font-family:'Orbitron'; font-size:0.7rem; color:#000; font-weight:bold; padding-bottom:35px; }
.pointer { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:2rem; color:var(--accent); z-index:100; }
</style>
</head>
<body>

  <div class="card-box" style="width:85%; text-align:center;
