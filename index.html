<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS V19.2 | Lottery & Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc00; --gold-glow: rgba(255, 204, 0, 0.4); --primary: #00d4ff; 
            --accent: #00ff88; --bg: #030508; --card-bg: rgba(255, 255, 255, 0.07); 
            --border: rgba(255, 204, 0, 0.3); --glass: rgba(0, 0, 0, 0.9);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; padding-bottom: 100px; }

        /* UI BOXES */
        .card-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; position: relative; backdrop-filter: blur(10px); }
        .card-label { position: absolute; top: -12px; left: 15px; background: var(--gold); color: #000; padding: 2px 10px; border-radius: 5px; font-size: 0.7rem; font-family: 'Orbitron'; font-weight: bold; }

        /* BUTTONS */
        .main-btn { background: linear-gradient(180deg, #333, #000); color: #fff; border: 1px solid var(--gold); padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; text-transform: uppercase; }
        .main-btn:active { transform: scale(0.95); background: var(--gold); color: #000; }
        
        /* LOTTERY UI */
        .lottery-box { text-align: center; background: rgba(255, 204, 0, 0.1); border: 1px dashed var(--gold); border-radius: 15px; padding: 15px; margin-top: 10px; }
        .ticket-num { font-size: 1.5rem; letter-spacing: 5px; color: var(--gold); font-family: 'Orbitron'; }

        /* HEADER & TABS */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .balance-card { background: linear-gradient(135deg, #111, #000); border: 2px solid var(--primary); border-radius: 20px; padding: 20px; text-align: center; margin: 20px 0; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        #miningDisplay { font-size: 2.5rem; font-family: 'Orbitron'; margin: 5px 0; color: var(--primary); }

        .nav-bar { display: flex; justify-content: space-around; background: var(--glass); border-top: 1px solid var(--border); padding: 15px; position: fixed; bottom: 0; width: 100%; max-width: 450px; z-index: 1000; }
        .nav-item { background: none; border: none; color: #666; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* GATE SCREENS */
        #gate, #socialLock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-box { width: 85%; text-align: center; border: 1px solid var(--gold); padding: 30px; border-radius: 25px; background: #0a0a0a; }
    </style>
</head>
<body>

<div id="gate">
    <div class="gate-box">
        <h1 style="font-family:'Orbitron'; color:var(--gold);">ADAMAS CORE</h1>
        <button onclick="connectWallet()" class="main-btn" style="background:var(--gold); color:#000;">CONNECT WALLET</button>
    </div>
</div>

<div id="socialLock" style="display:none;">
    <div class="gate-box">
        <h2 style="font-family:'Orbitron'; color:var(--accent);">VERIFICATION</h2>
        <button onclick="task('tg', 'https://t.me/daimodmo')" id="btn-tg" class="main-btn">JOIN TELEGRAM (+500)</button>
        <button onclick="task('tw', 'https://twitter.com/DiamoProtocol')" id="btn-tw" class="main-btn" style="margin-top:10px;">FOLLOW X (+500)</button>
        <button id="entryBtn" onclick="finishAuth()" class="main-btn" style="display:none; background:var(--accent); color:#000; margin-top:20px;">ENTER DASHBOARD</button>
    </div>
</div>

<div id="protocolApp" style="display:none;" class="container">
    <div class="header">
        <span style="font-family:'Orbitron'; color:var(--gold);">ADAMAS V19.2</span>
        <span id="walletDisp" style="font-size:0.7rem; color:#666;">0x...</span>
    </div>

    <div class="balance-card">
        <div id="miningDisplay">0.000</div>
        <div style="font-weight:bold; color:var(--gold);">ABP BALANCE: <span id="abpBalance">0</span></div>
    </div>

    <div id="tab-mine" class="tab-content active">
        <div class="card-box">
            <span class="card-label">DAILY LUCKY DRAW</span>
            <p style="font-size:0.8rem; color:#888;">Jackpot: 10,000 ABP | Ticket: 500 ABP</p>
            <div class="lottery-box">
                <div id="ticketDisplay" class="ticket-num">000000</div>
                <p id="lotteryStatus" style="font-size:0.7rem; margin-top:5px; color:var(--accent);">No Ticket Purchased</p>
            </div>
            <button id="buyTicketBtn" onclick="buyLotteryTicket()" class="main-btn" style="margin-top:10px;">BUY TICKET</button>
        </div>

        <div class="card-box">
            <span class="card-label">DAILY SPIN</span>
            <button onclick="startSpin()" class="main-btn">SPIN NOW</button>
        </div>
    </div>

    <div id="tab-play" class="tab-content">
        <div class="card-box">
            <span class="card-label">STAKING POOL</span>
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span>STAKED: <span id="stakedVal">0</span></span>
                <span>EARNED: <span id="earnedVal" style="color:var(--accent);">0</span></span>
            </div>
            <button onclick="handleStake()" class="main-btn">STAKE / CLAIM</button>
        </div>
        <p style="text-align:center; color:#555;">Gaming Module Updates Coming Soon...</p>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" onclick="showTab('mine', this)">HOME</button>
        <button class="nav-item" onclick="showTab('play', this)">VAULT</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

// YOUR CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "adamas-protocol.firebaseapp.com",
  databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
  projectId: "adamas-protocol",
  storageBucket: "adamas-protocol.appspot.com",
  messagingSenderId: "207798425238",
  appId: "1:207798425238:web:025b8544f085dde60af537"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// STATE
let abp = 0, staked = 0, rewards = 0, wallet = "";
let isStaked = false, lastSpin = 0, currentTicket = "000000";
let authDone = {tg:false, tw:false};

// CONNECT & CLOUD SYNC
window.connectWallet = async function() {
    if(!window.ethereum) return alert("MetaMask use karein");
    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
    wallet = accs[0];
    await loadCloudData();
    document.getElementById('gate').style.display = 'none';
    if(!authDone.tg || !authDone.tw) document.getElementById('socialLock').style.display = 'flex';
    else finishAuth();
    syncUI();
}

async function saveCloudData() {
    if(!wallet) return;
    const data = { abp, staked, rewards, isStaked, lastSpin, currentTicket, authDone, lastSeen: Date.now() };
    await set(ref(db, 'users/' + wallet), data);
}

async function loadCloudData() {
    const snap = await get(child(ref(db), 'users/' + wallet));
    if(snap.exists()) {
        const d = snap.val();
        abp=d.abp||0; staked=d.staked||0; rewards=d.rewards||0;
        isStaked=d.isStaked||false; lastSpin=d.lastSpin||0;
        currentTicket=d.currentTicket||"000000"; authDone=d.authDone||authDone;
    }
}

// 🎟️ LOTTERY LOGIC
window.buyLotteryTicket = function() {
    if(abp < 500) return alert("Insufficient ABP! 500 ABP required.");
    if(currentTicket !== "000000") return alert("You already have a ticket for today!");
    
    abp -= 500;
    currentTicket = Math.floor(100000 + Math.random() * 900000).toString();
    document.getElementById('ticketDisplay').innerText = currentTicket;
    document.getElementById('lotteryStatus').innerText = "Ticket Active ✅";
    
    alert("Ticket Purchased! Draw will happen at 12:00 AM UTC.");
    saveCloudData(); syncUI();
}

window.syncUI = function() {
    let total = abp + rewards;
    document.getElementById('abpBalance').innerText = Math.floor(total).toLocaleString();
    document.getElementById('miningDisplay').innerText = total.toFixed(3);
    document.getElementById('stakedVal').innerText = Math.floor(staked);
    document.getElementById('earnedVal').innerText = rewards.toFixed(4);
    document.getElementById('ticketDisplay').innerText = currentTicket;
}

window.task = function(t, url) {
    window.open(url, '_blank');
    setTimeout(() => {
        authDone[t] = true; abp += 500;
        document.getElementById('btn-'+t).innerText = "DONE ✅";
        if(authDone.tg && authDone.tw) document.getElementById('entryBtn').style.display='block';
        saveCloudData(); syncUI();
    }, 5000);
}

window.finishAuth = function() {
    document.getElementById('socialLock').style.display = 'none';
    document.getElementById('protocolApp').style.display = 'block';
}

window.startSpin = function() {
    if(Date.now() - lastSpin < 86400000) return alert("Next spin in 24h!");
    let win = [100, 500, 1000][Math.floor(Math.random()*3)];
    abp += win; lastSpin = Date.now();
    alert("You won " + win + " ABP!");
    saveCloudData(); syncUI();
}

window.handleStake = function() {
    if(!isStaked) { if(abp<=0)return; staked=abp; abp=0; isStaked=true; }
    else { abp+=(staked+rewards); staked=0; rewards=0; isStaked=false; }
    saveCloudData(); syncUI();
}

window.showTab = function(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    btn.classList.add('active');
}

setInterval(() => { if(isStaked) { rewards += staked * 0.000001; syncUI(); } }, 1000);
setInterval(() => { if(wallet) saveCloudData(); }, 30000);
</script>
</body>
</html>
