<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | SUPREME HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00d4ff; --neon-green: #00ff88; --gold: #ffcc00; --danger: #ff4444;
            --bg: #01080f; --card: rgba(2, 15, 30, 0.98); --glow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        body { 
            font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; margin: 0; 
            padding-bottom: 100px; overflow-x: hidden;
        }
        .container { width: 100%; max-width: 450px; margin: 0 auto; padding: 15px; }
        
        /* 1. MANDATORY SOCIAL GATE [cite: 2026-02-27] */
        .gate-modal { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--card); border: 1px solid var(--neon-blue); padding: 30px; border-radius: 20px; text-align: center; width: 100%; }

        /* 2. DASHBOARD & STAKING */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card); border: 1px solid rgba(0,212,255,0.2); padding: 15px; border-radius: 12px; text-align: center; }
        .staking-active { color: var(--neon-green); font-size: 0.7rem; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* 3. SPIN WHEEL (PROBABILITY LOGIC) */
        .wheel-box { position: relative; width: 200px; height: 200px; margin: 20px auto; border: 5px solid var(--gold); border-radius: 50%; overflow: hidden; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        .wheel-segment { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; border: 1px solid rgba(255,255,255,0.1); }

        /* 4. GAMES GRID */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .game-card { background: var(--card); border: 1px solid var(--neon-blue); aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; cursor: pointer; }

        /* UTILS */
        .btn-prime { background: linear-gradient(90deg, #004e92, #000428); border: 1px solid var(--neon-blue); color: #fff; padding: 12px; width: 100%; border-radius: 8px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; margin-top: 10px; }
        .btn-prime:disabled { opacity: 0.4; }
        .timer-lock { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; color: var(--gold); font-size: 0.8rem; z-index: 10; border-radius: 12px; }
    </style>
</head>
<body>

<div id="gate" class="gate-modal">
    <div class="gate-card">
        <h2 style="font-family:'Orbitron'; color:var(--neon-blue);">ADAMAS ACCESS</h2>
        <p style="font-size:0.8rem; color:#888;">Complete Mandatory Tasks to Initialize Node</p>
        <button onclick="task('tg', 'https://t.me/daimodmo')" id="tgB" class="btn-prime">JOIN TELEGRAM (+500 ABP)</button>
        <button onclick="task('tw', 'https://twitter.com/DiamoProtocol')" id="twB" class="btn-prime">FOLLOW ON X (+500 ABP)</button>
        <button id="entry" onclick="connect()" class="btn-prime" style="display:none; background:var(--neon-green); color:#000;">CONNECT WALLET & ENTER</button>
    </div>
</div>

<div class="container" id="hub" style="display:none;">
    <div class="stat-box" style="margin-bottom:15px;">
        <span class="staking-active" id="stakeStatus">STAKING ACTIVE 🟢</span>
        <div style="font-family:'Orbitron'; font-size:2.5rem; margin:10px 0;" id="bal">0.000</div>
        <div style="color:var(--neon-blue); font-size:0.8rem;">TOTAL ABP REWARDS</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><small>REFERRALS</small><br><b id="refCount">0</b></div>
        <div class="stat-box"><small>SQUAD BONUS</small><br><b id="refEarn" style="color:var(--neon-green);">0</b></div>
    </div>

    <div class="stat-box" style="position:relative;">
        <h3>DAILY SPIN 🎡</h3>
        <div id="wheel" class="wheel-box">
            <div class="wheel-segment" style="transform: rotate(0deg); background: #111;">100</div>
            <div class="wheel-segment" style="transform: rotate(90deg); background: #222;">500</div>
            <div class="wheel-segment" style="transform: rotate(180deg); background: #111;">JACKPOT</div>
            <div class="wheel-segment" style="transform: rotate(270deg); background: #222;">1000</div>
        </div>
        <button id="spinBtn" onclick="spinWheel()" class="btn-prime">SPIN (24H LOCK)</button>
        <div id="spinLock" class="timer-lock">LOCKED: <span id="sTime"></span></div>
    </div>

    <h3 style="margin-top:25px; font-family:'Orbitron'; font-size:0.9rem;">ADAMAS ARCADE 🕹️</h3>
    <div class="game-grid">
        <div class="game-card" onclick="play('card')">🃏<span>3-CARD</span></div>
        <div class="game-card" onclick="play('mines')">💣<span>MINES</span></div>
        <div class="game-card" onclick="play('snake')">🐍<span>SNAKE</span></div>
    </div>

    <div class="stat-box" style="margin-top:20px; position:relative;">
        <h3 style="font-size:0.9rem;">IQ LAB (Level 1-12) 🧠</h3>
        <p id="qText" style="font-size:0.8rem; color:#aaa;"></p>
        <div id="qOpts" style="display:grid; gap:5px;"></div>
        <div id="qLock" class="timer-lock">RELOADING...</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, update, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

//
const firebaseConfig = { apiKey: "YOUR_KEY", databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com", projectId: "adamas-protocol" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let abp = 0, wallet = "", lastLogin = 0;
let locks = { spin: 0, quiz: 0 };
let auth = { tg: false, tw: false };

window.task = (id, url) => {
    window.open(url, '_blank');
    setTimeout(() => { 
        auth[id] = true; 
        document.getElementById(id+'B').innerText = "VERIFIED ✅";
        if(auth.tg && auth.tw) document.getElementById('entry').style.display = 'block';
    }, 4000);
};

window.connect = async () => {
    if(!window.ethereum) return alert("MetaMask Required!");
    const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
    wallet = accs[0];
    document.getElementById('gate').style.display = 'none';
    document.getElementById('hub').style.display = 'block';
    await sync();
    startNode();
};

async function sync() {
    const s = await get(child(ref(db), 'users/' + wallet));
    if(s.exists()){
        const d = s.val();
        abp = d.abp||0; locks = d.locks||locks; lastLogin = d.lastLogin||Date.now();
    }
}

function startNode() {
    setInterval(() => { 
        // STAKING LOGIC: 24h Activity Check
        if(Date.now() - lastLogin < 86400000) {
            abp += 0.00015; 
            document.getElementById('stakeStatus').innerText = "STAKING ACTIVE 🟢";
        } else {
            document.getElementById('stakeStatus').innerText = "STAKING PAUSED (LOGIN REQ) 🔴";
        }
        updateUI(); 
    }, 1000);
    setInterval(save, 15000); // 15s Heartbeat
}

async function save() { if(wallet) await update(ref(db, 'users/'+wallet), { abp, locks, lastLogin: Date.now() }); }

function updateUI() {
    document.getElementById('bal').innerText = abp.toFixed(3);
    const now = Date.now();
    const handleLock = (time, lockId) => {
        document.getElementById(lockId).style.display = (now - time < 86400000) ? 'flex' : 'none';
    };
    handleLock(locks.spin, 'spinLock');
    handleLock(locks.quiz, 'qLock');
}

// SPIN WHEEL PROBABILITY LOGIC
window.spinWheel = () => {
    const wheel = document.getElementById('wheel');
    const rand = Math.random() * 100;
    let deg = 0, win = 0;

    if(rand < 2) { deg = 180; win = 5000; alert("JACKPOT! +5000 ABP"); } // 2% Chance
    else if(rand < 10) { deg = 270; win = 1000; } // 8% Chance
    else if(rand < 40) { deg = 90; win = 500; } // 30% Chance
    else { deg = 0; win = 100; } // 60% Chance

    wheel.style.transform = `rotate(${3600 + deg}deg)`;
    setTimeout(() => { 
        abp += win; locks.spin = Date.now(); save(); 
    }, 4500);
};

// IQ QUIZ (LEVEL LOGIC)
function loadQuiz() {
    const q = { t: "Level 5 IQ: 12 + 8 * 2?", o: ["40", "28", "32"], a: "28" };
    document.getElementById('qText').innerText = q.t;
    const box = document.getElementById('qOpts'); box.innerHTML = '';
    q.o.forEach(opt => {
        const b = document.createElement('button'); b.className = 'btn-prime'; b.innerText = opt;
        b.onclick = () => { if(opt === q.a) abp += 250; locks.quiz = Date.now(); save(); };
        box.appendChild(b);
    });
}
loadQuiz();

window.play = (g) => alert("Initializing " + g.toUpperCase() + " Mode...");
</script>
</body>
</html>
