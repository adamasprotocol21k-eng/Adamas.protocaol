<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas Protocol | The Digital Diamond</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>

    <div class="landing-container">
        <div class="hero-section">
            <div class="diamond-wrapper">
                <img src="diamond-logo.png" alt="Adamas" class="diamond-3d">
            </div>
            <h1>ADAMAS</h1>
            <p class="tagline">Bitcoin was Gold. Adamas is the Diamond.</p>
            <p class="network-status">● Polygon Amoy Testnet v1</p>
            
            <button id="connectWallet" class="btn-primary">Connect Wallet</button>
        </div>
    </div>

    <div id="socialPopup" class="modal">
        <div class="modal-content glass">
            <h2>Verify Identity</h2>
            <p>Follow our socials to start mining ABP points.</p>
            <div class="social-links">
                <a href="https://x.com/yourlink" target="_blank" class="social-btn x-btn">Follow on X</a>
                <a href="https://t.me/yourlink" target="_blank" class="social-btn tg-btn">Join Telegram</a>
            </div>
            <button id="verifySocials" class="btn-verify" disabled>Verify & Enter Dashboard</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
