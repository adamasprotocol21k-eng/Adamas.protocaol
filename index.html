<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamas Protocol | Diamond Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.6.0/dist/web3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --diamond: #00f2ff;
            --crystal: rgba(255, 255, 255, 0.1);
            --deep-space: #020617;
            --silver: #e2e8f0;
        }
        body {
            background: radial-gradient(circle at top, #0c1e35 0%, var(--deep-space) 100%);
            color: var(--silver); font-family: 'Rajdhani', sans-serif;
            margin: 0; display: flex; justify-content: center; min-height: 100vh;
        }
        .diamond-container { width: 100%; max-width: 480px; padding: 25px; }
        
        /* Premium Glass Card */
        .glass-panel {
            background: var(--crystal); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 30px;
            padding: 30px; text-align: center; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
        }
        .diamond-text {
            color: var(--diamond); text-transform: uppercase; letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px var(--diamond);
        }
        
        /* Web3 Buttons */
        .btn-diamond {
            background: linear-gradient(135deg, #00f2ff, #0066ff); border: none;
            padding: 15px; border-radius: 15px; color: white; font-weight: bold;
            width: 100%; cursor: pointer; transition: 0.4s; box-shadow: 0 5px 20px rgba(0, 242, 255, 0.3);
            margin-top: 15px; font-family: 'Orbitron';
        }
        .btn-diamond:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0, 242, 255, 0.5); }
        .btn-diamond:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Social Task Wall */
        .task-row {
            background: rgba(0, 0, 0, 0.3); padding: 12px; border-radius: 15px;
            margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .task-row.active { border-color: var(--diamond); background: rgba(0, 242, 255, 0.05); }

        /* Puzzle Board */
        #puzzle-board { display: grid; grid-template-columns: repeat(2, 140px); gap: 15px; justify-content: center; margin: 25px 0; }
        .piece { width: 140px; height: 140px; border-radius: 15px; border: 2px solid rgba(0, 242, 255, 0.3); background-size: 280px 280px; cursor: pointer; }

        #main-dashboard { display: none; }
    </style>
</head>
<body>

<div class="diamond-container">
    <div id="gateway" class="glass-panel">
        <h1 class="diamond-text">Adamas</h1>
        <p>Community Building Phase: Sabse pehle join karein</p>
        
        <div class="task-row" onclick="verifyTask(1, 'https://t.me/ADSProtocol')">
            <span>📢 Official Channel</span> <span id="s1">⭕</span>
        </div>
        <div class="task-row" onclick="verifyTask(2, 'https://t.me/adsprotocolcommunity')">
            <span>👥 Community Group</span> <span id="s2">⭕</span>
        </div>
        <div class="task-row" onclick="verifyTask(3, 'https://x.com/AdamasADS')">
            <span>🐦 Follow Twitter</span> <span id="s3">⭕</span>
        </div>

        <button id="unlock-btn" class="btn-diamond" disabled onclick="openPortal()">Unlock Portal 💎</button>
    </div>

    <div id="main-dashboard" class="glass-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 class="diamond-text" style="font-size: 18px;">Dashboard</h2>
            <button id="walletBtn" class="btn-diamond" style="width: auto; margin: 0; padding: 8px 15px; font-size: 11px;">Connect Wallet</button>
        </div>

        <div style="background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; margin: 20px 0; border: 1px dashed var(--diamond);">
            <small>Future ADS Balance</small>
            <div id="ads-balance" style="font-size: 28px; font-weight: bold; color: var(--diamond);">0.00</div>
            <button id="claim-btn" onclick="claimTokens()" style="background: none; border: 1px solid var(--diamond); color: var(--diamond); border-radius: 10px; margin-top: 10px; padding: 5px 10px; cursor: pointer;">Claim From Contract ⚓</button>
        </div>

        <div id="puzzle-board"></div>
        <button class="btn-diamond" onclick="checkWin()">Verify Logo & Earn ABP 💰</button>
        <p style="font-size: 12px; margin-top: 15px; opacity: 0.6;">Next Shuffle: <span id="clock">20</span>s</p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
