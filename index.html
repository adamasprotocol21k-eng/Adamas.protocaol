<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | Elite Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #phase-intro, #phase-social { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .active-phase { display: flex !important; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #typing-logo::after { content: "|"; animation: blink 0.7s infinite; margin-left: 5px; color: var(--parrot-green); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .btn-entry { 
            background: transparent; color: var(--parrot-green); border: 1px solid var(--parrot-green); 
            padding: 15px 40px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            letter-spacing: 2px; box-shadow: 0 0 15px rgba(173, 255, 47, 0.2);
        }
        .btn-entry:hover { background: var(--parrot-green); color: #000; box-shadow: 0 0 30px var(--parrot-green); }

        .task-card {
            background: rgba(10, 10, 10, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); border-radius: 24px; padding: 20px; margin-top: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: left;
        }

        .reward-summary { font-family: 'Orbitron'; color: var(--parrot-green); font-size: 13px; font-weight: 900; margin-bottom: 12px; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-social-action {
            display: flex; flex-direction: column; align-items: center; padding: 12px 5px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 14px; text-decoration: none; transition: 0.3s;
        }

        .unit-reward { font-size: 8px; color: var(--parrot-green); font-weight: 900; font-family: 'Orbitron'; margin-bottom: 3px; }
        .btn-label { font-size: 9px; color: #fff; font-weight: bold; letter-spacing: 1px; }

        .btn-social-action.verified { border-color: var(--parrot-green); background: rgba(173, 255, 47, 0.1); box-shadow: 0 0 15px rgba(173, 255, 47, 0.2); }
        .btn-social-action.verified .btn-label { color: var(--parrot-green); }
        
        #lock-msg { font-size: 9px; color: #ff0033; margin-top: 10px; font-weight: bold; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div class="app-container">
        <section id="phase-intro" class="active-phase">
            <div style="text-align: center;">
                <h1 id="typing-logo" class="glow-text" style="font-family: 'Orbitron'; font-size: 2rem; letter-spacing: 5px; min-height: 40px;"></h1>
                <p style="font-size: 10px; color: #555; margin-top: 10px; letter-spacing: 3px; text-transform: uppercase;">Decentralized Node Infrastructure</p>
                <div style="margin-top: 50px;">
                    <button class="btn-entry" onclick="startJourney()">INITIALIZE SYSTEM</button>
                </div>
            </div>
        </section>

        <section id="phase-social">
            <div class="premium-card" style="width: 92%; max-width: 400px; text-align: center; margin: auto;">
                <h2 style="font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 2px; color: #fff;">ELITE <span style="color: var(--parrot-green);">REWARDS</span></h2>
                
                <div style="margin: 15px 0; background: rgba(173, 255, 47, 0.05); padding: 8px; border-radius: 12px; border: 1px dashed var(--parrot-green);">
                    <p style="font-family: 'Orbitron'; font-size: 11px; color: #fff;">WELCOME BONUS: <span style="color: var(--parrot-green); font-size: 16px;">800 ABP</span></p>
                </div>

                <div class="task-card">
                    <p class="reward-summary">STEP 01: TELEGRAM HUB</p>
                    <div class="social-grid">
                        <a href="https://t.me/ADSProtocol" target="_blank" class="btn-social-action" onclick="verifyTaskWithDelay(this)">
                            <span class="unit-reward">+200 ABP</span>
                            <span class="btn-label">CHANNEL</span>
                        </a>
                        <a href="https://t.me/adsprotocolcommunity" target="_blank" class="btn-social-action" onclick="verifyTaskWithDelay(this)">
                            <span class="unit-reward">+200 ABP</span>
                            <span class="btn-label">COMMUNITY</span>
                        </a>
                    </div>
                </div>

                <div class="task-card">
                    <p class="reward-summary">STEP 02: X COMMAND</p>
                    <div class="social-grid">
                        <a href="https://x.com/DiamoProtocol" target="_blank" class="btn-social-action" onclick="verifyTaskWithDelay(this)">
                            <span class="unit-reward">+200 ABP</span>
                            <span class="btn-label">FOLLOW X1</span>
                        </a>
                        <a href="https://x.com/AdamasADS" target="_blank" class="btn-social-action" onclick="verifyTaskWithDelay(this)">
                            <span class="unit-reward">+200 ABP</span>
                            <span class="btn-label">FOLLOW X2</span>
                        </a>
                    </div>
                </div>

                <button id="connect-wallet-btn" class="btn-primary" onclick="connectWeb3()" style="margin-top: 25px; opacity: 0.2; pointer-events: none; width: 100%;">CONNECT WEB3 WALLET</button>
                <p id="lock-msg">[!] COMPLETE ALL 4 TASKS TO UNLOCK</p>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
    const ADMIN_WALLET = "0xC9267828a11dB4cb32f0A5Ea5FC29b38FF0fF25e";
    const firebaseConfig = {
      apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
      authDomain: "adamas-protocol-v2.firebaseapp.com",
      databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
      projectId: "adamas-protocol-v2",
      storageBucket: "adamas-protocol-v2.firebasestorage.app",
      messagingSenderId: "197711342782",
      appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef",
      measurementId: "G-FKP19J67TT"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const logoText = "ADAMAS PROTOCOL";
    let charIndex = 0;
    function typeEffect() {
        if (charIndex < logoText.length) {
            document.getElementById("typing-logo").innerHTML += logoText.charAt(charIndex);
            charIndex++;
            setTimeout(typeEffect, 100);
        }
    }

    window.onload = () => {
        typeEffect();
        if (localStorage.getItem('adamas_user')) {
            window.location.href = "dashboard.html";
            return;
        }
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) localStorage.setItem('adamas_referrer', refCode);
    };

    function startJourney() {
        document.getElementById('phase-intro').classList.remove('active-phase');
        document.getElementById('phase-social').classList.add('active-phase');
    }

    let completedTasks = 0;

    // 🔥 Fix: Task Delay and Verification Logic
    function verifyTaskWithDelay(btn) {
        if(!btn.classList.contains('verified')) {
            const label = btn.querySelector('.btn-label');
            label.innerText = "VERIFYING...";
            
            setTimeout(() => {
                btn.classList.add('verified');
                label.innerText = "CLAIMED ✅";
                completedTasks++;
                if(completedTasks >= 4) {
                    const connectBtn = document.getElementById('connect-wallet-btn');
                    const lockMsg = document.getElementById('lock-msg');
                    connectBtn.style.opacity = "1";
                    connectBtn.style.pointerEvents = "all";
                    lockMsg.innerText = "ACCESS GRANTED: 800 ABP READY ✅";
                    lockMsg.style.color = "#adff2f";
                }
            }, 3000); // 3 Second Delay for redirect/action
        }
    }

    async function connectWeb3() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                const btn = document.getElementById('connect-wallet-btn');
                btn.innerText = "AUTHORIZING...";
                btn.disabled = true;
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const wallet = accounts[0];

                // 🔥 Mandatory Confirmation Signature
                const msg = "Welcome to Adamas Protocol. Confirm to sync your 800 ABP rewards.";
                await window.ethereum.request({ method: 'personal_sign', params: [msg, wallet] });

                const isAdmin = wallet.toLowerCase() === ADMIN_WALLET.toLowerCase();
                const userRef = database.ref('users/' + wallet);

                userRef.once('value').then((snapshot) => {
                    if (!snapshot.exists()) {
                        const referrer = localStorage.getItem('adamas_referrer') || "DIRECT";
                        let welcomeBonus = isAdmin ? 1000000 : 800;
                        
                        userRef.set({
                            balance: welcomeBonus,
                            referredBy: referrer,
                            wallet: wallet,
                            refCode: wallet.substring(2, 8).toUpperCase(), // Unique Referral Code
                            joinedAt: new Date().toISOString(),
                            role: isAdmin ? "FOUNDER" : "USER",
                            miningStatus: false,
                            lastClaim: "NEVER"
                        }).then(() => {
                            if (referrer !== "DIRECT" && !isAdmin) {
                                database.ref('users/' + referrer + '/balance').transaction(b => (b || 0) + 100);
                            }
                        });
                    }
                    localStorage.setItem('adamas_user', wallet);
                    btn.innerText = "SECURE ✅";
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
                });
            } catch (err) {
                btn.disabled = false;
                btn.innerText = "RETRY CONNECTION";
            }
        } else {
            alert("Use Trust Wallet/MetaMask Browser.");
        }
    }
    </script>
</body>
</html>
