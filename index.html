<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Quantum Node Infrastructure</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .app-container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; text-align: center; position: relative; padding: 20px; }
        section { display: none; }
        section.active-phase { display: flex; flex-direction: column; animation: fadeIn 0.8s ease; }
        
        /* WALLET BUTTON FIX */
        #top-wallet-box { position: fixed; top: 20px; right: 20px; z-index: 5000; }
        .wallet-connect-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--cyan);
            color: var(--cyan); padding: 8px 14px; border-radius: 12px;
            font-family: 'Orbitron'; font-size: 10px; cursor: pointer;
            backdrop-filter: blur(15px); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* TASK CARD DESIGN - IMPROVED SPACING */
        .task-container { width: 100%; margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
        .task-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); 
            padding: 22px 20px; border-radius: 20px; text-align: left; transition: 0.3s; cursor: pointer;
        }
        .task-card.verified { border-color: var(--p-green); background: rgba(173, 255, 47, 0.06); }
        
        .status-pill { 
            font-size: 10px; background: rgba(255,255,255,0.07); 
            padding: 8px 14px; border-radius: 10px; color: #aaa; font-family: 'Orbitron';
            min-width: 90px; text-align: center;
        }
        
        #phase-social { margin-top: 70px; } /* Space for Wallet Button */

        .sync-spinner { width: 10px; height: 10px; border: 2px solid #fff; border-top-color: var(--cyan); border-radius: 50%; display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="top-wallet-box">
            <button id="connect-trigger" class="wallet-connect-btn" onclick="handleEntry()">CONNECT WALLET</button>
        </div>

        <section id="phase-intro">
            <div class="auth-badge" style="margin-bottom: 10px;">POLYGON AMOY TESTNET</div>
            <h1 class="main-logo" style="font-family: 'Orbitron';">ADAMAS</h1>
            <button class="btn-primary" style="margin-top: 30px;" onclick="handleEntry()">DEPLOY NODE ENGINE</button>
        </section>

        <section id="phase-social">
            <h2 style="font-family: 'Orbitron'; color: var(--p-green); letter-spacing: 2px;">VERIFICATION</h2>
            <p style="font-size: 11px; color: #666; margin-bottom: 25px;">Activate nodes to unlock your 800 ABP allocation.</p>

            <div class="task-container">
                <div class="task-card" id="card-t1" onclick="autoVerify('t1', 'https://t.me/ADSProtocol')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-family: 'Orbitron'; font-size: 12px; color: #fff;">JOIN TELEGRAM CHANNEL</span>
                        <div id="pill-t1" class="status-pill">PENDING</div>
                    </div>
                </div>

                <div class="task-card" id="card-t2" onclick="autoVerify('t2', 'https://t.me/adsprotocolcommunity')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-family: 'Orbitron'; font-size: 12px; color: #fff;">JOIN COMMUNITY GROUP</span>
                        <div id="pill-t2" class="status-pill">PENDING</div>
                    </div>
                </div>

                <div class="task-card" id="card-t3" onclick="autoVerify('t3', 'https://x.com/DiamoProtocol')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-family: 'Orbitron'; font-size: 12px; color: #fff;">FOLLOW DIAMO ON X</span>
                        <div id="pill-t3" class="status-pill">PENDING</div>
                    </div>
                </div>

                <div class="task-card" id="card-t4" onclick="autoVerify('t4', 'https://x.com/AdamasADS')">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-family: 'Orbitron'; font-size: 12px; color: #fff;">FOLLOW ADAMAS ON X</span>
                        <div id="pill-t4" class="status-pill">PENDING</div>
                    </div>
                </div>
            </div>

            <button id="wallet-btn" class="btn-primary" style="margin-top: 35px; opacity: 0.15; pointer-events: none;" onclick="finalRegistration()">UNLOCK DASHBOARD</button>
            <p id="lock-msg" style="font-size: 10px; color: #444; margin-top: 15px; font-family: 'Orbitron';">0/4 NODES SYNCED</p>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script> 
    
    <script>
        let activeWallet = null;

        window.onload = function() {
            if(localStorage.getItem('adamas_user')) { window.location.href = "dashboard.html"; return; }

            // LOOP FIX: Stay in social phase if wallet was connected in this session
            const tempWallet = sessionStorage.getItem('temp_wallet');
            if(tempWallet) {
                activeWallet = tempWallet;
                document.getElementById('connect-trigger').innerText = activeWallet.substring(0,6) + "..." + activeWallet.slice(-4);
                switchToSocialPhase();
            } else {
                document.getElementById('phase-intro').style.display = 'flex';
                document.getElementById('phase-intro').classList.add('active-phase');
            }
            
            restoreTasks();
        }

        async function handleEntry() {
            if (!window.ethereum) return alert("Please use Trust Wallet/MetaMask Browser");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                activeWallet = accounts[0].toLowerCase();
                sessionStorage.setItem('temp_wallet', activeWallet); // Important for back-navigation
                
                const snapshot = await db.ref('users/' + activeWallet).once('value');
                if (snapshot.exists()) {
                    localStorage.setItem('adamas_user', activeWallet);
                    window.location.href = "dashboard.html";
                } else {
                    switchToSocialPhase();
                }
            } catch (e) { alert("Connection Failed."); }
        }

        function switchToSocialPhase() {
            document.getElementById('phase-intro').style.display = 'none';
            document.getElementById('phase-social').style.display = 'flex';
            document.getElementById('phase-social').classList.add('active-phase');
            window.scrollTo(0,0);
        }

        // --- UPDATED AUTO-VERIFY (6 SECONDS AS REQUESTED) ---
        function autoVerify(id, link) {
            if(!activeWallet) return alert("Connect Wallet First!");
            if(localStorage.getItem('task_status_' + id) === 'verified') return;

            window.open(link, "_blank");
            const pill = document.getElementById('pill-' + id);
            pill.innerHTML = `<span class="sync-spinner"></span> SYNCING`;

            setTimeout(() => {
                localStorage.setItem('task_status_' + id, 'verified');
                updateUI(id);
                checkCompletion();
            }, 6000); // 6 Second wait time as requested
        }

        function updateUI(id) {
            const card = document.getElementById('card-' + id);
            const pill = document.getElementById('pill-' + id);
            if(card && pill) {
                card.classList.add('verified');
                pill.innerText = "VERIFIED";
                pill.style.background = "var(--p-green)";
                pill.style.color = "#000";
            }
        }

        function checkCompletion() {
            const verifiedCount = document.querySelectorAll('.task-card.verified').length;
            document.getElementById('lock-msg').innerText = verifiedCount + "/4 NODES SYNCED";
            
            if(verifiedCount >= 4) {
                const btn = document.getElementById('wallet-btn');
                btn.style.opacity = "1";
                btn.style.pointerEvents = "all";
                btn.style.background = "var(--cyan)";
                document.getElementById('lock-msg').style.color = "var(--p-green)";
                document.getElementById('lock-msg').innerText = "ALL NODES SYNCED";
            }
        }

        function restoreTasks() {
            for(let i=1; i<=4; i++) {
                if(localStorage.getItem('task_status_t' + i) === 'verified') updateUI('t' + i);
            }
            checkCompletion();
        }

        async function finalRegistration() {
            if(!activeWallet) return;
            try {
                const ref = localStorage.getItem('adamas_referrer') || "DIRECT";
                await db.ref('users/' + activeWallet).set({
                    balance: 800, wallet: activeWallet, referredBy: ref, joinedAt: new Date().toISOString()
                });
                localStorage.setItem('adamas_user', activeWallet);
                window.location.href = "dashboard.html";
            } catch (e) { alert("Registration Error."); }
        }
    </script>
</body>
</html>
