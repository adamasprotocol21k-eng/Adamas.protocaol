<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adamas Protocol | Web3 Gate</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero-section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #1a2026 0%, #0b0e11 100%); position: relative; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(10px); }
        
        .wallet-option {
            background: #1e2329; padding: 18px; border-radius: 16px; display: flex; align-items: center; 
            margin-bottom: 15px; cursor: pointer; border: 1px solid #333; transition: 0.2s; width: 100%;
        }
        .wallet-option:active { transform: scale(0.97); border-color: #F3BA2F; }
        .wallet-option img { width: 32px; height: 32px; margin-right: 15px; object-fit: contain; }
        .wallet-option span { font-weight: bold; color: #fff; font-size: 1rem; }

        /* Social Task Popup Inside Modal */
        #taskContent { display: none; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="hero-content" style="padding: 20px;">
            <h1 style="color: #F3BA2F; font-size: 3.5rem; margin-bottom: 5px; font-weight: 900;">ADAMAS</h1>
            <p style="color: #848e9c; margin-bottom: 40px; letter-spacing: 1px;">THE 21,000 SCARCITY ECOSYSTEM</p>
            <button class="btn-neon-large" onclick="openModal()">LAUNCH APP</button>
        </div>
    </div>

    <div id="mainModal" class="modal-overlay">
        <div class="glass-card" style="width: 90%; max-width: 360px; padding: 30px; text-align: center;">
            
            <div id="walletContent">
                <h3 style="color: #F3BA2F; margin-bottom: 25px;">Connect Wallet</h3>
                <div class="wallet-option" onclick="connectCryptoWallet('MetaMask')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Mirror_Logo.svg" alt="MetaMask">
                    <span>MetaMask</span>
                </div>
                <div class="wallet-option" onclick="connectCryptoWallet('TrustWallet')">
                    <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" alt="TrustWallet">
                    <span>Trust Wallet</span>
                </div>
                <p style="color: #ff4d4d; margin-top: 20px; font-size: 0.8rem; cursor: pointer;" onclick="closeModal()">Cancel</p>
            </div>

            <div id="taskContent">
                <h3 style="color: #F3BA2F; margin-bottom: 10px;">Pre-Launch Tasks</h3>
                <p style="font-size: 0.75rem; color: #848e9c; margin-bottom: 20px;">Follow us to unlock Dashboard</p>
                <button class="btn-neon-large" style="margin-bottom:10px; font-size:0.9rem;" onclick="window.open('https://twitter.com/')">FOLLOW ON X</button>
                <button class="btn-neon-large" style="background:transparent; border:1px solid #333; color:#fff;" onclick="enterDashboard()">GO TO DASHBOARD</button>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>

    <script>
        function openModal() { document.getElementById('mainModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('mainModal').style.display = 'none'; }

        async function connectCryptoWallet(type) {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const wallet = accounts[0];
                    
                    // Saving Wallet (Standard for all your files)
                    localStorage.setItem('adamas_wallet', wallet);
                    
                    // Switch to Social Tasks UI
                    document.getElementById('walletContent').style.display = 'none';
                    document.getElementById('taskContent').style.display = 'block';
                    
                    showNotification("Connected: " + type);
                } catch (err) {
                    showNotification("Connection Rejected");
                }
            } else {
                showNotification("No Wallet Found! Use DApp Browser.");
                setTimeout(() => {
                    window.location.href = "https://metamask.app.link/dapp/" + window.location.hostname;
                }, 2000);
            }
        }

        function enterDashboard() {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
