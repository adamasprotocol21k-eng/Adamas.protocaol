<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS Protocol | Diamond Universe</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.6.0/dist/web3.min.js"></script>
</head>
<body>

    <div id="authOverlay" class="overlay">
        <div class="auth-box">
            <h2>💎 Welcome to ADAMAS</h2>
            <button id="connectBtn" class="premium-btn">1. Connect Wallet</button>
            <div id="socialTasks" style="display:none;">
                <p>Follow to Unlock Dashboard</p>
                <a href="https://t.me/ADSProtocol" target="_blank" class="social-btn">Join Telegram</a>
                <a href="https://x.com/AdamasADS" target="_blank" class="social-btn">Follow Twitter</a>
                <button id="unlockBtn" class="premium-btn" style="margin-top:20px;">2. Enter Dashboard</button>
            </div>
        </div>
    </div>

    <main id="mainDash" style="opacity: 0.2; pointer-events: none;">
        <header>
            <div class="user-info">
                <span id="displayAddr">Address: 0x...</span>
                <div class="abp-box">
                    <img src="assets/diamond.png" width="20"> <span id="abpBalance">0.00</span> ABP
                </div>
            </div>
        </header>

        <section class="spin-section">
            <div class="wheel-container">
                <div id="wheel" class="fan">🎡</div>
            </div>
            <button class="spin-btn" onclick="spinFan()">🌀 Spin & Win (Upto 2000 ABP)</button>
        </section>

        <div class="action-grid">
            <button class="action-card" onclick="dailyCheckIn()">📅 Daily Check-in</button>
            <button class="action-card" onclick="instantClaim()">⚡ Instant Claim</button>
        </div>

        <nav class="main-nav">
            <div class="nav-item" onclick="showSection('gaming')">🎮 Gaming</div>
            <div class="nav-item" onclick="showSection('knowledge')">📚 Knowledge</div>
            <div class="nav-item" onclick="showSection('lottery')">🎟️ Lottery</div>
            <div class="nav-item" onclick="showSection('referral')">👥 Referral</div>
        </nav>

        <div id="gameContent" class="content-window">
            <div id="gaming" class="sub-section">
                <h3>Teen Patti (Triples) | Mime (Diamond)</h3>
                <button onclick="playTeenPatti()">Play Teen Patti</button>
                <button onclick="playMime()">Play Mime Game</button>
            </div>
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
