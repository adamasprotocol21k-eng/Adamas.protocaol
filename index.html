<!DOCTYPE html><html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adamas Protocol | ABP Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { --gold: #ffcc00; --gold-dark: #b8860b; --primary: #00d4ff; --secondary: #7000ff; --accent: #00ff88; --bg: #030508; --card-bg: rgba(255,255,255,0.05); --border: rgba(255,204,0,0.3); }
* { box-sizing: border-box; }
body { margin:0; font-family:'Rajdhani',sans-serif; background: var(--bg); color:#fff; overflow-x:hidden; background-image: radial-gradient(circle at center, #1a1a2e 0%, #030508 100%); }
.container { max-width:450px; margin:0 auto; padding:15px; padding-bottom:80px; }
.tab-nav-system { display:flex; justify-content:space-around; background:rgba(0,0,0,0.8); border:1px solid var(--border); border-radius:15px; padding:12px 5px; margin-bottom:20px; position:sticky; top:10px; z-index:1000; backdrop-filter:blur(15px); }
.tab-trigger { background:none; border:none; color:#666; font-family:'Orbitron'; font-size:0.6rem; cursor:pointer; transition:0.3s; padding:5px 10px; }
.tab-trigger.active-tab { color:var(--primary); text-shadow:0 0 10px var(--primary); }
.tab-pane { display:none; animation:slideIn 0.3s ease-out; }
.tab-pane.show { display:block; }
@keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(15px); z-index:20000; display:none; }
.modal-content { background:#111; border:2px solid var(--gold); border-radius:20px; padding:25px; width:90%; max-width:400px; text-align:center; }
.rank-card { background: var(--card-bg); border:1px solid var(--border); border-radius:20px; padding:25px 15px; margin-bottom:25px; text-align:center; }
#miningVal { font-family:'Orbitron'; font-size:2.2rem; background:linear-gradient(to bottom,#fff,var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:10px 0; }
.mission-box { background:var(--card-bg); border:1px solid var(--border); border-radius:18px; padding:22px 15px; margin-bottom:20px; position:relative; }
.step-tag { position:absolute; top:-12px; left:15px; background:linear-gradient(90deg,var(--gold-dark),var(--gold)); color:#000; padding:3px 12px; border-radius:6px; font-size:0.6rem; font-family:'Orbitron'; font-weight:bold; }
.btn-main { background:#000; color:#fff; border:1px solid var(--primary); padding:14px; border-radius:12px; width:100%; cursor:pointer; font-family:'Orbitron'; font-size:0.7rem; font-weight:bold; text-transform:uppercase; transition:0.2s; margin-top:10px; }
.btn-done { background:var(--accent) !important; color:#000 !important; border-color:var(--accent) !important; pointer-events:none; }
.checkin-container { display:flex; justify-content:space-between; margin-top:10px; }
.day-box { background:#111; border:1px solid #333; padding:5px; border-radius:8px; width:18%; font-size:0.6rem; text-align:center; }
.day-box.claimed { border-color:var(--accent); color:var(--accent); box-shadow:0 0 5px var(--accent); }
.slot-display { background:#000; border:2px solid #444; border-radius:10px; display:flex; justify-content:space-around; padding:8px; height:90px; overflow:hidden; }
.reel { width:30%; height:100%; background:#fff; border-radius:4px; font-size:2.2rem; display:flex; align-items:center; justify-content:center; transition: transform 1.5s cubic-bezier(0.1,0.9,0.3,1.0); flex-direction:column
