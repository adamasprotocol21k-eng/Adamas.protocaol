<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS PROTOCOL | SYSTEM INITIALIZE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container" style="max-width: 500px; margin: auto; height: 100vh;">
    <section id="phase-intro" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px;">
        <div class="brand-identity">
            <div class="logo-wrapper"><span class="main-logo-icon">A</span></div>
            <div class="brand-text"><span class="protocol-name">ADAMAS</span></div>
        </div>
        
        <div class="terminal-box">
            <div class="spec-row"><span class="spec-label">Administrator</span><span class="spec-value">PRO-ELITE CYBER</span></div>
            <div class="spec-row"><span class="spec-label">Environment</span><span class="spec-value">MAINNET V12.8</span></div>
            <div class="spec-row" style="border:none;"><span class="spec-label">Node Status</span><span class="spec-value" style="color:var(--p-green)">● ONLINE</span></div>
        </div>

        <p style="font-size: 10px; text-align: center; color: #888; margin-bottom: 20px; padding: 0 20px;">
            Initialize your node to synchronize decentralized infrastructure records.
        </p>

        <button class="btn-slanted" onclick="goToSocial()">INITIALIZE NODE</button>
    </section>

    <section id="phase-social" style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px;">
        <h2 style="font-family:'Orbitron'; color:var(--p-green); margin-bottom: 5px;">ELITE ACCESS</h2>
        <p style="font-size: 10px; color:#aaa; margin-bottom: 30px;">COMPLETE TASKS TO EARN 800 ABP</p>

        <div style="width: 100%;">
            <div class="premium-card" id="t1" style="padding: 15px; border-radius: 15px; cursor: pointer;" onclick="handleVerify('t1', 'https://t.me/ADSProtocol')">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div><span style="font-size: 11px; display: block; font-weight: bold;">JOIN TELEGRAM</span><span style="font-size: 9px; color: var(--p-green);">+400 ABP</span></div>
                    <div id="p-t1" style="font-size: 8px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px;">PENDING</div>
                </div>
            </div>
            <div class="premium-card" id="t2" style="padding: 15px; border-radius: 15px; cursor: pointer;" onclick="handleVerify('t2', 'https://x.com/AdamasADS')">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div><span style="font-size: 11px; display: block; font-weight: bold;">FOLLOW X COMMAND</span><span style="font-size: 9px; color: var(--p-green);">+400 ABP</span></div>
                    <div id="p-t2" style="font-size: 8px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px;">PENDING</div>
                </div>
            </div>
        </div>

        <button id="auth-btn" class="btn-slanted" style="opacity: 0.2; pointer-events: none; background: #fff;" onclick="connectFinal()">AUTHORIZE WALLET</button>
        <p id="msg" style="font-size: 9px; color: #ff3366; font-weight: 900; margin-top: 10px;">[!] COMPLETE ALL NODE CHECKS</p>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
        authDomain: "adamas-protocol-v2.firebaseapp.com",
        databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
        projectId: "adamas-protocol-v2",
        appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function goToSocial() {
        document.getElementById('phase-intro').style.display = 'none';
        document.getElementById('phase-social').style.display = 'flex';
    }

    let count = 0;
    function handleVerify(id, link) {
        window.open(link, '_blank');
        const pill = document.getElementById('p-' + id);
        const card = document.getElementById(id);
        if(pill.innerText !== "VERIFIED") {
            pill.innerText = "VERIFYING...";
            setTimeout(() => {
                pill.innerText = "VERIFIED";
                pill.style.background = "var(--p-green)";
                pill.style.color = "#000";
                card.style.borderColor = "var(--p-green)";
                count++;
                if(count >= 2) {
                    const btn = document.getElementById('auth-btn');
                    btn.style.opacity = "1"; btn.style.pointerEvents = "all"; btn.style.background = "var(--p-green)";
                    document.getElementById('msg').innerText = "NODE VERIFIED: 800 ABP READY";
                    document.getElementById('msg').style.color = "var(--p-green)";
                }
            }, 3000);
        }
    }

    async function connectFinal() {
        if (window.ethereum) {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const wallet = accounts[0];
            const userRef = db.ref('users/' + wallet);
            
            // 🔥 CRITICAL SYNC: Match with Dashboard.js
            await userRef.update({
                balance: 800.0000,
                abp_balance: 800.0000,
                wallet: wallet,
                streak: 1,
                miningStatus: false,
                lastClaim: "NEVER",
                joinedAt: new Date().toISOString()
            });

            localStorage.setItem('adamas_user', wallet);
            window.location.href = "dashboard.html";
        }
    }
</script>
</body>
</html>
