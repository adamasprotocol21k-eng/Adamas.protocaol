<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adamas Protocol</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

</head>

<body>

<header class="header">

<h1>🚀 Adamas Protocol</h1>

<button id="connectBtn">
🔗 Connect Wallet
</button>

<p id="walletAddress"></p>

</header>


<section class="dashboard">

<h2>🎮 User Dashboard</h2>

<div class="grid">

<div class="card" onclick="openCheckin()">

<span>🎁</span>

<h3>Daily Check-In</h3>

<p>Earn ABP points every day</p>

</div>


<div class="card" onclick="openLottery()">

<span>🎲</span>

<h3>Lottery</h3>

<p>Try your luck and win rewards</p>

</div>


<div class="card" onclick="openGames()">

<span>🎮</span>

<h3>Mini Games</h3>

<p>Play games and earn points</p>

</div>


<div class="card" onclick="openLeaderboard()">

<span>🏆</span>

<h3>Leaderboard</h3>

<p>Top players ranking</p>

</div>

</div>

</section>


<section class="points">

<h2>💎 ABP Points</h2>

<p id="points">0</p>

</section>


<footer>

<p>© Adamas Protocol</p>

</footer>


<script src="config.js"></script>
<script src="app.js"></script>

</body>

</html>
