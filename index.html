<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamas Protocol | Diamond Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.6.0/dist/web3.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="maintenance-screen" style="display:none;">
        <div class="diamond-icon">💎</div>
        <h1 class="diamond-text">ADAMAS PROTOCOL</h1>
        <p>System Upgrade in Progress...</p>
        <p style="color: #64748b;">Hum Mainnet deployment ki taiyari kar rahe hain. Jald hi milenge!</p>
        <a href="https://t.me/ADSProtocol" class="social-link">Join Official Channel 📢</a>
    </div>

    <div id="gateway" style="display:none;" class="glass-panel">
        <h2 class="diamond-text">COMMUNITY FIRST</h2>
        <p>Pehle niche diye gaye tasks pure karein:</p>
        <button onclick="verifySocial('ch', 'https://t.me/ADSProtocol')" id="ch-btn">Join Channel 📢</button>
        <button onclick="verifySocial('gr', 'https://t.me/adsprotocolcommunity')" id="gr-btn">Join Community 👥</button>
        <button onclick="verifySocial('tw', 'https://x.com/AdamasADS')" id="tw-btn">Follow Twitter 🐦</button>
        <button id="unlock-btn" disabled onclick="unlockPortal()">UNLOCK DASHBOARD 🚀</button>
    </div>

    <div id="main-dashboard" style="display:none;">
        <header>
            <span class="diamond-text">ADAMAS PORTAL</span>
            <button id="walletBtn" onclick="connectWallet()">CONNECT WALLET</button>
        </header>

        <div class="stats-card">
            <small>Live ADS Balance</small>
            <div id="ads-balance">0.00 ADS</div>
            <button class="claim-btn" onclick="claimTokens()">CLAIM FROM CONTRACT ⚓</button>
        </div>

        <div class="puzzle-section">
            <h3 class="diamond-text">Restore Logo (0-3000 ABP)</h3>
            <div id="puzzle-board"></div>
            <button class="btn-verify" onclick="checkWin()">VERIFY & EARN 💰</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
