<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .top-three {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 20px 0;
            padding: 10px;
        }
        .podium {
            background: var(--card-glass);
            border: 1px solid var(--border-dim);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            flex: 1;
        }
        .rank-1 { height: 140px; border-color: var(--binance-yellow); box-shadow: 0 0 15px rgba(243, 186, 47, 0.2); }
        .rank-2 { height: 110px; }
        .rank-3 { height: 100px; }
        
        .leader-list { margin-top: 20px; }
        .leader-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border-dim);
        }
        .medal { font-size: 1.2rem; }
    </style>
</head>
<body onload="updateUI()">

    <div class="header-pro" style="padding: 20px; text-align: center;">
        <h2 style="color: var(--binance-yellow);">🏆 LEADERBOARD</h2>
        <p style="font-size: 0.8rem; color: var(--text-sub);">Top ABP Earners & Legends</p>
    </div>

    <div class="top-three">
        <div class="podium rank-2">
            <div class="medal">🥈</div>
            <small style="font-size: 0.6rem;">0x8b...3a2</small>
            <h5 class="text-neon-blue">1.2M</h5>
        </div>
        <div class="podium rank-1">
            <div class="medal">🥇</div>
            <small style="font-size: 0.6rem;">0xf3...9bc</small>
            <h5 class="text-neon-yellow">2.5M</h5>
        </div>
        <div class="podium rank-3">
            <div class="medal">🥉</div>
            <small style="font-size: 0.6rem;">0x1d...4e1</small>
            <h5 class="text-neon-blue">980K</h5>
        </div>
    </div>

    <div style="padding: 0 15px;" class="leader-list">
        <h5 style="margin-bottom: 15px; color: var(--text-sub);">GLOBAL RANKINGS</h5>
        
        <div class="leader-item" style="border-color: var(--neon-blue); background: rgba(0, 210, 255, 0.05);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-weight: bold; color: var(--neon-blue);">#42</span>
                <span>You (0x...)</span>
            </div>
            <span id="userBalance" class="text-neon-blue">0 ABP</span>
        </div>

        <div class="leader-item">
            <span>#4. 0x5a...c2d</span>
            <span>850,400</span>
        </div>
        <div class="leader-item">
            <span>#5. 0x92...1f3</span>
            <span>720,100</span>
        </div>
        <div class="leader-item">
            <span>#6. 0xcc...8b4</span>
            <span>610,000</span>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠<br>Home</a>
        <a href="earn.html" class="nav-item">⛏️<br>Earn</a>
        <a href="stake.html" class="nav-item">🔐<br>Stake</a>
        <a href="refer.html" class="nav-item">👥<br>Refer</a>
        <a href="wallet.html" class="nav-item">💰<br>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        // Update user's current points in the list
        window.addEventListener('load', () => {
            const bal = userStats.balance.toLocaleString();
            document.getElementById('userBalance').innerText = bal + " ABP";
        });
    </script>
</body>
</html>
