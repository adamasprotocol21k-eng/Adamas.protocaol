<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite & Earn | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-animation"></div>

    <div class="container" style="padding-top: 80px; text-align: center;">
        <div class="glass-card" style="max-width: 450px; margin: auto;">
            <h2 style="color: var(--primary-neon);">Invite Friends</h2>
            <p style="font-size: 0.8rem; opacity: 0.7;">Get 10% of their Lottery entries & 100 ABP per signup!</p>

            <div style="margin: 30px 0;">
                <label style="font-size: 0.7rem; display: block; text-align: left; margin-bottom: 5px; opacity: 0.5;">Your Referral Link</dt>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="refLink" readonly value="https://adamas.io/join?ref=0x..." style="flex:1; background: rgba(0,0,0,0.5); border: 1px solid var(--primary-neon); color: white; padding: 10px; border-radius: 5px; font-size: 0.8rem;">
                    <button class="neon-btn" onclick="copyRef()" style="padding: 10px 15px;">Copy</button>
                </div>
            </div>

            <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <h4>Join Our Community</h4>
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 15px;">
                    <a href="https://t.me/daimodmo" target="_blank" class="neon-btn" style="font-size: 0.7rem; border-color: #229ED9; color: #229ED9;">Telegram</a>
                    <a href="https://twitter.com/DiamoProtocol" target="_blank" class="neon-btn" style="font-size: 0.7rem; border-color: #1DA1F2; color: #1DA1F2;">Twitter</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function copyRef() {
            const copyText = document.getElementById("refLink");
            copyText.select();
            document.execCommand("copy");
            alert("Link copied to clipboard!");
        }
        
        // Auto-fill wallet in link
        window.addEventListener('load', () => {
            if(userWallet) {
                document.getElementById('refLink').value = `https://adamas.io/join?ref=${userWallet}`;
            }
        });
    </script>
</body>
</html>
