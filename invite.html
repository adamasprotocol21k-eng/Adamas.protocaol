<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invite & Earn | Adamas Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ref-box {
            background: rgba(243, 186, 47, 0.05);
            border: 1px dashed #F3BA2F;
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            margin: 20px 0;
        }
        .link-display {
            background: #000;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.7rem;
            color: #00ff88;
            margin: 15px 0;
            word-break: break-all;
            border: 1px solid #1e2329;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: #1e2329;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body onload="initInvitePage()">

    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="color: #F3BA2F; margin: 0; font-weight: 900;">NETWORK</h2>
        <div class="bal-badge" style="background: #1e2329; color: #F3BA2F; padding: 6px 15px; border-radius: 50px; font-weight: bold; border: 1px solid #F3BA2F;">
            <span id="balance">0</span> <small>ABP</small>
        </div>
    </div>

    <div style="padding: 0 20px;">
        <div style="text-align: center; margin-top: 10px;">
            <h3 style="margin-bottom: 5px;">Expand Your Fleet</h3>
            <p style="color: #848e9c; font-size: 0.8rem;">Get 500 ABP for every pilot who joins through your link.</p>
        </div>

        <div class="ref-box">
            <small style="color: #848e9c; letter-spacing: 1px;">YOUR UNIQUE INVITE LINK</small>
            <div id="refLink" class="link-display">Generating link...</div>
            <button class="btn-neon-large" style="width: 100%;" onclick="copyInviteLink()">COPY LINK</button>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <small style="color: #848e9c;">Total Referrals</small>
                <h2 id="refCount" style="color: #fff; margin: 10px 0;">0</h2>
            </div>
            <div class="stat-card">
                <small style="color: #848e9c;">Network Bonus</small>
                <h2 id="refBonus" style="color: #00ff88; margin: 10px 0;">0</h2>
            </div>
        </div>

        <div class="glass-card" style="margin-top: 20px; padding: 20px; border-radius: 18px; background: linear-gradient(to right, rgba(243,186,47,0.1), transparent);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 1.5rem;">🚀</span>
                <div>
                    <b style="font-size: 0.85rem; display: block;">Ambassador Rank</b>
                    <small style="color: #848e9c;">Invite 10 friends to unlock 2x Mining Speed.</small>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="games.html" class="nav-item">🎮 Games</a>
        <a href="earn.html" class="nav-item">⛏️ Earn</a>
        <a href="invite.html" class="nav-item active">🔗 Invite</a>
        <a href="wallet.html" class="nav-item">💰 Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>

    <script>
        function initInvitePage() {
            updateAllUI();
            
            // Get Wallet from LocalStorage (Linked to app.js)
            const wallet = localStorage.getItem('adamas_wallet') || "0xGuest";
            
            // 1. Generate Dynamic Link
            // Note: Change 'yourdomain.com' to your actual hosting URL
            const inviteLink = window.location.origin + "/index.html?ref=" + wallet;
            document.getElementById('refLink').innerText = inviteLink;

            // 2. Fetch Live Stats from Firebase
            if(wallet !== "0xGuest") {
                db.ref('users/' + wallet).on('value', (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        document.getElementById('refCount').innerText = data.referralCount || 0;
                        document.getElementById('refBonus').innerText = (data.referralEarnings || 0) + " ABP";
                    }
                });
            }
        }

        function copyInviteLink() {
            const linkText = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                showNotification("Link Copied to Clipboard!");
            });
        }
    </script>
</body>
</html>
