<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Invite & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        /* --- HEADER & TOP NAV (As per your Screenshot) --- */
        .header-section {
            padding: 15px 20px; background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
        }

        .profile-header {
            display: flex; align-items: center; gap: 15px; margin-bottom: 15px;
            padding: 8px 15px; background: var(--glass); border-radius: 50px;
            border: 1px solid rgba(0, 242, 255, 0.1); width: fit-content;
        }
        .mini-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        .top-nav-bar {
            display: flex; justify-content: space-around; background: rgba(255, 255, 255, 0.03);
            padding: 12px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.1);
        }
        .nav-btn {
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s;
        }
        .nav-btn.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .nav-btn i { font-size: 1.1rem; }
        .nav-btn span { font-size: 0.55rem; font-family: 'Orbitron'; letter-spacing: 1px; }

        /* --- INVITE CONTENT --- */
        .container { padding: 30px 20px 100px; max-width: 500px; margin: auto; text-align: center; }

        .invite-card {
            background: var(--glass); border-radius: 30px; padding: 30px 20px;
            border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .reward-badge {
            background: rgba(255, 204, 0, 0.1); color: var(--gold);
            padding: 10px 20px; border-radius: 50px; font-family: 'Orbitron';
            font-size: 0.8rem; display: inline-block; margin-bottom: 20px;
            border: 1px solid var(--gold);
        }

        .link-box {
            background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px;
            display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.1);
            margin: 20px 0;
        }
        .link-input {
            background: transparent; border: none; color: white; width: 100%;
            font-family: 'Rajdhani'; font-size: 0.9rem; outline: none;
        }

        .copy-btn {
            background: var(--primary); color: black; border: none;
            padding: 10px 20px; border-radius: 12px; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; font-size: 0.7rem;
        }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .social-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 20px; text-decoration: none; color: white;
            display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 0.7rem; font-family: 'Orbitron';
        }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header-section">
        <div class="profile-header">
            <img src="assets/logo.png" class="mini-avatar">
            <div style="font-weight: bold; font-family: 'Orbitron'; font-size: 0.8rem; color: var(--primary);">Hanuman Verma</div>
        </div>

        <div class="top-nav-bar">
            <a href="dashboard.html" class="nav-btn"><i class="fas fa-th-large"></i><span>HOME</span></a>
            <a href="games.html" class="nav-btn"><i class="fas fa-gamepad"></i><span>GAMES</span></a>
            <a href="wallet.html" class="nav-btn"><i class="fas fa-wallet"></i><span>WALLET</span></a>
            <a href="invite.html" class="nav-btn active"><i class="fas fa-users"></i><span>FRIENDS</span></a>
            <a href="profile.html" class="nav-btn"><i class="fas fa-user-astronaut"></i><span>USER</span></a>
        </div>
    </div>

    <div class="container">
        <div class="invite-card">
            <div class="reward-badge">NEW USER BONUS: +100 ABP</div>
            <h1 style="font-family: 'Orbitron'; color: var(--primary); font-size: 1.5rem;">REFER & EARN</h1>
            <p style="opacity: 0.7;">Invite friends to ADAMAS and get <span style="color:var(--gold)">10%</span> of their game rewards directly in your balance!</p>

            <div class="link-box">
                <input type="text" id="refLink" class="link-input" value="https://adamas.io/join?ref=hanuman" readonly>
                <button class="copy-btn" onclick="copyAndEarn()">COPY</button>
            </div>

            <div class="social-grid">
                <a href="https://t.me/daimodmo" class="social-btn"><i class="fab fa-telegram" style="color: #229ED9; font-size: 1.5rem;"></i>TELEGRAM</a>
                <a href="https://twitter.com/DiamoProtocol" class="social-btn"><i class="fab fa-x-twitter" style="font-size: 1.5rem;"></i>TWITTER</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Background Animation
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(400 * 3);
        for(let i=0; i<1200; i++) posArray[i] = (Math.random()-0.5)*10;
        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0x00f2ff });
        const mesh = new THREE.Points(geometry, material);
        scene.add(mesh); camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); mesh.rotation.y += 0.001; renderer.render(scene, camera); } animate();

        // 2. Earning Logic (Direct to Dashboard)
        function copyAndEarn() {
            const link = document.getElementById('refLink');
            link.select();
            document.execCommand('copy');
            
            // Referral Bonus Logic
            let currentBal = parseFloat(localStorage.getItem('lastBalance') || "0");
            currentBal += 100; // Adding 100 ABP for referral simulation
            localStorage.setItem('lastBalance', currentBal);
            
            alert("Referral Link Copied! 100 ABP Bonus has been added to your Main Balance. 🚀");
        }
    </script>
</body>
</html>
