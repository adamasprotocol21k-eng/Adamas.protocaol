<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Games | Adamas</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10000; }
        .game-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:20px; text-align:center; }
    </style>
</head>
<body>
    <div style="padding:20px; display:flex; justify-content:space-between;">
        <h2 style="color:#F3BA2F; margin:0;">GAMES</h2>
        <div style="background:#1e2329; padding:5px 15px; border-radius:50px; color:#F3BA2F; border:1px solid #F3BA2F;"><span id="headerBalance">0</span> ABP</div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px;">
        <div class="game-card" onclick="openScratch()"><span>🧧</span><h4>Scratch</h4></div>
        <div class="game-card" onclick="openMines()"><span>💣</span><h4>Mines</h4></div>
    </div>

    <div id="scratchModal" class="modal">
        <h3 style="color:#F3BA2F">SCRATCH CARD</h3>
        <div style="position:relative; width:300px; height:150px; background:#fff; border-radius:15px; overflow:hidden;">
            <div id="rewardTxt" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#000; font-size:2rem; font-weight:bold;">0 ABP</div>
            <canvas id="scratchCanvas" width="300" height="150" style="position:absolute; inset:0; touch-action:none;"></canvas>
        </div>
        <button class="btn-neon" style="margin-top:30px; width:200px;" onclick="collectGameReward()">COLLECT ABP</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="games.html" class="nav-item active">🎮 Games</a>
        <a href="earn.html" class="nav-item">⛏️ Earn</a>
        <a href="invite.html" class="nav-item">🔗 Invite</a>
        <a href="wallet.html" class="nav-item">💰 Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        let pending = 0;
        function openScratch() {
            document.getElementById('scratchModal').style.display='flex';
            const canvas = document.getElementById('scratchCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle='#888'; ctx.fillRect(0,0,300,150);
            pending = Math.floor(Math.random()*500)+100;
            document.getElementById('rewardTxt').innerText = pending + " ABP";
            
            canvas.ontouchmove = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                const y = e.touches[0].clientY - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x,y,20,0,Math.PI*2); ctx.fill();
            }
        }
        function collectGameReward() {
            if(pending > 0) {
                window.userStats.balance += pending;
                saveToFirebase();
                showNotification("Collected " + pending + " ABP!");
                pending = 0;
            }
            document.getElementById('scratchModal').style.display='none';
        }
    </script>
</body>
</html>
