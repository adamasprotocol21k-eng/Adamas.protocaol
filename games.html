<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Gaming Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
            --danger: #ff4444;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
            background: radial-gradient(circle at top right, #0a0b14, #05060a);
            min-height: 100vh;
        }

        .container { padding: 20px; max-width: 500px; margin: auto; padding-bottom: 120px; }
        
        /* Top Bar & Balance */
        .top-bar { display: flex; justify-content: flex-end; padding: 10px 0; margin-bottom: 20px; position: sticky; top: 0; z-index: 50; }
        .balance-pill { 
            background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--primary); 
            padding: 8px 18px; 
            border-radius: 50px; 
            font-family: 'Orbitron'; 
            font-size: 0.85rem; 
            color: var(--primary); 
            box-shadow: 0 0 15px rgba(0,242,255,0.2);
            backdrop-filter: blur(10px);
        }

        .hub-title { text-align: center; font-family: 'Orbitron'; font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 30px; text-transform: uppercase; }
        .hub-title span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        
        /* Game Cards */
        .game-list { display: flex; flex-direction: column; gap: 20px; }
        .game-card { 
            background: var(--glass); border-radius: 20px; padding: 20px; 
            display: flex; align-items: center; gap: 20px; text-decoration: none; 
            color: white; border: 1px solid rgba(255,255,255,0.05); 
            position: relative; overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(10px); 
        }
        
        .game-card::before { content: ''; position: absolute; left: 0; top: 0; width: 5px; height: 100%; transition: 0.3s; }
        .card-mines::before { background: var(--danger); box-shadow: 2px 0 10px var(--danger); }
        .card-scratch::before { background: var(--primary); box-shadow: 2px 0 10px var(--primary); }
        .card-spin::before { background: var(--gold); box-shadow: 2px 0 10px var(--gold); }
        .card-patti::before { background: var(--secondary); box-shadow: 2px 0 10px var(--secondary); }
        
        .game-card:hover { 
            background: rgba(255,255,255,0.1); 
            transform: translateY(-5px) scale(1.02); 
            border-color: rgba(255,242,255,0.3); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        
        .game-icon { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        .game-info { flex: 1; }
        .game-name { font-family: 'Orbitron'; font-size: 1.1rem; margin-bottom: 4px; letter-spacing: 1px; }
        .game-desc { font-size: 0.75rem; opacity: 0.6; font-weight: 500; }

        /* Nav Bar */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(20px); border-radius: 25px; padding: 12px; display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-link { color: rgba(255,255,255,0.4); text-decoration: none; text-align: center; transition: 0.3s; }
        .nav-link.active { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
        .nav-link i { font-size: 1.2rem; }
        .nav-link span { display: block; font-size: 0.55rem; font-family: 'Orbitron'; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <div class="balance-pill"><span id="liveBal">0</span> ABP</div>
        </div>

        <h2 class="hub-title">GAMING <span>HUB</span></h2>

        <div class="game-list">
            <a href="mines.html" class="game-card card-mines">
                <div class="game-icon">💣</div>
                <div class="game-info">
                    <div class="game-name" style="color: var(--danger);">Mines Jackpot</div>
                    <div class="game-desc">High Risk • Up to 25x Multiplier</div>
                </div>
            </a>

            <a href="scratch.html" class="game-card card-scratch">
                <div class="game-icon">✨</div>
                <div class="game-info">
                    <div class="game-name" style="color: var(--primary);">Lucky Scratch</div>
                    <div class="game-desc">Daily Free • Win up to 2,000 ABP</div>
                </div>
            </a>

            <a href="spin.html" class="game-card card-spin">
                <div class="game-icon">🎡</div>
                <div class="game-info">
                    <div class="game-name" style="color: var(--gold);">Mega Spin</div>
                    <div class="game-desc">Wheel of Fortune • 50,000 ABP Pool</div>
                </div>
            </a>

            <a href="teenpatti.html" class="game-card card-patti">
                <div class="game-icon">🃏</div>
                <div class="game-info">
                    <div class="game-name" style="color: var(--secondary);">Teen Patti Royale</div>
                    <div class="game-desc">Skill & Luck • Classic 3-Card Poker</div>
                </div>
            </a>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i><span>HOME</span></a>
        <a href="games.html" class="nav-link active"><i class="fas fa-gamepad"></i><span>GAMES</span></a>
        <a href="wallet.html" class="nav-link"><i class="fas fa-wallet"></i><span>WALLET</span></a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user-astronaut"></i><span>USER</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Pre-load from local storage for instant UI
        const cachedBal = localStorage.getItem('lastBalance') || "0";
        document.getElementById('liveBal').innerText = Math.floor(cachedBal).toLocaleString();

        async function connectAndSync() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (accounts.length > 0) {
                        const userWallet = accounts[0];
                        const userShort = userWallet.substring(0, 10);
                        
                        // Real-time listener
                        onValue(ref(db, 'users/' + userShort), (snapshot) => {
                            const data = snapshot.val();
                            if (data) {
                                const bal = data.currentBalance || 0;
                                // Update UI
                                document.getElementById('liveBal').innerText = Math.floor(bal).toLocaleString();
                                // Cache it
                                localStorage.setItem('lastBalance', bal);
                            }
                        });
                    } else {
                        // If wallet not connected, check if we have it in storage
                        const savedWallet = localStorage.getItem('userWallet');
                        if (savedWallet) connectAndSync(); 
                    }
                } catch (err) {
                    console.error("Sync failed", err);
                }
            }
        }

        window.onload = connectAndSync;
    </script>
</body>
</html>
