<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Games Arena | Adamas Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .game-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; padding: 25px 15px; text-align: center; transition: 0.3s;
        }
        .game-card:active { transform: scale(0.95); background: rgba(243, 186, 47, 0.1); }
        .game-card .emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* Modern Modal Layout */
        .game-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; padding: 20px;
        }

        /* Mines Logic UI */
        .mines-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .tile { 
            width: 55px; height: 55px; background: #2b3139; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer;
        }
        .tile.revealed { background: #1e2329; border: 1px solid #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
    </style>
</head>
<body onload="updateAllUI()">

    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e2329;">
        <h2 style="color: #F3BA2F; margin: 0; font-weight: 900;">ARCADE</h2>
        <div class="bal-badge" style="background: #1e2329; color: #F3BA2F; padding: 6px 15px; border-radius: 50px; font-weight: bold; border: 1px solid #F3BA2F;">
            <span id="balance">0</span> <small>ABP</small>
        </div>
    </div>

    <div class="game-grid">
        <div class="game-card" onclick="openGame('scratchBox')">
            <span class="emoji">🧧</span>
            <b>Scratch & Win</b>
            <div style="color: #00ff88; font-size: 0.7rem; margin-top: 5px;">Win upto 2000</div>
        </div>

        <div class="game-card" onclick="openGame('minesBox')">
            <span class="emoji">💣</span>
            <b>Mines</b>
            <div style="color: #00ff88; font-size: 0.7rem; margin-top: 5px;">Multipliers 2x-50x</div>
        </div>

        <div class="game-card" onclick="openGame('cardBox')">
            <span class="emoji">🃏</span>
            <b>Teen Patti</b>
            <div style="color: #00ff88; font-size: 0.7rem; margin-top: 5px;">High Roller Game</div>
        </div>

        <div class="game-card" onclick="location.href='lottery.html'">
            <span class="emoji">🎡</span>
            <b>Jackpot</b>
            <div style="color: #00ff88; font-size: 0.7rem; margin-top: 5px;">Next Draw: 15 Days</div>
        </div>
    </div>

    <div id="minesBox" class="game-modal">
        <h3 style="color: #F3BA2F;">MINES (Bet: 100 ABP)</h3>
        <div class="mines-board" id="minesBoard"></div>
        <div id="minesStatus" style="color: #848e9c; margin-bottom: 20px;">Avoid 3 Bombs to multiply!</div>
        <button class="btn-neon-large" style="width: 200px;" onclick="startMines()">START NEW GAME</button>
        <p style="color: #ff4d4d; margin-top: 20px;" onclick="closeModal('minesBox')">EXIT GAME</p>
    </div>

    <div id="scratchBox" class="game-modal">
        <h3 style="color: #F3BA2F;">MAGIC SCRATCH</h3>
        <div style="position: relative; width: 300px; height: 150px; background: #fff; border-radius: 15px; overflow: hidden;">
            <div id="scratchReward" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #000; font-size: 2rem; font-weight: 900;">0 ABP</div>
            <canvas id="scratchCanvas" width="300" height="150" style="position: absolute; inset: 0; touch-action: none; cursor: crosshair;"></canvas>
        </div>
        <button class="btn-neon-large" style="margin-top: 30px; width: 220px;" onclick="collectScratchReward()">COLLECT & EXIT</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="games.html" class="nav-item active">🎮 Games</a>
        <a href="earn.html" class="nav-item">⛏️ Earn</a>
        <a href="invite.html" class="nav-item">🔗 Invite</a>
        <a href="wallet.html" class="nav-item">💰 Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>

    <script>
        function openGame(id) {
            document.getElementById(id).style.display = 'flex';
            if(id === 'scratchBox') initScratch();
            if(id === 'minesBox') initMines();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // --- MINES LOGIC (Betting) ---
        let mines = [];
        let gameActive = false;
        function initMines() {
            const board = document.getElementById('minesBoard');
            board.innerHTML = '';
            for(let i=0; i<25; i++) {
                const t = document.createElement('div');
                t.className = 'tile';
                t.onclick = () => revealTile(i, t);
                board.appendChild(t);
            }
        }

        function startMines() {
            if(window.userStats.balance < 100) return showNotification("Min Bet 100 ABP Required!");
            window.userStats.balance -= 100;
            saveToFirebase();
            mines = Array.from({length: 3}, () => Math.floor(Math.random() * 25));
            gameActive = true;
            initMines();
            showNotification("Game Started! 100 ABP Bet.");
        }

        function revealTile(idx, el) {
            if(!gameActive || el.classList.contains('revealed')) return;
            el.classList.add('revealed');
            if(mines.includes(idx)) {
                el.innerHTML = '💣'; el.style.background = 'red';
                gameActive = false;
                showNotification("BOOM! You lost the bet.");
                setTimeout(() => closeModal('minesBox'), 1500);
            } else {
                el.innerHTML = '💎';
                window.userStats.balance += 150; // Win logic
                saveToFirebase();
            }
        }

        // --- SCRATCH LOGIC ---
        let scratchVal = 0;
        function initScratch() {
            const canvas = document.getElementById('scratchCanvas');
            const ctx = canvas.getContext('2d');
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#888'; ctx.fillRect(0,0,300,150);
            scratchVal = Math.floor(Math.random()*500)+50;
            document.getElementById('scratchReward').innerText = scratchVal + " ABP";

            canvas.ontouchmove = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                const y = e.touches[0].clientY - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x,y,25,0,Math.PI*2); ctx.fill();
            }
        }

        function collectScratchReward() {
            if(scratchVal > 0) {
                window.userStats.balance += scratchVal;
                saveToFirebase();
                showNotification(`Added ${scratchVal} ABP!`);
                scratchVal = 0;
            }
            closeModal('scratchBox');
        }
    </script>
</body>
</html>
