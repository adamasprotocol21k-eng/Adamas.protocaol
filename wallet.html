<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS WALLET | Secure Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        /* 3D Canvas Background */
        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .container { padding: 30px 20px 100px; max-width: 500px; margin: auto; }

        /* Wallet Balance Card (Main Hero) */
        .wallet-card {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.2), rgba(0, 242, 255, 0.1));
            border-radius: 30px; padding: 40px 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            margin-bottom: 30px; transform-style: preserve-3d;
        }

        .balance-label { font-size: 0.8rem; letter-spacing: 3px; opacity: 0.6; margin-bottom: 10px; }
        .balance-amount {
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem;
            color: var(--gold); text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        /* Action Buttons */
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .action-btn {
            flex: 1; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            background: var(--glass); color: white; font-family: 'Orbitron'; font-size: 0.9rem;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .action-btn:hover { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }

        /* Transactions Section */
        .section-title { font-family: 'Orbitron'; font-size: 1rem; margin-bottom: 15px; opacity: 0.8; }
        
        .transaction-list { display: flex; flex-direction: column; gap: 12px; }
        
        .tx-item {
            background: var(--glass); border-radius: 20px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .tx-item:hover { border-color: var(--secondary); transform: translateX(5px); }
        
        .tx-info h4 { margin: 0; font-size: 1.1rem; }
        .tx-info p { margin: 0; font-size: 0.8rem; opacity: 0.5; }
        
        .tx-amount { font-family: 'Orbitron'; font-weight: bold; color: #00ff88; }

        /* Floating Nav Dock */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 11, 16, 0.8); backdrop-filter: blur(20px);
            padding: 10px 25px; border-radius: 100px; display: flex; gap: 25px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .dock-item { text-decoration: none; font-size: 1.2rem; opacity: 0.5; transition: 0.3s; }
        .dock-item.active { opacity: 1; color: var(--primary); transform: scale(1.2); }

    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <div style="font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px;">ADAMAS <span style="color: var(--primary);">WALLET</span></div>
        <div style="font-size: 0.8rem; opacity: 0.5;" id="userAddress">0x...</div>
    </div>

    <div class="container">
        <div class="wallet-card">
            <div class="balance-label">AVAILABLE BALANCE</div>
            <div class="balance-amount" id="walletBalance">0</div>
            <div style="font-size: 0.9rem; opacity: 0.6; margin-top: 5px;">ABP TOKENS</div>
            
            <div class="btn-group">
                <button class="action-btn">WITHDRAW</button>
                <button class="action-btn">SWAP</button>
            </div>
        </div>

        <div class="section-title">RECENT TRANSACTIONS</div>
        <div class="transaction-list">
            <div class="tx-item">
                <div class="tx-info">
                    <h4>Welcome Bonus</h4>
                    <p>Social Tasks Verification</p>
                </div>
                <div class="tx-amount">+300 ABP</div>
            </div>
            
            <div class="tx-item" style="opacity: 0.5;">
                <div class="tx-info">
                    <h4>Daily Mining</h4>
                    <p>Session: 2026-03-15</p>
                </div>
                <div class="tx-amount" id="miningRewards">+0.00 ABP</div>
            </div>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item">🏠</a>
        <a href="wallet.html" class="dock-item active">💰</a>
        <a href="invite.html" class="dock-item">👥</a>
        <a href="profile.html" class="dock-item">👤</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/app.js"></script>

    <script>
        // 1. THREE.JS Background (Synchronized with Dashboard)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(1000 * 3);
        for(let i=0; i < 3000; i++) posArray[i] = (Math.random() - 0.5) * 10;
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0x7000ff }); // Wallet theme thoda purple
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);
        camera.position.z = 3;

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // 2. Data Sync logic
        window.onload = function() {
            const addr = localStorage.getItem('userWallet');
            if(addr) {
                document.getElementById('userAddress').innerText = addr.substring(0,6) + '...' + addr.substring(38);
            }
            // Fetch balance from storage/firebase
            const savedBalance = localStorage.getItem('lastBalance') || "0";
            document.getElementById('walletBalance').innerText = parseFloat(savedBalance).toFixed(2);
        }
    </script>
</body>
</html>
