<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet | Adamas Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wallet-header {
            background: linear-gradient(180deg, #1e2329 0%, #0b0e11 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #1e2329;
        }
        .balance-main { font-size: 3rem; font-weight: 900; color: #F3BA2F; margin: 10px 0; }
        .address-box {
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            color: #848e9c;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .history-list { padding: 0 20px 100px; }
        .history-item {
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #F3BA2F;
        }
    </style>
</head>
<body onload="updateAllUI()">

    <div class="wallet-header">
        <small style="color: #848e9c; letter-spacing: 1.5px;">AVAILABLE BALANCE</small>
        <div class="balance-main"><span id="walletBalance">0</span></div>
        <div class="address-box" id="userWalletAddr">0x...</div>
    </div>

    <div class="action-grid">
        <button class="btn-neon-large" onclick="openWithdraw()">WITHDRAW</button>
        <button class="btn-neon-large" style="background:transparent; border:1px solid #333; color:#848e9c;" onclick="showNotification('Airdrop Coming Soon!')">SWAP</button>
    </div>

    <div class="history-list">
        <h4 style="color: #848e9c; margin-bottom: 15px;">RECENT TRANSACTIONS</h4>
        <div id="txHistory">
            <div class="history-item">
                <div>
                    <b style="font-size: 0.85rem;">Welcome Bonus</b><br>
                    <small style="color: #848e9c;">Social Tasks</small>
                </div>
                <div style="color: #00ff88; font-weight: bold;">+300 ABP</div>
            </div>
            </div>
    </div>

    <div id="withdrawModal" class="social-popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:10000;">
        <div class="glass-card" style="width: 90%; max-width: 350px; padding: 25px;">
            <h3 style="color: #F3BA2F; margin-top:0;">WITHDRAW ABP</h3>
            <p style="font-size: 0.75rem; color: #848e9c;">Min Withdraw: 5,000 ABP</p>
            
            <input type="number" id="withdrawAmt" placeholder="Enter Amount" style="width:100%; background:#000; border:1px solid #333; padding:15px; border-radius:12px; color:#fff; margin:15px 0;">
            
            <button class="btn-neon-large" onclick="processWithdrawal()">CONFIRM WITHDRAW</button>
            <p style="color: #ff4d4d; text-align: center; margin-top: 15px; font-size: 0.8rem;" onclick="document.getElementById('withdrawModal').style.display='none'">CANCEL</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">🏠 Home</a>
        <a href="games.html" class="nav-item">🎮 Games</a>
        <a href="earn.html" class="nav-item">⛏️ Earn</a>
        <a href="invite.html" class="nav-item">🔗 Invite</a>
        <a href="wallet.html" class="nav-item active">💰 Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>

    <script>
        function openWithdraw() {
            document.getElementById('withdrawModal').style.display = 'flex';
        }

        function processWithdrawal() {
            const amount = parseFloat(document.getElementById('withdrawAmt').value);
            const currentBal = window.userStats.balance;

            if (isNaN(amount) || amount < 5000) {
                showNotification("Minimum limit is 5,000 ABP!");
                return;
            }

            if (amount > currentBal) {
                showNotification("Insufficient Balance!");
                return;
            }

            // Logic for Professional Flow
            showNotification("Verifying on Polygon Amoy...");
            
            setTimeout(() => {
                window.userStats.balance -= amount;
                saveToFirebase(); // Sync decrease in points
                
                showNotification("Withdrawal Request Sent Successfully!");
                document.getElementById('withdrawModal').style.display = 'none';
                updateAllUI();
            }, 3000);
        }
    </script>
</body>
</html>
