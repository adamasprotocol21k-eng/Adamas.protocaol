<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | Adamas</title><link rel="stylesheet" href="css/style.css">
</head>
<body onload="updateUI()">
    <div class="header-pro" style="padding: 20px; text-align: center;">
        <h2 style="color: var(--binance-yellow);">WALLET</h2>
        <div class="glass-card">
            <small>Available Balance</small>
            <h1 id="balance">0</h1>
        </div>
    </div>

    <div class="glass-card" style="margin: 15px;">
        <select id="net" class="btn-neon" style="background:#000; margin-bottom:15px; color:#fff;">
            <option>BNB Smart Chain (Active)</option>
            <option>Polygon Mainnet (Active)</option>
        </select>
        <input type="number" id="amt" placeholder="Min. 5000 ABP" class="btn-neon" style="background:#000; margin-bottom:15px; text-align:center; color:#fff;">
        <button class="btn-neon" onclick="wd()" style="color:var(--neon-green); border-color:var(--neon-green);">WITHDRAW NOW</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="wallet.html" class="nav-item active"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function wd() {
            let a = parseInt(document.getElementById('amt').value);
            if(a < 5000) { alert("Min 5000!"); return; }
            if(userStats.balance < a) { alert("Insufficient!"); return; }
            
            db.ref('withdrawals').push({ wallet: userStats.wallet, amount: a, status: 'pending', date: Date.now() });
            userStats.balance -= a;
            saveToFirebase();
            showNotification("Request Sent!");
        }
    </script>
</body>
</html>
