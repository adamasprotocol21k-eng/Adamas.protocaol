<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wallet-card { text-align: center; padding: 40px 20px; border: 1px solid var(--primary-neon); }
        .token-symbol { font-size: 0.8rem; color: var(--primary-neon); margin-bottom: 10px; display: block; }
        .history-list { margin-top: 30px; }
        .tx-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px;
        }
        .tx-type { font-size: 0.75rem; font-weight: 700; }
        .tx-date { font-size: 0.6rem; color: #666; }
        .tx-amount { font-family: 'Orbitron'; font-size: 0.8rem; }
        .positive { color: #00ff88; }
        .negative { color: #ff3366; }
    </style>
</head>
<body>
    <div class="universe-bg"></div>

    <div style="padding: 20px; padding-bottom: 100px;">
        <h1 class="title-font gradient-text" style="font-size: 1.2rem; margin-bottom: 20px;">CRYPTO VAULT</h1>

        <div class="glass-card wallet-card">
            <span class="token-symbol title-font">ABP PROTOCOL TOKEN</span>
            <div class="val" id="walletBalance" style="font-size: 2.5rem;">0.00</div>
            <p style="font-size: 0.6rem; color: #888; margin-top: 10px;">Est. Value: <span id="usdVal">$0.00</span></p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px;">
                <button class="btn-cosmic" style="font-size: 0.6rem; padding: 12px;" onclick="Notify.show('Deposits opening soon!', 'info')">DEPOSIT</button>
                <button class="btn-cosmic btn-gold" style="font-size: 0.6rem; padding: 12px;" onclick="requestWithdraw()">WITHDRAW</button>
            </div>
        </div>

        <div class="history-list">
            <h3 class="title-font" style="font-size: 0.8rem; margin-bottom: 15px; color: var(--gold);">RECENT ACTIVITY</h3>
            <div id="txHistory">
                <p style="text-align: center; color: #444; font-size: 0.7rem; margin-top: 20px;">No recent transactions found.</p>
            </div>
        </div>
    </div>

    <div id="navbar-placeholder"></div>

    <script src="js/notify.js"></script>
    <script src="js/database.js" type="module"></script>
    <script src="js/nav.js"></script>
    <script type="module">
        import { DBModule } from './js/database.js';
        
        const wallet = localStorage.getItem('userWallet');
        
        async function initWallet() {
            if(!wallet) return;
            
            // Listen for Real-time Balance
            DBModule.listenToProfile(wallet, (user) => {
                document.getElementById('walletBalance').innerText = user.balance.toLocaleString();
                document.getElementById('usdVal').innerText = "$" + (user.balance * 0.01).toFixed(2);
            });
        }

        window.requestWithdraw = () => {
            Notify.show("Minimum withdrawal: 5000 ABP", "error");
        };

        window.addEventListener('DOMContentLoaded', initWallet);
    </script>
</body>
</html>
