<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS WALLET | Secure Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow-x: hidden;
        }

        canvas#canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .container { padding: 30px 20px 100px; max-width: 500px; margin: auto; }

        .wallet-card {
            background: linear-gradient(135deg, rgba(112, 0, 255, 0.2), rgba(0, 242, 255, 0.1));
            border-radius: 30px; padding: 40px 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            margin-bottom: 30px;
        }

        .balance-label { font-size: 0.8rem; letter-spacing: 3px; opacity: 0.6; margin-bottom: 10px; }
        .balance-amount {
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem;
            color: var(--gold); text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .action-btn {
            flex: 1; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            background: var(--glass); color: white; font-family: 'Orbitron'; font-size: 0.9rem;
            cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover:not(:disabled) { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #444; }

        .section-title { font-family: 'Orbitron'; font-size: 1rem; margin-bottom: 15px; opacity: 0.8; }
        .transaction-list { display: flex; flex-direction: column; gap: 12px; }
        
        .tx-item {
            background: var(--glass); border-radius: 20px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tx-info h4 { margin: 0; font-size: 1.1rem; }
        .tx-info p { margin: 0; font-size: 0.8rem; opacity: 0.5; }
        .tx-amount { font-family: 'Orbitron'; font-weight: bold; color: #00ff88; }

        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 11, 16, 0.8); backdrop-filter: blur(20px);
            padding: 10px 25px; border-radius: 100px; display: flex; gap: 25px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .dock-item { text-decoration: none; font-size: 1.2rem; opacity: 0.5; color: white; }
        .dock-item.active { opacity: 1; color: var(--primary); }

        /* Status Label */
        #withdrawStatus { font-size: 0.7rem; color: #ff4444; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <canvas id="canvas3d"></canvas>

    <div class="header">
        <div style="font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px;">ADAMAS <span style="color: var(--primary);">WALLET</span></div>
        <div style="font-size: 0.8rem; opacity: 0.5;" id="userAddress">Connect Wallet</div>
    </div>

    <div class="container">
        <div class="wallet-card">
            <div class="balance-label">AVAILABLE BALANCE</div>
            <div class="balance-amount" id="walletBalance">0.00</div>
            <div style="font-size: 0.9rem; opacity: 0.6; margin-top: 5px;">ABP TOKENS</div>
            
            <div class="btn-group">
                <button class="action-btn" id="withdrawBtn" onclick="handleWithdraw()">WITHDRAW</button>
                <button class="action-btn">SWAP</button>
            </div>
            <span id="withdrawStatus">Loading...</span>
        </div>

        <div class="section-title">RECENT TRANSACTIONS</div>
        <div class="transaction-list" id="txHistory">
            <div class="tx-item">
                <div class="tx-info">
                    <h4>Mining Reward</h4>
                    <p>Daily Session</p>
                </div>
                <div class="tx-amount" id="lastTx">+0.00 ABP</div>
            </div>
        </div>
    </div>

    <div class="dock">
        <a href="dashboard.html" class="dock-item">🏠</a>
        <a href="wallet.html" class="dock-item active">💰</a>
        <a href="invite.html" class="dock-item">👥</a>
        <a href="profile.html" class="dock-item">👤</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Particle Background Logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const posArray = new Float32Array(1000 * 3);
        for(let i=0; i < 3000; i++) posArray[i] = (Math.random() - 0.5) * 10;
        const particlesGeometry = new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: 0x7000ff });
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh); camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); particlesMesh.rotation.y += 0.001; renderer.render(scene, camera); } animate();

        // 2. Withdrawal & Balance Logic
        const CONTRACT_ADDR = "0x6DbC17D9950e0b3A7627ec6bFc6b210A998da690";
        const MIN_WITHDRAW = 5000;

        function updateWalletUI() {
            const currentBal = parseFloat(localStorage.getItem('lastBalance') || "0");
            document.getElementById('walletBalance').innerText = currentBal.toFixed(2);
            document.getElementById('lastTx').innerText = "+" + currentBal.toFixed(2) + " ABP";

            const btn = document.getElementById('withdrawBtn');
            const status = document.getElementById('withdrawStatus');

            if(currentBal >= MIN_WITHDRAW) {
                btn.disabled = false;
                status.innerText = "Polygon Mainnet Bridge Ready! 🚀";
                status.style.color = "#00ff88";
            } else {
                btn.disabled = true;
                status.innerText = `Need ${Math.ceil(MIN_WITHDRAW - currentBal)} more ABP to withdraw`;
                status.style.color = "#ff4444";
            }
        }

        function handleWithdraw() {
            const currentBal = localStorage.getItem('lastBalance');
            alert(`Initiating Bridge to Polygon Testnet...\n\nContract: ${CONTRACT_ADDR}\nAmount: ${currentBal} ABP\n\nStatus: Waiting for MetaMask confirmation.`);
            // Yahan par hum actual Web3 sendTransaction call karenge jab aap ABI doge.
        }

        window.onload = function() {
            // Fake user address for UI
            document.getElementById('userAddress').innerText = "0x71C...3902";
            updateWalletUI();
        }
    </script>
</body>
</html>
