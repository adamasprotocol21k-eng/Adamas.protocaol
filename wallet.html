<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS | Digital Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --dark: #05060a; --glass: rgba(255, 255, 255, 0.05); --gold: #ffcc00; --success: #00ff88; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; background: radial-gradient(circle at top right, #0a0b14, #05060a); }
        
        .container { padding: 20px; max-width: 480px; margin: auto; padding-bottom: 120px; }
        
        /* Header */
        .wallet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 2px; }
        .address-box { font-size: 0.65rem; font-family: 'Orbitron'; background: var(--glass); padding: 8px 12px; border-radius: 50px; border: 1px solid rgba(0,242,255,0.2); color: var(--primary); display: flex; align-items: center; gap: 8px; }

        /* Card */
        .asset-card { background: linear-gradient(145deg, rgba(112, 0, 255, 0.15), rgba(0, 242, 255, 0.05)); border-radius: 30px; padding: 35px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-bottom: 25px; backdrop-filter: blur(20px); }
        .asset-label { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--primary); letter-spacing: 4px; opacity: 0.7; }
        .asset-value { font-family: 'Orbitron'; font-size: 2.8rem; font-weight: 700; margin: 12px 0; color: #fff; text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .token-name { color: var(--gold); font-size: 1rem; letter-spacing: 3px; font-weight: bold; }

        /* Actions */
        .wallet-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .action-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 16px; border-radius: 20px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .action-btn:hover { background: var(--primary); color: black; border-color: var(--primary); transform: translateY(-3px); }

        /* History */
        .history-title { font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; color: var(--primary); }
        .history-item { background: var(--glass); border-radius: 20px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; }
        .history-item:hover { background: rgba(255,255,255,0.08); }
        .tx-icon { width: 45px; height: 45px; border-radius: 15px; background: rgba(0, 255, 136, 0.1); display: flex; align-items: center; justify-content: center; color: var(--success); font-size: 1.2rem; }
        .tx-info { flex: 1; margin-left: 15px; text-align: left; }
        .tx-name { font-weight: bold; font-size: 0.95rem; }
        .tx-date { font-size: 0.7rem; opacity: 0.4; margin-top: 3px; }
        .tx-amount { font-family: 'Orbitron'; font-weight: bold; font-size: 0.9rem; }

        .withdraw-note { text-align: center; color: #ff4444; font-size: 0.75rem; margin-top: 15px; font-family: 'Orbitron'; border-top: 1px solid rgba(255,68,68,0.2); padding-top: 10px; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 88%; max-width: 400px; background: rgba(10, 11, 20, 0.9); backdrop-filter: blur(20px); border-radius: 30px; padding: 12px 20px; display: flex; justify-content: space-around; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-link { color: rgba(255,255,255,0.4); text-decoration: none; text-align: center; transition: 0.3s; }
        .nav-link.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .nav-link i { font-size: 1.3rem; }
        .nav-link span { display: block; font-size: 0.55rem; font-family: 'Orbitron'; margin-top: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="wallet-header">
            <div class="brand">ADAMAS <span style="color: var(--primary);">PRO</span></div>
            <div class="address-box" id="walletAddr"><i class="fas fa-circle-notch fa-spin"></i> SYNCING...</div>
        </div>

        <div class="asset-card">
            <div class="asset-label">ABP ASSET BALANCE</div>
            <div class="asset-value" id="balance">0.00</div>
            <div class="token-name">ADAMAS BEP-20</div>
        </div>

        <div class="wallet-actions">
            <div class="action-btn" onclick="openAction('Send')"><i class="fas fa-paper-plane"></i> SEND</div>
            <div class="action-btn" onclick="openAction('Withdraw')"><i class="fas fa-wallet"></i> WITHDRAW</div>
        </div>

        <div class="history-title">
            <span>TX REGISTRY</span>
            <span style="font-size: 0.6rem; opacity: 0.5;">REAL-TIME</span>
        </div>

        <div id="txHistory">
            <div class="history-item">
                <div class="tx-icon" style="background: rgba(255, 204, 0, 0.1); color: var(--gold);"><i class="fas fa-star"></i></div>
                <div class="tx-info">
                    <div class="tx-name">Genesis Reward</div>
                    <div class="tx-date" id="currentDate">-- --, 2026</div>
                </div>
                <div class="tx-amount" style="color: var(--gold);">+100.00</div>
            </div>
        </div>

        <p class="withdraw-note">MIN WITHDRAWAL: 5,000 ABP</p>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-layer-group"></i><span>HOME</span></a>
        <a href="games.html" class="nav-link"><i class="fas fa-gamepad"></i><span>GAMES</span></a>
        <a href="wallet.html" class="nav-link active"><i class="fas fa-wallet"></i><span>WALLET</span></a>
        <a href="profile.html" class="nav-link"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function initWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userWallet = accounts[0];
                    
                    document.getElementById('walletAddr').innerHTML = 
                        `<i class="fas fa-link" style="font-size:0.5rem; color:var(--success)"></i> ` +
                        userWallet.substring(0, 6).toUpperCase() + "..." + userWallet.substring(userWallet.length - 4).toUpperCase();

                    const userShort = userWallet.substring(0, 10);
                    onValue(ref(db, 'users/' + userShort), (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const bal = data.currentBalance || 0;
                            document.getElementById('balance').innerText = 
                                parseFloat(bal).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                        }
                    });
                } catch (err) {
                    document.getElementById('walletAddr').innerText = "DISCONNECTED";
                }
            } else {
                document.getElementById('walletAddr').innerText = "NO WEB3";
            }
        }

        window.openAction = (type) => {
            alert(`${type} protocol initialization starting... Mainnet connection required.`);
        };

        window.onload = () => {
            initWallet();
            const d = new Date();
            document.getElementById('currentDate').innerText = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        };
    </script>
</body>
</html>
