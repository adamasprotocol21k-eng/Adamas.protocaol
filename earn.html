<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .mining-circle {
            width: 180px; height: 180px; border-radius: 50%;
            border: 5px solid #1e2026; margin: 30px auto;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .mining-active .mining-circle { border-top-color: var(--neon-blue); animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pulse-core { width: 10px; height: 10px; background: var(--neon-blue); border-radius: 50%; box-shadow: 0 0 15px var(--neon-blue); }
        .mining-active .pulse-core { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body onload="updateUI()">

    <div class="news-ticker">
        <div class="ticker-content">
            🚀 EARNING ENGINE ACTIVE | 💰 REWARD RATE: 1.5X BOOST | 💎 NEXT AIRDROP SOON
        </div>
    </div>

    <div class="header-pro" style="margin-top: 15px;">
        <h2 class="text-neon-blue">EARNING ENGINE</h2>
        <p style="font-size: 0.7rem; color: var(--text-sub);">ACTIVE PROOF OF WORK</p>
    </div>

    <div id="miningContainer" style="padding: 0 15px;">
        <div class="glass-card" style="text-align: center;">
            <div class="mining-circle">
                <div style="position: absolute;">
                    <div class="pulse-core" style="margin: 0 auto 10px;"></div>
                    <h2 id="miningPower">0.00</h2>
                </div>
            </div>
            <button id="mineBtn" class="btn-neon" onclick="startMiningProcess()">START MINING</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="earn.html" class="nav-item active"><span>⛏️</span>Earn</a>
        <a href="stake.html" class="nav-item"><span>🔐</span>Stake</a>
        <a href="refer.html" class="nav-item"><span>👥</span>Refer</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="js/app.js"></script>
    <script>
        let miningInterval; let currentEarned = 0;
        function startMiningProcess() {
            const btn = document.getElementById('mineBtn');
            const container = document.getElementById('miningContainer');
            if (btn.innerText === "START MINING") {
                btn.innerText = "STOP MINING"; btn.style.borderColor = "#ff3131"; btn.style.color = "#ff3131";
                container.classList.add('mining-active');
                miningInterval = setInterval(() => {
                    currentEarned += 0.01; document.getElementById('miningPower').innerText = currentEarned.toFixed(2);
                    if(currentEarned >= 1) { userStats.balance += 1; saveStats(); updateUI(); currentEarned = 0; }
                }, 100);
            } else {
                btn.innerText = "START MINING"; btn.style.borderColor = "var(--binance-yellow)"; btn.style.color = "var(--binance-yellow)";
                container.classList.remove('mining-active'); clearInterval(miningInterval);
            }
        }
    </script>
</body>
</html>
