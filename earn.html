<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .calendar-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 15px;
        }
        .day-card {
            background: var(--glass); border: 1px solid var(--border-dim);
            border-radius: 15px; padding: 15px 5px; text-align: center;
            transition: 0.3s; position: relative;
        }
        .day-card.claimed {
            border-color: var(--neon-green); background: rgba(0, 255, 136, 0.05);
        }
        .day-card.claimed::after {
            content: '✓'; position: absolute; top: 5px; right: 8px; 
            color: var(--neon-green); font-weight: bold; font-size: 0.7rem;
        }
        .day-card h4 { margin: 5px 0; font-size: 0.8rem; }
        .day-card small { color: var(--binance-yellow); font-size: 0.6rem; }
        
        .task-list { padding: 0 15px; }
        .task-item {
            background: var(--glass); display: flex; justify-content: space-between;
            align-items: center; padding: 15px; border-radius: 18px; margin-bottom: 12px;
            border: 1px solid var(--border-dim);
        }
    </style>
</head>
<body onload="initEarnPage()">

    <div style="padding: 20px;">
        <h2 style="color: var(--binance-yellow); margin-bottom: 5px;">EARN STATION</h2>
        <p style="color: var(--text-sub); font-size: 0.75rem;">Daily Extraction Calendar</p>
    </div>

    <div class="calendar-grid" id="calendar">
        </div>

    <div style="padding: 0 20px;">
        <button id="claimBtn" class="btn-neon" style="background: var(--binance-yellow); color: #000;" onclick="handleCheckIn()">
            CLAIM DAILY REWARD
        </button>
    </div>

    <div class="task-list">
        <h4 style="margin: 20px 0 15px 5px;">BOOSTER MISSIONS</h4>
        <div class="task-item">
            <div><b>Telegram Fleet</b><br><small style="color:var(--text-sub)">+50 ABP Tokens</small></div>
            <button class="btn-neon" style="width:auto; padding:8px 20px; margin:0;" onclick="doTask('tg', 'https://t.me/ADSProtocol')">JOIN</button>
        </div>
        <div class="task-item">
            <div><b>X Protocol</b><br><small style="color:var(--text-sub)">+50 ABP Tokens</small></div>
            <button class="btn-neon" style="width:auto; padding:8px 20px; margin:0;" onclick="doTask('x', 'https://x.com/DiamoProtocol')">FOLLOW</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item active"><span>⛏️</span>Earn</a>
        <a href="invite.html" class="nav-item"><span>🔗</span>Invite</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        const rewards = [100, 150, 200, 250, 300, 400, 1000]; // Day 7 is Jackpot
        
        function initEarnPage() {
            const calendar = document.getElementById('calendar');
            let currentDay = parseInt(localStorage.getItem('adamas_streak') || "0");
            
            calendar.innerHTML = '';
            for(let i = 0; i < 7; i++) {
                const isClaimed = i < currentDay;
                calendar.innerHTML += `
                    <div class="day-card ${isClaimed ? 'claimed' : ''}">
                        <h4>Day ${i+1}</h4>
                        <small>${rewards[i]} ABP</small>
                    </div>
                `;
            }
        }

        function handleCheckIn() {
            const lastClaim = localStorage.getItem('adamas_last_claim');
            const today = new Date().toDateString();

            if(lastClaim === today) {
                showNotification("Already claimed today! Return tomorrow.");
                return;
            }

            let streak = parseInt(localStorage.getItem('adamas_streak') || "0");
            if(streak >= 7) streak = 0; // Reset after 7 days

            const reward = rewards[streak];
            userStats.balance += reward;
            
            streak++;
            localStorage.setItem('adamas_streak', streak);
            localStorage.setItem('adamas_last_claim', today);
            
            saveToFirebase();
            showNotification(`Day ${streak} Claimed: +${reward} ABP!`);
            initEarnPage();
        }

        function doTask(platform, link) {
            window.open(link, '_blank');
            showNotification(`${platform.toUpperCase()} Task Verified! +50 ABP`);
            userStats.balance += 50;
            saveToFirebase();
        }
    </script>
</body>
</html>
