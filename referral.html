<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Network Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { 
            --cyan: #00f2ff; 
            --cyan-glow: rgba(0, 242, 255, 0.4); 
            --p-green: #adff2f; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { background: #050505; color: #fff; margin: 0; font-family: 'Inter', sans-serif; }

        .network-wrapper { padding: 20px; padding-bottom: 120px; max-width: 440px; margin: 0 auto; animation: fadeIn 0.8s ease-out; }

        /* --- BRANDING --- */
        .brand-identity { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .logo-box-net {
            width: 44px; height: 44px; border-radius: 50%;
            border: 1.5px solid var(--cyan); background: #000;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--cyan-glow);
        }
        .nav-logo-img { width: 85%; height: 85%; border-radius: 50%; object-fit: cover; }

        /* Stats Grid */
        .node-stats-grid { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-box { 
            flex: 1; background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 100%);
            border: 1px solid var(--glass-border); padding: 22px 10px; border-radius: 24px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-label { font-size: 8px; color: #555; font-family: 'Orbitron'; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        .stat-value { display: block; font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; font-weight: 900; }
        
        /* Premium Cards */
        .premium-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 22px; border-radius: 28px; backdrop-filter: blur(10px); }

        /* Referral Input */
        .referral-input-group {
            display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 18px; border: 1px solid var(--glass-border);
        }
        .referral-input-group input { flex: 1; background: none; border: none; color: var(--cyan); font-size: 10px; outline: none; font-family: monospace; }

        .earning-row { display: flex; justify-content: space-between; margin-bottom: 14px; align-items: center; }
        .earning-label { font-size: 8px; color: #444; font-family: 'Orbitron'; letter-spacing: 1px; }
        .earning-value { font-size: 10px; color: #eee; font-family: 'Orbitron'; font-weight: bold; }

        /* Node List */
        .node-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px; background: rgba(255,255,255,0.02); border-radius: 22px; margin-bottom: 12px; border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .node-item:hover { background: rgba(0, 242, 255, 0.03); border-color: var(--cyan); }
        .node-addr { font-size: 10px; font-family: 'Orbitron'; color: var(--cyan); letter-spacing: 1px; font-weight: 900; }
        .node-role { font-size: 7px; color: #444; margin-top: 4px; font-family: 'Orbitron'; letter-spacing: 1px; }
        
        .pulse-live { width: 7px; height: 7px; background: var(--p-green); border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 10px var(--p-green); animation: pulse-glow 2s infinite; }
        
        .copy-btn { background: var(--cyan); color: #000; border: none; padding: 0 18px; border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px); 
            display: flex; justify-content: space-around; align-items: center;
            padding: 18px 0; border-top: 1px solid var(--glass-border); 
            z-index: 10000;
        }
        .nav-item { 
            text-decoration: none; color: #444; font-size: 9px; 
            font-family: 'Orbitron'; font-weight: 700; text-align: center;
            display: flex; flex-direction: column; gap: 6px; transition: 0.3s;
        }
        .nav-item.active { color: var(--cyan); }
        .nav-item span { font-size: 16px; margin-bottom: 2px; }

        @keyframes pulse-glow { 0%, 100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="network-wrapper">
        <div class="brand-identity">
            <div class="logo-box-net">
                <img src="assets/dashboard-logo.png" class="nav-logo-img" alt="Logo">
            </div>
            <h2 style="font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 3px; color: #fff; margin:0;">NETWORK_<span style="color: var(--cyan);">NODES</span></h2>
        </div>

        <div class="node-stats-grid">
            <div class="stat-box">
                <span class="stat-label">PARTNER_L1</span>
                <span id="l1-count" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">NETWORK_L2</span>
                <span id="l2-count" class="stat-value">0</span>
            </div>
        </div>

        <section class="premium-card" style="margin-bottom: 20px; border-color: rgba(0, 242, 255, 0.1);">
            <div class="earning-row">
                <span class="earning-label">DIRECT_COMMISSION (L1)</span>
                <span id="l1-earnings" class="earning-value">0 ABP</span>
            </div>
            <div class="earning-row">
                <span class="earning-label">NETWORK_OVERRIDE (L2)</span>
                <span id="l2-earnings" class="earning-value">0 ABP</span>
            </div>
            <div class="earning-row">
                <span class="earning-label">LOYALTY_YIELD (10%)</span>
                <span id="daily-yield" class="earning-value" style="color: var(--cyan);">0.00 ABP</span>
            </div>
            <div style="height: 1px; background: var(--glass-border); margin: 15px 0;"></div>
            <div class="earning-row" style="margin-bottom: 0;">
                <span style="font-size: 8px; color: #fff; font-family: 'Orbitron'; letter-spacing: 2px;">TOTAL_NETWORK_VALUE</span>
                <span id="total-referral-earned" style="font-size: 20px; color: var(--p-green); font-family: 'Orbitron'; font-weight: 900;">0.00</span>
            </div>
        </section>

        <section class="premium-card" style="margin-bottom: 30px; border: 1px dashed rgba(0, 242, 255, 0.3);">
            <p style="font-size: 7px; color: var(--cyan); margin-bottom: 12px; font-family: 'Orbitron'; text-align: center; letter-spacing: 3px;">INVITATION_GATEWAY_v1.0</p>
            <div class="referral-input-group">
                <input type="text" id="ref-link-input" readonly value="AUTHENTICATING...">
                <button class="copy-btn" onclick="copyRefLink()">COPY</button>
            </div>
        </section>

        <section class="node-list">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; padding: 0 5px;">
                <h3 style="font-family: 'Orbitron'; font-size: 9px; color: #555; letter-spacing: 2px;">ACTIVE_CONNECTIONS</h3>
                <span style="font-size: 8px; color: var(--p-green); font-family: 'Orbitron'; letter-spacing: 1px;">
                    <span class="pulse-live"></span>SYNC_ACTIVE
                </span>
            </div>
            <div id="nodes-container">
                </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item"><span>🏠</span>HOME</a>
            <a href="vault.html" class="nav-item"><span>🔒</span>VAULT</a>
            <a href="missions.html" class="nav-item"><span>⚡</span>TASKS</a>
            <a href="referral.html" class="nav-item active"><span>👥</span>NETWORK</a>
            <a href="profile.html" class="nav-item"><span>🏆</span>RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
    const userWallet = localStorage.getItem('adamas_user');

    window.onload = () => {
        if(!userWallet) { window.location.href = "index.html"; return; }
        
        const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
        document.getElementById('ref-link-input').value = `${baseUrl}/index.html?ref=${userWallet.toLowerCase()}`;
        
        loadNetworkNodes(userWallet.toLowerCase());
    };

    function loadNetworkNodes(myWallet) {
        db.ref('users').on('value', (snapshot) => {
            const container = document.getElementById('nodes-container');
            let l1Count = 0;
            let l2TotalCount = 0;
            let l1TotalBalance = 0;

            if (!snapshot.exists()) {
                container.innerHTML = `<p style="text-align: center; color: #333; font-size: 9px; margin-top: 30px; font-family: 'Orbitron';">NO_DATA_SYNC</p>`;
                return;
            }

            const allUsers = snapshot.val();
            container.innerHTML = ""; 

            Object.keys(allUsers).forEach(wallet => {
                const user = allUsers[wallet];
                const cleanWallet = wallet.toLowerCase();
                
                if (cleanWallet === myWallet) return;

                if (user.referredBy && user.referredBy.toLowerCase() === myWallet) {
                    l1Count++;
                    l1TotalBalance += (parseFloat(user.balance) || 0);

                    const nodeBox = document.createElement('div');
                    nodeBox.className = 'node-item';
                    const displayWallet = wallet.substring(0,6) + "..." + wallet.slice(-4);
                    
                    nodeBox.innerHTML = `
                        <div>
                            <span class="node-addr">${displayWallet}</span>
                            <span class="node-role" style="display:block">L1_PARTNER</span>
                        </div>
                        <div style="text-align:right">
                             <span style="color:#fff; font-size:12px; font-family:'Orbitron'; font-weight:900; display:block">${Math.floor(user.balance || 0)}</span>
                             <span style="color:var(--p-green); font-size:7px; font-family:'Orbitron'; opacity:0.8;">SYNCED</span>
                        </div>
                    `;
                    container.appendChild(nodeBox);

                    Object.keys(allUsers).forEach(subWallet => {
                        const subUser = allUsers[subWallet];
                        if (subUser.referredBy && subUser.referredBy.toLowerCase() === cleanWallet) {
                            l2TotalCount++;
                        }
                    });
                }
            });

            document.getElementById('l1-count').innerText = l1Count;
            document.getElementById('l2-count').innerText = l2TotalCount;
            
            const dailyYield = l1TotalBalance * 0.10; 
            updateEarningDisplay(l1Count, l2TotalCount, dailyYield);

            if (l1Count === 0) {
                container.innerHTML = `<p style="text-align: center; color: #222; font-size: 9px; margin-top: 40px; font-family: 'Orbitron';">NETWORK_EMPTY: Waiting for nodes...</p>`;
            }
        });
    }

    function updateEarningDisplay(l1, l2, daily) {
        const l1Earned = l1 * 200;
        const l2Earned = l2 * 50;
        const total = l1Earned + l2Earned + daily;

        document.getElementById('l1-earnings').innerText = l1Earned.toLocaleString() + " ABP";
        document.getElementById('l2-earnings').innerText = l2Earned.toLocaleString() + " ABP";
        document.getElementById('daily-yield').innerText = daily.toLocaleString(undefined, {minimumFractionDigits: 2}) + " ABP";
        document.getElementById('total-referral-earned').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    async function copyRefLink() {
        const copyText = document.getElementById("ref-link-input");
        try {
            await navigator.clipboard.writeText(copyText.value);
            alert("✓ Protocol Link Copied");
        } catch (err) {
            copyText.select();
            document.execCommand("copy");
            alert("✓ Protocol Link Copied");
        }
    }
</script>
</body>
</html>
