<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Network Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* FIX: Bottom Overlap */
        .network-wrapper {
            padding-bottom: 120px;
        }

        .node-stats-grid { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-box { 
            flex: 1; background: var(--card-bg); border: 1px solid var(--glass-border); 
            padding: 15px; border-radius: 20px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-value { display: block; font-family: 'Orbitron'; font-size: 1.6rem; color: var(--cyan); font-weight: 900; margin-top: 5px; }
        
        .referral-input-group {
            display: flex; gap: 10px; background: rgba(0,0,0,0.4); 
            padding: 8px; border-radius: 15px; border: 1px solid var(--glass-border);
        }
        .referral-input-group input {
            flex: 1; background: none; border: none; color: #fff; 
            padding: 5px 10px; font-size: 12px; outline: none; font-family: 'Rajdhani';
        }

        .earning-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .earning-label { font-size: 11px; color: #666; font-family: 'Orbitron'; }
        .earning-value { font-size: 11px; color: #fff; font-family: 'Orbitron'; font-weight: bold; }

        .node-list { margin-top: 25px; }
        .node-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(255,255,255,0.02); 
            border-radius: 18px; margin-bottom: 12px; border: 1px solid var(--glass-border);
            animation: slideIn 0.4s ease-out;
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .node-info span { display: block; }
        .node-addr { font-size: 11px; font-family: 'Orbitron'; color: var(--cyan); letter-spacing: 1px; }
        .node-role { font-size: 9px; color: #555; margin-top: 4px; text-transform: uppercase; font-weight: bold; }
        
        .pulse-live {
            width: 8px; height: 8px; background: var(--p-green); border-radius: 50%;
            display: inline-block; margin-right: 5px;
            box-shadow: 0 0 10px var(--p-green);
            animation: pulse-ring 1.5s infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="network-wrapper">
        <header class="premium-card" style="margin-bottom: 20px; text-align: center; border-color: rgba(188, 19, 254, 0.3);">
            <h2 style="font-family: 'Orbitron'; font-size: 1.3rem; letter-spacing: 2px; color: #fff;">NETWORK <span style="color: var(--cyan);">NODES</span></h2>
            <p style="font-size: 9px; color: #555; margin-top: 5px; letter-spacing: 1px; font-family: 'Orbitron';">SYSTEM-ID: PRO-ELITE-V12</p>
        </header>

        <div class="node-stats-grid">
            <div class="stat-box">
                <span style="font-size: 9px; color: #666; font-family: 'Orbitron';">DIRECT (L1)</span>
                <span id="l1-count" class="stat-value">0</span>
            </div>
            <div class="stat-box">
                <span style="font-size: 9px; color: #666; font-family: 'Orbitron';">NETWORK (L2)</span>
                <span id="l2-count" class="stat-value">0</span>
            </div>
        </div>

        <section class="premium-card" style="background: rgba(0,242,255,0.03); margin-bottom: 20px;">
            <div class="earning-row">
                <span class="earning-label">L1 Commission (200/Ref)</span>
                <span id="l1-earnings" class="earning-value">0 ABP</span>
            </div>
            <div class="earning-row">
                <span class="earning-label">L2 Multiplier (50/Ref)</span>
                <span id="l2-earnings" class="earning-value">0 ABP</span>
            </div>
            <div class="earning-row">
                <span class="earning-label">Daily Yield (10% Network)</span>
                <span id="daily-yield" class="earning-value" style="color: var(--cyan);">0.00 ABP</span>
            </div>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 12px 0;">
            <div class="earning-row">
                <span style="font-size: 11px; color: #fff; font-family: 'Orbitron';">TOTAL NETWORK REWARDS</span>
                <span id="total-referral-earned" style="font-size: 16px; color: var(--p-green); font-family: 'Orbitron'; font-weight: 900;">0 ABP</span>
            </div>
        </section>

        <section class="premium-card" style="margin-bottom: 25px; border: 1px dashed var(--cyan);">
            <p style="font-size: 10px; color: var(--cyan); margin-bottom: 12px; font-family: 'Orbitron'; text-align: center; letter-spacing: 1px;">GENERATE INVITE PROTOCOL</p>
            <div class="referral-input-group">
                <input type="text" id="ref-link-input" readonly value="SYNCHRONIZING...">
                <button onclick="copyRefLink()" style="background: var(--cyan); color: #000; border: none; padding: 0 18px; border-radius: 10px; font-weight: 900; font-family: 'Orbitron'; font-size: 10px; cursor: pointer;">COPY</button>
            </div>
        </section>

        <section class="node-list">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; padding: 0 5px;">
                <h3 style="font-family: 'Orbitron'; font-size: 11px; color: #fff;">ACTIVE CONNECTIONS</h3>
                <span style="font-size: 9px; color: var(--p-green); font-family: 'Orbitron'; font-weight: bold;">
                    <span class="pulse-live"></span>LIVE SYNC
                </span>
            </div>
            <div id="nodes-container">
                </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠 HOME</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item active">👥 NETWORK</a>
            <a href="profile.html" class="nav-item">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
    const userWallet = localStorage.getItem('adamas_user');

    window.onload = () => {
        if(!userWallet) { window.location.href = "index.html"; return; }
        
        const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
        document.getElementById('ref-link-input').value = `${baseUrl}/index.html?ref=${userWallet.toLowerCase()}`;
        
        loadNetworkNodes(userWallet.toLowerCase());
    };

    function loadNetworkNodes(myWallet) {
        // Real-time listener: Hum direct 'users' list se count nikalenge taaki data miss na ho
        db.ref('users').orderByChild('referredBy').equalTo(myWallet).on('value', async (snapshot) => {
            const container = document.getElementById('nodes-container');
            let l1Count = 0;
            let l2TotalCount = 0;
            let l1TotalBalance = 0;

            if (!snapshot.exists()) {
                container.innerHTML = `<p style="text-align: center; color: #444; font-size: 10px; margin-top: 30px; font-family: 'Orbitron';">NO PARTNERS FOUND</p>`;
                document.getElementById('l1-count').innerText = "0";
                document.getElementById('l2-count').innerText = "0";
                updateEarningDisplay(0, 0, 0);
                return;
            }

            const users = snapshot.val();
            const wallets = Object.keys(users);
            l1Count = wallets.length; // Jitne users mile, wahi L1 count hai
            document.getElementById('l1-count').innerText = l1Count;
            
            container.innerHTML = ""; 

            // Loop through Level 1 Partners
            for (const wallet of wallets) {
                const nodeBox = document.createElement('div');
                nodeBox.className = 'node-item';
                const displayWallet = wallet.substring(0,10) + "..." + wallet.slice(-6);
                
                nodeBox.innerHTML = `
                    <div class="node-info">
                        <span class="node-addr">${displayWallet}</span>
                        <span class="node-role">Level 1 Partner</span>
                    </div>
                    <span class="status-badge" style="color:var(--p-green); border: 1px solid var(--p-green); padding: 4px 10px; border-radius: 8px; font-size: 8px; font-weight:bold; font-family:'Orbitron';">ACTIVE</span>
                `;
                container.appendChild(nodeBox);

                // Balance for Yield
                l1TotalBalance += (parseFloat(users[wallet].balance) || 0);

                // Level 2 logic
                const l2Snap = await db.ref('users').orderByChild('referredBy').equalTo(wallet).once('value');
                if(l2Snap.exists()) {
                    l2TotalCount += Object.keys(l2Snap.val()).length;
                }
            }

            document.getElementById('l2-count').innerText = l2TotalCount;
            const dailyYield = l1TotalBalance * 0.10;
            
            updateEarningDisplay(l1Count, l2TotalCount, dailyYield);
        });
    }

    function updateEarningDisplay(l1, l2, daily) {
        const l1Earned = parseInt(l1) * 200;
        const l2Earned = parseInt(l2) * 50;
        const total = l1Earned + l2Earned + parseFloat(daily);

        document.getElementById('l1-earnings').innerText = l1Earned + " ABP";
        document.getElementById('l2-earnings').innerText = l2Earned + " ABP";
        document.getElementById('daily-yield').innerText = parseFloat(daily).toFixed(2) + " ABP";
        document.getElementById('total-referral-earned').innerText = total.toFixed(2) + " ABP";
    }

    async function copyRefLink() {
        const copyText = document.getElementById("ref-link-input");
        try {
            await navigator.clipboard.writeText(copyText.value);
            alert("Invite Protocol Copied!");
        } catch (err) {
            copyText.select();
            document.execCommand("copy");
            alert("Invite Protocol Copied!");
        }
    }
</script>
</body>
</html>
