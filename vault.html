<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | The Vault</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-gold: #ffcc00; --p-green: #adff2f; --cyan: #00f2ff; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* --- VAULT PREMIUM UI --- */
        .vault-wrapper { padding: 15px; padding-bottom: 120px; max-width: 440px; margin: 0 auto; }
        
        .vault-container {
            text-align: center; padding: 35px 22px;
            background: radial-gradient(circle at center, rgba(255, 204, 0, 0.05) 0%, rgba(0,0,0,0.8) 100%);
            border-radius: 30px; border: 1px solid rgba(255, 204, 0, 0.15);
            margin-bottom: 25px; position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }
        
        /* Shimmer Effect for Unlocked Vault */
        .unlocked-shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(90deg, transparent, rgba(173, 255, 47, 0.1), transparent); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .vault-lock-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; filter: drop-shadow(0 0 15px var(--neon-gold)); transition: 0.5s ease-in-out; }
        .scarcity-tag { background: var(--neon-gold); color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 8px; padding: 5px 12px; border-radius: 6px; letter-spacing: 2px; }

        /* CHECKLIST */
        .check-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; background: rgba(255,255,255,0.03);
            border-radius: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .check-label { font-size: 9px; color: #777; font-family: 'Orbitron'; letter-spacing: 1px; }
        .check-status { font-family: 'Orbitron'; font-size: 10px; font-weight: 900; color: #444; }
        .status-completed { color: var(--p-green) !important; text-shadow: 0 0 10px rgba(173, 255, 47, 0.5); }

        /* BUTTONS */
        .btn-lock {
            background: rgba(255,255,255,0.05); color: #555; cursor: not-allowed;
            border: 1px solid rgba(255,255,255,0.08); padding: 18px; width: 100%;
            border-radius: 20px; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; letter-spacing: 1px;
        }
        .btn-unlocked { background: var(--cyan) !important; color: #000 !important; cursor: pointer !important; box-shadow: 0 0 20px var(--cyan); border: none !important; }

        /* NAV FIX */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { text-decoration: none; color: #444; font-size: 9px; font-family: 'Orbitron'; text-align: center; }
        .nav-item.active { color: var(--cyan); }
    </style>
</head>
<body>

    <div class="vault-wrapper">
        <header style="text-align: center; margin-bottom: 25px;">
            <div class="scarcity-tag">GENESIS_ACCESS_POINT</div>
            <h1 style="font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 3px; margin-top: 15px;">THE <span style="color: var(--neon-gold);">VAULT</span></h1>
        </header>

        <section class="vault-container" id="vault-main-box">
            <div style="position: absolute; top: 15px; right: 15px; background: rgba(130, 71, 229, 0.1); border: 1px solid rgba(130, 71, 229, 0.3); color: #8247e5; font-size: 7px; padding: 4px 10px; border-radius: 20px; font-family: 'Orbitron';">AMOY_MAINNET</div>
            
            <div class="vault-lock-icon" id="vault-icon">🔒</div>
            <div id="vault-status-text" style="font-family: 'Orbitron'; font-size: 9px; color: var(--neon-gold); margin-bottom: 25px; letter-spacing: 2px;">PROTOCOL_LOCKED</div>
            
            <div style="text-align: left; margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; font-size: 8px; font-family: 'Orbitron'; margin-bottom: 8px;">
                    <span style="color: #666;">COMMUNITY_MINT_SYNC</span>
                    <span id="genesis-percent" style="color: var(--cyan);">0%</span>
                </div>
                <div style="height: 6px; background: #080808; border-radius: 10px; overflow: hidden; border: 1px solid #111;">
                    <div id="genesis-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--neon-gold), var(--p-green)); transition: 2s;"></div>
                </div>
            </div>

            <button class="btn-lock" id="wallet-btn" disabled>VERIFYING_TERMINAL...</button>
        </section>

        <section class="premium-card" style="background: rgba(255,255,255,0.02); border-radius: 28px; padding: 20px; border: 1px solid rgba(255,255,255,0.05);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-family: 'Orbitron'; font-size: 9px; letter-spacing: 1px; margin: 0;">ELIGIBILITY_LEDGER</h3>
                <span id="eligibility-status" style="font-size: 7px; font-family: 'Orbitron'; color: #ff3366; background: rgba(255,51,102,0.1); padding: 4px 10px; border-radius: 20px;">SCANNING...</span>
            </div>
            
            <div id="rank-checklist">
                <div class="check-item">
                    <span class="check-label">MINING_VOLUME</span>
                    <span id="check-points" class="check-status">0/5,000 ABP</span>
                </div>
                <div class="check-item">
                    <span class="check-label">NODE_NETWORK</span>
                    <span id="check-refs" class="check-status">0/3 NODES</span>
                </div>
                <div class="check-item">
                    <span class="check-label">SYNC_STREAK</span>
                    <span id="check-status-streak" class="check-status">0/5 DAYS</span>
                </div>
                <div class="check-item" style="border-color: rgba(0, 242, 255, 0.1);">
                    <span class="check-label" style="color: var(--cyan);">KNOWLEDGE_SYNC</span>
                    <span id="check-quiz" class="check-status">LOCKED</span>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠 HOME</a>
            <a href="vault.html" class="nav-item active">🔒 VAULT</a>
            <a href="missions.html" class="nav-item">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>
    
    <script>
        const userWallet = localStorage.getItem('adamas_user');
        if(!userWallet) { window.location.href = "index.html"; }

        const userRef = db.ref('users/' + userWallet);

        userRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                let criteriaMet = 0;

                // 1. Points
                const balance = Math.floor(data.balance || 0);
                const ptEl = document.getElementById('check-points');
                ptEl.innerText = `${balance.toLocaleString()}/5,000`;
                if(balance >= 5000) { ptEl.className = "check-status status-completed"; criteriaMet++; }

                // 2. Streak
                const streak = data.streak || 1;
                const streakEl = document.getElementById('check-status-streak');
                streakEl.innerText = `${streak}/5 DAYS`;
                if(streak >= 5) { streakEl.className = "check-status status-completed"; criteriaMet++; }

                // 3. Quiz/Knowledge (Loyalty Task)
                const quizEl = document.getElementById('check-quiz');
                if(data.quizDone) { 
                    quizEl.innerText = "VERIFIED"; 
                    quizEl.className = "check-status status-completed"; 
                    criteriaMet++;
                } else {
                    quizEl.innerHTML = `<a href="missions.html" style="color:var(--cyan); text-decoration:none;">START</a>`;
                }

                // 4. Referral Check
                db.ref('users').orderByChild('referredBy').equalTo(userWallet.toLowerCase()).once('value', refSnap => {
                    const count = refSnap.numChildren() || 0;
                    const refEl = document.getElementById('check-refs');
                    refEl.innerText = `${count}/3 NODES`;
                    if(count >= 3) { refEl.className = "check-status status-completed"; criteriaMet++; }

                    // Final Status
                    const statusBadge = document.getElementById('eligibility-status');
                    if(criteriaMet >= 4) {
                        statusBadge.innerText = "VERIFIED_NODE";
                        statusBadge.style.color = "var(--p-green)";
                        statusBadge.style.background = "rgba(173, 255, 47, 0.1)";
                    } else {
                        statusBadge.innerText = "INCOMPLETE";
                    }
                });
            }
        });

        // Community Global Sync
        db.ref('global_stats/total_forged').on('value', snap => {
            const total = snap.val() || 0; 
            const target = 21000;
            const percent = Math.min((total / target) * 100, 100).toFixed(1);
            
            document.getElementById('genesis-percent').innerText = percent + "%";
            document.getElementById('genesis-fill').style.width = percent + "%";
            
            if(percent >= 100) {
                document.getElementById('vault-icon').innerText = "🔓";
                document.getElementById('vault-main-box').classList.add('unlocked-shimmer');
                document.getElementById('vault-status-text').innerText = "PROTOCOL_ACTIVE";
                document.getElementById('wallet-btn').disabled = false;
                document.getElementById('wallet-btn').innerText = "CLAIM_GENESIS_ASSET";
                document.getElementById('wallet-btn').className = "btn-lock btn-unlocked";
            } else {
                document.getElementById('wallet-btn').innerText = "WAITING_FOR_SYNC";
            }
        });
    </script>
</body>
</html>
