<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wheel-container {
            position: relative; width: 300px; height: 300px; margin: 30px auto;
        }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--binance-yellow);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #f3ba2f 0deg 60deg, #1e2329 60deg 120deg, 
                #00ff88 120deg 180deg, #1e2329 180deg 240deg, 
                #00d4ff 240deg 300deg, #1e2329 300deg 360deg
            );
        }
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 25px solid #ff4d4d; z-index: 10;
        }
    </style>
</head>
<body>

    <div style="padding: 20px; text-align: center;">
        <h3 style="color: var(--binance-yellow);">QUANTUM SPIN</h3>
        <p style="color: var(--text-sub);">Test your luck for ABP Multipliers</p>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel"></div>
    </div>

    <div class="glass-card">
        <input type="number" id="spinBet" class="btn-neon" style="text-align:center; background:#000;" placeholder="Bet (e.g. 100 ABP)">
        <button id="spinBtn" class="btn-neon" style="background:var(--binance-yellow); color:#000;" onclick="spin()">SPIN ENGINE</button>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><span>🏠</span>Home</a>
        <a href="games.html" class="nav-item active"><span>🎮</span>Games</a>
        <a href="earn.html" class="nav-item"><span>⛏️</span>Earn</a>
        <a href="invite.html" class="nav-item"><span>🔗</span>Invite</a>
        <a href="wallet.html" class="nav-item"><span>💰</span>Wallet</a>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        let isSpinning = false;

        function spin() {
            if (isSpinning) return;
            const bet = parseInt(document.getElementById('spinBet').value);
            
            if (isNaN(bet) || bet <= 0 || bet > userStats.balance) {
                alert("Check your balance!"); return;
            }

            isSpinning = true;
            userStats.balance -= bet;
            saveToFirebase();

            const randomDeg = Math.floor(Math.random() * 360) + 3600; // 10 full rotations
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${randomDeg}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const actualDeg = randomDeg % 360;
                calculateWin(actualDeg, bet);
            }, 4000);
        }

        function calculateWin(deg, bet) {
            let multiplier = 0;
            // Simplified logic for 6 segments (60 degrees each)
            if (deg >= 0 && deg < 60) multiplier = 2;
            else if (deg >= 60 && deg < 120) multiplier = 0.5;
            else if (deg >= 120 && deg < 180) multiplier = 5;
            else if (deg >= 180 && deg < 240) multiplier = 0.2;
            else if (deg >= 240 && deg < 300) multiplier = 1.5;
            else multiplier = 0;

            const win = Math.floor(bet * multiplier);
            userStats.balance += win;
            saveToFirebase();
            
            if(win > 0) showNotification(`Multiplied: ${win} ABP (${multiplier}x)!`);
            else showNotification("Better luck next spin!");
        }
    </script>
</body>
</html>
