<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Spin | ADAMAS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --dark: #05060a;
            --gold: #ffcc00;
        }

        body {
            margin: 0; background: var(--dark); color: white;
            font-family: 'Rajdhani', sans-serif; text-align: center; overflow-x: hidden;
        }

        .container { padding: 20px; max-width: 450px; margin: auto; }

        /* Spin Wheel Styling */
        .wheel-container {
            position: relative; width: 320px; height: 320px; margin: 40px auto;
            border: 8px solid var(--glass); border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 40px; z-index: 10; filter: drop-shadow(0 0 10px var(--primary));
        }

        /* Controls */
        .controls { margin-top: 30px; }
        .btn-spin {
            background: var(--primary); color: black; border: none;
            padding: 15px 50px; border-radius: 50px; font-family: 'Orbitron';
            font-weight: bold; cursor: pointer; font-size: 1rem;
            box-shadow: 0 0 20px var(--primary); transition: 0.3s;
        }
        .btn-spin:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        .status-box {
            margin-top: 20px; font-family: 'Orbitron'; font-size: 0.8rem;
            min-height: 40px; color: var(--primary);
        }

        .entry-fee { font-size: 0.7rem; color: var(--gold); margin-top: 5px; }
        .timer { color: #ff4444; font-size: 0.8rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 2px;">LUCKY <span style="color:var(--primary)">SPIN</span></h2>
        
        <div class="wheel-container">
            <img src="https://i.ibb.co/vVpx79m/pointer.png" class="pointer" alt="pointer">
            <canvas id="wheel"></canvas>
        </div>

        <div class="controls">
            <button id="spinBtn" class="btn-spin" onclick="handleSpin()">SPIN NOW</button>
            <div class="entry-fee" id="feeText">FREE DAILY SPIN</div>
            <div class="timer" id="timerText">Next Free: 24h 00m</div>
            <div id="status" class="status-box">Ready to Win?</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, update, get, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ2i6r8F66CxKpnbwMEhPS4pwC36V0Kgg",
            databaseURL: "https://adamas-protocol-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol",
            appId: "1:207788425238:web:025b8544f085dde60af537"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wallet = "0x6DbC17D9950e0b3A7627ec6bFc6b210A998da690";
        const userPath = 'users/' + wallet.substring(0, 10);

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const sectors = [
            { label: "100", color: "#1a0033", val: 100 },
            { label: "500", color: "#7000ff", val: 500 },
            { label: "JACKPOT", color: "#ffcc00", val: 2000 },
            { label: "200", color: "#1a0033", val: 200 },
            { label: "1000", color: "#00f2ff", val: 1000 },
            { label: "50", color: "#333", val: 50 },
            { label: "300", color: "#1a0033", val: 300 },
            { label: "800", color: "#00ff88", val: 800 }
        ];

        let currentRotation = 0;
        let isSpinning = false;
        let userData = { balance: 0, nextFee: 0, lastSpin: 0 };

        // Draw Wheel
        function drawWheel() {
            const size = 320;
            canvas.width = size; canvas.height = size;
            const rad = size / 2;
            const arc = (Math.PI * 2) / sectors.length;

            sectors.forEach((s, i) => {
                const ang = i * arc;
                ctx.beginPath();
                ctx.fillStyle = s.color;
                ctx.moveTo(rad, rad);
                ctx.arc(rad, rad, rad, ang, ang + arc);
                ctx.lineTo(rad, rad);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.stroke();

                // Text
                ctx.save();
                ctx.translate(rad, rad);
                ctx.rotate(ang + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 14px Orbitron";
                ctx.fillText(s.label, rad - 20, 5);
                ctx.restore();
            });
        }

        // Sync Data
        onValue(ref(db, userPath), (snap) => {
            if(snap.exists()){
                const d = snap.val();
                userData.balance = d.currentBalance || 0;
                userData.nextFee = d.spinFee || 0;
                userData.lastSpin = d.lastSpinTime || 0;
                updateButtonState();
            }
        });

        function updateButtonState() {
            const now = Date.now();
            const diff = now - userData.lastSpin;
            const feeText = document.getElementById('feeText');
            const timerText = document.getElementById('timerText');

            if (diff < 24 * 60 * 60 * 1000) {
                // In Paid Mode
                feeText.innerText = `ENTRY FEE: ${userData.nextFee || 10} ABP`;
                timerText.style.display = 'block';
                startTimer(24 * 60 * 60 * 1000 - diff);
            } else {
                // Free Mode
                feeText.innerText = `FREE DAILY SPIN`;
                timerText.style.display = 'none';
                if(userData.nextFee !== 0) update(ref(db, userPath), { spinFee: 0 });
            }
        }

        window.handleSpin = async () => {
            if (isSpinning) return;
            
            const now = Date.now();
            const diff = now - userData.lastSpin;
            let currentFee = userData.nextFee || 0;

            // Check if user has to pay
            if (diff < 24 * 60 * 60 * 1000) {
                if (currentFee === 0) currentFee = 10;
                if (userData.balance < currentFee) return alert("Paisa nahi hai bhai!");
                
                userData.balance -= currentFee;
                userData.nextFee = currentFee + 10; // Increase fee for next time
            } else {
                currentFee = 0; // Free spin
                userData.nextFee = 10; // Next one will be 10
            }

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('status').innerText = "Spinning...";

            const randomDeg = Math.floor(Math.random() * 360) + 3600; 
            currentRotation += randomDeg;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(async () => {
                isSpinning = false;
                const actualDeg = currentRotation % 360;
                const sectorIdx = Math.floor((360 - actualDeg) / (360 / sectors.length)) % sectors.length;
                const win = sectors[sectorIdx];

                userData.balance += win.val;
                
                await update(ref(db, userPath), {
                    currentBalance: userData.balance,
                    lastSpinTime: Date.now(),
                    spinFee: userData.nextFee
                });

                document.getElementById('status').innerText = `WINNER! +${win.val} ABP`;
                document.getElementById('spinBtn').disabled = false;
            }, 4000);
        };

        function startTimer(ms) {
            const t = document.getElementById('timerText');
            const interval = setInterval(() => {
                ms -= 1000;
                let h = Math.floor(ms / 3600000);
                let m = Math.floor((ms % 3600000) / 60000);
                t.innerText = `Next Free: ${h}h ${m}m`;
                if (ms <= 0) {
                    clearInterval(interval);
                    updateButtonState();
                }
            }, 1000);
        }

        window.onload = drawWheel;
    </script>
</body>
</html>
