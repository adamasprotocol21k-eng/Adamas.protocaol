<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Scratch | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .scratch-container {
            position: relative;
            width: 300px;
            height: 200px;
            margin: 20px auto;
            user-select: none;
            cursor: pointer;
        }
        .scratch-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1b26;
            border-radius: 15px;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-neon);
            border: 2px dashed rgba(0, 242, 255, 0.3);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 15px;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <div class="balance-pill">
        <span id="header-abp-balance" class="abp-balance-display">0</span> ABP
    </div>

    <div class="container" style="padding-top: 100px; text-align: center;">
        <div class="glass-card" style="max-width: 400px; margin: auto;">
            <h2 id="scratch-title">Daily Free Scratch</h2>
            <p id="scratch-desc" style="font-size: 0.8rem; opacity: 0.7;">Win up to 500 ABP Points!</p>

            <div class="scratch-container" id="scratch-area">
                <div class="scratch-base" id="scratch-reward">?</div>
                <canvas id="scratch-canvas" width="300" height="200"></canvas>
            </div>

            <div id="scratch-controls" style="margin-top: 20px;">
                <button class="neon-btn" id="claim-btn" style="display:none;" onclick="claimReward()">Claim Reward</button>
                <div id="paid-scratch-area" style="display:none; margin-top: 20px;">
                    <p style="font-size: 0.8rem; color: #ffcc00;">No free cards left!</p>
                    <button class="neon-btn" onclick="buyScratchCard()">Buy Card (20 ABP)</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Scratch Card Logic
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let rewardAmount = 0;

        function initScratch() {
            // Fill canvas with silver/grey color
            ctx.fillStyle = '#777';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#999';
            ctx.font = '20px Inter';
            ctx.fillText('SCRATCH HERE', 80, 110);
            
            // Logic for reward
            rewardAmount = Math.floor(Math.random() * 500) + 1;
            document.getElementById('scratch-reward').innerText = `+${rewardAmount} ABP`;
        }

        // Mouse/Touch Events
        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => {
            if(isDrawing) checkScratchPercentage();
            isDrawing = false;
        });
        canvas.addEventListener('mousemove', scratch);

        function scratch(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        function checkScratchPercentage() {
            // Agar user ne kaafi scratch kar liya hai toh claim button dikhao
            document.getElementById('claim-btn').style.display = 'inline-block';
        }

        async function claimReward() {
            await updateABP(rewardAmount, 'plus');
            canvas.style.display = 'none';
            document.getElementById('claim-btn').style.display = 'none';
            document.getElementById('paid-scratch-area').style.display = 'block';
            alert(`Congrats! You claimed ${rewardAmount} ABP`);
        }

        async function buyScratchCard() {
            if(userData.abp_balance < 20) {
                alert("Low Balance!");
                return;
            }
            await updateABP(20, 'minus');
            location.reload(); // Restart to get a new card
        }

        initScratch();
    </script>
</body>
</html>
