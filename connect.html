<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | ADAMAS Protocol</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gateway-card { margin-top: 30px; border: 1px solid var(--neon-blue); }
        .task-btn {
            background: rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-dim);
            text-decoration: none; color: white; transition: 0.3s;
        }
        .task-btn.done { border-color: var(--neon-green); background: rgba(57, 255, 20, 0.05); }
        .verified-tick { color: var(--neon-green); display: none; }
        .task-btn.done .verified-tick { display: block; }
    </style>
</head>
<body>

    <div class="header-pro">
        <h2 class="text-neon-blue">VAULT ACCESS</h2>
        <p style="font-size: 0.7rem; color: var(--text-sub);">VERIFY IDENTITY TO ENTER ECOSYSTEM</p>
    </div>

    <div style="padding: 0 15px;">
        <div class="glass-card gateway-card" id="step1">
            <h3>Step 1: Link Node</h3>
            <p style="font-size: 0.8rem; color: var(--text-sub); margin-bottom: 15px;">Enter your decentralized wallet address to sync data.</p>
            <input type="text" id="walletInput" placeholder="0x..." style="margin-bottom: 15px;">
            <button class="btn-neon" onclick="linkWallet()">CONNECT TO CLOUD</button>
        </div>

        <div class="glass-card" id="step2" style="display: none; border-color: var(--binance-yellow);">
            <h3>Step 2: Social Verification</h3>
            <p style="font-size: 0.7rem; color: var(--text-sub); margin-bottom: 15px;">Complete tasks to unlock your 1,000 ABP Welcome Bonus.</p>
            
            <a href="https://t.me/ADSProtocol" target="_blank" class="task-btn" onclick="markDone('tg')">
                <span>Join Official Telegram</span>
                <span class="verified-tick">✔</span>
            </a>
            <a href="https://x.com/AdamasADS" target="_blank" class="task-btn" onclick="markDone('x')">
                <span>Follow on X (Twitter)</span>
                <span class="verified-tick">✔</span>
            </a>

            <button id="finalEnter" class="btn-neon" style="margin-top: 20px; opacity: 0.5;" disabled onclick="enterDashboard()">ENTER PROTOCOL</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
