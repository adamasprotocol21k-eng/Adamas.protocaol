<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header-pro" style="text-align: center; padding: 40px 20px;">
        <h2 style="color: var(--binance-yellow);">SOCIAL VERIFICATION</h2>
        <p style="font-size: 0.7rem; color: var(--text-sub);">Complete tasks to unlock Dashboard.</p>
    </div>

    <div style="padding: 0 20px;">
        <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div><h4>TELEGRAM</h4><small>Join Community</small></div>
            <button class="btn-neon" style="width:auto; padding:10px 20px;" onclick="doTask('tg', 'https://t.me/ADSProtocol')">JOIN</button>
        </div>

        <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div><h4>X (TWITTER)</h4><small>Follow Updates</small></div>
            <button class="btn-neon" style="width:auto; padding:10px 20px;" onclick="doTask('x', 'https://x.com/DiamoProtocol')">FOLLOW</button>
        </div>

        <button id="finalEnterBtn" class="btn-neon" style="margin-top:30px; background:rgba(0,255,136,0.1); border-color:var(--neon-green); color:var(--neon-green);" onclick="forceEnter()">ENTER DASHBOARD</button>
        
        <p style="text-align:center; font-size:0.6rem; color:var(--text-sub); margin-top:20px;">
            Click 'Enter' after completing at least one task.
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        function doTask(type, link) {
            window.open(link, '_blank');
            localStorage.setItem('task_' + type, 'done');
            showNotification("Task Registered!");
        }

        function forceEnter() {
            // Force verification in LocalStorage
            localStorage.setItem('adamas_social_verified', 'true');
            
            // Sync with Firebase if wallet exists
            if(userStats.wallet) {
                db.ref('users/' + userStats.wallet).update({
                    isSocialVerified: true
                }).then(() => {
                    window.location.href = "dashboard.html";
                }).catch(() => {
                    // Fallback agar Firebase slow ho
                    window.location.href = "dashboard.html";
                });
            } else {
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
