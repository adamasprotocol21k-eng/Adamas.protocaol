<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .task-card {
            background: var(--glass); border: 1px solid var(--border-dim);
            padding: 20px; border-radius: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--neon-red); }
        .status-dot.done { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
    </style>
</head>
<body>

    <div class="header-pro" style="text-align: center; padding: 40px 20px;">
        <h2 style="color: var(--binance-yellow);">SOCIAL VERIFICATION</h2>
        <p style="font-size: 0.7rem; color: var(--text-sub);">Complete tasks to unlock the protocol terminal.</p>
    </div>

    <div style="padding: 0 20px;">
        <div class="task-card">
            <div>
                <h4 style="margin: 0;">JOIN TELEGRAM</h4>
                <small style="color: var(--text-sub);">Official Community</small>
            </div>
            <button class="btn-neon" style="width: auto; padding: 8px 20px;" onclick="completeTask('tg', 'https://t.me/ADSProtocol')">JOIN</button>
        </div>

        <div class="task-card">
            <div>
                <h4 style="margin: 0;">FOLLOW ON X</h4>
                <small style="color: var(--text-sub);">Latest Updates</small>
            </div>
            <button class="btn-neon" style="width: auto; padding: 8px 20px;" onclick="completeTask('x', 'https://x.com/DiamoProtocol')">FOLLOW</button>
        </div>

        <div style="display: flex; justify-content: center; gap: 15px; margin: 20px 0;">
            <div id="dot-tg" class="status-dot"></div>
            <div id="dot-x" class="status-dot"></div>
        </div>

        <button id="enterBtn" class="btn-neon" style="opacity: 0.5;" onclick="enterDashboard()" disabled>ENTER DASHBOARD</button>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="#" onclick="bypassTasks()" style="font-size: 0.6rem; color: var(--border-dim); text-decoration: none;">ADMIN BYPASS</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        let tasks = { tg: false, x: false };

        function completeTask(type, link) {
            // नए टैब में लिंक खोलें
            window.open(link, '_blank');
            
            // टास्क को डन मार्क करें (बिना पेज रिफ्रेश किए)
            setTimeout(() => {
                tasks[type] = true;
                document.getElementById('dot-' + type).classList.add('done');
                checkCompletion();
                showNotification("Task Registered!");
            }, 2000);
        }

        function checkCompletion() {
            if(tasks.tg && tasks.x) {
                const btn = document.getElementById('enterBtn');
                btn.style.opacity = "1";
                btn.style.borderColor = "var(--neon-green)";
                btn.style.color = "var(--neon-green)";
                btn.disabled = false;
            }
        }

        function enterDashboard() {
            // Firebase में सोशल स्टेटस अपडेट करें
            if(userStats.wallet) {
                userStats.isSocialVerified = true;
                saveToFirebase();
            }
            window.location.href = "dashboard.html";
        }

        function bypassTasks() {
            // सीधे अंदर जाने के लिए
            tasks.tg = true; tasks.x = true;
            checkCompletion();
            showNotification("Access Granted by Admin");
        }
    </script>
</body>
</html>
