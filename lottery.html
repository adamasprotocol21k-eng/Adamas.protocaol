<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADAMAS - Diamond Jackpot</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .lottery-container { text-align: center; padding: 40px 20px; }
        .jackpot-pool { 
            background: linear-gradient(135deg, #001a33, #00d2ff); 
            padding: 40px; border-radius: 30px; margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5);
        }
        .pool-amount { font-size: 3.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px #000; }
        .ticket-card { background: var(--card-bg); border: 1px dashed var(--diamond-blue); padding: 20px; border-radius: 15px; display: inline-block; }
    </style>
</head>
<body>
    <header>
        <button onclick="location.href='index.html'" class="btn-primary">⬅ Back</button>
        <h2 class="glow-text">ADAMAS JACKPOT</h2>
    </header>

    <div class="lottery-container">
        <div class="jackpot-pool">
            <h3>TOTAL PRIZE POOL</h3>
            <div class="pool-amount" id="totalPool">50000.00</div>
            <p>ABP POINTS</p>
        </div>

        <div class="ticket-card">
            <p>Your Active Tickets: <strong id="myTickets">0</strong></p>
            <p>Ticket Price: <strong>100 ABP</strong></p>
            <button class="btn-stake" onclick="buyTicket()">Buy Ticket Now</button>
        </div>

        <div id="drawTimer" style="margin-top: 30px; font-size: 1.2rem; color: var(--neon-green);">
            Next Draw in: 05h : 12m : 45s
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="lottery.js"></script>
</body>
</html>
