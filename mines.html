<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Mines | ADAMAS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .mines-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
            max-width: 350px; margin: 20px auto; padding: 10px;
        }
        .cell {
            aspect-ratio: 1/1; background: #2b2f36; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; border-bottom: 3px solid #1a1e23; transition: 0.2s;
        }
        .cell.active { background: #3d434d; transform: translateY(-2px); }
        .cell.diamond { background: var(--neon-blue); border-bottom-color: #008fb3; }
        .cell.bomb { background: var(--neon-red); border-bottom-color: #b30000; }
        
        .bet-controls { padding: 15px; background: var(--glass); border-radius: 20px; margin: 15px; }
        .multiplier-badge { color: var(--neon-green); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body onload="initMines()">

    <div class="header-pro" style="padding: 10px 15px; display: flex; justify-content: space-between;">
        <button onclick="location.href='games.html'" style="background:none; border:none; color:#fff;">← Back</button>
        <div id="walletBadge" style="font-size: 0.7rem;">0x...</div>
    </div>

    <div class="bet-controls">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <small>Current Multiplier</small>
            <span class="multiplier-badge" id="multiDisplay">1.00x</span>
        </div>
        <input type="number" id="betAmount" value="100" class="btn-neon" style="background:#000; margin-bottom: 10px; text-align: center;">
        <button id="startBtn" class="btn-neon" onclick="startGame()">START GAME</button>
        <button id="cashoutBtn" class="btn-neon" style="display:none; border-color: var(--neon-green); color: var(--neon-green);" onclick="cashout()">CASHOUT</button>
    </div>

    <div class="mines-grid" id="grid"></div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        let mines = [];
        let revealedCount = 0;
        let isGameOver = false;
        let currentBet = 0;

        function initMines() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => reveal(i, cell);
                grid.appendChild(cell);
            }
            loadUserData(localStorage.getItem('adamas_wallet'));
        }

        function startGame() {
            let amt = parseInt(document.getElementById('betAmount').value);
            if(userStats.balance < amt) { alert("Insufficient Balance!"); return; }
            
            userStats.balance -= amt;
            currentBet = amt;
            saveToFirebase();
            updateUI();

            mines = Array(25).fill('💎');
            // Place 3 Bombs randomly
            for(let i=0; i<3; i++) {
                let r = Math.floor(Math.random() * 25);
                mines[r] = '💣';
            }

            isGameOver = false;
            revealedCount = 0;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('cashoutBtn').style.display = 'block';
            document.getElementById('multiDisplay').innerText = "1.00x";
            initMines();
        }

        function reveal(index, cell) {
            if(isGameOver || cell.classList.contains('active')) return;
            
            cell.classList.add('active');
            if(mines[index] === '💣') {
                cell.innerHTML = '💣';
                cell.classList.add('bomb');
                gameOver(false);
            } else {
                cell.innerHTML = '💎';
                cell.classList.add('diamond');
                revealedCount++;
                let multi = 1 + (revealedCount * 0.25);
                document.getElementById('multiDisplay').innerText = multi.toFixed(2) + "x";
            }
        }

        function cashout() {
            let multi = 1 + (revealedCount * 0.25);
            let winAmt = currentBet * multi;
            userStats.balance += winAmt;
            saveToFirebase();
            showNotification(`Win: +${winAmt.toFixed(0)} ABP! 💰`);
            gameOver(true);
        }

        function gameOver(win) {
            isGameOver = true;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('cashoutBtn').style.display = 'none';
            if(!win) showNotification("BOOM! Game Over 💥");
            updateUI();
        }
    </script>
</body>
</html>
