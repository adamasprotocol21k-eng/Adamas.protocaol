<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Missions Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Gaming & Mission Specific Enhancements */
        .mines-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; 
            padding: 10px; background: rgba(0,0,0,0.3); border-radius: 15px;
        }
        .mine-tile { 
            aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 10px; 
            border: 1px solid var(--glass-border); display: flex; align-items: center; 
            justify-content: center; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .mine-tile:active { transform: scale(0.9); }
        .mine-tile.revealed-win { background: rgba(173, 255, 47, 0.15); border-color: var(--p-green); color: var(--p-green); }
        .mine-tile.revealed-loss { background: rgba(255, 51, 102, 0.15); border-color: #ff3366; color: #ff3366; }

        .mission-card {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 18px; margin-bottom: 12px;
        }
        .task-reward { color: var(--p-green); font-family: 'Orbitron'; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="mission-wrapper" style="padding: 15px; padding-bottom: 100px;">
        <header class="premium-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <span style="font-size: 10px; color: #666; letter-spacing: 1px;">AVAILABLE ABP</span>
                <span id="header-balance" style="display:block; color:white; font-family:'Orbitron'; font-size: 1.2rem; font-weight: 900;">0.00</span>
            </div>
            <div class="status-pill" style="background: rgba(173, 255, 47, 0.1); color: var(--p-green); border: 1px solid var(--p-green);">● HUB ONLINE</div>
        </header>

        <h2 style="font-family: 'Orbitron'; font-size: 12px; color: #fff; margin-bottom: 15px; letter-spacing: 2px;">⚡ DAILY MISSIONS</h2>
        <div id="mission-list">
            <div class="mission-card">
                <div>
                    <h4 style="font-size: 12px; color: #fff;">Daily Node Ping</h4>
                    <p style="font-size: 9px; color: #666;">Verification required</p>
                </div>
                <div style="text-align: right;">
                    <span class="task-reward">+50 ABP</span>
                    <button class="status-pill" style="display:block; margin-top: 5px; background: var(--cyan); color: #000; border:none;" onclick="claimTask(50, this)">CLAIM</button>
                </div>
            </div>
        </div>

        <section class="game-section" style="margin-top: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="font-family: 'Orbitron'; font-size: 12px; color: var(--cyan); letter-spacing: 2px;">💎 DIAMOND HUNT</h2>
                <span style="font-size: 10px; color: #666;">STAKE: 100 ABP</span>
            </div>
            <div class="premium-card">
                <div id="mines-grid" class="mines-grid">
                    </div>
                <button id="mine-start-btn" class="btn-primary" onclick="initMines()">INITIALIZE HUNT</button>
                <div id="game-controls" style="display:none; gap: 10px;">
                    <button class="btn-primary" style="background: var(--p-green); color: #000;" onclick="cashout()">CASHOUT</button>
                </div>
            </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠 HOME</a>
            <a href="missions.html" class="nav-item active">⚡ TASKS</a>
            <a href="referral.html" class="nav-item">👥 NETWORK</a>
            <a href="profile.html" class="nav-item">🏆 RANK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration (Using your existing one)
        const firebaseConfig = {
            apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
            authDomain: "adamas-protocol-v2.firebaseapp.com",
            databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol-v2",
            appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userWallet = localStorage.getItem('adamas_user');
        if (!userWallet) window.location.href = "index.html";
        const userRef = db.ref('users/' + userWallet);

        // Fetch Balance
        userRef.on('value', snap => {
            const data = snap.val();
            if(data) document.getElementById('header-balance').innerText = parseFloat(data.balance || 0).toFixed(2);
        });

        // Simple Task Claim
        async function claimTask(amt, btn) {
            btn.innerText = "WAIT...";
            btn.disabled = true;
            await userRef.child('balance').transaction(b => (b || 0) + amt);
            btn.innerText = "DONE";
            btn.style.background = "#333";
            btn.style.color = "#666";
        }

        // --- DIAMOND HUNT ENGINE ---
        let mines = [];
        let gameActive = false;

        function initMines() {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            mines = Array(25).fill('💎');
            // Randomly place 3 bombs
            for(let i=0; i<3; i++) {
                let idx = Math.floor(Math.random() * 25);
                mines[idx] = '💣';
            }

            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'mine-tile';
                tile.dataset.index = i;
                tile.onclick = () => revealTile(tile, i);
                grid.appendChild(tile);
            }
            
            document.getElementById('mine-start-btn').style.display = 'none';
            document.getElementById('game-controls').style.display = 'flex';
            gameActive = true;
        }

        async function revealTile(el, idx) {
            if(!gameActive || el.classList.contains('revealed-win')) return;

            if(mines[idx] === '💣') {
                el.innerText = '💣';
                el.classList.add('revealed-loss');
                alert("NODE CRASHED! 100 ABP LOST");
                await userRef.child('balance').transaction(b => (b || 0) - 100);
                resetGame();
            } else {
                el.innerText = '💎';
                el.classList.add('revealed-win');
            }
        }

        async function cashout() {
            const revealed = document.querySelectorAll('.revealed-win').length;
            if(revealed === 0) return;
            
            const reward = revealed * 20;
            await userRef.child('balance').transaction(b => (b || 0) + reward);
            alert(`SUCCESS! Received ${reward} ABP`);
            resetGame();
        }

        function resetGame() {
            gameActive = false;
            document.getElementById('mine-start-btn').style.display = 'block';
            document.getElementById('game-controls').style.display = 'none';
            setTimeout(() => { document.getElementById('mines-grid').innerHTML = ''; }, 2000);
        }
    </script>
</body>
</html>
