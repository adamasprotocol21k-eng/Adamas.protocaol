<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Mission Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00f2ff; 
            --cyan-glow: rgba(0, 242, 255, 0.4); 
            --gold: #ffcc00;
            --p-green: #adff2f; 
            --glass: rgba(255, 255, 255, 0.03); 
            --card-bg: rgba(10, 10, 10, 0.9);
        }

        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .mission-wrapper { min-height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; width: 100%; max-width: 440px; margin: 0 auto; padding-bottom: 120px; }

        /* --- ARCADE GRID --- */
        .arcade-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .game-item {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01)); 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; text-align: center; transition: 0.3s; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .game-item:active { transform: scale(0.95); border-color: var(--cyan); }
        .game-icon-svg { width: 45px; height: 45px; margin-bottom: 12px; filter: drop-shadow(0 0 8px var(--cyan)); }
        .game-label { font-family: 'Orbitron'; font-size: 9px; color: #fff; letter-spacing: 2px; font-weight: 700; }

        /* --- DIAMOND HUNT SECTION (EMBEDDED) --- */
        #mines-sec { 
            background: var(--card-bg); border: 1px solid rgba(173, 255, 47, 0.2); 
            border-radius: 30px; padding: 25px; position: relative; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 30px rgba(173, 255, 47, 0.05);
        }
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; display: none; }
        .mine-tile { 
            aspect-ratio: 1; background: rgba(255,255,255,0.03); border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; 
            justify-content: center; font-size: 1.3rem; cursor: pointer; transition: 0.2s;
        }
        .mine-tile:active { transform: scale(0.9); }
        .mine-tile.revealed { background: rgba(0, 242, 255, 0.15); border-color: var(--cyan); box-shadow: inset 0 0 10px var(--cyan-glow); }

        /* --- OVERLAYS --- */
        .game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(12px);
        }
        .game-window {
            width: 88%; max-width: 380px; background: #080808; border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 35px; padding: 25px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1); position: relative;
        }

        .header-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-pill { background: var(--cyan); color: #000; border: none; padding: 14px 20px; border-radius: 15px; font-size: 10px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px var(--cyan-glow); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #151515; z-index: 100; backdrop-filter: blur(10px); }
        .nav-item { text-decoration: none; color: #555; font-size: 8px; font-family: 'Orbitron'; text-align: center; transition: 0.3s; }
        .nav-item.active { color: var(--cyan); filter: drop-shadow(0 0 5px var(--cyan)); }

        .live-win { color: var(--p-green); font-family: 'Orbitron'; font-size: 14px; margin-top: 10px; font-weight: 900; letter-spacing: 1px; }
        .balance-label { font-family: 'Orbitron'; font-size: 10px; color: var(--cyan); opacity: 0.7; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div id="game-overlay" class="game-overlay">
        <div class="game-window">
            <span onclick="closeGame()" style="position:absolute; top: -45px; right: 0; color: #666; font-family:'Orbitron'; cursor:pointer; font-size: 10px;">[ TERMINATE_SESSION ]</span>
            
            <div id="crash-box" style="display:none;">
                <span class="balance-label">WALLET_SYNC: <span class="live-balance">0.00</span></span>
                <canvas id="crash-canvas" width="300" height="180" style="background:#000; border-radius:20px; border: 1px solid rgba(255,255,255,0.05);"></canvas>
                <div id="crash-multiplier" style="font-size: 48px; font-family:'Orbitron'; color:var(--gold); margin-top: -120px; position: relative; z-index: 5; text-shadow: 0 0 20px rgba(255,204,0,0.3);">1.00x</div>
            </div>

            <div id="spin-sync-box" style="display:none; margin: 20px 0;">
                <span class="balance-label">WALLET_SYNC: <span class="live-balance">0.00</span></span>
                <div style="position:relative; width: 210px; height: 210px; margin: auto;">
                    <svg width="210" height="210" viewBox="0 0 200 200" id="wheel-svg" style="transition: transform 4s cubic-bezier(0.15, 0, 0.1, 1);">
                        <circle cx="100" cy="100" r="98" fill="#111" stroke="#222" stroke-width="4"/>
                        <path d="M100,100 L100,5 A95,95 0 0,1 195,100 Z" fill="#ff3b3b"/>
                        <path d="M100,100 L195,100 A95,95 0 0,1 100,195 Z" fill="#00f2ff"/>
                        <path d="M100,100 L100,195 A95,95 0 0,1 5,100 Z" fill="#ffcc00"/>
                        <path d="M100,100 L5,100 A95,95 0 0,1 100,5 Z" fill="#adff2f"/>
                    </svg>
                    <div style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent; border-top:25px solid #fff; z-index:10; filter: drop-shadow(0 0 5px var(--cyan));"></div>
                </div>
            </div>
            
            <div id="bet-container" style="margin-top: 85px;">
                <div style="background:rgba(255,255,255,0.03); padding:12px; border-radius:18px; margin-bottom:15px; border: 1px solid rgba(255,255,255,0.05);">
                    <input type="number" id="bet-amount" value="50" style="background:transparent; border:none; color:var(--cyan); font-family:'Orbitron'; text-align:center; width:80px; font-size: 1.2rem; outline: none;">
                    <span style="font-size: 10px; font-family:'Orbitron'; color:var(--cyan);">ABP</span>
                </div>
                <button id="main-game-btn" class="status-pill" style="width: 100%;">INITIALIZE PROTOCOL</button>
            </div>
        </div>
    </div>

    <div class="mission-wrapper">
        <header class="header-card">
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:40px; height:40px; border-radius:12px; border:1px solid var(--cyan); display:flex; align-items:center; justify-content:center; background:rgba(0,242,255,0.05); box-shadow: inset 0 0 10px var(--cyan-glow);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--cyan)"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <div>
                    <span style="font-size: 8px; color: #555; font-family: 'Orbitron'; letter-spacing: 1px;">TOTAL_VAULT</span>
                    <span id="header-balance" style="display:block; color:#fff; font-family:'Orbitron'; font-size: 1.2rem; font-weight: 900;">0.00</span>
                </div>
            </div>
            <div id="streak-badge" style="color: var(--p-green); border: 1px solid rgba(173, 255, 47, 0.2); font-size: 8px; padding: 8px 14px; border-radius: 20px; font-family: 'Orbitron'; background: rgba(173,255,47,0.05);">STREAK: 1</div>
        </header>

        <h2 style="font-family: 'Orbitron'; font-size: 10px; color: var(--gold); margin-bottom: 18px; letter-spacing: 2px;">⚡ QUANTUM_ARCADE</h2>
        <div class="arcade-grid">
            <div class="game-item" onclick="openCrash()">
                <svg class="game-icon-svg" viewBox="0 0 24 24" fill="var(--cyan)"><path d="M21 16v2L13 13v5L16 21V23L12 22L8 23V21L11 18V13L3 18V16L11 8L8 4H12L14 4L11 8L21 16Z"/></svg>
                <div class="game-label">CRASH_SYNC</div>
            </div>
            <div class="game-item" onclick="openSpinSync()">
                <svg class="game-icon-svg" viewBox="0 0 24 24" fill="var(--gold)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                <div class="game-label">SPIN_WHEEL</div>
            </div>
        </div>

        <section id="mines-sec">
            <div id="mines-intro" style="text-align:center;">
                <svg width="55" height="55" viewBox="0 0 24 24" fill="var(--p-green)" style="margin-bottom:15px; filter: drop-shadow(0 0 10px var(--p-green));"><path d="M12.14 2.14L3.07 11.21L12.14 20.28L21.21 11.21L12.14 2.14ZM12.14 6.38L16.97 11.21L12.14 16.04L7.31 11.21L12.14 6.38Z"/></svg>
                <h3 style="font-family:'Orbitron'; font-size:13px; margin:0; letter-spacing: 1px;">DIAMOND_HUNT_V2</h3>
                <p style="font-size:9px; color:#555; margin-top: 5px;">MULTIPLIER: UP TO 15.0x</p>
                <button class="status-pill" onclick="initMines()" style="margin-top:20px; width:100%; background: var(--p-green);">START DECRYPTION (50 ABP)</button>
            </div>

            <div id="mines-grid-box" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                    <span style="font-family:'Orbitron'; font-size:9px; color:#666;">SESSION_ACTIVE</span>
                    <div id="mines-live-reward" class="live-win">PROFIT: 0.00</div>
                </div>
                <div id="mines-grid" class="mines-grid"></div>
                <button class="status-pill" style="background:var(--gold); width:100%; margin-top:15px;" onclick="cashoutMines()">SECURE EARNINGS</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">🏠<br>HOME</a>
            <a href="vault.html" class="nav-item">🔒<br>VAULT</a>
            <a href="rank.html" class="nav-item">🏆<br>RANK</a>
            <a href="missions.html" class="nav-item active">⚡<br>TASKS</a>
            <a href="referral.html" class="nav-item">👥<br>NETWORK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        const userWallet = localStorage.getItem('adamas_user');
        const userRef = db.ref('users/' + userWallet);
        let currentBalance = 0;

        function formatABP(val) {
            if (val >= 1e6) return (val / 1e6).toFixed(2) + 'M';
            if (val >= 1e3) return (val / 1e3).toFixed(1) + 'K';
            return parseFloat(val).toFixed(2);
        }

        userRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                currentBalance = data.balance || 0;
                document.getElementById('header-balance').innerText = formatABP(currentBalance);
                document.querySelectorAll('.live-balance').forEach(el => el.innerText = formatABP(currentBalance));
                document.getElementById('streak-badge').innerText = "STREAK: " + (data.streak || 1);
            }
        });

        // --- DIAMOND HUNT ---
        let mineNodes = []; let minesActive = false; let gemsFound = 0;
        async function initMines() {
            if(currentBalance < 50) return alert("Insufficient ABP!");
            await userRef.update({ balance: firebase.database.ServerValue.increment(-50) });
            
            document.getElementById('mines-intro').style.display = 'none';
            document.getElementById('mines-grid-box').style.display = 'block';
            const grid = document.getElementById('mines-grid');
            grid.style.display = 'grid';
            grid.innerHTML = '';
            
            mineNodes = Array(25).fill('💎');
            for(let i=0; i<4; i++) {
                let r = Math.floor(Math.random()*25);
                mineNodes[r] = '💣';
            }
            
            gemsFound = 0; minesActive = true;
            document.getElementById('mines-live-reward').innerText = `PROFIT: 0.00`;

            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'mine-tile';
                tile.onclick = () => {
                    if(!minesActive || tile.classList.contains('revealed')) return;
                    tile.classList.add('revealed');
                    if(mineNodes[i] === '💣') {
                        tile.innerText = '💣'; tile.style.background = '#ff3b3b';
                        minesActive = false;
                        setTimeout(() => { alert("NODE BUSTED: 0.00 ABP Recovered"); resetMinesUI(); }, 500);
                    } else {
                        tile.innerText = '💎';
                        gemsFound++;
                        document.getElementById('mines-live-reward').innerText = `PROFIT: ${(gemsFound * 30).toFixed(2)}`;
                    }
                };
                grid.appendChild(tile);
            }
        }

        async function cashoutMines() {
            if(!minesActive || gemsFound === 0) return;
            const win = gemsFound * 30;
            await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
            minesActive = false;
            alert(`VAULTED: +${win} ABP SECURED`);
            resetMinesUI();
        }

        function resetMinesUI() {
            document.getElementById('mines-intro').style.display = 'block';
            document.getElementById('mines-grid-box').style.display = 'none';
        }

        // --- CRASH ---
        let crashInterval; let mult = 1.00; let isFlying = false;
        function openCrash() {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('crash-box').style.display = 'block';
            document.getElementById('spin-sync-box').style.display = 'none';
            document.getElementById('main-game-btn').innerText = "INITIALIZE";
            document.getElementById('main-game-btn').onclick = () => startCrash();
        }

        async function startCrash() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            if(currentBalance < bet) return alert("Low Balance!");
            await userRef.update({ balance: firebase.database.ServerValue.increment(-bet) });
            
            isFlying = true; mult = 1.00;
            document.getElementById('main-game-btn').innerText = "CASH OUT";
            document.getElementById('main-game-btn').onclick = () => cashoutCrash(bet);
            
            const crashPoint = Math.random() < 0.8 ? (1.1 + Math.random() * 2) : (2 + Math.random() * 8);
            
            crashInterval = setInterval(() => {
                mult += 0.01 * (mult * 1.1);
                document.getElementById('crash-multiplier').innerText = mult.toFixed(2) + "x";
                if(mult >= crashPoint) {
                    clearInterval(crashInterval);
                    isFlying = false;
                    document.getElementById('crash-multiplier').innerText = "CRASHED";
                    document.getElementById('main-game-btn').innerText = "RETRY";
                    document.getElementById('main-game-btn').onclick = () => openCrash();
                }
            }, 100);
        }

        async function cashoutCrash(bet) {
            if(!isFlying) return;
            clearInterval(crashInterval);
            isFlying = false;
            const win = Math.floor(bet * mult);
            await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
            alert(`VAULTED: +${win} ABP`);
            closeGame();
        }

        // --- SPIN ---
        function openSpinSync() {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('spin-sync-box').style.display = 'block';
            document.getElementById('crash-box').style.display = 'none';
            document.getElementById('main-game-btn').innerText = "SPIN (100 ABP)";
            document.getElementById('main-game-btn').onclick = () => {
                if(currentBalance < 100) return alert("Low Balance!");
                userRef.update({ balance: firebase.database.ServerValue.increment(-100) });
                const deg = 1800 + Math.floor(Math.random() * 360);
                document.getElementById('wheel-svg').style.transform = `rotate(${deg}deg)`;
                setTimeout(async () => {
                    await userRef.update({ balance: firebase.database.ServerValue.increment(200) });
                    alert("SYNCED: +200 ABP");
                    closeGame();
                }, 4000);
            };
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            clearInterval(crashInterval);
            isFlying = false;
        }
    </script>
</body>
</html>
