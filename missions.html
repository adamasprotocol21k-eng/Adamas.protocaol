<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Missions</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #050505; color: #fff; margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; }
        
        .mission-wrapper { padding: 15px; padding-bottom: 100px; max-width: 480px; margin: auto; }
        
        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(130, 71, 229, 0.2);
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
        }

        .mission-card {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 18px; margin-bottom: 12px;
        }

        .task-reward { color: #adff2f; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; }
        
        .status-pill {
            background: #00f2ff; color: #000; border: none;
            padding: 6px 12px; border-radius: 8px; font-size: 10px;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        }

        .mines-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; 
        }

        .mine-tile { 
            aspect-ratio: 1; background: rgba(255, 255, 255, 0.05); border-radius: 8px; 
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; 
            align-items: center; justify-content: center; font-size: 1rem; cursor: pointer;
        }

        .btn-elite {
            background: #00f2ff; color: #000; border: none; width: 100%;
            padding: 15px; border-radius: 12px; font-family: 'Orbitron'; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="mission-wrapper">
        <header class="premium-card" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span style="font-size: 9px; color: #666; letter-spacing: 1px; font-family: 'Orbitron';">AVAILABLE ABP</span>
                <span id="header-balance" style="display:block; color:#fff; font-family:'Orbitron'; font-size: 1.2rem; font-weight: 900;">0.00</span>
            </div>
            <div style="background: rgba(173, 255, 47, 0.1); color: #adff2f; border: 1px solid #adff2f; font-size: 9px; padding: 4px 8px; border-radius: 5px;">● HUB ONLINE</div>
        </header>

        <h2 style="font-family: 'Orbitron'; font-size: 11px; color: #fff; margin: 20px 0 15px 0; letter-spacing: 2px;">⚡ DAILY MISSIONS</h2>
        
        <div id="mission-list">
            <div class="mission-card">
                <div>
                    <h4 style="font-size: 12px; color: #fff; margin: 0;">Follow Adamas X</h4>
                    <p style="font-size: 9px; color: #666; margin-top: 4px;">+150 ABP REWARD</p>
                </div>
                <button class="status-pill" id="btn-m1" onclick="handleMission('m1', 'https://x.com/AdamasADS', 150)">START</button>
            </div>
        </div>

        <section class="game-section" style="margin-top: 30px;">
            <h2 style="font-family: 'Orbitron'; font-size: 11px; color: #00f2ff; letter-spacing: 2px;">💎 DIAMOND HUNT</h2>
            <div class="premium-card">
                <div id="mines-grid" class="mines-grid"></div>
                <button id="mine-start-btn" class="btn-elite" onclick="initMines()">INITIALIZE HUNT</button>
                <div id="game-controls" style="display:none; gap: 10px;">
                    <button class="btn-elite" style="background: #adff2f;" onclick="cashout()">CASHOUT</button>
                </div>
            </div>
        </section>

        <nav class="bottom-nav" style="position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; background: #050505; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05);">
            <a href="dashboard.html" style="text-decoration:none; color:#555; font-size:10px; font-family:'Orbitron';">🏠 HOME</a>
            <a href="missions.html" style="text-decoration:none; color:#adff2f; font-size:10px; font-family:'Orbitron';">⚡ TASKS</a>
            <a href="referral.html" style="text-decoration:none; color:#555; font-size:10px; font-family:'Orbitron';">👥 NETWORK</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBs2XAli-CtSh4qqHJTwcoLBaGsGC4RUHI",
            authDomain: "adamas-protocol-v2.firebaseapp.com",
            databaseURL: "https://adamas-protocol-v2-default-rtdb.firebaseio.com",
            projectId: "adamas-protocol-v2",
            appId: "1:197711342782:web:84cc5ffcd29b3f9bfe82ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userWallet = localStorage.getItem('adamas_user');
        if (!userWallet) window.location.href = "index.html";
        const userRef = db.ref('users/' + userWallet);

        userRef.on('value', snap => {
            const data = snap.val();
            if(data) document.getElementById('header-balance').innerText = parseFloat(data.balance || 0).toFixed(2);
        });

        async function handleMission(mId, link, reward) {
            window.open(link, '_blank');
            const btn = document.getElementById('btn-' + mId);
            btn.innerText = "VERIFYING...";
            setTimeout(async () => {
                await userRef.child('balance').transaction(b => (b || 0) + reward);
                btn.innerText = "DONE";
                btn.disabled = true;
                btn.style.background = "#222";
            }, 5000);
        }

        // Diamond Hunt logic remains same as before...
        let mines = [];
        function initMines() {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            mines = Array(25).fill('💎');
            for(let i=0; i<3; i++) mines[Math.floor(Math.random() * 25)] = '💣';
            for(let i=0; i<25; i++) {
                const tile = document.createElement('div');
                tile.className = 'mine-tile';
                tile.onclick = () => {
                    tile.innerText = mines[i];
                    if(mines[i] === '💣') { alert('CRASHED!'); location.reload(); }
                };
                grid.appendChild(tile);
            }
            document.getElementById('mine-start-btn').style.display = 'none';
            document.getElementById('game-controls').style.display = 'flex';
        }
    </script>
</body>
</html>
