<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Missions Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Gaming Specific Styles */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .mine-tile { 
            aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s; font-family: 'Orbitron';
        }
        .mine-tile.revealed { background: #000; border-color: var(--cyan); box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2); }
        .mine-tile.win { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .mine-tile.bomb { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }

        .road-container { background: #080808; border-radius: 15px; padding: 10px; border: 1px solid #111; }
        .road-lane { height: 35px; border-bottom: 1px dashed #222; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #333; font-family: 'Orbitron'; }
        
        .mission-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px;
            display: none; flex-direction: column; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="mission-wrapper" style="padding: 15px;">
        <header class="premium-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px;">
            <div>
                <span style="font-size: 10px; color: #555;">AVAILABLE ABP</span>
                <span id="header-balance" style="display:block; color:white; font-family:'Orbitron'; font-weight: bold;">0.00 ABP</span>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 10px; color: #555;">HUB STATUS</span>
                <span style="display:block; color:var(--neon-green); font-family:'Orbitron'; font-weight: bold; font-size: 10px;">ONLINE</span>
            </div>
        </header>

        <section class="premium-card" style="text-align: center; border: 1px dashed var(--cyan); margin-bottom: 25px; background: rgba(0, 242, 255, 0.02);">
            <h3 style="font-family: 'Orbitron'; font-size: 14px; color: #fff; margin-bottom: 5px;">PROTOCOL MISSIONS</h3>
            <p style="font-size: 11px; margin-bottom: 15px; color: #888;">Earn guaranteed ABP rewards instantly</p>
            <button class="btn-primary" style="background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 12px;" onclick="toggleMissionList()">ACCESS TERMINAL</button>
        </section>

        <section class="game-section" style="margin-bottom: 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="font-family: 'Orbitron'; font-size: 12px; color: var(--cyan);">💎 DIAMOND HUNT</h2>
                <span id="mine-multiplier" style="font-size: 10px; color: var(--neon-green); font-family: 'Orbitron';">BET: 100 ABP</span>
            </div>
            <div class="premium-card">
                <div id="mines-grid" class="mines-grid"></div>
                <button id="mine-start-btn" class="btn-primary" onclick="startMines()">START HUNT</button>
                <button id="mine-cashout-btn" class="btn-primary" style="display:none; background: var(--neon-green);" onclick="cashoutMines()">CASHOUT</button>
            </div>
        </section>

        <section class="game-section" style="margin-bottom: 25px;">
            <h2 style="font-family: 'Orbitron'; font-size: 12px; color: var(--neon-gold); margin-bottom: 10px;">🐔 CHICKEN ROAD</h2>
            <div class="premium-card">
                <div class="road-container" id="road-display">
                    <div class="road-lane">LANE 5 (5.0x)</div>
                    <div class="road-lane">LANE 4 (3.0x)</div>
                    <div class="road-lane">LANE 3 (2.0x)</div>
                    <div class="road-lane">LANE 2 (1.5x)</div>
                    <div class="road-lane" style="color: var(--neon-gold);">LANE 1 (1.2x)</div>
                </div>
                <button class="btn-primary" style="margin-top: 15px; background: var(--neon-gold); color: #000;" onclick="startChickenRun()">CROSS ROAD (50 ABP)</button>
            </div>
        </section>

        <div id="mission-terminal" class="mission-overlay">
            <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 30px;">
                <span style="font-family:'Orbitron'; color:var(--cyan); letter-spacing: 2px;">ACTIVE_TASKS</span>
                <button onclick="toggleMissionList()" style="color:var(--neon-red); background:none; border:none; font-family: 'Orbitron'; font-weight: bold;">[ CLOSE ]</button>
            </div>
            <div id="mission-list-container"></div>
        </div>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="icon">🏠</span>
                <span>HOME</span>
            </a>
            <a href="vault.html" class="nav-item">
                <span class="icon">🔒</span>
                <span>VAULT</span>
            </a>
            <a href="missions.html" class="nav-item active">
                <span class="icon">⚡</span>
                <span>TASKS</span>
            </a>
            <a href="referral.html" class="nav-item">
                <span class="icon">👥</span>
                <span>NETWORK</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="icon">🏆</span>
                <span>RANK</span>
            </a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="missions.js"></script>
</body>
</html>
