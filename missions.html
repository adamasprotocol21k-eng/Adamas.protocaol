<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Mission Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root { 
            --cyan: #00f2ff; 
            --cyan-glow: rgba(0, 242, 255, 0.4); 
            --gold: #ffcc00;
            --p-green: #adff2f; 
            --glass: rgba(255, 255, 255, 0.03); 
        }

        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .mission-wrapper { min-height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; width: 100%; max-width: 440px; margin: 0 auto; padding-bottom: 120px; }

        /* --- ARCADE GRID --- */
        .arcade-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .game-item {
            background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; text-align: center; transition: 0.3s; cursor: pointer;
        }
        .game-icon-large { font-size: 32px; margin-bottom: 10px; display: block; }
        .game-label { font-family: 'Orbitron'; font-size: 9px; color: #fff; letter-spacing: 1px; text-transform: uppercase; }

        /* --- OVERLAY STYLES --- */
        .game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }
        .game-window {
            width: 90%; max-width: 400px; background: #050505; border: 1.5px solid var(--cyan);
            border-radius: 30px; padding: 20px; text-align: center; box-shadow: 0 0 40px var(--cyan-glow); position: relative;
        }

        /* --- SPIN WHEEL PREMIUM --- */
        .wheel-container { position: relative; width: 220px; height: 220px; margin: 20px auto; }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 5px solid #111;
            background: conic-gradient(
                #ff3e3e 0deg 45deg, #111 45deg 90deg, 
                #00f2ff 90deg 135deg, #111 135deg 180deg,
                #ffcc00 180deg 225deg, #111 225deg 270deg,
                #adff2f 270deg 315deg, #111 315deg 360deg
            );
            box-shadow: 0 0 30px var(--cyan-glow);
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1);
            position: relative; overflow: hidden;
        }
        .wheel-number {
            position: absolute; width: 100%; height: 100%;
            font-family: 'Orbitron'; font-size: 12px; font-weight: 900;
            color: #fff; text-shadow: 0 0 5px #000;
        }

        .wheel-pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 25px solid var(--cyan); z-index: 10;
        }

        /* --- MINES GRID --- */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .mine-tile { 
            aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; 
            justify-content: center; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }

        .mission-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 12px; }
        .header-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-pill { background: var(--cyan); color: #000; border: none; padding: 12px 18px; border-radius: 12px; font-size: 10px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-overlay" class="game-overlay">
        <div class="game-window">
            <span onclick="closeGame()" style="position:absolute; top: -40px; right: 0; color: #555; font-family:'Orbitron'; cursor:pointer; font-size: 10px;">[×] TERMINATE_SESSION</span>
            <h2 id="overlay-title" style="font-family:'Orbitron'; color:#fff; font-size: 12px; margin-bottom: 15px;">MISSION_MODULE</h2>
            
            <div id="crash-box" style="display:none;">
                <canvas id="crash-canvas" width="300" height="180"></canvas>
                <div id="crash-multiplier" style="font-size: 40px; font-family:'Orbitron'; color:var(--gold); margin-top: -110px; position: relative; z-index: 5;">1.00x</div>
            </div>

            <div id="spin-box" style="display:none;">
                <div class="wheel-container">
                    <div class="wheel-pointer"></div>
                    <div id="wheel">
                        <div class="wheel-number" style="transform: rotate(22deg) translateY(10px);">0x</div>
                        <div class="wheel-number" style="transform: rotate(112deg) translateY(10px);">2x</div>
                        <div class="wheel-number" style="transform: rotate(202deg) translateY(10px);">5x</div>
                        <div class="wheel-number" style="transform: rotate(292deg) translateY(10px);">10x</div>
                    </div>
                </div>
            </div>

            <div id="mines-box" style="display:none;">
                <div id="mines-grid-container" class="mines-grid"></div>
                <p id="mine-status" style="font-size: 10px; color: var(--p-green); font-family: 'Orbitron';">SELECT TILES TO DECRYPT</p>
            </div>
            
            <div id="bet-container" style="margin-top: 70px;">
                <div class="bet-box">
                    <span style="font-size: 9px; font-family:'Orbitron'; color:#666;">AMT</span>
                    <input type="number" id="bet-amount" value="50" min="10" style="background:transparent; border:none; border-bottom:1px solid #333; color:var(--cyan); text-align:center; font-family:'Orbitron'; outline:none; width: 60px;">
                    <span style="font-size: 9px; font-family:'Orbitron'; color:var(--cyan);">ABP</span>
                </div>
                <button id="main-game-btn" class="status-pill" style="width: 100%; margin-top: 15px;">INITIALIZE</button>
            </div>
        </div>
    </div>

    <div class="mission-wrapper">
        <header class="header-card">
            <div class="brand-identity">
                <span style="font-size: 8px; color: #555; letter-spacing: 2px; font-family: 'Orbitron';">VAULT_ASSETS</span>
                <span id="header-balance" style="display:block; color:#fff; font-family:'Orbitron'; font-size: 1.1rem; font-weight: 900;">0.00</span>
            </div>
            <div id="streak-badge" style="color: var(--p-green); border: 1px solid rgba(173, 255, 47, 0.2); font-size: 8px; padding: 6px 12px; border-radius: 20px; font-family: 'Orbitron';">STREAK: 1</div>
        </header>

        <h2 style="font-family: 'Orbitron'; font-size: 10px; color: var(--gold); margin: 10px 0 15px 5px; letter-spacing: 3px;">🎰 QUANTUM_ARCADE</h2>
        <div class="arcade-grid">
            <div class="game-item" onclick="openCrash()">
                <span class="game-icon-large">🚀</span>
                <div class="game-label">CRASH</div>
            </div>
            <div class="game-item" onclick="openSpinSync()">
                <span class="game-icon-large">🎡</span>
                <div class="game-label">SPIN</div>
            </div>
            <div class="game-item" onclick="openMines()" style="grid-column: span 2;">
                <span class="game-icon-large">💎</span>
                <div class="game-label">DIAMOND_HUNT</div>
            </div>
        </div>

        <h2 style="font-family: 'Orbitron'; font-size: 10px; color: var(--cyan); margin: 10px 0 15px 5px; opacity: 0.6;">⚡ DAILY_MISSIONS</h2>
        <div id="daily-mission-list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        const userWallet = localStorage.getItem('adamas_user');
        const userRef = db.ref('users/' + userWallet);
        
        // --- AEROPLANE SVG (Fixed Rotation for UDTE HUE POSITION) ---
        const planeSVG = `data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwZjJmZiI+PHBhdGggZD0iTTIxIDE2djJMMTMgMTN2NUwxNiAyMVYyM0wxMiAyMkw4IDIzVjIxTDExIDE4VjEzTDMgMThWMTZMMTEgOEw4IDRIMTJMMTQgNEwxMSA4TDIxIDE2WiIvPjwvc3ZnPg==`;
        const planeImg = new Image(); planeImg.src = planeSVG;

        const dailyTasks = [
            { id: 'tg_comm', name: 'COMMUNITY_SYNC', link: 'https://t.me/adsprotocolcommunity', reward: 50 },
            { id: 'tg_ann', name: 'PROTOCOL_NEWS', link: 'https://t.me/ADSProtocol', reward: 50 },
            { id: 'x_diamo', name: 'DIAMO_X_RAID', link: 'https://x.com/DiamoProtocol', reward: 50 },
            { id: 'x_adamas', name: 'ADAMAS_X_RAID', link: 'https://x.com/AdamasADS', reward: 50 }
        ];

        function formatBalance(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(2) + 'K';
            return num.toFixed(2);
        }

        userRef.on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('header-balance').innerText = formatBalance(data.balance || 0);
                document.getElementById('streak-badge').innerText = "STREAK: " + (data.streak || 1);
                renderMissions(data.dailyTasks || {});
            }
        });

        function renderMissions(completed) {
            const container = document.getElementById('daily-mission-list');
            const today = new Date().toISOString().split('T')[0];
            container.innerHTML = '';
            dailyTasks.forEach(task => {
                const isDone = completed[task.id] && completed[task.id].date === today;
                const card = document.createElement('div');
                card.className = 'mission-card';
                card.innerHTML = `
                    <div><h4 style="margin:0; font-family:'Orbitron'; font-size:10px;">${task.name}</h4><span style="color:var(--p-green); font-size:9px;">+${task.reward} ABP</span></div>
                    <button class="status-pill" ${isDone ? 'disabled' : ''} onclick="handleDailyTask('${task.id}', '${task.link}', ${task.reward})">
                        ${isDone ? 'COMPLETED' : 'GO'}
                    </button>
                `;
                container.appendChild(card);
            });
        }

        async function handleDailyTask(id, link, reward) {
            window.open(link, '_blank');
            setTimeout(async () => {
                const today = new Date().toISOString().split('T')[0];
                await userRef.child('dailyTasks').child(id).set({ date: today });
                await userRef.update({ balance: firebase.database.ServerValue.increment(reward) });
            }, 5000);
        }

        // --- DIAMOND MINES ---
        let mines = [], mineActive = false, diamondsFound = 0;
        function openMines() {
            showOverlay('DIAMOND_HUNT_V2');
            document.getElementById('mines-box').style.display = 'block';
            const grid = document.getElementById('mines-grid-container'); grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const tile = document.createElement('div'); tile.className = 'mine-tile';
                tile.onclick = () => revealMine(i, tile); grid.appendChild(tile);
            }
            const btn = document.getElementById('main-game-btn'); btn.innerText = "START";
            btn.onclick = () => startMines();
        }

        async function startMines() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            const snap = await userRef.child('balance').get();
            if(snap.val() < bet) return alert("Low Balance!");
            await userRef.update({ balance: firebase.database.ServerValue.increment(-bet) });
            mineActive = true; diamondsFound = 0; mines = Array(25).fill('💎');
            for(let i=0; i<4; i++) mines[Math.floor(Math.random()*25)] = '💣';
            document.getElementById('main-game-btn').innerText = "CASH OUT (0)";
            document.getElementById('main-game-btn').onclick = () => cashoutMines();
        }

        function revealMine(idx, el) {
            if(!mineActive || el.innerText !== '') return;
            if(mines[idx] === '💣') {
                el.innerText = '💥'; mineActive = false; alert("BOMB!"); closeGame();
            } else {
                el.innerText = '💎'; diamondsFound++;
                let win = Math.floor(document.getElementById('bet-amount').value * (1 + diamondsFound * 0.25));
                document.getElementById('main-game-btn').innerText = `CASH OUT (${win})`;
            }
        }

        async function cashoutMines() {
            let win = Math.floor(document.getElementById('bet-amount').value * (1 + diamondsFound * 0.25));
            await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
            closeGame();
        }

        // --- SPIN SYNC ---
        let canSpin = true;
        function openSpinSync() {
            showOverlay('SPIN_SYNC');
            document.getElementById('spin-box').style.display = 'block';
            const btn = document.getElementById('main-game-btn'); btn.innerText = "SPIN (100)";
            btn.onclick = () => startSpin();
        }

        async function startSpin() {
            if(!canSpin) return;
            const snap = await userRef.child('balance').get();
            if(snap.val() < 100) return alert("Low ABP!");
            canSpin = false; await userRef.update({ balance: firebase.database.ServerValue.increment(-100) });
            const wheel = document.getElementById('wheel');
            const deg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transform = `rotate(${deg}deg)`;
            setTimeout(async () => {
                const actualDeg = deg % 360;
                let win = 0;
                if (actualDeg > 90 && actualDeg < 135) win = 250; 
                else if (actualDeg > 180 && actualDeg < 225) win = 500;
                else if (actualDeg > 270 && actualDeg < 315) win = 1000;
                if(win > 0) await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
                canSpin = true; closeGame();
                wheel.style.transition = 'none'; wheel.style.transform = 'rotate(0deg)';
                setTimeout(() => wheel.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.1, 1)', 100);
            }, 5200);
        }

        // --- CRASH ---
        let crashInterval, multiplier = 1.00, isPlaying = false, points = [];
        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');

        function openCrash() { 
            showOverlay('QUANTUM_CRASH');
            document.getElementById('crash-box').style.display = 'block';
            resetCrash();
            const btn = document.getElementById('main-game-btn'); btn.innerText = "LAUNCH";
            btn.onclick = () => handleCrashAction();
        }

        function resetCrash() { points = []; multiplier = 1.00; ctx.clearRect(0,0,300,180); document.getElementById('crash-multiplier').innerText = "1.00x"; }

        async function handleCrashAction() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            const btn = document.getElementById('main-game-btn');
            if(!isPlaying) {
                const snap = await userRef.child('balance').get();
                if(snap.val() < bet) return alert("Low ABP!");
                await userRef.update({ balance: firebase.database.ServerValue.increment(-bet) });
                isPlaying = true; resetCrash(); btn.innerText = "CASH OUT";
                const crashPoint = Math.pow(Math.random(), -0.7);
                crashInterval = setInterval(() => {
                    multiplier += 0.015 + (multiplier * 0.006);
                    document.getElementById('crash-multiplier').innerText = multiplier.toFixed(2) + "x";
                    drawGraph();
                    if(multiplier >= crashPoint) { clearInterval(crashInterval); isPlaying = false; closeGame(); }
                }, 90);
            } else {
                clearInterval(crashInterval); isPlaying = false;
                const win = Math.floor(bet * multiplier);
                await userRef.update({ balance: firebase.database.ServerValue.increment(win) });
                closeGame();
            }
        }

        function drawGraph() {
            ctx.clearRect(0,0,300,180);
            ctx.beginPath(); ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 3;
            ctx.moveTo(0, 180);
            let curX = points.length * 2.2;
            let curY = 180 - (Math.pow(multiplier, 1.35) * 15);
            points.push({x: curX, y: curY});
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
            
            // Draw Rotated Plane (Udate hue style)
            ctx.save();
            ctx.translate(curX, curY);
            ctx.rotate(-45 * Math.PI / 180); // Rotate to fly UP
            ctx.drawImage(planeImg, -15, -15, 30, 30);
            ctx.restore();
        }

        function showOverlay(title) {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('crash-box').style.display = 'none';
            document.getElementById('spin-box').style.display = 'none';
            document.getElementById('mines-box').style.display = 'none';
        }

        function closeGame() { 
            document.getElementById('game-overlay').style.display = 'none'; 
            clearInterval(crashInterval); isPlaying = false; mineActive = false;
        }
    </script>
</body>
</html>
