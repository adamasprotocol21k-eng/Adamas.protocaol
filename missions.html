<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADAMAS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --bg: #000; --card: rgba(255, 255, 255, 0.03); --border: rgba(0, 242, 255, 0.2); --neon-green: #00ff88; --neon-red: #ff4444; }
        body { background-color: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .mission-wrapper { padding: 20px; }
        
        .mission-header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            padding: 15px; border-radius: 15px; border: 1px solid var(--border); 
            margin-bottom: 20px; position: sticky; top: 10px; z-index: 100;
        }

        .energy-bar { width: 100px; height: 6px; background: #111; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 1px solid #222; }
        .energy-fill { height: 100%; background: linear-gradient(90deg, #00f2ff, #0066ff); transition: width 0.3s; box-shadow: 0 0 10px var(--cyan); }
        .mult-val { display: block; font-size: 22px; font-family: 'Orbitron'; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        .section-title { font-family: 'Orbitron'; font-size: 12px; margin: 25px 0 15px; color: #555; letter-spacing: 2px; text-transform: uppercase; }

        .game-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 15px; border-radius: 20px; margin-top: 10px;
        }

        /* 💎 DIAMOND HUNT (MINES) GRID */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .mine-tile { 
            aspect-ratio: 1; background: #111; border-radius: 10px; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            cursor: pointer; transition: 0.3s;
        }
        .mine-tile.revealed { background: #1a1a1a; border-color: var(--cyan); transform: rotateY(180deg); }
        .mine-tile.win { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .mine-tile.bomb { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }

        /* 🐔 CHICKEN ROAD STYLES */
        .road-container { background: #080808; border-radius: 15px; padding: 15px; position: relative; overflow: hidden; }
        .road-lane { height: 40px; border-bottom: 1px dashed #222; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #333; }
        .chicken-btn { 
            width: 100%; padding: 12px; background: var(--cyan); color: #000; 
            font-family: 'Orbitron'; border: none; border-radius: 10px; margin-top: 10px; cursor: pointer;
        }

        .btn-cashout {
            width: 100%; margin-top: 15px; padding: 15px; background: var(--neon-green);
            color: #000; border: none; border-radius: 12px; font-weight: bold;
            font-family: 'Orbitron'; cursor: pointer; display: none;
        }

        /* TERMINAL STYLES */
        .mission-terminal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px;
            display: none; flex-direction: column;
        }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 18px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { text-decoration: none; color: #444; font-size: 10px; font-weight: bold; font-family: 'Orbitron'; }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body>

    <div class="mission-wrapper">
        <header class="mission-header">
            <div>
                <span style="font-size: 10px; color: #555;">ABP BALANCE</span>
                <span id="header-balance" style="display:block; color:white; font-family:'Orbitron';">0.00</span>
                <div class="energy-bar"><div id="energy-fill" class="energy-fill" style="width: 100%;"></div></div>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 10px; color: #555;">ACTIVE MULTIPLIER</span>
                <span id="active-multiplier" class="mult-val">1.0x</span>
            </div>
        </header>

        <section class="game-section">
            <h2 class="section-title">💎 DIAMOND HUNT (MINES)</h2>
            <div class="game-card">
                <div style="display:flex; justify-content:space-between; font-size:12px; color:#888;">
                    <span>BET: 100 ABP</span>
                    <span id="mine-multiplier" style="color:var(--neon-green)">NEXT: 1.25x</span>
                </div>
                <div id="mines-grid" class="mines-grid"></div>
                <button id="mine-start-btn" class="chicken-btn" onclick="startMines()">START NEW HUNT</button>
                <button id="mine-cashout-btn" class="btn-cashout" onclick="cashoutMines()">CASHOUT DIAMONDS</button>
            </div>
        </section>

        <section class="game-section">
            <h2 class="section-title">🐔 CHICKEN ROAD (CRASH)</h2>
            <div class="game-card">
                <div class="road-container" id="road-display">
                    <div class="road-lane">LANE 5 (5.0x)</div>
                    <div class="road-lane">LANE 4 (3.0x)</div>
                    <div class="road-lane">LANE 3 (2.0x)</div>
                    <div class="road-lane">LANE 2 (1.5x)</div>
                    <div class="road-lane">LANE 1 (1.2x)</div>
                </div>
                <button class="chicken-btn" style="background:#ffaa00;" onclick="startChickenRun()">CROSS THE ROAD (50 ABP)</button>
            </div>
        </section>

        <section class="mission-section">
            <h2 class="section-title">⚡ PROTOCOL TASKS</h2>
            <button class="chicken-btn" onclick="toggleMissionList()" style="background:transparent; border:1px solid var(--cyan); color:var(--cyan);">OPEN MISSION TERMINAL</button>
        </section>

        <div id="mission-terminal" class="mission-terminal-overlay">
            <div style="display:flex; justify-content:space-between;">
                <span style="font-family:'Orbitron'; color:var(--cyan);">MISSION_LOG</span>
                <button onclick="toggleMissionList()" style="color:red; background:none; border:none;">CLOSE</button>
            </div>
            <div id="mission-list-container" style="margin-top:20px;"></div>
        </div>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">DASHBOARD</a>
            <a href="missions.html" class="nav-item active">MISSIONS</a>
            <a href="profile.html" class="nav-item">PROFILE</a>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="missions.js"></script>
</body>
</html>
